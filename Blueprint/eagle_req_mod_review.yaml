# =============================================================================
# MODULE REQUIREMENTS  (1 requirements)
# =============================================================================

requirements:

  # -------------------------------------------------------------------------
  # Human review and approval gate
  # -------------------------------------------------------------------------
  human_review_and_approval_gate:

    - id: REQ-REV-001
      title: "Mandatory human review and approval gate"
      layer: [L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8]
      regulatory: [DORA, AIFMD, AI_ACT]
      description: >
        Non-bypassable pre-submission gate. Authorised user must explicitly review
        and approve the record. Required roles: COMPLIANCE_REVIEWER or TENANT_ADMIN.
        Supports individual record review and bulk approval for zero-flag records.
        Cross-NCA grouped approval per REQ-MJ-006. API callers require a valid
        approval token generated by this gate before any submission proceeds.
      review_checklist:
        - "All CAF errors resolved or overridden with documented justification"
        - "All CAM flags reviewed and accepted, corrected, or overridden"
        - "All DQ quality warnings acknowledged individually with explanations"
        - "Reporting period and filing type confirmed correct"
        - "Fund count and AIFM-AIF consistency confirmed"
        - "For overridden checks: acknowledgement of full regulatory responsibility"
      bulk_approval:
        eligible_records: "Records with zero flags — all L3 checks PASS, zero CAM, zero DQ, zero overrides"
        required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
        pre_conditions: "Validation 100% complete; reviewer confirms batch summary statistics"
        audit_record: "Batch-level event with record count and Merkle tree root hash of approved canonical records"
        excluded: "Any record with a single flag of any category requires individual review"
      acceptance_criteria:
        - "Each checklist item requires individual acknowledgement — bulk approval of checklist not permitted"
        - "Any change to canonical record after approval invalidates approval and requires new review cycle"
        - "Approval creates immutable record: approver identity, role, timestamp, checklist acknowledgements, canonical record hash"


