framework_coverage:
  total_requirements: 151
  by_section:
    functional_requirements: 95
    technical_requirements: 23
    iso27001_controls: 12
    gdpr_controls: 5
    ai_act_controls: 4
    dora_requirements: 4
    out_of_scope_items: 7
  additions_v1_4_0:
    new_change_release_requirements: 10
    note: >
      REQ-REL-001: Validation rule regression test suite — formalises the gate
      referenced (but undefined) in REQ-ISO-004; 100% ESMA rule and NCA override
      coverage; auto-generated from rule YAML; pipeline-blocking gate.
      REQ-REL-002: CI/CD pipeline as a formal requirement — all mandatory gates
      enumerated; pipeline integrity controls; no-manual-deployment principle.
      REQ-REL-003: Four-eyes production deployment approval gate — role-specific
      approvers per change category; author cannot approve own change.
      REQ-REL-004: Staging acceptance criteria — defines "validated in staging"
      from REQ-ISO-004; explicit smoke test scenarios, DAST gate, reference data
      checks, formal pass/fail criteria.
      REQ-REL-005: Change freeze window — standard changes pipeline-blocked within
      5 business days of any active client NCA submission deadline.
      REQ-REL-006: Post-deployment verification and rollback trigger — 30-minute
      watch window; defined trigger conditions; auto-rollback escalation.
      REQ-REL-007: Release communication to clients — three-tier model aligned to
      REQ-ISO-004 change categories; structured notice periods and content.
      REQ-REL-008: IaC formal requirement — all environments in version-controlled
      IaC; no manual console changes to production or staging.
      REQ-REL-009: Configuration drift detection — daily automated reconciliation;
      drift alert within 1 hour; Phase 1.5.
      REQ-REL-010: Release record and semantic versioning — formal release manifest
      tying software, rule file, NCA override, AI model, allowlist versions;
      immutable audit trail entry per deployment.
      REQ-ISO-004 amended: significant change category now explicitly references
      REQ-REL-001, REQ-REL-003, REQ-REL-004; change freeze bullet added.
    phase_distribution:
      phase_1: 140
      phase_1_5: 9
      phase_2: 3
  additions_v1_3_0:
    scope_change: "Document renamed from Application Requirements to Company Requirements"
    module_rename: "MOD-INTERNAL renamed to MOD-MANAGEMENT; scope expanded to company-wide"
    new_principle: "P14 (Database-first) added; applied to all new and updated COO operations requirements"
    new_coo_operations_requirements: 8
    updated_existing_requirements: 6
    note: >
      REQ-OPS-007: Automated client health score — DB-native composite score
      replacing manual COO assessment; auto-actions on RED/AMBER tiers.
      REQ-OPS-008: Exception pattern analysis — automatic recurring pattern
      detection; automation gap intelligence stored in automation_gaps table
      for CTO/CPO roadmap intake.
      REQ-OPS-009: Vendor SLA tracking — vendor_register and vendor_deliveries
      tables; continuous monitoring; breach alerts with DB-linked exceptions.
      REQ-OPS-010: Cost-per-submission model — auto-computed from existing DB
      tables; cost_per_submission_model table; stateless simulation tool.
      REQ-OPS-011: Monthly operational report — monthly_operational_reports
      table; all sections populated from existing DB tables; PDF is a view.
      REQ-OPS-012: Capacity breach alerts — capacity_thresholds and
      capacity_projections tables; weekly projection; exception auto-opened.
      REQ-OPS-013: Post-incident review workflow — incident_reviews table;
      auto-populated from audit trail and impact register; feeds automation_gaps.
      REQ-OPS-014: AI pipeline performance monitoring — ai_field_performance
      and ai_override_patterns tables; sourced from audit trail; AI Act evidence.
      Updated REQ-OPS-001..006 and REQ-INT-001: removed CSV/file as primary
      storage; replaced with DB records and on-demand generated views.
    phase_distribution:
      phase_1: 130
      phase_1_5: 8
      phase_2: 3

