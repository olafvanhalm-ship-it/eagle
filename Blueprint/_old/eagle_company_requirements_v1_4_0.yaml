          definition: "Service degradation >1 hour not near deadline"
          client_notification: "Within 24 hours"
        MINOR:
          definition: "Isolated fault with no client impact"
          client_notification: "Monthly service report"
      requirements:
        - "Incident reporting workflow generates structured reports with all DORA Art.18 and NIS2 Art.23 required fields"
        - "Post-incident review within 5 business days for MAJOR incidents"
