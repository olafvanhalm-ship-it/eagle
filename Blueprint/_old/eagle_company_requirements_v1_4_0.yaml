#
# design_decisions_on_record:
#   - AIFMD 2.0 is out of scope. Requirements will be extended when ESMA
#     publishes implementing technical standards (~April 2027).
#   - Multi-tenancy: both AIFM-direct and service-provider-with-multiple-AIFMs
#     models are supported simultaneously.
#   - Historical data: Eagle starts clean. Import of historical submissions
#     for amendment traceability is a COULD item (REQ-AUD-005).
#   - NCA submission: five channel model per NCA registration.
#   - AIFM workflow is independent of AIF completion; aggregation is a
#     convenience calculation that recalculates automatically, not a gate.
#   - Cross-NCA bulk approval offered automatically when canonical content
#     hashes match; no manual mirror configuration required.
#   - Manual override of derived fields locks the field with a visible indicator;
#     original calculated value retained in history; client can explicitly unlock.
#   - ECB rates: use last known good with DQ warning if stale >2 business days;
#     block if >10 business days. GLEIF cache: stale produces DQ warning only.
#   - NCA portal robot fallback: on failure Eagle operations is notified,
#     submission falls back to MANUAL, client notified within 30 minutes.
#   - Batch approval: individual validation per AIF record; review gate supports
#     both per-record and bulk approval for zero-flag records.
#   - Module architecture: the application is structured in ten functional
#     modules. Each module has an independent specification scope. Module
#     boundaries do not imply separate deployables; they define specification
#     and ownership boundaries. Cross-cutting concerns (security, resilience,
#     IAM, GDPR, AI Act, DORA) apply to all modules and are owned at
#     application level.
#   - Billing module: commercial and subscription logic is intentionally
#     separated from the compliance pipeline. No billing data flows through
#     the reporting factory. Billing module specification deferred to Phase 1.5.
