# =============================================================================
# 1.  REFERENCE INDEXES
# =============================================================================

principle_index:
  P1:  "Customer experience first — simplicity, reliability, predictability over customisation"
  P2:  "Code-first, human-by-exception — automated orchestration; humans for exceptions only"
  P3:  "Standardised product — fixed scope, reproducible quality, no bespoke"
  P4:  "Single source of truth — canonical data model; quality, lineage and ownership explicit"
  P5:  "Deterministic core, probabilistic edge — AI for transformation only; all compliance logic rule-based"
  P6:  "Modular and portable — logic, data and rules separated from AI models and infrastructure"
  P7:  "Resilience — every process has defined failure modes, fallbacks and escalation paths"
  P8:  "Compliance-proof by design — deterministic, auditable, explainable; AI supports, never decides"
  P9:  "Security by design — client data isolated, least-privilege access, encrypted in transit and at rest"
  P10: "Founder-independent — all knowledge, rules and processes fully codified in systems"
  P11: "Continuous learning — every process generates feedback data to improve models, rules and outputs"
  P12: "Ambitious growth and profitability — cash flow positive within two years; >€1M ARR; >50% EBITDA margin"
  P13: "Internationally oriented — products offered worldwide; all communication in English"
  P14: "Database-first — all operational state, metrics, scores and reports stored in the database as first-class records; file exports (PDF, CSV, JSON) are generated views of DB data, never the system of record; no loose extract workflows"

regulatory_index:
  AIFMD:      "Directive 2011/61/EU — Arts. 3(3)(d), 24(1), 24(2), 24(4)"
  CDR231:     "CDR (EU) No 231/2013 — Arts. 2, 10, 110-127"
  ESMA_GUIDE: "ESMA Guidelines on AIFMD Reporting ESMA/2014/869rev"
  DQEF:       "ESMA DQEF ESMA50-1605533872-8305 (May 2025)"
  IT_TECH_R6: "ESMA IT Technical Guidance Revision 6 (from 2023-11-22)"
  DORA:       "Regulation (EU) 2022/2554 — DORA"
  GDPR:       "Regulation (EU) 2016/679 — GDPR"
  AI_ACT:     "Regulation (EU) 2024/1689 — EU AI Act"
  ISO27001:   "ISO/IEC 27001:2022 — Information Security Management"
  NIS2:       "Directive (EU) 2022/2555 — NIS2"

priority_framework:
  MUST:   "Non-negotiable. Regulatory compliance or core product function. Phase 1."
  SHOULD: "Important. Significant risk or commercial value if deferred. Phase 1."
  COULD:  "Beneficial. Acceptable to defer to Phase 2."
  WONT:   "Explicitly out of scope for this version."

phase_framework:
  1:   "Launch-critical. Must be live before or at first client go-live."
  1.5: "Post-launch, pre-scale. Target: first 10 clients or first funding round."
  2:   "Scale phase. Target: >€1M ARR or Series A."
  note: >
    Phase tags are indicative and subject to the roadmap constraint model
    (CTO/CPO owns sequencing). Phase tags enable the phasing review pass
    without restructuring individual requirements. All MUST requirements
    without a phase tag are implicitly Phase 1.

gdpr_blocker_definition:
  description: >
    A formal requirement attribute. When gdpr_blocker: true is set on a
    requirement, that requirement cannot be deployed to production until
    the corresponding RoPA entry has status SIGNED_OFF in the compliance
    workflow (REQ-INT-003, Phase 2). In Phase 1, gdpr_blocker requirements
    are tracked manually by Head of Compliance and Risk as a go-live gate.
  values:
    true:  "Deployment to production blocked until RoPA entry is SIGNED_OFF"
    false: "No RoPA blocker — default for all requirements unless explicitly set"
  phase_1_process: >
    Before REQ-INT-003 is built, Head of Compliance and Risk manually
    confirms RoPA sign-off for all gdpr_blocker: true requirements.
    This confirmation is recorded as a dated sign-off in the compliance
    risk register. The automated gate (REQ-INT-003) replaces this manual
    process in Phase 2.

# =============================================================================
# 1B.  MODULE ARCHITECTURE
# =============================================================================
#
# The Eagle application is structured into ten functional modules. Each module
# has a distinct user audience, bounded specification scope, and an independent
# future specification document. Module boundaries define specification and
# ownership boundaries — they do not imply separate deployables or
# microservices; that is an infrastructure decision.
#
# Cross-cutting concerns (IAM, security, resilience, GDPR, AI Act, DORA)
# apply to all modules and are maintained at application level.
# The full requirement-to-module assignment is in section 12.
# =============================================================================

module_index:

  MOD-ADMIN:
    name: "Eagle Administration"
    description: >
      Internal Eagle operations surface. Used exclusively by EAGLE_ADMIN role.
      Covers tenant provisioning and lifecycle, user account management,
      system configuration, reference data management, NCA credential vault
      administration, and system-wide audit log access.
    primary_users: [EAGLE_ADMIN]
    pipeline_layers: [L11_IAM, L9_ORCHESTRATION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-ADMIN-SPEC v1.0"

  MOD-MANAGEMENT:
    name: "Company Management Intelligence"
    description: >
      See the MOD-MANAGEMENT entry in the module_index above for the full
      description (updated in v1.3.0 — company-wide scope, DB-first).
    primary_users: [EAGLE_ADMIN, COO, CCO, CRO, CFO, CCO_DELEGATE]
    pipeline_layers: [L9_ORCHESTRATION, L8_AUDIT]
    specification_status: >
      COO-view requirements in this document (REQ-OPS-001 through REQ-OPS-006,
      added v1.1.0). CCO/CRO-view requirements added v1.2.0 (REQ-INT-001,
      REQ-INT-002). Detailed spec deferred to MOD-MANAGEMENT-SPEC v1.0.
    renamed_from: "MOD-OPS (v1.1.0) → MOD-INTERNAL (v1.2.0) → MOD-MANAGEMENT (v1.3.0)"

  MOD-BILLING:
    name: "Billing and Subscriptions"
    description: >
      Commercial operations module. Manages subscription plans, per-client
      pricing configuration, usage-based billing inputs (submission count,
      AIF count, NCA registrations), invoice generation, and payment status
      tracking. Billing data is strictly isolated from the compliance pipeline.
      No billing logic touches canonical records or audit trail.
      Trial-to-paid conversion flow is owned by MOD-TRIAL (trigger) and
      MOD-BILLING (subscription activation); the handoff is defined in
      REQ-TRIAL-001 and REQ-TRIAL-006.
    primary_users: [EAGLE_ADMIN, CFO]
    pipeline_layers: []
    specification_status: "Detailed spec deferred to MOD-BILLING-SPEC v1.0 (Phase 1.5)"
    note: >
      Phase 1 billing is handled operationally. Application billing module
      is a Phase 1.5 item triggered at approximately 10 or more clients or
      first external funding round. Trial-to-paid conversion trigger point
      is defined in Phase 1 (REQ-TRIAL-006) even though full billing module
      is deferred.

  MOD-GTM:
    name: "Go-to-Market Automation"
    description: >
      Internal module for Eagle's commercial acquisition pipeline. Manages the
      internal AIFM prospect database (built from ESMA and national registers),
      web-based strategy enrichment, inbound legitimacy validation, MQL scoring,
      and CRM integration. Not visible to prospects or clients. Outputs feed
      MOD-TRIAL (provisioning trigger) and MOD-MANAGEMENT CCO-view (funnel metrics).
      The external toolstack (email sequencing, LinkedIn outreach) is out of scope
      for this module; the integration endpoints that connect those tools to Eagle
      are in scope.
    primary_users: [EAGLE_ADMIN, CCO, CRO, CCO_DELEGATE]
    pipeline_layers: [L9_ORCHESTRATION]
    specification_status: >
      Core requirements added in v1.2.0 (REQ-GTM-001 through REQ-GTM-003).
      Detailed spec deferred to MOD-GTM-SPEC v1.0.
    gdpr_note: >
      Processing of prospect personal data requires a legitimate interest basis
      documented in the Eagle RoPA before go-live. See REQ-GTM-002.

  MOD-TRIAL:
    name: "Trial Account Lifecycle"
    description: >
      Manages the full lifecycle of trial tenants from self-service registration
      through expiry or conversion to a paid account. Covers: inbound legitimacy
      validation gate (fed by MOD-GTM score), self-service trial provisioning,
      configurable time limit (default 60 days), feature gating (no Annex IV
      download or NCA submission), pre-population from register data, AI-assisted
      strategy orientation, pre-population quality scoring with COO ops review,
      trial health monitoring, upgrade trigger to Pipedrive and MOD-BILLING, and
      trial data retention. Trial tenants are isolated from paid tenants at the
      data and IAM layers.
    primary_users: [EAGLE_ADMIN, COO, CCO_DELEGATE, TRIAL_USER]
    pipeline_layers: [L1_INGESTION, L1B_ADAPTER, L2_TRANSFORMATION,
                      L9_ORCHESTRATION, L11_IAM]
    specification_status: >
      Core requirements added in v1.2.0 (REQ-TRIAL-001 through REQ-TRIAL-007).
      Detailed spec deferred to MOD-TRIAL-SPEC v1.0.
    dependencies:
      - "MOD-GTM: legitimacy score input to REQ-TRIAL-001 provisioning gate"
      - "MOD-ADMIN: trial tenant creation via existing provisioning path"
      - "MOD-DATA: pre-population uses L1/L2 pipeline with TRIAL_PRE_POP flag"
      - "MOD-BILLING: trial-to-paid conversion handoff at REQ-TRIAL-006 trigger"
      - "MOD-MANAGEMENT: trial health and quality metrics feed CCO-view dashboard"

  MOD-CLIENT:
    name: "Client Compliance Portal"
    description: >
      The primary tenant-facing application surface. Covers the full
      compliance workflow from reporting obligation setup through submission
      confirmation: AIFM and AIF profile management, reporting calendar,
      NCA obligation matrix, data upload and status tracking, validation
      result review, submission history, and notifications. This is the
      module clients interact with day-to-day.
    primary_users: [TENANT_ADMIN, COMPLIANCE_REVIEWER, DATA_PREPARER, READ_ONLY]
    pipeline_layers: [L9_ORCHESTRATION, L11_IAM]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-CLIENT-SPEC v1.0"

  MOD-DATA:
    name: "Data Ingestion and Processing"
    description: >
      Covers the full data intake and preparation pipeline: all five ingestion
      channels (API, file upload, SFTP, manual entry, AI-assisted parsing),
      legacy template adapters, position data management, derived field
      calculations (leverage, AuM, rankings), AI transformation layer, and
      canonical data model. Produces a validated canonical record ready for
      L3 compliance checking.
    primary_users: [DATA_PREPARER, COMPLIANCE_REVIEWER]
    pipeline_layers: [L1_INGESTION, L1B_ADAPTER, L2_TRANSFORMATION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-DATA-SPEC v1.0"

  MOD-COMP:
    name: "Compliance Engine"
    description: >
      The deterministic compliance core. Covers AIFMD Annex IV field-level
      validation (L3), ESMA DQEF quality checks (L4), CAF/CAM/DQ override
      management, amendment workflow, and AIFM-level aggregation logic.
      No AI involvement at this layer. All logic is rule-based, version-
      controlled, and auditable. This module is the regulatory heart of Eagle.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN]
    pipeline_layers: [L3_VALIDATION, L4_QUALITY]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-COMP-SPEC v1.0"

  MOD-REVIEW:
    name: "Review and Approval Gate"
    description: >
      The mandatory human review gate (L5). Supports individual record
      review, bulk approval for zero-flag records, cross-NCA grouped approval
      for content-identical variants, and the diff view for NCA variants with
      override differences. Non-bypassable. This gate is the primary DORA
      Art.30 oversight control and the structural condition for non-high-risk
      EU AI Act classification.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN]
    pipeline_layers: [L5_REVIEW]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-REVIEW-SPEC v1.0"

  MOD-SUB:
    name: "Submission and Delivery"
    description: >
      NCA file packaging (L6) and delivery (L7). Covers XML generation and
      wrapping, NCA-specific packaging configuration (compression, naming,
      structure), all five delivery channels (DIRECT_API, ROBOT_PORTAL,
      S3_CLIENT_BUCKET, S3_EAGLE_BUCKET, SFTP_EAGLE_SERVER, MANUAL), portal
      robot management, NCA credential vault, and submission acknowledgement
      processing. Produces the submission audit record.
    primary_users: [EAGLE_ADMIN, COMPLIANCE_REVIEWER]
    pipeline_layers: [L6_PACKAGING, L7_SUBMISSION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-SUB-SPEC v1.0"

  MOD-AUDIT:
    name: "Audit Trail, Lineage and Archive"
    description: >
      Immutable event log (L8), field-level lineage view, logic transparency
      panel, submission archive, and traceability reports. Serves internal
      compliance sign-off, NCA enquiry response, ISAE 3402/SOC 2 auditor
      review, and EU AI Act evidence requirements. All data in this module
      is append-only and retained for ten years.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN, READ_ONLY, EAGLE_ADMIN]
    pipeline_layers: [L8_AUDIT]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-AUDIT-SPEC v1.0"

  MOD-API:
    name: "External API and Integration"
    description: >
      Versioned REST API (L10) for programmatic data ingestion, status
      retrieval, and white-label embedding. Covers API authentication
      (OAuth 2.0 / API keys), versioning policy, rate limiting, OpenAPI
      specification, and the white-label embedding capability for service
      providers who want to surface Eagle within their own platform.
    primary_users: [External integrators, service providers]
    pipeline_layers: [L10_API]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-API-SPEC v1.0"

# =============================================================================
# 2.  PIPELINE ARCHITECTURE
# =============================================================================

pipeline_layers:

  L1_INGESTION:
    name: "Data Ingestion"
    description: >
      Receives fund data and position data via five channels: REST API push,
      structured file upload (CSV/Excel/JSON), SFTP inbound, manual web UI entry,
      and AI-assisted unstructured document parsing. Includes automatic format
      detection for known legacy template formats. Produces a raw,
      channel-agnostic payload for the adapter or transformation layer.
    principles: [P2, P4, P5, P6, P9]

  L1B_ADAPTER:
    name: "Legacy Template Adapter"
    description: >
      Sits between L1 and L2. Processes known legacy template formats
      (M registered, M authorised, ESMA legacy) and applies
      deterministic enrichment calculations (AuM aggregation, leverage derivation,
      currency conversion) before passing a normalised intermediate record to L2.
      Fully deterministic; no AI involvement at this layer.
    principles: [P5, P6, P10]

  L2_TRANSFORMATION:
    name: "AI Transformation and Derivation"
    description: >
      Two distinct functions at this layer:
      (a) Claude normalises and maps raw input to the Eagle canonical data model
          for unstructured sources and non-standard layouts. Output is always a
          candidate mapping requiring human confirmation.
      (b) The deterministic calculation engine derives Annex IV reportable fields
          from position-level data (rankings, leverage, unencumbered cash, AuM
          aggregation). All calculations are rule-based and fully auditable.
      AI output never flows directly into a regulatory submission. Every
      AI-mapped field must pass L3 before it enters the canonical record.
    principles: [P5, P6, P8, P11]
    regulatory: [AI_ACT]
    ai_act_note: >
      This layer is classified non-high-risk under the EU AI Act because AI
      output never flows directly into a regulatory submission. The deterministic
      validation core (L3) is the mandatory gate. This classification is
      conditional on that gate remaining non-bypassable.

  L3_VALIDATION:
    name: "Deterministic Validation Core"
    description: >
      Rule-based validation of every field against the AIFMD canonical data
      model and aifmd_annex_iv_validation_rules_v0_3.yaml. Validation is run
      once per NCA registration per record, applying the NCA-specific override
      profile for each target. Produces a structured validation report per field
      per NCA: PASS / CAF / CAM / DQ-WARNING. All logic is deterministic,
      version-controlled and auditable. No AI involvement.
    principles: [P4, P5, P8, P10]
    regulatory: [AIFMD, CDR231, ESMA_GUIDE, DQEF, IT_TECH_R6]

  L4_QUALITY:
    name: "DQEF Quality Layer"
    description: >
      Statistical and plausibility checks per the ESMA DQEF framework.
      Runs after L3. Flags issues for human review. Never blocks a submission
      autonomously — escalates to the human review gate.
    principles: [P5, P7, P8, P11]
    regulatory: [DQEF]

  L5_REVIEW:
    name: "Human Review and Approval Gate"
    description: >
      Mandatory pre-submission gate. An authorised user must explicitly review
      and approve the record before submission proceeds. Non-bypassable by any
      means including API calls. Supports both individual record review and
      bulk approval for zero-flag records. Cross-NCA grouped approval offered
      automatically when NCA variants are content-identical.
      This gate is the primary DORA Art.30 oversight control, the liability
      protection mechanism, and the structural condition maintaining the
      non-high-risk EU AI Act classification.
    principles: [P2, P8]
    regulatory: [DORA, AIFMD, AI_ACT]

  L6_PACKAGING:
    name: "NCA File Packaging"
    description: >
      Wraps validated XML into the file format required by the target NCA.
      Packaging is configurable per NCA: XML structure (single vs multi-AIF),
      compression (none / ZIP / ZIP-per-AIF / ZIP-of-ZIPs / GZIP), file naming
      template, and minor XML variations. Configuration loaded from NCA override
      files at runtime. Packaging never alters XML content.
    principles: [P3, P6, P10]
    regulatory: [AIFMD, IT_TECH_R6]

  L7_SUBMISSION:
    name: "NCA Delivery"
    description: >
      Delivers the packaged submission to the NCA or to the client for onward
      delivery, via the channel configured per NCA registration: DIRECT_API,
      ROBOT_PORTAL, S3_CLIENT_BUCKET, S3_EAGLE_BUCKET, SFTP_EAGLE_SERVER,
      or MANUAL download. All channels produce an equivalent audit record.
    principles: [P2, P3, P7, P8, P9]
    regulatory: [AIFMD, DORA]

  L8_AUDIT:
    name: "Audit Trail and Lineage"
    description: >
      Immutable, append-only log of every event across all pipeline layers.
      AI-assisted steps tagged distinctly. Field provenance recorded per field.
      Reference data versions recorded per calculation. Supports ISAE 3402,
      SOC 2, ISO 27001 and EU AI Act evidence requirements.
    principles: [P4, P8, P9, P10]
    regulatory: [DORA, GDPR, ISO27001, AI_ACT]

  L9_ORCHESTRATION:
    name: "Orchestration, Workflow and Queue"
    description: >
      Priority queue architecture for on-demand pipeline execution. Manages
      state machine transitions, per-client resource quotas, deadline monitoring,
      notification dispatch, and escalation triggers. Central control layer
      per Principle 2. Scales horizontally via auto-scaling worker pools.
    principles: [P2, P7, P10]
    regulatory: [DORA]

  L10_API:
    name: "External API and Integration"
    description: >
      Versioned REST API for programmatic data ingestion and status retrieval.
      White-label embedding capability. Secured with OAuth 2.0 / API keys.
    principles: [P3, P6, P9, P13]
    regulatory: [GDPR, DORA]

  L11_IAM:
    name: "Identity, Access and Tenant Management"
    description: >
      Multi-tenant access control. Manages organisations, users, roles,
      permissions, and NCA credential vault. Enforces per-client data isolation.
      Supports AIFM-direct and service-provider tenancy models.
    principles: [P9, P10]
    regulatory: [GDPR, DORA, ISO27001]


# =============================================================================
# 3.  FUNCTIONAL REQUIREMENTS
# =============================================================================

functional_requirements:

  # ---------------------------------------------------------------------------
  # 3.1  TENANT AND ORGANISATION MANAGEMENT
  # ---------------------------------------------------------------------------
  tenant_management:

    - id: REQ-TEN-001
      title: "Strict multi-tenant data isolation"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9, P10]
      regulatory: [GDPR, DORA, ISO27001]
      description: >
        Every tenant's data is logically isolated at database and application layer.
        No data from one tenant may be accessible by another under any circumstances
        including error states, background jobs, or shared infrastructure.
      acceptance_criteria:
        - "Row-level security or equivalent enforced at data layer for all queries"
        - "Background jobs are tenant-scoped; cross-tenant access is architecturally impossible"
        - "Automated tests verify isolation boundary"
        - "Isolation boundary documented in security architecture for ISAE audit"

    - id: REQ-TEN-002
      title: "Dual tenancy model: direct AIFM and service provider"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P3, P9]
      regulatory: [DORA, AIFMD]
      description: >
        A tenant may represent a single AIFM or a service provider managing
        multiple AIFMs. In the service provider model each underlying AIFM is a
        distinct sub-entity with isolated data and its own NCA identifiers.
        For DORA register purposes Eagle is identifiable per AIFM sub-entity.
      acceptance_criteria:
        - "Service provider tenant can create, configure and archive AIFM sub-entities"
        - "DORA register export produces one entry per AIFM sub-entity"

    - id: REQ-TEN-003
      title: "Tenant provisioning — CS Manager for paid, self-service for trial"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P1, P2, P10]
      regulatory: []
      description: >
        Two provisioning paths exist with strictly separated rules.
        Paid tenant provisioning is a privileged action performed exclusively
        by the Eagle Customer Success Manager; clients cannot self-register
        for a paid account. Trial tenant provisioning is self-service via
        the public website, subject to the legitimacy validation gate defined
        in REQ-GTM-002 and REQ-TRIAL-001. A trial tenant is never activated
        as a paid tenant without CS Manager action — conversion is a distinct
        provisioning event, not an automatic upgrade.
      paid_tenant_onboarding_checklist:
        - "AIFM legal name and LEI validated against GLEIF"
        - "At least one NCA registration configured per REQ-MJ-001"
        - "Reporting regime confirmed per REQ-OBL-001"
        - "Delivery channel selected per REQ-DEL-001 for each NCA registration"
        - "GDPR DPA execution confirmed per REQ-GDPR-004"
        - "At least one TENANT_ADMIN user created and notified"
      trial_provisioning_rules:
        - "Self-service registration via public website — no CS Manager step"
        - "Legitimacy validation gate (REQ-GTM-002) runs before provisioning"
        - "HIGH legitimacy score: trial provisioned automatically within 10 minutes"
        - "MEDIUM/LOW score: trial held pending CCO review (same business day)"
        - "Trial tenant type = TRIAL_TENANT; distinct from ACTIVE_TENANT"
        - "TRIAL_TENANT cannot access paid features (per REQ-TRIAL-002)"
        - "Trial-to-paid conversion requires CS Manager action and full paid checklist"
      acceptance_criteria:
        - "Paid tenant activation blocked until all paid checklist items complete"
        - "Trial self-registration without CS Manager action completes within 10 minutes for HIGH legitimacy score"
        - "TRIAL_TENANT attempting a paid-only action receives a clear upgrade prompt, not an error"
        - "Conversion from TRIAL_TENANT to ACTIVE_TENANT is a distinct logged event requiring CS Manager identity"

    - id: REQ-TEN-004
      title: "AIFM profile as authoritative configuration record"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P4, P8, P10]
      regulatory: [AIFMD, CDR231]
      description: >
        Each AIFM entity has a complete validated profile that is the single
        source of truth for all downstream reporting logic and submission metadata.
      required_fields:
        legal_name:        "Full legal name of the AIFM"
        lei:               "20-char LEI per ISO 17442 validated against GLEIF"
        jurisdiction:      "ISO 3166-1 alpha-2 country of registration"
        reporting_regime:  "ART3 or ART24 per REQ-OBL-001"
        nca_registrations: "One or more NCA registrations per REQ-MJ-001"
        contact_email:     "Submission contact for NCA correspondence"
        aifmd_auth_date:   "Date of authorisation or registration"
      acceptance_criteria:
        - "Activation blocked if any required field is missing or invalid"
        - "LEI validated against GLEIF at creation and flagged for annual re-validation"
        - "Profile changes version-controlled and logged in audit trail"

  # ---------------------------------------------------------------------------
  # 3.2  MULTI-JURISDICTION AND NCA REGISTRATION
  # ---------------------------------------------------------------------------
  multi_jurisdiction:

    - id: REQ-MJ-001
      title: "Multiple NCA registrations per AIFM"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P8, P10]
      regulatory: [AIFMD, CDR231]
      description: >
        An AIFM may report to multiple NCAs simultaneously. Each NCA registration
        is fully independent with its own regime, frequency, content override
        profile, delivery channel, NCA-specific identifiers, and deadline calendar.
      per_registration_fields:
        nca_code:                 "NCA identifier e.g. AFM, CSSF, BaFin"
        nca_aifm_national_code:   "AIFM national code assigned by this NCA"
        registration_type:        "HOME_NCA | NPPR_HOST | NPPR_MARKETING"
        reporting_regime:         "ART3 or ART24 — may differ per NCA"
        reporting_frequency:      "Q / H / Y — may differ per NCA"
        delivery_channel:         "Per REQ-DEL-001"
        content_override_profile: "NCA override config reference"
        first_reporting_period:   "Effective from date"
        last_reporting_period:    "Effective until date — null means ongoing"
        credential_vault_ref:     "Vault reference for ROBOT or S3/SFTP channels"
      requirements:
        - "Supports 1 to 27 NCA registrations per AIFM"
        - "Each registration independently configurable for all parameters"
        - "Independent deadline calendar generated per NCA registration"
        - "Registration changes require TENANT_ADMIN authorisation and are logged"
      acceptance_criteria:
        - "AIFM with 3 NCA registrations each with different frequencies has 3 independent calendars"

    - id: REQ-MJ-002
      title: "AIF marketing jurisdiction as the reporting obligation trigger"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P8, P10]
      regulatory: [AIFMD, CDR231]
      description: >
        Whether an AIF reports to a given NCA is driven by is_marketed_in_jurisdiction
        per (AIF, NCA) pair. AIFM-level records are always required for every NCA
        registration. AIF-level records are required only where the marketing flag
        is true. Two AIFs under the same AIFM can have completely different NCA coverage.
      aif_nca_fields:
        nca_code:                    "Must match a code in the parent AIFM registrations"
        aif_nca_national_code:       "AIF national code assigned by this NCA"
        is_marketed_in_jurisdiction: "Boolean — primary obligation trigger"
        reporting_obligation:        "Derived from marketing flag; manually overridable with documented reason"
      requirements:
        - "Changing is_marketed_in_jurisdiction triggers confirmation workflow with prospective effective date"
        - "Reporting calendar regenerates when any marketing flag changes"
        - "Manual obligation overrides require documented justification logged in audit trail"
      acceptance_criteria:
        - "AIF-A with NL+LU flags and AIF-B with LU-only flag produces correct per-NCA batches"

    - id: REQ-MJ-003
      title: "Per-NCA reporting obligation matrix view"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P4]
      regulatory: [AIFMD]
      description: >
        Dashboard provides a matrix view: rows = AIFs, columns = NCA registrations,
        cells = marketing flag, obligation status, and deadline. Eagle generates one
        independent submission batch per NCA per period. Cross-NCA batch triggerable
        in one action; each NCA batch retains an independent review gate.
      acceptance_criteria:
        - "Matrix view exportable as PDF for client compliance record"

    - id: REQ-MJ-004
      title: "NPPR submission envelope and NCA routing"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P3, P8]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        For NPPR and cross-border submissions ReportingMemberState is set to the
        target NCA jurisdiction. AIFMNationalCode and AIFNationalCode use
        NCA-specific codes from the registration record. Non-EU AIFM NPPR codes
        validated against the full 45-code AIFReportingCode set.
      acceptance_criteria:
        - "US AIFM with AFM and CSSF NPPR registrations produces two XML submissions with correct ReportingMemberState and different NCA national codes"

    - id: REQ-MJ-005
      title: "Per-NCA validation using NCA-specific override profiles"
      layer: [L3_VALIDATION]
      priority: MUST
      phase: 1
      principles: [P3, P5, P8, P10]
      regulatory: [AIFMD, CDR231, ESMA_GUIDE]
      description: >
        A single canonical record is validated once per NCA registration using the
        appropriate NCA override profile. A field may be PASS for one NCA and CAF
        for another. Validation reports group results by NCA. Override profiles are
        version-controlled configuration files loaded at runtime.
      acceptance_criteria:
        - "Field optional at ESMA level but mandatory under CSSF override produces PASS for AFM and CAF for CSSF from the same canonical record"

    - id: REQ-MJ-006
      title: "Cross-NCA identical-content grouped approval"
      layer: [L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P1, P2, P8]
      regulatory: [DORA, AIFMD, AI_ACT]
      description: >
        NCA variants of the same AIF that are content-identical — differing only in
        NCA routing metadata — are offered for single-action grouped approval. Identity
        is determined by canonical content hash over substantive fields. Where NCA
        overrides add or modify substantive fields variants require individual review
        with a diff view highlighting differences.
      acceptance_criteria:
        - "AIF identical for AFM and CSSF correctly grouped for single-action approval"
        - "AIF where CSSF override adds a mandatory field shows individual review items with diff highlighting"

  # ---------------------------------------------------------------------------
  # 3.3  USER MANAGEMENT AND ACCESS CONTROL
  # ---------------------------------------------------------------------------
  user_management:

    - id: REQ-USR-001
      title: "Role-based access control"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9, P10]
      regulatory: [GDPR, DORA, ISO27001]
      description: >
        Five predefined roles govern all functions. No custom roles or ad-hoc
        permission grants are supported.
      roles:
        EAGLE_ADMIN:
          scope: "Eagle internal — CS Managers and operations staff"
          permissions:
            - "Provision and archive tenants"
            - "Create and deactivate TENANT_ADMIN users"
            - "Read-only tenant access for support (auto-logged)"
            - "System-wide audit logs and reference data management"
            - "Incident reporting workflow and EAGLE_ADMIN alerts"
        TENANT_ADMIN:
          scope: "Tenant-wide or per AIFM sub-entity"
          permissions:
            - "Manage users within tenant"
            - "Configure AIFM/AIF profiles and NCA registrations"
            - "Confirm reporting regime and marketing flags"
            - "Manage API keys and credential vault"
            - "Approve submissions and initiate CAF-level overrides"
        DATA_PREPARER:
          scope: "Tenant or specific AIFM sub-entity"
          permissions:
            - "Ingest data via all channels"
            - "Trigger transformation and validation pipeline"
            - "View validation results and quality flags"
        COMPLIANCE_REVIEWER:
          scope: "Tenant or specific AIFM sub-entity"
          permissions:
            - "All DATA_PREPARER permissions"
            - "Approve records at review gate (individual and bulk)"
            - "Override CAM and DQ flags with documented justification"
            - "Initiate and approve amendment workflow"
            - "Download packaged XML for MANUAL submissions"
        READ_ONLY:
          scope: "Tenant or specific AIFM sub-entity"
          permissions:
            - "View reports, submissions, validation output and audit trail"

    - id: REQ-USR-002
      title: "Authentication and session management"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, ISO27001, DORA]
      requirements:
        - "Email and password with enforced minimum strength policy"
        - "MFA mandatory for COMPLIANCE_REVIEWER, TENANT_ADMIN and EAGLE_ADMIN"
        - "Session timeout after 30 minutes of inactivity"
        - "All login events (success, failure, MFA) logged in audit trail"
        - "Lockout after 5 consecutive failed login attempts"
        - "Session tokens invalidated server-side on logout"

    - id: REQ-USR-003
      title: "API key authentication"
      layer: [L10_API]
      priority: MUST
      phase: 1
      principles: [P6, P9]
      regulatory: [GDPR, DORA, ISO27001]
      requirements:
        - "Tenant-scoped API keys or OAuth 2.0 client credentials"
        - "API keys hashed at rest; plaintext shown only at creation"
        - "24-hour grace period on key rotation"
        - "All API calls logged with key identifier, endpoint, timestamp and result"
        - "Rate limiting enforced per key; configurable per tenant"

  # ---------------------------------------------------------------------------
  # 3.4  REPORTING OBLIGATION MANAGEMENT
  # ---------------------------------------------------------------------------
  obligation_management:

    - id: REQ-OBL-001
      title: "Reporting regime determination and confirmation"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P5, P8, P10]
      regulatory: [AIFMD, CDR231]
      description: >
        Eagle proposes the applicable reporting regime and frequency based on AuM,
        fund count, leverage use and domicile. Requires explicit confirmation from
        TENANT_ADMIN or COMPLIANCE_REVIEWER before activation.
      regime_logic:
        art3_sub_threshold:
          thresholds: "EUR 100M general; EUR 500M for unleveraged funds with 5yr lock-up"
          frequency: "Annual Y1 — AIFM record only; reduced data requirements"
          dora_applicable: false
        art24_full:
          aum_below_1bn: "Annual Y1"
          aum_1bn_to_10bn: "Half-yearly H1/H2"
          aum_above_10bn: "Quarterly Q1-Q4"
          hedge_fund_500m: "Quarterly regardless of total AuM"
      acceptance_criteria:
        - "Regime cannot be activated without explicit confirmation"
        - "Regime change triggers re-confirmation workflow"

    - id: REQ-OBL-002
      title: "Reporting calendar and deadline management"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P10]
      regulatory: [AIFMD, CDR231, DQEF]
      description: >
        Independent reporting calendars per AIFM per NCA registration. Active
        notifications via email and in-app at scheduled points.
      deadline_rules:
        standard:      "30 calendar days after period end"
        fund_of_funds: "45 calendar days after period end"
        amnd_flag:     "AMND flagged if submitted more than 90 days after INIT (DQEF DQ-T-002)"
      notification_schedule:
        t_minus_30: "Period opens"
        t_minus_14: "14 days to deadline"
        t_minus_7:  "7 days — escalate if data not ingested"
        t_minus_2:  "2 days — escalate if not approved"
        t_plus_1:   "Overdue — immediate escalation required"

    - id: REQ-OBL-003
      title: "AIF fund profile management"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P10]
      regulatory: [AIFMD, CDR231]
      required_fields:
        aif_name:              "Legal name of the AIF"
        lei:                   "Validated against GLEIF if provided"
        domicile:              "ISO 3166-1 alpha-2"
        aif_type:              "Hedge fund, PE, RE, FoF, other"
        inception_date:        "Mandatory per ESMA guidance"
        base_currency:         "ISO 4217 3-character code"
        fund_of_funds_flag:    "Affects deadline calculation (45 days)"
        feeder_flag:           "Feeder fund indicator"
        master_aif_identifier: "If feeder: identifier of master AIF"
        umbrella_flag:         "Enables share class sub-records"
        nca_registrations:     "Per REQ-MJ-002 — subset of parent AIFM registrations"
      acceptance_criteria:
        - "Fund activation requires TENANT_ADMIN confirmation"

  # ---------------------------------------------------------------------------
  # 3.5  DATA INGESTION
  # ---------------------------------------------------------------------------
  data_ingestion:

    - id: REQ-ING-001
      title: "REST API data ingestion"
      layer: [L1_INGESTION, L10_API]
      priority: MUST
      phase: 1
      principles: [P2, P6, P9]
      regulatory: [DORA, GDPR]
      requirements:
        - "OpenAPI 3.0 specification published and versioned at /api/docs"
        - "Accepts AIFM-level, AIF-level and position dataset payloads"
        - "Idempotent submission via idempotency key"
        - "Partial payloads accepted; missing fields produce validation warnings"
        - "All API calls logged with key identifier, payload hash and result"

    - id: REQ-ING-002
      title: "Structured file upload"
      layer: [L1_INGESTION]
      priority: MUST
      phase: 1
      principles: [P1, P2, P6]
      regulatory: [GDPR]
      requirements:
        - "Supports .xlsx, UTF-8 CSV, and Eagle canonical JSON schema"
        - "Eagle-provided templates downloadable per report type"
        - "Custom column mapping configurable per tenant and reusable across uploads"
        - "File size limit 50 MB; source files deleted after successful ingestion"

    - id: REQ-ING-003
      title: "Manual data entry via web UI"
      layer: [L1_INGESTION]
      priority: SHOULD
      phase: 2
      principles: [P1, P3]
      regulatory: []
      requirements:
        - "Forms for AIFM-level, AIF-level and position-level sections"
        - "Enumeration fields as validated dropdowns; inline format validation on blur"
        - "Auto-save draft every 60 seconds"
        - "Functionally equivalent to API ingestion — same canonical record produced"

    - id: REQ-ING-004
      title: "AI-assisted unstructured data ingestion"
      layer: [L1_INGESTION, L2_TRANSFORMATION]
      priority: MUST
      phase: 1
      principles: [P5, P6, P8, P11]
      regulatory: [AI_ACT, GDPR]
      description: >
        Clients upload unstructured documents. Claude produces a candidate canonical
        mapping with per-field confidence scores. Human confirmation required per field
        before entry into the validation core. AI output never flows to NCA without
        human review.
      requirements:
        - "LOW confidence fields require explicit user confirmation before pipeline proceeds"
        - "AI extraction rationale and source text stored in audit trail per field"
        - "System prompt version-controlled; changes require compliance sign-off"
        - "Prompt injection prevention: output confined to extraction schema; suspicious documents pre-screened"
        - "AI_PROPOSED fields not yet confirmed by user treated as missing values at L3"
        - "Source documents deleted immediately after extraction"
      acceptance_criteria:
        - "UI labels all AI proposals as pending review — never presented as validated data"

    - id: REQ-LEG-001
      title: "Legacy template adapter architecture"
      layer: [L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P6, P10]
      regulatory: []
      description: >
        Known legacy formats processed by pluggable independently versioned adapters.
        Interface: input = raw file bytes, output = normalised intermediate JSON.
        Fully deterministic. Adapter registry is a configuration file. New format
        requires only a new adapter.
      acceptance_criteria:
        - "New adapter integrates without modifying existing adapters or pipeline code"
        - "Audit trail includes per-field before/after values for all calculations"

    - id: REQ-LEG-002
      title: "Automatic import format detection"
      layer: [L1_INGESTION, L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P1, P2, P5]
      regulatory: []
      description: >
        3-factor detection: sheet names, header patterns, version cells. Result
        confirmed by user. User can override. Undetected files offered for manual
        column mapping or AI transformation.
      acceptance_criteria:
        - "Detection accuracy >= 99% on known-format test set"
        - "Detection runs in < 2 seconds for files up to 50 MB"

    - id: REQ-LEG-003
      title: "Deterministic enrichment calculations for legacy templates"
      layer: [L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10]
      regulatory: [AIFMD, CDR231]
      calculations:
        aum_aggregation:
          method: "Sum position market values converted to base currency; cross-check against template total cell; discrepancy >0.1% flags DQ warning"
          legal_basis: "CDR 231/2013 Art.2, Arts.110-127"
        leverage_gross:
          method: "Sum of absolute market values plus derivative notionals divided by NAV times 100 per CDR Art.7"
          legal_basis: "CDR 231/2013 Art.7"
        leverage_commitment:
          method: "CDR Art.8 netting rules applied; non-nettable positions treated gross; conservative default for ambiguous positions"
          legal_basis: "CDR 231/2013 Art.8"
        currency_conversion:
          source: "ECB reference rates from reference data store per REQ-REF-001"
          rate_date: "ECB rate for last business day of reporting period"
          fallback: "Calculation halts if rate unavailable; no silent substitution"
      acceptance_criteria:
        - "Enrichment review step shows original and calculated values before canonical entry"
        - "Leverage results consistent with ESMA DQEF reference test cases"
        - "User can accept or reject enrichment results before pipeline proceeds"

    - id: REQ-LEG-004
      title: "M registered manager template adapter"
      layer: [L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P3, P6]
      regulatory: [AIFMD]
      enrichment_applied: [aum_aggregation, currency_conversion]
      acceptance_criteria:
        - "All M registered template fields mapped with documented field-by-field translation"

    - id: REQ-LEG-005
      title: "M authorised manager template adapter"
      layer: [L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P3, P6]
      regulatory: [AIFMD, CDR231]
      enrichment_applied: [aum_aggregation, leverage_gross, leverage_commitment, currency_conversion]
      acceptance_criteria:
        - "Leverage derivation produces values consistent with ESMA methodology"

    - id: REQ-LEG-006
      title: "ESMA legacy template adapter"
      layer: [L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P3, P6]
      regulatory: [AIFMD, IT_TECH_R6]
      enrichment_applied: [currency_conversion]
      notes: "Field name translation table documented and version-controlled; Rev.6 absent fields listed after import"
      acceptance_criteria:
        - "Translation table reviewable by compliance; Rev.6 absent fields listed for manual completion"

  # ---------------------------------------------------------------------------
  # 3.6  POSITION DATA AND DERIVED CALCULATIONS
  # ---------------------------------------------------------------------------
  position_data:

    - id: REQ-POS-001
      title: "Position-level data model and ingestion"
      layer: [L1_INGESTION, L1B_ADAPTER]
      priority: MUST
      phase: 1
      principles: [P4, P5, P6]
      regulatory: [AIFMD, CDR231]
      description: >
        Position data is a versioned dataset linked to (AIF, reporting_period,
        NCA_registration). Incremental updates trigger automatic recalculation
        of derived fields. All ingestion channels supported including SFTP.
      position_fields:
        instrument_id:      "Internal or external identifier"
        asset_type_code:    "SubAssetType per AIFMD Table 1"
        long_short:         "LONG or SHORT"
        market_value:       "In position currency; negative for short positions"
        currency:           "ISO 4217"
        market_value_base:  "Converted to AIF base currency — calculated"
        is_encumbered:      "Boolean — pledged or encumbered"
        notional_value:     "For derivatives: gross notional"
        counterparty_lei:   "LEI of counterparty"
        is_nettable:        "Boolean — CDR Art.8 Commitment Method netting eligibility"
        position_date:      "Valuation date"
      acceptance_criteria:
        - "5,000-position dataset ingested via API in under 30 seconds"
        - "Incremental update of 50 positions triggers recalculation within 30 seconds"

    - id: REQ-POS-002
      title: "Deterministic derived field calculation engine"
      layer: [L2_TRANSFORMATION]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10]
      regulatory: [AIFMD, CDR231, ESMA_GUIDE]
      description: >
        Derives Annex IV reportable fields from position data. All calculations are
        rule-based, versioned, independently testable, and logged with engine and
        dataset version. Missing inputs produce DATA_INCOMPLETE warning rather than
        a silent wrong value.
      calculations:
        principal_market_rankings:
          fields: "PrincipalMarkets and PrincipalInstruments at AIFM and AIF level"
          method: "Sum market values by SubAssetType (Table 1) and MIC code; rank by absolute value; top 5 instruments, top 3 markets"
          legal_basis: "CDR 231/2013 Arts.24(1) and 24(2); ESMA Guidelines ranking methodology"
        leverage_gross:
          method: "Sum absolute market values plus derivative notionals divided by NAV times 100"
          legal_basis: "CDR 231/2013 Art.7"
        leverage_commitment:
          method: "CDR Art.8 netting applied; non-nettable positions treated gross"
          legal_basis: "CDR 231/2013 Art.8"
        unencumbered_cash:
          method: "Sum of SEC_CSH_CSH positions where is_encumbered = false"
          legal_basis: "CDR 231/2013 Art.110; ESMA Guidelines"
        turnover_by_asset_type:
          method: "Sum transaction values by TurnoverSubAssetType (Table 2); requires buy/sell transaction data"
          note: "Left blank with manual completion flag if transaction data absent"
        aum_and_nav:
          method: "Sum of all position market values converted to base currency"
      acceptance_criteria:
        - "Rankings for 500-position fund calculated in < 5 seconds"
        - "Leverage results consistent with ESMA DQEF reference test cases"

    - id: REQ-POS-003
      title: "AIFM report aggregation from underlying AIF records"
      layer: [L2_TRANSFORMATION]
      priority: MUST
      phase: 1
      principles: [P4, P5]
      regulatory: [AIFMD, CDR231]
      description: >
        AIFM-level fields (TotalAuM, PrincipalMarkets, PrincipalInstruments,
        NumberOfFunds) are aggregated automatically from AIF records. AIFM workflow
        is not locked on AIF completion. Aggregation recalculates on any AIF update.
        Status shown as COMPLETE, PARTIAL, or MANUAL.
      acceptance_criteria:
        - "AIFM with 50 AIFs re-aggregates within 10 seconds of any underlying AIF record update"
        - "PARTIAL status clearly lists which AIFs are missing their contribution"

    - id: REQ-POS-004
      title: "Field provenance model — full traceability per canonical field"
      layer: [L2_TRANSFORMATION, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P5, P8, P10]
      regulatory: [AIFMD, AI_ACT, DORA]
      description: >
        Every field in the canonical record carries a structured provenance record
        capturing how its value was produced, which logic or source was applied,
        and the complete change history. Provenance is the foundation for field-level
        audit trails, the UI lineage view (REQ-LIN-001), the logic transparency panel
        (REQ-LIN-002), and the review gate field summary. It enables any stakeholder —
        reviewer, NCA auditor, or ISAE auditor — to trace any reported value back
        to its source without accessing raw data.
      provenance_values:
        DERIVED:
          description: "Calculated by the deterministic calculation engine from position data"
          traceability_record:
            engine_version: "Calculation engine version identifier"
            formula_id: "Named formula applied (e.g. GROSS_LEVERAGE_CDR_ART7)"
            formula_description: "Human-readable description of the calculation"
            legal_basis: "CDR article or ESMA guideline reference"
            input_fields: "List of position dataset fields and their values used as inputs"
            input_dataset_version: "Position dataset version identifier"
            reference_data_used: "e.g. ECB rate EUR/USD = 1.0823 as of 2026-03-19"
            calculation_timestamp: "UTC timestamp of calculation run"
          recalculation: "Overwritten on each calculation run unless field is LOCKED"
          ui_indicator: "Formula icon (∑); click opens logic transparency panel"
        AI_PROPOSED:
          description: "Extracted by Claude from an unstructured document; not yet confirmed by user"
          traceability_record:
            model_name: "Claude (Anthropic)"
            model_version: "Model version at time of extraction"
            confidence_level: "HIGH / MEDIUM / LOW"
            confidence_score: "Numeric score 0.00–1.00"
            source_text: "Verbatim text fragment from source document that produced this value"
            source_document_hash: "Hash of source document (document itself deleted per REQ-SEC-003)"
            source_page_or_location: "Page number or section reference if determinable"
            extraction_timestamp: "UTC timestamp"
          recalculation: "Replaced if calculation engine can derive the field; AI value is fallback only"
          ui_indicator: "AI badge with confidence chip; click opens AI extraction detail"
          pipeline_constraint: "AI_PROPOSED fields not confirmed by user are treated as missing at L3"
        MANUALLY_ENTERED:
          description: "Value typed directly by a DATA_PREPARER, COMPLIANCE_REVIEWER, or TENANT_ADMIN"
          traceability_record:
            entered_by_role: "Role of user who entered the value"
            entered_by_user_id: "Pseudonymous user reference"
            entry_timestamp: "UTC timestamp"
            entry_channel: "WEB_UI or API"
          recalculation: "Protected from automatic overwrite"
          ui_indicator: "Pencil icon"
        MANUALLY_OVERRIDDEN:
          description: "Field had a DERIVED, AI_PROPOSED, or IMPORTED value; user changed it"
          traceability_record:
            original_provenance: "The provenance value the field held before the override"
            original_value: "The value before override"
            overridden_by_role: "Role of user who overrode"
            overridden_by_user_id: "Pseudonymous user reference"
            override_timestamp: "UTC timestamp"
            override_reason: "Free text entered by user at override time (mandatory for DERIVED overrides)"
          recalculation: "LOCKED — not overwritten by any automatic process"
          ui_indicator: "Override icon (amber); hover shows original value and override reason"
        IMPORTED:
          description: "Value produced by a legacy template adapter (REQ-LEG-001 through LEG-006)"
          traceability_record:
            adapter_id: "Adapter identifier (e.g. M_AUTHORISED_V2)"
            adapter_version: "Adapter version"
            source_template_field: "Original field name in the source template"
            source_cell_reference: "Excel cell reference or column name if determinable"
            import_timestamp: "UTC timestamp"
            enrichment_applied: "List of enrichment calculations applied (e.g. CURRENCY_CONVERSION, AUM_AGGREGATION)"
          recalculation: "Overwritten if calculation engine can derive the field"
          ui_indicator: "Import icon; click shows adapter and source field mapping"
        SMART_DEFAULT:
          description: "Value populated by a smart default rule based on fund characteristics"
          traceability_record:
            rule_id: "Smart default rule identifier"
            rule_version: "Rule version at time of application"
            rule_description: "Human-readable condition and default value description"
            trigger_condition: "The fund characteristic that triggered this rule"
            applied_timestamp: "UTC timestamp"
          recalculation: "Overwritten if user enters a value or calculation engine can derive a value"
          ui_indicator: "Default icon; click shows rule description and trigger condition"
        LOCKED:
          description: "Field explicitly locked by user against all automatic recalculation"
          traceability_record:
            locked_by_user_id: "Pseudonymous user reference"
            locked_timestamp: "UTC timestamp"
            lock_reason: "Optional free text"
            underlying_provenance: "The provenance the field held when it was locked"
          recalculation: "Never overwritten by any process"
          ui_indicator: "Lock icon"
      field_history:
        description: >
          Every field maintains a complete ordered history of provenance changes.
          Each entry in the history is immutable and contains the full provenance
          record at the time of the change, including the value held and who or
          what changed it. The history is accessible from the field lineage view.
        retention: "10 years — same as canonical record retention"
      override_behaviour:
        edit_derived_field:
          step_1: "Warning: 'This value was calculated from your position data. Editing it will lock the field. The calculated value was [X]. Continue?'"
          step_2: "User confirms; free-text override reason required"
          step_3: "Provenance changes to MANUALLY_OVERRIDDEN; original value and reason stored in history"
        restore_calculation:
          action: "User clicks Unlock and recalculate"
          result: "Provenance returns to DERIVED; calculation runs immediately; override history retained"
      requirements:
        - "Every canonical field stores its complete provenance record as a structured object"
        - "Provenance record is updated atomically with the field value — no field value exists without a provenance record"
        - "Full field history retained and immutable for the 10-year retention period"
        - "Provenance records stored in the audit trail per REQ-AUD-001"
        - "AI_PROPOSED fields display their confidence level and source text in the UI before confirmation"
        - "Review gate presents a field-level summary: count of fields per provenance type, count of MANUALLY_OVERRIDDEN fields"
      acceptance_criteria:
        - "Every field in a canonical record has a non-null provenance record at all times"
        - "Editing a DERIVED field triggers the warning, captures the reason, and locks the field"
        - "Field history for a value changed 3 times shows all 3 historical provenance records in order"
        - "Review gate summary accurately counts fields per provenance type"

    - id: REQ-POS-005
      title: "Smart defaults for optional and conditional fields"
      layer: [L2_TRANSFORMATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P5, P8]
      regulatory: [AIFMD, ESMA_GUIDE]
      description: >
        Smart defaults populate empty optional fields based on known fund
        characteristics. Applied after derivations, before L3. Never overwrites
        any existing value regardless of provenance. Each rule is a versioned
        configuration entry.
      acceptance_criteria:
        - "Smart default never overwrites a MANUALLY_ENTERED or MANUALLY_OVERRIDDEN field"
        - "All smart default fields receive DERIVED provenance"

  # ---------------------------------------------------------------------------
  # 3.7  TRANSFORMATION AND CANONICAL DATA MODEL
  # ---------------------------------------------------------------------------
  transformation:

    - id: REQ-TRN-001
      title: "Canonical data model as single source of truth"
      layer: [L2_TRANSFORMATION]
      priority: MUST
      phase: 1
      principles: [P4, P5, P6]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        All ingestion channels produce a record conforming to the Eagle canonical
        data model before validation is applied. XSD serialisation for NCA
        submission is a downstream transformation of the canonical record.
        The canonical model is a versioned JSON schema; field names map 1:1 to
        AIFMD field references in the validation rules YAML.
      acceptance_criteria:
        - "No NCA submission is generated from any representation other than the canonical record"
        - "Schema version mismatch produces a validation warning, not a silent error"

    - id: REQ-TRN-002
      title: "NCA-specific XSD serialisation and file packaging"
      layer: [L6_PACKAGING]
      priority: MUST
      phase: 1
      principles: [P3, P6, P10]
      regulatory: [IT_TECH_R6, AIFMD]
      description: >
        The canonical record is serialised to AIFMD Annex IV XML per the active
        XSD schema (AIFMD_DATMAN_V1_2.xsd and AIFMD_DATAIF_V1_2.xsd) with
        NCA-specific override profiles applied. Packaging wraps the validated XML
        into the format required by the target NCA per REQ-FMT-001.
        All serialisation and packaging logic loaded from configuration files at runtime.
      acceptance_criteria:
        - "Schema validation failure blocks submission with a CAF-equivalent error"
        - "NCA override application logged in submission audit trail"
        - "Generated XML stored immutably as part of the submission record"

  # ---------------------------------------------------------------------------
  # 3.8  VALIDATION
  # ---------------------------------------------------------------------------
  validation:

    - id: REQ-VAL-001
      title: "Deterministic validation against AIFMD rules"
      layer: [L3_VALIDATION]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10]
      regulatory: [AIFMD, CDR231, ESMA_GUIDE, DQEF, IT_TECH_R6]
      description: >
        Every canonical record is validated against the rule engine loaded from
        aifmd_annex_iv_validation_rules_v0_3.yaml. Validation runs once per NCA
        registration using the appropriate override profile. Each rule produces a
        deterministic PASS / FAIL result. Rule engine is separated from application
        code (Principle 6) and loaded at runtime.
      validation_categories:
        CAF:
          label: "Critical Acceptance Failure"
          effect: "Blocks submission. Cannot be submitted without override (REQ-OVR-001)."
          handling: "Returned to DATA_PREPARER for correction, or TENANT_ADMIN may override with justification"
        CAM:
          label: "Critical Acceptance Message"
          effect: "Accepted with flag. Resolution tracked in CAM register (REQ-AIFMD-002)."
          handling: "Presented at review gate; COMPLIANCE_REVIEWER may override with justification"
        DQ_WARNING:
          label: "Data Quality Warning (DQEF statistical/plausibility checks)"
          effect: "Never blocks submission. Requires human acknowledgement."
          handling: "Flagged at review gate; reviewer must acknowledge each warning individually"
      requirements:
        - "Each rule result records rule_id, field_path, result, actual value, constraint, and ESMA error code"
        - "Validation is stateless and repeatable; same input always produces same output"
        - "Rule engine version recorded on every validation report"
        - "Validation report is human-readable with field labels not just field codes"
      acceptance_criteria:
        - "CAF result prevents record from reaching review gate unless explicitly overridden"
        - "Full validation report stored immutably in audit trail per validation run"

    - id: REQ-VAL-002
      title: "Cross-record consistency validation"
      layer: [L3_VALIDATION]
      priority: MUST
      phase: 1
      principles: [P5, P8]
      regulatory: [AIFMD, DQEF]
      cross_record_checks:
        - "AuM sum: AIF-level NAV values consistent with AIFM-level AuM within tolerance"
        - "LEI consistency: AIFMIdentifierNCA in all AIF records matches the AIFM record"
        - "Reporting period: all AIF records in a batch have the same period type and year"
        - "Fund count: number of AIF records matches the count declared in the AIFM record"
        - "Filing type: all records in a batch use the same FilingType (INIT or AMND)"
      acceptance_criteria:
        - "Cross-record CAF results block the entire batch, not individual records"

    - id: REQ-VAL-003
      title: "DQEF quality layer checks"
      layer: [L4_QUALITY]
      priority: MUST
      phase: 1
      principles: [P5, P7, P8, P11]
      regulatory: [DQEF]
      implemented_checks:
        DQ_AUM_OUTLIER: "AuM deviates more than 50% from previous period — flag with explanation field"
        DQ_NAV_PLAUSIBILITY: "NAV per share outside expected range for fund type"
        DQ_LEI_COMPLETENESS: "LEI present but not found in GLEIF register cache"
        DQ_TIMELINESS_T001: "Submission lag exceeds 30 days (45 for FoF) after period end"
        DQ_TIMELINESS_T002: "AMND submitted more than 90 days after original INIT"
        DQ_LEVERAGE_CONSISTENCY: "Gross and Commitment leverage inconsistent with declared leverage flag"
      acceptance_criteria:
        - "Reviewer must acknowledge each DQ flag individually — bulk-dismiss not permitted"
        - "Acknowledgement with explanation stored immutably in audit trail"

  # ---------------------------------------------------------------------------
  # 3.9  VALIDATION OVERRIDE
  # ---------------------------------------------------------------------------
  validation_override:

    - id: REQ-OVR-001
      title: "Validation override with documented justification"
      layer: [L3_VALIDATION, L4_QUALITY, L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8, P10]
      regulatory: [AIFMD, DORA, AI_ACT]
      description: >
        Any validation check (CAF, CAM, DQ) may be overridden with a documented
        justification. Compliance responsibility rests entirely with the client.
        Override never modifies the canonical record; the invalid value is submitted
        as-is with the client's documented decision.
        Override is valid for one submission only and does not carry over to re-submissions.
      override_by_category:
        CAF:
          required_role: "TENANT_ADMIN only"
          justification: "Mandatory free-text minimum 100 characters"
          countersignature: "Second TENANT_ADMIN required if available; absence logged as warning"
          eagle_admin_alert: "Automatic notification to EAGLE_ADMIN on every CAF override"
        CAM:
          required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
          justification: "Mandatory free-text minimum 50 characters"
        DQ_WARNING:
          required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
          justification: "Mandatory free-text minimum 50 characters"
      requirements:
        - "Override UI presents full flag detail before justification field"
        - "Override bound to specific rule_id, field_path, and actual value at override time"
        - "Review gate shows all overridden flags in a dedicated section — cannot be hidden"
        - "NCA XML generated from unmodified canonical record — Eagle never alters values"
        - "Monthly override report generated for EAGLE_ADMIN to identify systematic data quality patterns"
      acceptance_criteria:
        - "CAF override without justification text is rejected"
        - "CAF override without countersignature where second TENANT_ADMIN exists is blocked"
        - "Override audit record is immutable and cannot be deleted or modified"

  # ---------------------------------------------------------------------------
  # 3.10  HUMAN REVIEW AND APPROVAL GATE
  # ---------------------------------------------------------------------------
  review_gate:

    - id: REQ-REV-001
      title: "Mandatory human review and approval gate"
      layer: [L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8]
      regulatory: [DORA, AIFMD, AI_ACT]
      description: >
        Non-bypassable pre-submission gate. Authorised user must explicitly review
        and approve the record. Required roles: COMPLIANCE_REVIEWER or TENANT_ADMIN.
        Supports individual record review and bulk approval for zero-flag records.
        Cross-NCA grouped approval per REQ-MJ-006. API callers require a valid
        approval token generated by this gate before any submission proceeds.
      review_checklist:
        - "All CAF errors resolved or overridden with documented justification"
        - "All CAM flags reviewed and accepted, corrected, or overridden"
        - "All DQ quality warnings acknowledged individually with explanations"
        - "Reporting period and filing type confirmed correct"
        - "Fund count and AIFM-AIF consistency confirmed"
        - "For overridden checks: acknowledgement of full regulatory responsibility"
      bulk_approval:
        eligible_records: "Records with zero flags — all L3 checks PASS, zero CAM, zero DQ, zero overrides"
        required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
        pre_conditions: "Validation 100% complete; reviewer confirms batch summary statistics"
        audit_record: "Batch-level event with record count and Merkle tree root hash of approved canonical records"
        excluded: "Any record with a single flag of any category requires individual review"
      acceptance_criteria:
        - "Each checklist item requires individual acknowledgement — bulk approval of checklist not permitted"
        - "Any change to canonical record after approval invalidates approval and requires new review cycle"
        - "Approval creates immutable record: approver identity, role, timestamp, checklist acknowledgements, canonical record hash"

  # ---------------------------------------------------------------------------
  # 3.11  NCA FILE FORMAT REQUIREMENTS
  # ---------------------------------------------------------------------------
  nca_file_formats:

    - id: REQ-FMT-001
      title: "NCA-specific file packaging configuration"
      layer: [L6_PACKAGING]
      priority: MUST
      phase: 1
      principles: [P3, P6, P10]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        Packaging is configurable per NCA via override configuration files loaded
        at runtime. New NCA packaging requires only a new configuration entry.
        Packaging never alters XML content.
      packaging_dimensions:
        xml_structure:
          single_aif_file: "One XML file per AIF record with AIFM in separate file"
          multi_aif_file: "All AIF records bundled with AIFM record in single XML (default)"
        compression:
          none: "Plain XML files"
          zip_single: "Single ZIP containing all batch XML files"
          zip_per_aif: "One ZIP per AIF XML"
          zip_of_zips: "Master ZIP containing individual AIF ZIPs"
          gzip: "GZIP-compressed XML"
        file_naming:
          pattern: "Configurable template per NCA"
          variables: ["{aifm_national_code}", "{aif_national_code}", "{reporting_period_type}", "{reporting_period_year}", "{filing_type}", "{submission_timestamp}", "{sequence_number}"]
        xml_variations: "NCA-specific namespace prefixes, wrapper elements, encoding declarations handled by NCA override serialisation profiles"
      requirements:
        - "Packaging configuration in NCA override files — no hard-coded packaging logic"
        - "File naming templates validated at configuration time"
        - "Packaging shown to client in submission preview before delivery"
        - "Checksum (MD5 or SHA-256 per NCA requirement) generated per packaged file and stored in audit record"
      acceptance_criteria:
        - "Adding a new NCA packaging profile passes integration tests without modifying existing code"

  # ---------------------------------------------------------------------------
  # 3.12  NCA DELIVERY CHANNELS
  # ---------------------------------------------------------------------------
  nca_delivery:

    - id: REQ-DEL-001
      title: "Five-channel NCA delivery model"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P3, P6, P7]
      regulatory: [DORA, AIFMD]
      description: >
        Each NCA registration has one configured delivery channel. All channels
        produce an equivalent audit trail record. All credentials for ROBOT,
        S3, and SFTP channels stored in the credential vault per REQ-NCA-003.
      channels:
        DIRECT_API:
          description: "Eagle calls the NCA REST API endpoint directly using Eagle-managed credentials"
          failure_fallback: "Retry 3 times with exponential backoff; fall back to MANUAL on persistent failure"
        ROBOT_PORTAL:
          description: "Browser automation submits via NCA web portal using client credentials from vault"
          failure_fallback: "Defined in REQ-NCA-002"
        S3_CLIENT_BUCKET:
          description: "Eagle places packaged file in client-provided S3 bucket; client responsible for onward NCA delivery"
          credentials: "Client IAM role ARN or access key in credential vault"
          confirmation: "S3 PutObject success recorded; client confirms NCA receipt"
        S3_EAGLE_BUCKET:
          description: "Eagle places packaged file in Eagle-managed S3 bucket; client pulls via presigned URL (7-day expiry)"
          confirmation: "Client records NCA confirmation number in Eagle (PENDING_CONFIRMATION flow)"
          cleanup: "File deleted after download or after 7 days — whichever comes first"
        SFTP_EAGLE_SERVER:
          description: "Client pushes data to Eagle SFTP inbound path; Eagle processes and returns packaged file to client outbound path"
          inbound_path: "/inbound/{tenant_id}/{aif_id}/"
          outbound_path: "/outbound/{tenant_id}/{period}/"
          polling: "Eagle polls inbound path every 5 minutes; new files trigger ingestion pipeline automatically"
          credentials: "Eagle issues tenant-scoped SSH key pairs; stored in credential vault"
          confirmation: "Client records NCA confirmation number in Eagle"
        MANUAL:
          description: "Eagle generates packaged file for client download; client submits via NCA portal"
          confirmation: "Client records NCA confirmation number in Eagle"
      acceptance_criteria:
        - "All five channels produce equivalent audit trail record structure"
        - "Channel delivery failure triggers defined fallback within specified timeframe"

    - id: REQ-DEL-002
      title: "SFTP inbound as automated ingestion trigger"
      layer: [L1_INGESTION]
      priority: SHOULD
      phase: 1
      principles: [P2, P6]
      regulatory: [DORA, GDPR]
      requirements:
        - "Files deposited to SFTP inbound path trigger ingestion pipeline automatically"
        - "Auto-detection (REQ-LEG-002) applied to SFTP inbound files"
        - "Processing status of SFTP-triggered ingestion visible in dashboard"
        - "Inbound path is tenant- and AIF-scoped; misrouting architecturally impossible"
        - "Inbound files deleted after successful ingestion"
      acceptance_criteria:
        - "File on SFTP appears as ingestion event in dashboard within 10 minutes"

  # ---------------------------------------------------------------------------
  # 3.13  NCA PORTAL ROBOTS AND CREDENTIAL MANAGEMENT
  # ---------------------------------------------------------------------------
  nca_robots:

    - id: REQ-NCA-001
      title: "NCA portal robot submission"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P9]
      regulatory: [DORA, AIFMD]
      description: >
        Browser automation submits validated XML to NCA web portal using client
        credentials from the encrypted vault. Triggered manually by
        COMPLIANCE_REVIEWER or TENANT_ADMIN after review gate approval.
        All robot actions logged. Credentials never logged or retained in memory
        beyond the session.
      robot_flow:
        1: "Review gate approval recorded"
        2: "Credentials retrieved from vault for session duration"
        3: "Headless browser opens NCA portal and authenticates"
        4: "Automation navigates to submission page and uploads XML"
        5: "NCA portal confirmation number captured and stored"
        6: "Browser session terminated; credentials cleared from memory"
      requirements:
        - "ROBOT mode available per NCA registration configuration"
        - "Robot scripts version-controlled and subject to change management"
        - "Eagle does not attempt to bypass CAPTCHAs under any circumstances"
      acceptance_criteria:
        - "AFM portal robot tested against AFM test environment before go-live"

    - id: REQ-NCA-002
      title: "NCA portal robot fallback procedure"
      layer: [L7_SUBMISSION, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      failure_scenarios:
        authentication_failure: "Halt robot; alert EAGLE_ADMIN and client; fall back to MANUAL within 15 minutes"
        portal_unavailable: "Retry 3 times at 10-minute intervals; alert and fall back to MANUAL"
        layout_changed: "Halt immediately; alert EAGLE_ADMIN; emergency change process for robot script"
        captcha_encountered: "Halt immediately; fall back to MANUAL; EAGLE_ADMIN investigates"
      requirements:
        - "Fallback to MANUAL is automatic; download link generated and client notified within 15 minutes"
        - "EAGLE_ADMIN notified within 5 minutes of any robot failure"
        - "Robot failure within 5 business days of deadline classified as SIGNIFICANT ICT incident"
        - "Sustained failure rate >10% triggers EAGLE_ADMIN alert and investigation"

    - id: REQ-NCA-003
      title: "NCA credential vault"
      layer: [L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, DORA, ISO27001]
      description: >
        Client NCA portal credentials and channel credentials stored in an
        HSM-backed secrets management service (AWS Secrets Manager or equivalent).
      requirements:
        - "Credentials encrypted with tenant-specific data encryption key wrapped by HSM master key"
        - "Credential plaintext never logged, transmitted in API responses, or shown in UI after entry"
        - "Only robot execution process can retrieve credentials; cleared from memory after session"
        - "TENANT_ADMIN can enter and update credentials; cannot retrieve existing values (write-only)"
        - "Credential entry UI prevents browser auto-fill and clipboard logging"
        - "Certificate and API token expiry monitoring; TENANT_ADMIN notified 30 days before expiry"
        - "All credential access events logged with vault reference only — never plaintext"
      acceptance_criteria:
        - "Credential vault passes penetration test with no HIGH or CRITICAL credential-storage findings"
        - "Credential retrieval audit log verified to contain only vault references, never plaintext"

    - id: REQ-NCA-004
      title: "Delivery channel governance per NCA registration"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P3, P9, P10]
      regulatory: [DORA]
      requirements:
        - "Channel set per NCA registration by TENANT_ADMIN; not a global setting"
        - "ROBOT mode cannot be activated without a credential vault entry for that NCA registration"
        - "Channel changes require TENANT_ADMIN authorisation and are logged in audit trail"
        - "DORA Art.30 information pack documents delivery channels in use and is updated on any change"

  # ---------------------------------------------------------------------------
  # 3.14  NCA SUBMISSION MECHANICS
  # ---------------------------------------------------------------------------
  submission_mechanics:

    - id: REQ-SUB-001
      title: "INIT and AMND filing type support"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P3, P8]
      regulatory: [AIFMD, IT_TECH_R6, DQEF]
      filing_types:
        INIT: "Initial filing for a reporting period — one INIT per AIFM per period per NCA; duplicate blocked"
        AMND: "Amendment of a previously accepted INIT — references original; CancelledRecordFlag = C"
      acceptance_criteria:
        - "Filing type auto-assigned based on submission history for the period"
        - "Duplicate INIT blocked with explanatory error"

    - id: REQ-SUB-002
      title: "Cancellation record support"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P8]
      regulatory: [AIFMD, IT_TECH_R6]
      requirements:
        - "CancellationAIFMRecordInfo and CancellationAIFRecordInfo supported"
        - "CancelledRecordFlag must be C"
        - "Cannot cancel an already-cancelled record"
        - "Cancellation requires COMPLIANCE_REVIEWER approval at review gate"

    - id: REQ-SUB-003
      title: "Batch submission sequencing"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P7, P8]
      regulatory: [AIFMD, DORA]
      description: >
        AIFM-level record must be submitted and acknowledged before any AIF-level
        records in the same batch. NCA-specific rate limits respected.
      requirements:
        - "AIFM acknowledgement verified before any AIF records are submitted"
        - "AIFM submission failure holds all AIF records in the batch"
        - "NCA rate limit configuration stored in NCA override files (REQ-MOD-001)"
        - "ROBOT mode: sessions serialised per NCA portal — no parallel sessions"

  # ---------------------------------------------------------------------------
  # 3.15  AMENDMENT WORKFLOW
  # ---------------------------------------------------------------------------
  amendment:

    - id: REQ-AMD-001
      title: "Client-initiated amendment workflow"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P8]
      regulatory: [AIFMD, DQEF]
      workflow:
        1: "COMPLIANCE_REVIEWER or TENANT_ADMIN initiates amendment on an ACCEPTED submission"
        2: "Eagle creates AMND draft pre-populated from original INIT data"
        3: "DATA_PREPARER corrects erroneous fields"
        4: "Full validation pipeline (L3 + L4) runs on corrected record"
        5: "COMPLIANCE_REVIEWER completes review gate for the AMND record"
        6: "AMND submitted to NCA via configured delivery channel"
        7: "AMND linked to original INIT in submission history"
      acceptance_criteria:
        - "Original INIT record is immutable; only AMND is created"
        - "DQEF DQ-T-002 flag applied if AMND is more than 90 days after original INIT"

    - id: REQ-AIFMD-001
      title: "Ad-hoc reporting trigger and workflow for Art.24(4)"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P2, P8]
      regulatory: [AIFMD, CDR231]
      description: >
        Eagle monitors trigger conditions for Art.24(4) ad-hoc reporting
        (illiquid asset proportion, leverage increase >10%) during L3 validation.
        Detected triggers notify COMPLIANCE_REVIEWER of the potential obligation.
        Ad-hoc workflow uses the same pipeline but with X1/X2 period codes.
      acceptance_criteria:
        - "Trigger conditions configurable with regulatory reference; ad-hoc workflow tested before go-live"

    - id: REQ-AIFMD-002
      title: "CAM flag resolution tracking"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P8]
      regulatory: [DQEF, AIFMD]
      description: >
        Each CAM flag on an accepted submission creates a tracked item in a
        CAM Resolution Register with statuses OPEN, IN_PROGRESS, RESOLVED.
        Unresolved items older than 60 days trigger reminder notifications.
        Items automatically closed when a subsequent submission passes without
        the same flag.
      acceptance_criteria:
        - "CAM register exportable as JSON and PDF for NCA enquiry response"

    - id: REQ-AIFMD-003
      title: "NCA response parsing and status reconciliation"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P8]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        NCA response XML is parsed automatically. ACCEPTED status and NCA reference
        number extracted and stored. REJECTED status maps error codes back to
        canonical record fields with human-readable DQEF descriptions.
        Unparseable responses set RESPONSE_PARSE_ERROR status and alert EAGLE_ADMIN.
      requirements:
        - "NCA error code to DQEF description mapping table version-controlled in configuration"
      acceptance_criteria:
        - "Parsing tested against AFM and CSSF response formats before go-live"

    - id: REQ-AIFMD-004
      title: "Umbrella fund and share class identification"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P4, P8]
      regulatory: [AIFMD, CDR231]
      description: >
        AIF profile supports umbrella_flag. Where set, one or more share classes
        can be registered (share class identifier, ISIN, NAV, currency).
        ShareClassIdentification fields populated in canonical record per
        validation rules.
      acceptance_criteria:
        - "Umbrella fund with 3 share classes produces valid AIF record with correct ShareClassIdentification sub-elements"

    - id: REQ-AIFMD-005
      title: "NCA enquiry response support"
      layer: [L9_ORCHESTRATION]
      priority: COULD
      phase: 1
      principles: [P1, P8]
      regulatory: [AIFMD]
      description: >
        COMPLIANCE_REVIEWER can mark a submission as NCA_ENQUIRY_IN_PROGRESS and
        generate a response pack: validation report, audit trail extract, and
        canonical record as a downloadable bundle.
      acceptance_criteria:
        - "Response pack generated within 5 minutes for a single submission"

  # ---------------------------------------------------------------------------
  # 3.16  AUDIT TRAIL AND LINEAGE
  # ---------------------------------------------------------------------------
  audit_trail:

    - id: REQ-AUD-001
      title: "Immutable append-only audit trail"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P4, P8, P9, P10]
      regulatory: [DORA, GDPR, ISO27001, AI_ACT]
      description: >
        Every event across all pipeline layers is recorded in an immutable
        append-only audit trail. No event may be modified or deleted after
        creation. Supports ISAE 3402, SOC 2, ISO 27001, and EU AI Act evidence.
      events_logged:
        ingestion: "Channel, source identifier, payload hash, user/API key, timestamp"
        transformation: "AI model version, per-field extraction result, confidence scores, source text references"
        validation: "Rule engine version, per-rule result, actual vs expected values, ESMA error codes"
        quality: "DQEF check ID, result, flagged value"
        review_gate: "Reviewer identity, role, timestamp, checklist acknowledgements, canonical record hash"
        submission: "Channel type, target NCA, packaged file hash, delivery timestamp, NCA response"
        amendment: "Initiator, reason, fields changed with original and corrected values"
        user_events: "Login, logout, MFA, role changes, API key lifecycle"
        system_events: "Rule engine updates, schema changes, NCA override updates, reference data updates"
        override_events: "Rule ID, flag category, justification, authoriser, countersignature"
      requirements:
        - "Audit trail records are write-once; no update or delete at any layer including database administration"
        - "Retention: minimum 10 years"
        - "User identity stored as pseudonymous user_id reference; name/email resolved at display time"
        - "Tamper attempt logs itself as a security alert"
      acceptance_criteria:
        - "Audit trail queryable by submission ID, fund ID, user ID, date range, and event type"
        - "Audit trail export available in machine-readable JSON for external auditor access"

    - id: REQ-AUD-002
      title: "Field-level lineage and logic audit record"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P4, P5, P8, P11]
      regulatory: [AI_ACT, DORA, AIFMD]
      description: >
        The audit trail records field-level lineage for every canonical record.
        For each field: the full provenance record per REQ-POS-004 (including
        formula applied, inputs used, AI confidence and source text, or user
        identity), plus the complete validation outcome against every rule that
        assessed that field, plus the logic version used at each step.
        This makes it possible to reconstruct exactly how any reported value
        was produced — from raw input through transformation, derivation,
        validation, and approval — without relying on institutional memory.
      audit_record_per_field:
        field_identifier: "Canonical field name and ESMA Annex IV field reference"
        current_provenance: "Full provenance record per REQ-POS-004"
        full_history: "Ordered list of all provenance records for this field since ingestion"
        validation_results:
          description: "All L3 rule results that assessed this field"
          per_rule: "rule_id, rule_version, result (PASS/CAF/CAM/DQ), actual value, constraint, ESMA error code, NCA code the rule applied to"
        logic_versions_applied:
          validation_rule_engine: "aifmd_annex_iv_validation_rules version"
          nca_override_profile: "NCA override profile version for each NCA the field was validated against"
          calculation_engine: "Calculation engine version (if DERIVED provenance)"
          ai_model: "Model name and version (if AI_PROPOSED provenance)"
      ai_step_tagging:
        description: "All AI-assisted steps tagged distinctly from deterministic steps throughout the audit record"
        tagged_events: "AI extraction, AI confidence scoring, AI field mapping, AI input quality check"
        confirmation_status: "Whether the human reviewer confirmed, modified, or rejected the AI proposal"
      requirements:
        - "Field-level audit record stored as part of the immutable submission audit trail (REQ-AUD-001)"
        - "Logic versions (rule engine, NCA override, calculation engine, AI model) recorded per audit event — not just per submission"
        - "AI-tagged events filterable separately from deterministic events"
        - "Model version changes are versioned system events in audit trail"
        - "Field lineage audit record is the data source for the UI lineage view (REQ-LIN-001) and logic transparency panel (REQ-LIN-002)"
      acceptance_criteria:
        - "Field lineage audit record for a DERIVED field contains formula ID, input values, engine version, and reference data used"
        - "Field lineage audit record for an AI_PROPOSED field contains model version, confidence score, and source text fragment"
        - "Field lineage audit record for a MANUALLY_OVERRIDDEN field contains original value, override reason, and user role"
        - "All three audit record types queryable and renderable in the UI lineage view (REQ-LIN-001)"

    - id: REQ-AUD-003
      title: "Submission history and status dashboard"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P4]
      regulatory: [AIFMD]
      submission_statuses:
        DRAFT: "Data ingested, validation not yet run"
        VALIDATION_PENDING: "Pipeline triggered, validation in progress"
        CAF_FAILED: "One or more CAF errors present; returned to DATA_PREPARER"
        REVIEW_PENDING: "Validation passed; awaiting review gate approval"
        APPROVED: "Review gate completed; awaiting submission trigger"
        SUBMITTING: "Direct submission or robot in progress"
        SUBMITTED: "Transmitted; awaiting NCA acknowledgement"
        ACCEPTED: "NCA acknowledged (DIRECT/ROBOT) or client confirmed (other channels)"
        PENDING_CONFIRMATION: "Client has downloaded/received file; awaiting NCA confirmation number"
        REJECTED: "NCA returned rejection; requires correction and resubmission"
        RESPONSE_PARSE_ERROR: "NCA response received but could not be parsed"
        AMENDMENT_INITIATED: "Amendment workflow started"
        AMENDED: "AMND record submitted; original INIT superseded"
        CANCELLED: "Cancellation record submitted"
        OVERDUE: "Submission deadline passed without accepted submission"
      acceptance_criteria:
        - "Dashboard loads in < 2 seconds for tenants with up to 50 AIFs"
        - "Overdue submissions prominently highlighted"

    - id: REQ-AUD-004
      title: "Use of AI Register"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P8, P10]
      regulatory: [AI_ACT]
      register_content:
        model_name: "Claude (Anthropic)"
        model_version: "Recorded per deployment; updated on model changes"
        deployment_purpose: "L2 data transformation and normalisation only"
        inputs: "Raw ingested fund data and unstructured documents"
        outputs: "Candidate field mappings with confidence scores"
        human_oversight: "Mandatory confirmation before AI output enters validation; mandatory review gate before NCA submission"
        validation_mechanism: "All AI outputs pass L3 deterministic validation before use"
        ai_classification_flag: "ai_produces_regulatory_output = FALSE (REQ-AIACT-002)"
        retention: "5 years from end of service"
      acceptance_criteria:
        - "Register exportable for regulatory authority requests"
        - "Model version changes recorded as versioned system events"

    - id: REQ-AUD-005
      title: "Historical submission import"
      layer: [L8_AUDIT]
      priority: COULD
      phase: 2
      principles: [P4]
      regulatory: [AIFMD]
      description: >
        Clients migrating from another system can import historical accepted INIT
        records for audit continuity and amendment tracing. Imported records are
        not re-validated and are clearly marked IMPORTED_HISTORICAL.
      acceptance_criteria:
        - "Import via structured JSON or Excel template"
        - "Imported records available as source for amendment workflow"

  # ---------------------------------------------------------------------------
  # 3.17  NOTIFICATIONS
  # ---------------------------------------------------------------------------
  notifications:

    - id: REQ-NOT-001
      title: "Active notification system"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P2, P7]
      regulatory: [DQEF]
      description: >
        Email and in-app alerts for deadline events (per REQ-OBL-002) and
        status changes. Mandatory alerts (OVERDUE, REJECTED, CAF_FAILED,
        RESPONSE_PARSE_ERROR) cannot be disabled. Unsubscribe not available
        for regulatory deadline alerts.
      requirements:
        - "Notification delivery failure retried 3 times with exponential backoff"
        - "Failed delivery logged as system event; in-app alert always shown"
        - "All notifications logged with recipient list and timestamp"

  # ---------------------------------------------------------------------------
  # 3.18  DASHBOARDS
  # ---------------------------------------------------------------------------
  dashboards:

    - id: REQ-DSH-001
      title: "Client compliance dashboard"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P4]
      regulatory: []
      required_elements:
        - "Reporting calendar with all NCA registrations, period statuses and days-to-deadline"
        - "NCA obligation matrix per REQ-MJ-003"
        - "AIFM aggregation status indicator (COMPLETE / PARTIAL / MANUAL)"
        - "Active overdue count prominently displayed"
        - "Reference data staleness indicators"
        - "Quick actions: upload data, view pending reviews, view submission history"
      acceptance_criteria:
        - "Dashboard loads in < 2 seconds for up to 50 AIFs"
        - "Mobile-responsive layout"

    - id: REQ-DSH-002
      title: "Validation and quality report view"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P5, P8]
      regulatory: [DQEF]
      required_elements:
        - "CAF errors: field label, code, description, ESMA error code, actual value, legal basis, NCA"
        - "CAM flags: same as CAF plus resolution guidance; link to CAM register"
        - "DQ warnings: check name, flagged value, DQEF rationale, acknowledgement field"
        - "Field provenance indicator per field per REQ-POS-004 — icon with click-through to lineage view (REQ-LIN-001)"
        - "Overall status per NCA: PASS / BLOCKED / REVIEW_REQUIRED"
      acceptance_criteria:
        - "Report printable and exportable as PDF"
        - "Plain English error descriptions — no unexplained field codes"
        - "Every field with a non-PASS validation result shows its provenance indicator and a link to the lineage view"

  # ---------------------------------------------------------------------------
  # 3.20  FIELD LINEAGE AND LOGIC TRANSPARENCY
  # ---------------------------------------------------------------------------
  field_lineage:

    - id: REQ-LIN-001
      title: "Field lineage view — per-field audit trail accessible from the UI"
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P1, P4, P5, P8, P10]
      regulatory: [AIFMD, AI_ACT, DORA]
      description: >
        Any user with at least READ_ONLY access can click on any field in any
        canonical record and open a field lineage panel that shows the complete
        history of that field's value and provenance in a human-readable,
        non-technical format. The lineage view is the primary UI surface for
        understanding how a reported value was produced. It draws from the
        field-level audit record (REQ-AUD-002) and the provenance model
        (REQ-POS-004) and does not require navigating to a separate audit log.
      lineage_panel_content:
        current_value_summary:
          field_label: "Human-readable field name and ESMA Annex IV field reference number"
          current_value: "Current value with unit/currency if applicable"
          provenance_badge: "Prominent badge: DERIVED / AI_PROPOSED / MANUALLY_ENTERED / MANUALLY_OVERRIDDEN / IMPORTED / SMART_DEFAULT / LOCKED"
          one_line_summary: "Plain-English sentence: e.g. 'This value was calculated from your position data using the Gross Method leverage formula (CDR Art.7). Calculated on 2026-03-15.' or 'This value was extracted from uploaded PDF by AI with HIGH confidence.' or 'This value was entered manually by a Compliance Reviewer on 2026-03-14.'"
        provenance_detail:
          for_DERIVED:
            - "Formula used: [formula_description in plain English]"
            - "Legal basis: [CDR article or ESMA guideline]"
            - "Inputs used: [list of input field names and values at calculation time]"
            - "Reference data: [e.g. ECB rate EUR/USD 1.0823 as of 2026-03-19]"
            - "Calculated at: [timestamp]"
            - "Calculation engine version: [version]"
          for_AI_PROPOSED:
            - "Extracted by Claude [model version] on [timestamp]"
            - "Confidence: [HIGH / MEDIUM / LOW] ([numeric score])"
            - "Source text: [verbatim extracted fragment in a styled quote block]"
            - "Source document: [hash and filename if available]"
            - "Confirmed by: [user role and timestamp if confirmed; 'Awaiting confirmation' if not]"
          for_MANUALLY_ENTERED:
            - "Entered by: [role] on [timestamp] via [WEB_UI or API]"
          for_MANUALLY_OVERRIDDEN:
            - "Original value: [value]"
            - "Original provenance: [provenance type]"
            - "Overridden by: [role] on [timestamp]"
            - "Override reason: [reason text]"
          for_IMPORTED:
            - "Imported from: [adapter name and version]"
            - "Source template field: [field name in template]"
            - "Enrichment applied: [list of calculations]"
          for_SMART_DEFAULT:
            - "Applied by rule: [rule description]"
            - "Trigger condition: [fund characteristic that triggered the rule]"
        validation_results:
          description: "All validation rules that assessed this field, per NCA"
          per_nca_group:
            - "NCA: [code]"
            - "Rule: [rule_id] — [plain-English rule description]"
            - "Result: PASS / CAF / CAM / DQ"
            - "Rule logic link: [click to open logic transparency panel REQ-LIN-002]"
        change_history:
          description: "Complete ordered list of all provenance changes since the field was first populated"
          per_history_entry:
            - "Timestamp, provenance type, value, source/user, one-line summary"
          note: "History is immutable and cannot be edited or deleted"
      ui_behaviour:
        trigger: "Click on any field value anywhere in the application — data entry forms, validation report, review gate, archive view"
        presentation: "Slide-out panel alongside the current view; does not navigate away"
        depth: "Full detail always available; no truncation of source text or input lists"
        export: "Lineage panel content exportable as PDF or JSON for NCA enquiry evidence"
        role_access: "Available to all roles including READ_ONLY; no sensitive data exposed (user IDs are pseudonymous)"
      requirements:
        - "Lineage panel available on every field in every canonical record view in the application"
        - "Lineage panel loads within 2 seconds for any field"
        - "Plain-English one-line summary generated for all provenance types without exception"
        - "Source text for AI_PROPOSED fields shown verbatim in the panel — never summarised or truncated"
        - "Lineage panel export produces a document suitable for inclusion in an NCA enquiry response pack"
      acceptance_criteria:
        - "Click on a DERIVED field opens lineage panel showing formula, inputs, reference data, and timestamp within 2 seconds"
        - "Click on an AI_PROPOSED field opens lineage panel showing confidence score and verbatim source text"
        - "Click on a MANUALLY_OVERRIDDEN field shows original value, override reason, and full change history"
        - "Lineage panel available in the archived submission view for submissions up to 10 years old"

    - id: REQ-LIN-002
      title: "Logic transparency panel — rule and formula explanation for any check or derivation"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P5, P8, P10]
      regulatory: [AIFMD, CDR231, AI_ACT]
      description: >
        Any user can access a plain-English explanation of the rule or formula
        that produced any validation result or calculated value, without needing
        to read the YAML rule files or legal texts directly. The logic transparency
        panel bridges the technical rule definitions in the validation rules YAML
        and NCA override files with a comprehensible explanation that a compliance
        professional can use to understand, investigate, and explain a result.
        This is distinct from the field lineage view (REQ-LIN-001) which shows
        what happened to a specific field instance; the logic transparency panel
        shows what the rule or formula itself specifies.
      panel_content:
        for_validation_rules:
          rule_identity:
            - "Rule ID and human-readable rule name"
            - "Applies to: [field label and ESMA field reference]"
            - "Rule category: CAF / CAM / DQ"
            - "NCA scope: applies to all NCAs / specific NCAs listed"
          plain_english_explanation:
            - "What this rule checks: [one or two sentences]"
            - "Why this rule exists: [regulatory basis in plain English]"
          technical_detail:
            - "Validation constraint: [from rule YAML — e.g. 'value must be > 0 and <= 100']"
            - "Legal basis: [ESMA error code, CDR article, or ESMA guideline reference with full citation]"
            - "Rule version: [version identifier from rule engine]"
            - "Effective from: [date this rule version became active]"
          nca_override_note:
            - "If the rule behaviour differs for a specific NCA, the difference is shown: 'For CSSF: this field is mandatory (vs. optional at ESMA baseline)'"
          example_correct_value: "An example of a value that would pass this rule"
          remediation_guidance: "What to check and how to correct a CAF or CAM result"
        for_calculation_formulas:
          formula_identity:
            - "Formula ID and human-readable formula name"
            - "Produces: [field label and ESMA field reference]"
          plain_english_explanation:
            - "What this formula calculates: [one or two sentences]"
            - "Why this method is used: [regulatory basis]"
          technical_detail:
            - "Formula: [symbolic or step-by-step description]"
            - "Inputs required: [list of input fields with descriptions]"
            - "Assumptions: [e.g. 'Short positions are treated as absolute values in the Gross Method']"
            - "Legal basis: [CDR article with full citation]"
            - "Formula version: [version identifier from calculation engine]"
            - "Effective from: [date]"
          worked_example: "Numeric worked example using anonymised or illustrative figures"
        for_dqef_checks:
          check_identity:
            - "DQEF check ID and name"
            - "Assessed field(s)"
          plain_english_explanation: "What the check tests and why it flags unusual values"
          technical_detail:
            - "Check method: [plausibility range, statistical threshold, or cross-record rule]"
            - "ESMA DQEF reference: [DQEF document reference and section]"
            - "Check version: [version]"
      ui_behaviour:
        trigger_from_lineage_panel: "Rule logic link in the validation results section of REQ-LIN-001"
        trigger_from_validation_report: "Click on rule ID or CAF/CAM/DQ badge in REQ-DSH-002"
        trigger_from_field: "Hover tooltip on any DERIVED field shows formula name; click opens full panel"
        presentation: "Second-level panel; navigable back to field lineage panel"
        search: "EAGLE_ADMIN and TENANT_ADMIN can search logic transparency content by rule ID, field name, or keyword"
        export: "Panel content exportable as PDF"
      requirements:
        - "Every validation rule in aifmd_annex_iv_validation_rules_v0_3.yaml has a corresponding logic transparency entry"
        - "Every calculation formula in REQ-POS-002 has a corresponding logic transparency entry"
        - "Every DQEF check in REQ-VAL-003 has a corresponding logic transparency entry"
        - "Logic transparency content is version-controlled alongside the rule files — when a rule changes, its transparency entry is updated as part of the same change process"
        - "Logic transparency content is maintained by EAGLE_ADMIN; drafts reviewed by Head of Compliance before publication"
        - "NCA override differences surfaced explicitly — a reviewer can see at a glance if a rule is stricter for a specific NCA"
      acceptance_criteria:
        - "Every CAF result in the validation report has a working link to its logic transparency entry"
        - "Logic transparency entry for the Gross Method leverage formula includes the CDR Art.7 citation, the formula, and a worked numeric example"
        - "Logic transparency entry for a CSSF override rule shows the difference vs. the ESMA baseline"
        - "Logic transparency content search returns results for 'leverage' in < 1 second"

    - id: REQ-LIN-003
      title: "Submission-level traceability report"
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: SHOULD
      phase: 1
      principles: [P1, P4, P8, P10]
      regulatory: [DORA, AIFMD, ISO27001]
      description: >
        For any completed or archived submission, a structured traceability report
        can be generated summarising: the provenance composition of all fields,
        the logic versions applied, the review gate decisions, and a field-by-field
        exception list (any field that is not DERIVED or MANUALLY_ENTERED).
        The report is designed as a self-contained document for NCA enquiries,
        ISAE 3402 auditor review, or internal compliance sign-off.
      report_sections:
        cover:
          - "AIFM name, AIF name, reporting period, NCA, filing type, submission date"
          - "Overall provenance composition: X fields DERIVED (N%), Y fields MANUALLY_ENTERED (N%), Z fields AI_PROPOSED-confirmed (N%), W fields MANUALLY_OVERRIDDEN (N%)"
        logic_versions:
          - "Validation rule engine version and effective date"
          - "NCA override profile version and effective date"
          - "Calculation engine version and effective date"
          - "AI model version (if any AI_PROPOSED fields present)"
          - "Reference data versions (ECB rate snapshot date, GLEIF snapshot date)"
        review_gate_summary:
          - "Approver role and timestamp"
          - "Checklist acknowledgements"
          - "Overridden checks: count, category breakdown, justifications"
        field_exception_list:
          description: "Every field that is not DERIVED or MANUALLY_ENTERED listed with provenance and one-line summary"
          includes: [MANUALLY_OVERRIDDEN, AI_PROPOSED_confirmed, IMPORTED, SMART_DEFAULT, LOCKED]
      requirements:
        - "Report generated on demand for any submission in ACCEPTED, AMENDED, or archived status"
        - "Report exported as PDF and machine-readable JSON"
        - "COMPLIANCE_REVIEWER and TENANT_ADMIN can generate; READ_ONLY cannot"
        - "Generation completes within 60 seconds for a full AIFM + 200 AIF batch"
      acceptance_criteria:
        - "Traceability report for an accepted submission is complete and self-consistent — all counts match the archived canonical record"
        - "Report included in the archive package export per REQ-DORA-003"
  # ---------------------------------------------------------------------------
  # 3.19  COO OPERATIONS REQUIREMENTS
  # ---------------------------------------------------------------------------
  # These requirements define the MOD-MANAGEMENT Operations Dashboard: the internal
  # Eagle operations surface used by the COO and EAGLE_ADMIN roles to manage
  # the reporting factory. They are distinct from the client-facing compliance
  # dashboard (REQ-DSH-001) which serves tenant users.
  # Source: gap analysis against project_eagle_coo_v1_1.md (v1.1.0 addition).
  # ---------------------------------------------------------------------------
  coo_operations:

    - id: REQ-OPS-001
      title: "EAGLE_ADMIN cross-client operations dashboard"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P2, P4, P10]
      regulatory: [DORA]
      description: >
        A dedicated internal dashboard — visible only to EAGLE_ADMIN — that
        provides a real-time cross-tenant view of the reporting factory. This
        is the primary operational control surface for the COO role. It
        aggregates status across all active clients into a single operational
        health view, distinct from the per-client compliance dashboard
        (REQ-DSH-001) which is client-facing.
      required_elements:
        factory_overview:
          - "Total active clients with count of AIFs and NCA registrations"
          - "Submissions in progress: count by pipeline stage (INGESTING, VALIDATING, REVIEW_PENDING, SUBMITTING)"
          - "Queue depth: number of records waiting in each stage across all tenants"
          - "Submission success rate for the current and previous reporting period (% accepted / % rejected / % pending)"
          - "Automation ratio indicator: current rolling 30-day automation ratio (see REQ-OPS-002)"
        deadline_pressure_view:
          - "All NCA deadlines within the next 14 days, sorted by urgency, showing client, NCA, period, status, and days remaining"
          - "Color-coded urgency: GREEN (>7 days), AMBER (3-7 days), RED (<3 days), BLACK (overdue)"
          - "One-click drill-down to the client's submission in the admin tenant view"
        per_client_health_row:
          - "Table of all clients, each row showing: client name, active AIF count, last submission date, current period status, SLA performance score (last 12 months), open exception count"
          - "Sortable by any column; filterable by status and SLA score"
          - "Clients with deteriorating health (SLA score below threshold or open exceptions above threshold) highlighted automatically"
        ingestion_status:
          - "Per-client data receipt status for the current period: RECEIVED, PARTIAL, NOT_YET_RECEIVED, OVERDUE"
          - "Expected vs. received feed counts where clients use scheduled SFTP or API push"
          - "Flag for clients where ingest is overdue relative to their submission deadline minus configured lead time"
        reference_data_panel:
          - "Simplified version of REQ-REF-002: ECB rate freshness, GLEIF freshness, NCA register freshness — with status indicators"
      requirements:
        - "Dashboard loads in < 3 seconds for up to 200 active clients"
        - "All data reflects pipeline state with maximum 60-second refresh lag"
        - "Dashboard accessible from any authenticated EAGLE_ADMIN session without tenant context"
        - "Dashboard state (filters, sort) persisted in DB per user — not browser state; consistent across devices and sessions"
        - "Mobile-responsive layout for on-call access"
      acceptance_criteria:
        - "EAGLE_ADMIN sees all active clients in a single scrollable view without navigating per tenant"
        - "A client with OVERDUE status is prominently distinguishable from the rest within 5 seconds of opening the dashboard"
        - "Ingestion overdue flag fires correctly when a client's SFTP feed has not arrived within the configured lead time"

    - id: REQ-OPS-002
      title: "Automation ratio tracking and reporting"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P2, P4, P10, P11]
      regulatory: [DORA]
      description: >
        The automation ratio — the proportion of AIF submissions processed
        end-to-end without any manual intervention — is the primary operational
        KPI for the reporting factory (COO document section 8: target >90% by
        Phase 2). The application must record every manual touchpoint against
        a submission and compute the automation ratio at multiple granularities.
        A submission is counted as automated only if it completes all pipeline
        stages L1 through L7 without any of the defined manual interventions.
      manual_intervention_types:
        MANUAL_FIELD_ENTRY:     "Any field entered manually via web UI rather than derived or ingested"
        MANUAL_FIELD_OVERRIDE:  "Override of a derived or AI-proposed field value"
        MANUAL_CAF_OVERRIDE:    "Override of a CAF (critical mandatory) validation failure"
        MANUAL_CAM_OVERRIDE:    "Override of a CAM (critical additional mandatory) validation failure"
        MANUAL_DQ_ACKNOWLEDGE:  "Explicit acknowledgement of a DQEF DQ-WARNING flag"
        MANUAL_REVIEW_WITH_FLAGS: "Review gate approval of a record that carries unresolved flags"
        MANUAL_SUBMISSION:      "Submission via MANUAL download channel (not automated NCA delivery)"
        MANUAL_EXCEPTION_RESOLUTION: "Any exception in the operational exception log linked to this submission"
      automation_ratio_definition: >
        automation_ratio = count(submissions with zero manual_intervention_types) /
                           count(all completed submissions) * 100
        Calculated per period, per client, and as a rolling 30-day factory-wide figure.
        MANUAL_DQ_ACKNOWLEDGE is excluded from the ratio denominator when the DQ flag
        is a known-good exception documented in the CAM register (REQ-OVR-001).
      requirements:
        - "Every manual intervention type is recorded against the submission record at the moment of occurrence"
        - "Automation ratio computed and stored per (client, reporting_period, NCA_registration) on submission completion"
        - "Rolling 30-day factory-wide automation ratio available in REQ-OPS-001 dashboard"
        - "Automation ratio trend chart available in MOD-MANAGEMENT: monthly bars for the last 12 months, factory-wide and per client"
        - "Breakdown by intervention type available: which manual touchpoints are most frequent and on which clients"
        - "Automation ratio stored as a first-class record in the management_metrics table per (client, reporting_period, NCA_registration) — queryable directly; no intermediate file store"
        - "PDF and CSV exports of automation ratio data generated on demand from DB records in MOD-MANAGEMENT; the export is a view of the DB record, not a separate data store"
        - "EAGLE_ADMIN can set an automation ratio alert threshold; alert fires when the rolling 30-day ratio drops below the threshold"
      acceptance_criteria:
        - "A submission where a DATA_PREPARER manually entered one field is correctly counted as non-automated"
        - "A submission processed entirely via API ingestion, AI transformation confirmed without change, zero validation flags, bulk approved, and delivered via DIRECT_API is counted as automated"
        - "Monthly automation ratio chart reflects actual intervention data — not estimated"
        - "Alert fires within 60 minutes of the rolling ratio crossing the configured threshold"

    - id: REQ-OPS-003
      title: "Per-submission SLA throughput metrics"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P1, P4, P10]
      regulatory: [DORA]
      description: >
        In addition to deadline conformity (whether a submission was made before
        the NCA deadline), the COO needs to measure factory throughput: how long
        each submission took to move from initial data receipt to NCA delivery.
        These metrics drive SLA definition, capacity planning, and identification
        of pipeline bottlenecks.
      metrics_to_capture:
        total_cycle_time:
          definition: "Elapsed time from first ingestion event to NCA submission confirmation"
          unit: "Hours (decimal)"
          recorded_per: "(client, AIF, reporting_period, NCA_registration)"
        stage_dwell_times:
          definition: "Time spent in each pipeline stage: INGESTING, TRANSFORMATION, VALIDATION, REVIEW_PENDING, PACKAGING, SUBMITTING"
          unit: "Hours (decimal)"
          note: "REVIEW_PENDING dwell time is the primary indicator of human review bottleneck"
        deadline_margin:
          definition: "Hours between NCA submission confirmation and the NCA deadline"
          sign: "Positive = on time; negative = overdue"
        manual_intervention_dwell:
          definition: "Sum of time attributed to manual intervention types per REQ-OPS-002"
          note: "Derived: total_cycle_time minus automated stage processing time"
      requirements:
        - "All stage timestamps derived from the existing audit trail (REQ-AUD-001) — no separate timing infrastructure required"
        - "Per-submission SLA metrics stored as first-class records in the submission_metrics table per (client, AIF, reporting_period, NCA_registration) — queryable directly from MOD-MANAGEMENT without file export"
        - "SLA performance view in MOD-MANAGEMENT: average and P90 cycle time per client per period"
        - "Pipeline bottleneck report: which stage accounts for the most dwell time across all submissions in a period"
        - "Deadline margin distribution chart: histogram of hours-before-deadline for all submissions in the last 12 months"
      acceptance_criteria:
        - "Total cycle time for a submission is consistent with the difference between first ingestion timestamp and submission confirmation timestamp in the audit trail"
        - "REVIEW_PENDING dwell time is correctly identified as the dominant stage for any submission where the reviewer took more than 24 hours"
        - "Deadline margin is correctly negative for any submission where the NCA confirmation timestamp post-dates the configured deadline"

    - id: REQ-OPS-004
      title: "Operational exception log"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P4, P7, P10]
      regulatory: [DORA]
      description: >
        A structured, searchable operational exception log maintained by
        EAGLE_ADMIN for tracking non-automated resolutions, pipeline failures,
        and escalated issues. This is distinct from the immutable audit trail
        (REQ-AUD-001) which records all events; the exception log is an
        operational register of issues requiring attention or tracking.
        Exceptions may be opened automatically by the system (e.g. robot
        failure, reference data update failure) or manually by EAGLE_ADMIN.
      exception_categories:
        PIPELINE_FAILURE:      "Pipeline stage failed for technical reason — e.g. transformation timeout, robot failure"
        DATA_QUALITY_ISSUE:    "Client data arrived malformed, incomplete, or with unexpected structure"
        SLA_AT_RISK:           "Submission is at risk of missing deadline — triggered by REQ-OPS-001 deadline pressure view"
        REFERENCE_DATA_STALE:  "Reference data batch update failed or exceeded staleness threshold"
        MANUAL_ESCALATION:     "EAGLE_ADMIN or client raised an issue requiring operational attention"
        DORA_INCIDENT_LINKED:  "Exception linked to an open DORA incident (REQ-OPS-006)"
      exception_record_fields:
        id:              "Auto-generated exception ID"
        opened_at:       "Timestamp — auto (system-generated) or manual entry"
        category:        "One of the exception categories above"
        severity:        "LOW / MEDIUM / HIGH / CRITICAL"
        client:          "Linked tenant / AIFM sub-entity"
        period:          "Reporting period affected (if applicable)"
        pipeline_stage:  "Pipeline stage at point of exception (if applicable)"
        description:     "Free-text description of the issue"
        status:          "OPEN / IN_PROGRESS / RESOLVED / CLOSED"
        assigned_to:     "EAGLE_ADMIN user responsible"
        resolution_time: "Elapsed hours from opened_at to RESOLVED status"
        root_cause:      "Free-text root cause (required before status can be set to CLOSED)"
        linked_audit_events: "References to audit trail event IDs relevant to this exception"
        linked_dora_incident: "Reference to DORA incident ID if applicable (REQ-OPS-006)"
      requirements:
        - "System auto-opens exceptions for: robot failure (REQ-NCA-002), reference data update failure (REQ-REF-001 alert), NCA submission rejection (REQ-SUB-003), and OVERDUE status reached"
        - "EAGLE_ADMIN can manually open, update, assign, and close exceptions"
        - "Exception log searchable and filterable by all fields"
        - "Open exception count per client surfaced in REQ-OPS-001 client health row"
        - "Root cause is required before an exception can be set to CLOSED"
        - "Exception log stored in the exceptions table — all fields indexed and queryable from MOD-MANAGEMENT; CSV and JSON export generated on demand as views of the DB record, not separate stores"
        - "Monthly exception summary computed from DB records and stored as a monthly_exception_summary record; displayed in MOD-MANAGEMENT without requiring manual assembly"
        - "Exception records retained for 5 years"
      acceptance_criteria:
        - "A robot failure event (REQ-NCA-002) automatically creates an exception record within 5 minutes of the failure event"
        - "Attempting to close an exception without entering a root cause is blocked with an explanatory message"
        - "EAGLE_ADMIN can filter all open HIGH and CRITICAL exceptions across all clients in one view"

    - id: REQ-OPS-005
      title: "Cross-client reporting capacity calendar"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P2, P4, P10]
      regulatory: []
      description: >
        An EAGLE_ADMIN-only calendar view that aggregates all NCA submission
        deadlines across all active clients and NCA registrations into a single
        factory capacity view. This view enables the COO to identify peak
        submission periods, anticipate capacity requirements, and plan
        operational resources in advance. It is the cross-tenant counterpart
        to the per-client reporting calendar in REQ-DSH-001.
      required_elements:
        calendar_view:
          - "Monthly and weekly views showing all NCA submission deadlines across all clients"
          - "Each deadline shown as a bar or marker labeled with: client name, NCA code, number of AIFs in scope, submission channel"
          - "Peak-load indicator: total number of submissions due within any 7-day window highlighted when above configurable threshold"
        load_distribution:
          - "Bar chart of submission count by calendar week for the next 6 months"
          - "Configurable peak threshold; weeks above threshold highlighted in amber/red"
        scenario_planning:
          - "Ability to add projected future client deadlines (for clients in onboarding) to the calendar without activating them"
          - "Projection mode: show estimated load assuming 2x and 5x current client count based on current deadline distribution"
      requirements:
        - "Calendar populated automatically from all active NCA registration deadline schedules"
        - "Updates automatically when a new client is onboarded or a reporting frequency changes"
        - "Calendar data stored in the capacity_calendar table — DB record is the source of truth; PDF export generated on demand as a view of the DB record"
      acceptance_criteria:
        - "Calendar correctly shows all deadlines for 50 active clients with varying NCA registrations and reporting frequencies"
        - "Peak-load alert fires when a 7-day window contains more submissions than the configured threshold"
        - "Projected 2x client load view is available and clearly labeled as a projection"

    - id: REQ-OPS-006
      title: "DORA incident client impact register"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P7, P10]
      regulatory: [DORA]
      description: >
        A structured register of client impacts for each DORA MAJOR or
        SIGNIFICANT incident, owned by the COO (operational impact lane per
        project_eagle_coo_v1_1.md section 4.5). This register is the input
        to the DORA Art.18 regulatory notification process owned by the Head
        of Compliance and Risk, and provides the basis for client SLA
        remediation tracking.
        This requirement complements the technical incident register
        (REQ-ISO-005) which is owned by the CTO. Each DORA incident has two
        linked records: a technical incident record (REQ-ISO-005) and an
        operational client impact record (this requirement).
      impact_register_fields:
        incident_id:            "Reference to the DORA technical incident record (REQ-ISO-005)"
        incident_classification: "MAJOR / SIGNIFICANT per DORA Art.3 and REQ-DORA-001"
        detected_at:            "Timestamp of first detection"
        affected_clients:
          structure:            "List of affected client records, one per client"
          per_client_fields:
            client_name:        "Tenant / AIFM sub-entity name"
            impact_type:        "SUBMISSION_DELAYED / DATA_UNAVAILABLE / PORTAL_INACCESSIBLE / AUDIT_TRAIL_UNAVAILABLE / OTHER"
            submission_at_risk: "Boolean — is there a submission deadline within 5 business days of incident start?"
            deadline:           "Date of submission deadline at risk (if applicable)"
            sla_breach:         "Boolean — did or will the incident cause an SLA breach?"
            client_notified_at: "Timestamp of client notification"
            notification_channel: "EMAIL / IN_APP / PHONE (free text)"
            remediation_commitment: "Free text — what Eagle has committed to the client"
            remediation_status: "PENDING / IN_PROGRESS / COMPLETED"
        regulatory_notification_required: "Boolean — derived from classification; triggers alert to Head of Compliance"
        regulatory_notification_deadline: "Deadline for DORA Art.18 initial notification (4 hours for MAJOR)"
        post_incident_review_due: "5 business days after incident resolution for MAJOR incidents"
        lessons_learned:        "Free text — linked to operational improvement programme"
      requirements:
        - "Impact register record created automatically when a DORA incident is classified as MAJOR or SIGNIFICANT in REQ-ISO-005"
        - "EAGLE_ADMIN populates affected client list and impact details; system pre-populates clients with active submissions near the incident window"
        - "If regulatory_notification_required is TRUE, an urgent alert is sent to the Head of Compliance and Risk role with the notification deadline"
        - "SLA breach flag on any client record triggers automatic notification to that client's Head of Customer Success contact"
        - "Impact register visible in REQ-OPS-001 dashboard during an active incident"
        - "All impact register records retained for 5 years per DORA retention requirements"
        - "Impact register exportable as PDF and JSON for inclusion in post-incident report (REQ-ISO-005)"
      acceptance_criteria:
        - "Creating a MAJOR incident in REQ-ISO-005 automatically creates a linked impact register record within 5 minutes"
        - "Alert to Head of Compliance and Risk fires with the correct 4-hour notification deadline for a MAJOR incident"
        - "Impact register export produces a self-contained document suitable for inclusion in a DORA Art.18 notification package"

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # 3.20  GTM, TRIAL AND COMMERCIAL DASHBOARD REQUIREMENTS (added v1.2.0)
  # ---------------------------------------------------------------------------
  # Owner: CCO / CRO (commercial process); COO (quality review); CTO (build)
  # GDPR blocker: RoPA entry for prospect data processing must be completed
  # by Head of Compliance and Risk before MOD-GTM and MOD-TRIAL go-live.
  # ---------------------------------------------------------------------------

  # --- MOD-GTM: AIFM prospect database ---

  gtm_and_trial:

    - id: REQ-GTM-001
      title: "AIFM prospect enrichment via public web sources"
      module: MOD-GTM
      layer: [L2_TRANSFORMATION]
      priority: SHOULD
      phase: 1.5
      gdpr_blocker: true
      principles: [P2, P5, P8, P11, P12]
      regulatory: [AI_ACT, GDPR]
      description: >
        Eagle's internal AIFM prospect database is enriched asynchronously
        with strategy context inferred from publicly available sources:
        AIFM websites, fund factsheets, prospectuses, press releases and
        regulatory publications. Enriched attributes serve two purposes:
        (1) improved outbound targeting in MOD-GTM; (2) trial workspace
        orientation in MOD-TRIAL. All inferred attributes stored with
        confidence score and source reference. No inferred attribute
        is ever treated as verified data.
      enrichment_attributes:
        - "PredominantAIFType (HFND / PEQF / RESF / FOFS / OTHR)"
        - "Likely InvestmentStrategy codes (Annex II Table 3)"
        - "Primary asset classes (Table 2 vocabulary)"
        - "Fund geographic or sector focus where discernible"
        - "Indicative fund size tier (not a reportable value)"
      requirements:
        - >
          Enrichment pipeline runs asynchronously after AIFM record is
          created in the prospect database; does not block record creation
        - >
          Each enriched attribute stored with: inferred value, confidence
          score (HIGH / MEDIUM / LOW), source URL, extraction timestamp,
          AI model version
        - >
          Enrichment refreshed on configurable schedule (default: quarterly)
          or when triggered manually by EAGLE_ADMIN
        - >
          GDPR: only publicly accessible sources used; source URLs logged
          per attribute; opt-out suppresses enrichment for that prospect
        - >
          Enrichment pipeline failure does not affect prospect record
          creation or downstream trial provisioning
      ai_act_note: >
        AI inference of PredominantAIFType and strategy codes is AI_PROPOSED_INDICATIVE
        only. These values never flow to a regulatory submission without
        user confirmation at L5. Non-high-risk classification preserved.
      acceptance_criteria:
        - >
          For a known PE fund with public website, enrichment pipeline
          produces PredominantAIFType = PEQF with HIGH or MEDIUM confidence
          within 60 minutes of prospect record creation
        - "Source URL stored for every enriched attribute"
        - "Pipeline failure does not block prospect record or trial provisioning"

    - id: REQ-GTM-002
      title: "Inbound trial request legitimacy validation"
      module: MOD-GTM
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: true
      principles: [P1, P2, P8, P9, P12]
      regulatory: [GDPR]
      description: >
        Every self-service inbound trial request is automatically scored
        for legitimacy before a trial account is provisioned. The process
        has two stages: automated scoring across four sources, followed by
        CCO review for MEDIUM and LOW scores. HIGH scores are auto-approved.
        The CCO review role is explicitly delegatable (CCO_DELEGATE) to
        manage operational load at scale.
      matching_sources:
        esma_aifm_register:
          description: "Match on company name and/or LEI against Eagle MOD-GTM database"
          confidence_contribution: HIGH
        service_provider_database:
          description: >
            Match against Eagle-maintained list of fund administrators, ManCos,
            prime brokers, compliance consultancies and regulatory technology
            vendors. List is a versioned configuration file (REQ-MOD-001).
          confidence_contribution: MEDIUM
        linkedin_profile:
          description: >
            Automated lookup on company name and registrant role. Clear match
            (financial services sector, fund/compliance/investment role keywords)
            scores MEDIUM. Partial match scores LOW.
          confidence_contribution: "MEDIUM (clear) / LOW (partial)"
        company_website:
          description: >
            Does the email domain resolve to a website containing fund/investment
            vocabulary? Supporting signal only — boosts LOW to MEDIUM in combination.
          confidence_contribution: supporting
      scoring_outcomes:
        HIGH:
          criteria: "Confirmed AIFM or sub-threshold AIFM in ESMA register"
          action: "AUTO_APPROVED — trial provisioned within 10 minutes"
        MEDIUM:
          criteria: "Service provider match OR LinkedIn clear match"
          action: "QUEUED_FOR_CCO_REVIEW — prospect notified of same-day review"
        LOW:
          criteria: "No clear match; partial signals only"
          action: "QUEUED_FOR_CCO_REVIEW with LOW flag"
        NONE:
          criteria: "No match; non-industry domain"
          action: "QUEUED_FOR_CCO_REVIEW — CCO likely rejects"
      cco_review_process:
        sla: "Same business day"
        interface: "MOD-MANAGEMENT CCO-view review queue"
        actions: [APPROVE, REJECT, REQUEST_INFO]
        delegatable: >
          CCO_DELEGATE role enables delegation. EAGLE_ADMIN assigns
          CCO_DELEGATE. Delegation activated when queue exceeds configurable
          threshold (default: 10 requests/day). All actions logged with
          actor identity.
        rejection_notice: >
          Standard message only — no reason given to prospect to avoid
          revealing matching process or creating GDPR obligations.
      gdpr_controls:
        lawful_basis: >
          Legitimate interest (GDPR Art.6(1)(f)). Must be documented in
          Eagle RoPA by Head of Compliance and Risk before go-live.
        data_minimisation: "Name, company, email domain, stated use case only"
        retention: >
          APPROVED: data moves to trial tenant record.
          REJECTED: prospect personal data deleted within 30 days.
          Audit record retains decision outcome, confidence score,
          timestamp, actor identity — no prospect personal data.
      requirements:
        - "Automated matching completes within 5 minutes of trial registration"
        - "HIGH score provisions trial within 10 minutes of registration"
        - >
          MEDIUM and LOW scores trigger automated email to prospect:
          'Your request is being reviewed. You will hear from us within
          one business day.'
        - "CCO review queue accessible in MOD-MANAGEMENT CCO-view, oldest first"
        - >
          Every matching attempt logged: sources checked, per-source scores,
          overall score, outcome, timestamp — in GTM audit partition separate
          from the compliance pipeline audit trail
        - "LinkedIn lookup uses only publicly visible profile data"
        - "Matching logic is configuration-driven per REQ-MOD-001"
      acceptance_criteria:
        - >
          Trial request from confirmed AIFM in ESMA register is auto-approved
          and trial provisioned within 10 minutes
        - "MEDIUM/LOW score appears in CCO review queue within 5 minutes"
        - "CCO REJECT triggers prospect notification and suppresses future provisioning"
        - "GDPR RoPA entry signed off by Head of Compliance and Risk before go-live"

    - id: REQ-GTM-003
      title: "Internal AIFM prospect database"
      module: MOD-GTM
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P2, P4, P10, P12]
      regulatory: [GDPR, AIFMD]
      description: >
        Eagle maintains an internal, versioned database of AIFM prospects
        built from ESMA and national AIFM registers supplemented by
        enrichment from REQ-GTM-001. This is a strategic data asset owned
        by Eagle — not a pass-through to an external tool. The database
        is the single source of truth for outbound targeting, inbound
        legitimacy matching, and trial pre-population data.
      data_sources:
        - "ESMA AIFMD register (weekly refresh, per REQ-REF-001 schedule)"
        - "National registers: AFM, CSSF, BaFin, FCA, CBI and others as added"
        - "Web enrichment pipeline per REQ-GTM-001"
        - "Manual additions and corrections by EAGLE_ADMIN"
      core_fields:
        - "AIFM legal name, LEI, national codes per NCA"
        - "Authorisation status and date"
        - "Home NCA and all registered NCAs"
        - "AIF names and identifiers where available in register"
        - "Enrichment attributes (REQ-GTM-001) with confidence scores"
        - "Outbound contact status (not yet contacted / active sequence / MQL / SQL / customer)"
        - "Opt-out flag with timestamp"
      requirements:
        - "Register data refreshed on schedule aligned with REQ-REF-001"
        - >
          Deduplication: LEI is the primary deduplication key; name-based
          deduplication with configurable fuzzy threshold for records
          without LEI
        - "All changes version-controlled with timestamp and source"
        - "GDPR: opt-out suppresses all outbound activity for that record"
        - >
          Data accessible via MOD-MANAGEMENT CCO-view for targeting and
          pipeline management; not exposed to clients or trial users
      acceptance_criteria:
        - "Database contains all authorised AIFMs from ESMA register within 7 days of a new register publication"
        - "Duplicate LEI rejected at import with clear EAGLE_ADMIN notification"
        - "Opt-out flag suppresses record from all outbound export and email tool integrations"

  # --- MOD-TRIAL requirements ---

    - id: REQ-TRIAL-001
      title: "Trial account provisioning and lifecycle"
      module: MOD-TRIAL
      layer: [L9_ORCHESTRATION, L11_IAM]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P9, P12]
      regulatory: [GDPR]
      description: >
        Self-service trial provisioning triggered by website registration.
        Legitimacy validation (REQ-GTM-002) is a prerequisite gate.
        Trial tenants are TRIAL_TENANT type, distinct from ACTIVE_TENANT
        (paid). Time limit is configurable per tenant (default: 60 days).
        Expiry is enforced as a hard cutoff. Conversion to paid is a
        separate CS Manager action.
      provisioning_flow:
        step_1: "Registrant submits name, company, email, optional use-case description"
        step_2: "Legitimacy scoring runs (REQ-GTM-002) — HIGH auto-proceeds; MEDIUM/LOW queued"
        step_3: "On approval: TRIAL_TENANT created in MOD-ADMIN with TRIAL_TENANT type flag"
        step_4: "Pre-population pipeline triggered (REQ-TRIAL-003, REQ-TRIAL-004, REQ-TRIAL-005)"
        step_5: "Registrant receives email with trial account link; clock starts"
      tenant_type_flags:
        TRIAL_TENANT:
          description: "Self-service trial — feature-gated, time-limited"
          transition: "Can only transition to ACTIVE_TENANT via CS Manager action + paid checklist"
        ACTIVE_TENANT:
          description: "Paid client — full access, CS Manager-provisioned"
      time_limit:
        default_days: 60
        configurable_by: "EAGLE_ADMIN per prospect — override available at provisioning"
        warning_emails: [7, 3, 1]
        hard_expiry: >
          At T+limit: all trial user access suspended; data enters 30-day
          retention window (REQ-TRIAL-007). Prospect notified at each warning
          milestone and at expiry.
      requirements:
        - "TRIAL_TENANT provisioned within 10 minutes of HIGH legitimacy score"
        - "Time limit configurable between 14 and 90 days; default 60"
        - "EAGLE_ADMIN can extend a specific trial by up to 30 days with logged reason"
        - "Expiry warning emails sent at T-7, T-3, T-1 days"
        - "Hard expiry suspends access; data not immediately deleted (REQ-TRIAL-007)"
        - "Trial provisioning event logged in audit trail with legitimacy score, source, approver"
      acceptance_criteria:
        - "TRIAL_TENANT created within 10 minutes of HIGH legitimacy approval"
        - "T-7 warning email triggers automatically; T+limit access suspended automatically"
        - "EAGLE_ADMIN extension logged with actor identity and reason"

    - id: REQ-TRIAL-002
      title: "Trial feature gating"
      module: MOD-TRIAL
      layer: [L11_IAM, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P3, P9, P12]
      regulatory: [AIFMD]
      description: >
        TRIAL_TENANT has access to all Eagle functionality except the
        explicitly gated features below. The gating enforces the commercial
        boundary: trial users can validate a full Annex IV submission
        and experience the product end-to-end, but cannot produce a
        deliverable that replaces the paid service.
      gated_features:
        download_annex_iv_report:
          description: "Download or export of the generated Annex IV XML submission package"
          ui_treatment: "Feature visible but locked; upgrade prompt shown on attempt"
          rationale: "Core deliverable of the paid service"
        nca_submission:
          description: "Transmission of an Annex IV submission to any NCA"
          ui_treatment: "Submit button disabled with clear label 'Available in paid plan'"
          rationale: "Regulatory action with legal consequences — not appropriate for trial"
        api_key_creation:
          description: "Generation of production API keys for system integration"
          ui_treatment: "API key section shows sandbox key only; production key requires upgrade"
          rationale: "Production integration implies paid commitment"
      available_in_trial:
        - "Full data upload (all five ingestion channels)"
        - "AI-assisted data parsing and field mapping (REQ-ING-004)"
        - "Complete L3 validation with all CAF/CAM/DQ error codes"
        - "DQEF quality checks (L4)"
        - "Human review gate (L5) — full workflow including bulk approval"
        - "Amendment workflow (REQ-AMD-001)"
        - "Audit trail viewing (read-only)"
        - "NCA obligation matrix (view only)"
        - "Pre-populated workspace and strategy orientation (REQ-TRIAL-003/004)"
      requirements:
        - "Gating enforced server-side — not only in UI; API calls for gated actions return HTTP 402"
        - "Upgrade prompt shown on every gated action attempt — consistent wording, link to contact Eagle"
        - "TRIAL_TENANT role cannot be self-upgraded; only CS Manager can transition"
        - "Feature gate configuration is version-controlled per REQ-MOD-001"
      acceptance_criteria:
        - "TRIAL_TENANT POST to submission API returns 402 with upgrade message"
        - "XML download button visible but locked; click shows upgrade prompt not error"
        - "Gate configuration change deployable without code release"

    - id: REQ-TRIAL-003
      title: "Trial pre-population from public register data"
      module: MOD-TRIAL
      layer: [L1_INGESTION, L1B_ADAPTER]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P5, P8, P12]
      regulatory: [AIFMD, AI_ACT, GDPR]
      description: >
        Upon trial provisioning, Eagle pre-populates the trial workspace
        with data from the Eagle AIFM prospect database (REQ-GTM-003).
        Goal: immediate recognition and reduced time-to-first-validation
        for deadline-driven smaller AIFMs. Pre-populated fields carry
        status PRE_POPULATED_PUBLIC and require explicit user confirmation
        before entering the validation pipeline. No pre-populated field
        may flow to L3 validation without confirmation.
      source_fields:
        - "AIFM legal name, LEI, national codes"
        - "Home NCA and all registered NCA jurisdictions"
        - "AIF names and identifiers where available in register"
        - "AIFM authorisation date and status"
      explicitly_excluded:
        - "AuM, NAV, portfolio positions — not publicly available"
        - "Leverage ratios, liquidity profiles — not publicly available"
        - "Any field derived from non-public data"
      field_status_model:
        PRE_POPULATED_PUBLIC:
          source: "Deterministic register match (exact LEI or name)"
          confidence: HIGH
          ui_indicator: "Solid filled pill — 'From public register'"
        AI_PROPOSED_INDICATIVE:
          source: "AI-inferred from web enrichment (REQ-GTM-001)"
          confidence: "MEDIUM or LOW"
          ui_indicator: "Dashed outline pill — 'Suggested based on public profile'"
        MANUAL_OPS_CORRECTION:
          source: "Manually corrected by COO ops reviewer (REQ-TRIAL-005)"
          ui_indicator: "Pencil icon — 'Reviewed by Eagle team'"
        USER_CONFIRMED:
          source: "User has confirmed the value"
          ui_indicator: "Standard filled field"
      requirements:
        - >
          Pre-population triggers within 60 seconds of trial tenant creation
          based on AIFM LEI or name match in MOD-GTM database
        - >
          All pre-populated fields carry their status indicator in UI;
          bulk confirmation permitted for HIGH confidence fields
        - "No pre-populated field advances past data entry without user confirmation"
        - "Unmatched fields shown as blank with manual entry prompt — no silent omission"
        - "If AIFM not found in database, trial starts in fully blank mode with clear notification"
        - >
          Audit trail records per field: source, confidence score, register
          snapshot timestamp, confirmation action and actor
      acceptance_criteria:
        - "Known AIFM trial shows pre-populated profile within 60 seconds of provisioning"
        - "No pre-populated field appears in L3 output without USER_CONFIRMED record in audit trail"
        - "Unknown AIFM trial proceeds to blank workspace with clear notification"

    - id: REQ-TRIAL-004
      title: "Trial orientation via inferred fund strategy"
      module: MOD-TRIAL
      layer: [L1_INGESTION, L2_TRANSFORMATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P5, P8, P12]
      regulatory: [AI_ACT, AIFMD]
      description: >
        Using enrichment attributes from REQ-GTM-001, Eagle personalises
        the trial workspace to reflect the prospect's fund type. The goal
        is orientation and recognition — not accuracy. Mandatory Annex IV
        sections for the inferred fund type are highlighted; not-applicable
        sections are visually de-emphasised. All strategy suggestions are
        explicitly labelled AI_PROPOSED_INDICATIVE and require confirmation.
        This mechanism applies to both trial users and, when REQ-TRIAL-003
        pre-population is active, to paid onboarding.
      orientation_elements:
        strategy_suggestion:
          trigger: "PredominantAIFType inferred at MEDIUM or HIGH confidence"
          presentation: >
            Onboarding wizard shows: 'Based on your public profile, we think
            you are a [type] fund. Is this correct?' — one-click confirm or change.
          status: AI_PROPOSED_INDICATIVE
        section_highlighting:
          description: >
            On AIF type confirmation (or suggestion): mandatory sections
            highlighted; conditional sections shown with trigger condition;
            not-applicable sections suppressed (visible but greyed).
          updates: "Dynamic — updates immediately when user changes AIF type"
          example_PEQF: >
            PrivateEquityFundInvestmentStrategies highlighted as mandatory;
            PositionSizeType shown as mandatory (CAF-079); HedgeFund section
            suppressed. CAF-036 and CAF-079 risk surfaced proactively.
        field_pre_suggestion:
          trigger: "Strategy codes inferred at HIGH confidence"
          example: "StrategyType = VENT_CAPL for known VC fund"
          status: AI_PROPOSED_INDICATIVE
          requirement: "Never pre-selected without visible suggestion label"
      requirements:
        - >
          Orientation applies at provisioning and updates dynamically when
          user changes PredominantAIFType — no page reload required
        - >
          If no enrichment data available or confidence too low, trial starts
          with standard blank workspace — no degraded experience
        - "All AI_PROPOSED_INDICATIVE fields visually distinct from USER_CONFIRMED fields"
        - "User confirmation of AIF type recorded in audit trail"
        - "Orientation does not pre-fill reportable field values — guides, not fills"
        - >
          AI Act: inferred AIF type and strategy codes recorded in AI component
          register per REQ-AUD-004 with model version, source, confidence and
          user confirmation action
      acceptance_criteria:
        - >
          PE fund trial user sees PEQF workspace with PE-specific sections
          highlighted within 60 seconds of provisioning, with 'Is this correct?'
          confirmation prompt
        - "Confirming PEQF marks PositionSizeType as mandatory and suppresses HedgeFund sections"
        - "Changing AIF type updates section highlighting without page reload"
        - "All orientation suggestions labelled AI_PROPOSED_INDICATIVE in UI and audit trail"

    - id: REQ-TRIAL-005
      title: "Pre-population quality scoring and COO operations review"
      module: MOD-TRIAL
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P5, P8, P11, P12]
      regulatory: [AI_ACT, AIFMD]
      description: >
        Before pre-populated data reaches the trial workspace, every
        enrichment attribute is scored for quality using a weighted model.
        Attributes with low scores are reviewed by the COO operations team
        before display. The trial is never blocked — it falls back to blank
        workspace mode if review is not completed within 4 hours.
        The scoring and review feedback loop continuously improves enrichment
        accuracy per REQ-INT-002.
      attribute_weights:
        critical_weight_3:
          fields: [PredominantAIFType, NCA_registrations, AIFM_LEI]
          rationale: >
            PredominantAIFType determines mandatory vs forbidden sections
            (CAF-036, CAF-079). NCA registrations determine the full
            reporting obligation matrix. AIFM LEI is the entity key.
        important_weight_2:
          fields: [AIF_names, AIFM_national_code, authorisation_date,
                   InvestmentStrategy_codes]
        contextual_weight_1:
          fields: [fund_focus, fund_size_tier, asset_class_indicators]
      score_calculation: >
        Weighted average: SUM(attribute_confidence × weight) /
        SUM(weight) for attributes with data present.
        Absent attributes excluded from calculation.
        Confidence: HIGH=1.0, MEDIUM=0.6, LOW=0.2.
      score_outcomes:
        HIGH:
          threshold: "Weighted score >= 0.70"
          action: >
            HIGH and MEDIUM confidence attributes pre-populated.
            LOW confidence attributes suppressed (shown blank).
            Trial provisioned automatically.
        MEDIUM:
          threshold: "Weighted score 0.40 – 0.69"
          action: >
            Only HIGH confidence attributes pre-populated. MEDIUM and LOW
            suppressed. Trial provisioned automatically. COO ops notified
            informally for quality improvement.
        LOW:
          threshold: "Weighted score < 0.40"
          action: >
            Pre-population HELD. Trial provisioned in blank workspace
            immediately (user not blocked). COO ops review queued.
            If approved or corrected within 4 hours, pre-populated
            workspace pushed as update. After 4 hours, trial continues
            in blank mode.
      coo_ops_review:
        trigger: "LOW overall score OR any critical-weight-3 attribute scoring LOW"
        interface: "MOD-MANAGEMENT COO-view — pre-population review queue"
        actions:
          APPROVE_AS_IS: "Deploy all scored attributes to trial workspace"
          CORRECT_AND_APPROVE: >
            Reviewer corrects one or more attribute values manually.
            Correction logged as MANUAL_OPS_CORRECTION with reviewer identity.
          SUPPRESS_ATTRIBUTE: "Remove specific attribute; shown blank in workspace"
          NO_PRE_POPULATION: "Reject all enrichment; trial stays in blank mode"
        sla: "Same-day target; 4-hour non-blocking cutoff"
        audit: "Every action logged: reviewer, timestamp, before/after values"
      requirements:
        - "Quality score calculated within 60 seconds of enrichment pipeline completion"
        - "HIGH/MEDIUM score outcomes provision trial workspace within 2 minutes of registration"
        - "LOW score provisions blank workspace within 2 minutes; queue item within 60 seconds"
        - "PredominantAIFType at LOW always triggers COO ops review regardless of overall score"
        - "Scoring thresholds and weights are configuration-driven per REQ-MOD-001"
        - "COO ops corrections distinguishable from automated enrichment in all audit outputs"
      acceptance_criteria:
        - "Well-known PE firm trial shows PEQF workspace within 2 minutes"
        - "Low-confidence AIFM provisions blank workspace within 2 minutes; COO queue item appears"
        - "COO correction to PredominantAIFType reflected in workspace and logged with reviewer identity"
        - "No pre-populated field in validation output without USER_CONFIRMED audit record"

    - id: REQ-TRIAL-006
      title: "Trial health monitoring and upgrade trigger"
      module: MOD-TRIAL
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P11, P12]
      regulatory: []
      description: >
        Eagle monitors trial engagement signals and generates a health score
        per trial tenant. High-engagement trials trigger an in-app upgrade
        prompt and a notification to Pipedrive. This enables the CCO/CRO
        to prioritise outreach on trials showing genuine intent.
      engagement_signals:
        - "Login count and last login date"
        - "Data uploaded (any ingestion channel)"
        - "Validation run (L3 triggered at least once)"
        - "Review gate accessed"
        - "Days since provisioning vs time limit remaining"
      health_score_tiers:
        HOT: "Validation run + review gate accessed + data uploaded — within first 14 days"
        WARM: "Data uploaded + validation run — no review gate yet"
        COLD: "Login only or no activity in 14 days"
        INACTIVE: "No login in 21 days"
      upgrade_trigger:
        conditions: "HOT or WARM for 7+ consecutive days"
        in_app: "Upgrade prompt displayed on next login"
        pipedrive: >
          Webhook to Pipedrive creates or updates deal: trial account name,
          health tier, days remaining, engagement summary
      requirements:
        - "Health score recalculated daily per trial tenant"
        - "HOT/WARM trigger fires Pipedrive webhook within 24 hours of tier change"
        - "In-app prompt shown on next login after trigger — dismissable but re-shown after 3 days"
        - "Trial health metrics visible in MOD-MANAGEMENT CCO-view dashboard (REQ-INT-001)"
        - "Pipedrive webhook is configuration-driven (endpoint, auth token) per REQ-MOD-001"
      acceptance_criteria:
        - "HOT trial fires Pipedrive webhook within 24 hours of reaching HOT status"
        - "INACTIVE trial visible in CCO-view with days-inactive count and upgrade link"

    - id: REQ-TRIAL-007
      title: "Trial data retention and GDPR compliance"
      module: MOD-TRIAL
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: true
      principles: [P9, P10, P12]
      regulatory: [GDPR, AIFMD]
      description: >
        Trial tenant data has a distinct retention lifecycle. Upon expiry,
        data enters a 30-day grace window. If the trial converts to a paid
        account within the window, all data is migrated to the ACTIVE_TENANT
        record. If no conversion occurs, all trial data is permanently deleted
        at end of the grace window. No trial data is retained after the
        grace window regardless of data type.
      retention_lifecycle:
        active_trial:
          duration: "60 days (default, configurable)"
          data_status: "Active — full read/write access for trial user"
        grace_window:
          trigger: "Hard expiry reached (T+limit)"
          duration: "30 days"
          data_status: >
            Read-only for EAGLE_ADMIN; no trial user access.
            Conversion possible during this window.
          prospect_communication: >
            Expiry notification at T+0, reminder at T+15 of grace window.
        post_grace:
          trigger: "Grace window expires without conversion"
          action: "All trial tenant data permanently and automatically deleted"
          data_included: >
            All uploaded documents, canonical records, validation reports,
            audit trail entries, pre-population data, enrichment data
            linked to this trial tenant. LEI and AIFM legal name retained
            in MOD-GTM prospect database as a contact record (separate
            legal basis: legitimate interest for future outreach, subject
            to opt-out).
        conversion:
          trigger: "CS Manager upgrades TRIAL_TENANT to ACTIVE_TENANT"
          data_action: "All trial data migrated to ACTIVE_TENANT record intact"
          legal_basis_change: >
            Data basis transitions from legitimate interest (trial) to
            contract performance (paid service). DPA must be executed
            before conversion completes (REQ-GDPR-004).
      requirements:
        - "Grace window auto-deletion is automated — no manual trigger required"
        - "Deletion event logged in audit trail: tenant ID, data scope, timestamp"
        - "Pre-deletion notification sent to trial user at T+0 and T+15 of grace window"
        - "Conversion action requires CS Manager role; DPA confirmation required"
        - >
          GDPR RoPA entry for trial data processing under legitimate interest
          must be in place before MOD-TRIAL go-live (same entry as REQ-GTM-002)
      acceptance_criteria:
        - "Trial data auto-deleted at end of 30-day grace window — confirmed by EAGLE_ADMIN"
        - "Conversion retains all trial data with no data loss"
        - "Deletion event has complete audit record"

  # --- MOD-MANAGEMENT CCO/CRO commercial view requirements ---

    - id: REQ-INT-001
      title: "CCO/CRO commercial KPI dashboard (MOD-MANAGEMENT CCO-view)"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P4, P10, P12]
      regulatory: []
      description: >
        The CCO-view within MOD-MANAGEMENT provides a real-time commercial
        intelligence dashboard covering the full funnel from prospect
        database to signed ARR. It consolidates data from MOD-GTM,
        MOD-TRIAL, Pipedrive (via webhook/API), and MOD-BILLING. All
        stakeholder-specific views (CCO, CRO, CFO) are subsets of the
        same underlying dataset — no duplicate data stores.
      funnel_metrics:
        prospect_database:
          - "Total AIFM prospects in database by NCA jurisdiction"
          - "Coverage rate: % of ESMA register represented in database"
          - "Enrichment completion rate: % of prospects with MEDIUM+ confidence on PredominantAIFType"
        outbound_pipeline:
          - "Outbound volume: emails and LinkedIn messages sent (from external tool webhooks)"
          - "MQL rate: % of outreach resulting in trial registration, demo request or form fill"
          - "Inbound lead volume: website forms + content downloads + AI chat leads per month"
        legitimacy_queue:
          - "Pending legitimacy reviews: count, average age in hours"
          - "Approval rate by legitimacy score tier (HIGH auto / MEDIUM approved / LOW rejected)"
        trial_funnel:
          - "Active trials: count by health tier (HOT / WARM / COLD / INACTIVE)"
          - "Trial activation rate: % of provisioned trials that uploaded data"
          - "Trial-to-demo rate: % of HOT/WARM trials that requested a demo or contacted Eagle"
          - "Trial-to-paid conversion rate: % of trials converting within trial period"
          - "Average days to conversion (trial start to contract signed)"
      revenue_metrics:
        - "New ARR: signed contract value per month and rolling 12 months"
        - "Pipeline ARR: probability-weighted ARR per Pipedrive stage"
        - "Sales cycle length: average days from first MQL to signed contract"
        - "CAC: total sales and marketing spend divided by new clients in period"
        - "LTV:CAC ratio: computed from average contract value, average retention and CAC"
        - "NRR: net revenue retention including expansion and churn"
        - "ICP hit rate: % of closed deals matching the defined ICP criteria"
        - "Scope exception rate: % of deals requiring non-standard product commitments"
      cfo_subview:
        - "ARR bridge: opening ARR + new ARR + expansion ARR - churn ARR = closing ARR"
        - "MRR with month-over-month trend"
        - "Revenue forecast: pipeline-weighted ARR projection for next 3 months"
      requirements:
        - "Dashboard data refreshed at minimum every 4 hours; manual refresh available"
        - >
          Pipedrive integration via webhook: deal stage changes in Pipedrive
          update Eagle CCO-view within 15 minutes. Webhook endpoint is
          configuration-driven per REQ-MOD-001.
        - >
          Funnel metrics (prospect through trial) computed from Eagle-internal
          data. Revenue metrics sourced from Pipedrive + MOD-BILLING.
        - "All metric definitions documented and version-controlled alongside the dashboard code"
        - "Dashboard accessible to EAGLE_ADMIN, CCO, CRO, CFO — scoped by role where noted"
        - "Export to PDF for weekly pipeline review with CEO"
      acceptance_criteria:
        - "Dashboard loads in < 3 seconds with full dataset"
        - "Pipedrive deal stage update reflected in pipeline ARR within 15 minutes"
        - "Coverage rate metric correctly reflects % of ESMA register in MOD-GTM database"
        - "All funnel and revenue metrics stored as first-class records in the commercial_metrics table; PDF export generated on demand as a view of those records, not a separate document store"

    - id: REQ-INT-002
      title: "Trial analytics and enrichment quality metrics"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      gdpr_blocker: false
      principles: [P2, P4, P11, P12]
      regulatory: [AI_ACT]
      description: >
        Dedicated analytics view within MOD-MANAGEMENT tracking the
        accuracy and effectiveness of the pre-population and orientation
        system. Feeds the continuous improvement loop for REQ-GTM-001
        enrichment and REQ-TRIAL-005 quality scoring. Also provides
        the AI Act evidence for AI component performance monitoring
        per REQ-AUD-004.
      enrichment_quality_metrics:
        - "Pre-population suggestion accuracy: % of AI_PROPOSED_INDICATIVE fields confirmed vs corrected by users, by confidence tier"
        - "Most frequently corrected fields (top 5 by correction count)"
        - "COO ops correction rate: % of LOW-score trials that were corrected vs approved-as-is vs suppressed"
        - "Blank workspace fallback rate: % of trials provisioned in blank mode (score too low or ops timeout)"
        - "Source domain accuracy: per enrichment source URL domain, % of suggestions confirmed — enables EAGLE_ADMIN to suppress low-accuracy domains"
      trial_effectiveness_metrics:
        - "Time-to-first-validation: median hours from trial provisioning to first L3 run"
        - "Pre-populated vs blank workspace comparison: time-to-first-validation for each cohort"
        - "Strategy suggestion accuracy: % of AI_PROPOSED_INDICATIVE PredominantAIFType suggestions confirmed at first review"
        - "Trial health score distribution at T+7, T+14, T+30 days"
      ai_act_evidence:
        description: >
          These metrics constitute the ongoing AI component performance
          monitoring required by the EU AI Act for the enrichment AI
          component. Metrics stored per model version to detect accuracy
          drift across model updates.
        retention: "5 years per REQ-AUD-004"
      requirements:
        - "Metrics available from first 10 completed trial provisioning events"
        - "EAGLE_ADMIN can suppress a specific enrichment source domain via configuration (REQ-MOD-001)"
        - "Accuracy metrics segmented by confidence tier (HIGH / MEDIUM / LOW)"
        - "Model version tag on all accuracy records to detect accuracy drift across updates"
      acceptance_criteria:
        - "After 50 trial events, suggestion accuracy calculable and visible for each confidence tier"
        - "Source domain suppression takes effect within 1 hour without code deployment"
        - "Blank workspace fallback rate visible and filterable by reason (LOW score vs ops timeout)"

    - id: REQ-INT-003
      title: "Compliance-as-code: automated RoPA draft generation"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: COULD
      phase: 2
      gdpr_blocker: false
      principles: [P2, P8, P10]
      regulatory: [GDPR]
      description: >
        MOD-MANAGEMENT generates a structured RoPA draft automatically from
        GDPR-relevant requirements in the application requirements YAML on
        each new version release. The pipeline extracts processing purpose,
        lawful basis, personal data categories, recipients, retention periods
        and technical measures from requirements tagged regulatory: [GDPR].
        Output is a versioned draft requiring Head of Compliance and Risk
        sign-off — only the diff versus the prior signed version is presented
        for review, not the full document. LIA steps 1 and 2 are generated
        automatically; step 3 (balancing test) is presented as a structured
        template requiring human completion and sign-off before the relevant
        module may go live. This requirement replaces the Phase 1 manual
        RoPA sign-off process with an automated gate in the deployment
        pipeline.
      ropa_generation_trigger:
        - "New application requirements version published"
        - "Any requirement with regulatory: [GDPR] added, changed or removed"
        - "Any requirement with gdpr_blocker: true added or modified"
      review_workflow:
        draft_produced_by: "Automated pipeline from requirements YAML"
        review_scope: "Diff versus prior signed version only"
        sign_off_by: "Head of Compliance and Risk"
        sign_off_recorded: "MOD-MANAGEMENT audit trail with role, identity, timestamp, version"
        go_live_gate: >
          Requirements with gdpr_blocker: true cannot be deployed to
          production until the corresponding RoPA entry status is
          SIGNED_OFF in this workflow
      lia_automation:
        step_1_purpose_test: "Generated from requirement description and module purpose"
        step_2_necessity_test: "Generated from requirement justification and alternatives considered"
        step_3_balancing_test: >
          Structured template generated with processing context pre-filled.
          Free-text field for human balancing judgment. Cannot be auto-approved.
          Head of Compliance and Risk must complete and sign.
      requirements:
        - >
          On each requirements version bump, system produces RoPA diff
          within 24 hours and notifies Head of Compliance and Risk via
          MOD-MANAGEMENT dashboard and email
        - "Signed RoPA versions stored immutably in MOD-MANAGEMENT audit partition"
        - >
          gdpr_blocker: true requirement blocks deployment pipeline to
          production until corresponding RoPA entry status is SIGNED_OFF
        - >
          LIA step 3 template pre-filled with processing context;
          free-text field for balancing judgment; sign-off mandatory
        - >
          Signed RoPA exportable as PDF for supervisory authority requests
          and SOC 2 / ISAE 3402 evidence
        - >
          Phase 1 manual process (Head of Compliance and Risk sign-off
          in compliance risk register) is superseded by this automated
          workflow when REQ-INT-003 goes live
      acceptance_criteria:
        - "New GDPR-tagged requirement in a release produces a RoPA diff entry within 24 hours"
        - "Deployment pipeline blocks production release of gdpr_blocker requirement without SIGNED_OFF status"
        - "Signed RoPA PDF export passes ISAE 3402 auditor review as sufficient evidence"
        - "LIA step 3 template for a new processing activity is pre-filled with relevant context from the triggering requirement"

    - id: REQ-DAT-001
      title: "Application-managed master data store for static reporting entities"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P10]
      regulatory: [AIFMD, CDR231, GDPR]
      description: >
        The application maintains a persistent, structured master data store for
        all static entities referenced in Annex IV reporting. This data is owned
        and managed within Eagle, distinct from external reference data refreshed
        from public sources (REQ-REF-001) and from the report-level canonical
        records produced during the submission pipeline. Master data is the
        authoritative source for AIFM/AIF identities and for all code lists
        used in validation and serialisation.
      master_data_categories:
        aifm_master:
          entities: "AIFM legal name, LEI, jurisdiction, authorisation date, domicile, AIFMD regime, NCA registrations"
          scope: "One record per AIFM sub-entity; linked to tenant"
          managed_by: "TENANT_ADMIN; validated against GLEIF on entry"
        aif_master:
          entities: "AIF legal name, LEI, domicile, inception date, base currency, fund type, feeder/FoF/umbrella flags, NCA marketing flags, share class records"
          scope: "One record per AIF; linked to parent AIFM"
          managed_by: "TENANT_ADMIN"
        nca_code_register:
          entities: "NCA codes, NCA full names, member state, submission endpoint type, packaging profile reference"
          scope: "Shared across all tenants; Eagle-managed"
          managed_by: "EAGLE_ADMIN only"
          update_source: "ESMA AIFMD register (REQ-REF-001) combined with Eagle-maintained operational metadata"
        report_code_tables:
          entities: "Reporting frequency codes (Q/H/Y/X1/X2), period type codes, filing type codes (INIT/AMND), AIFReportingCode values (45 codes including NPPR), cancellation codes"
          scope: "Shared; Eagle-managed"
          managed_by: "EAGLE_ADMIN only"
          note: "These are static ESMA-defined code tables; updated only when ESMA revises the standard"
        annex_iv_code_tables:
          entities: "SubAssetType codes (Table 1), TurnoverSubAssetType codes (Table 2), strategy type codes, investor type codes, counterparty type codes, instrument type codes"
          scope: "Shared; Eagle-managed"
          managed_by: "EAGLE_ADMIN only"
        lei_cache:
          entities: "LEI number, legal name, jurisdiction, registration status, LEI expiry"
          scope: "Populated from GLEIF Golden Copy per REQ-REF-001; available to all tenants"
          note: "Queryable by tenants for LEI lookup at data entry time without external API call"
      requirements:
        - "Master data records are versioned; every change to a master data record creates a new version with timestamp, changed fields, and user identity"
        - "Previous versions retained for the full 10-year data retention period"
        - "AIFM and AIF master data changes that would affect pending or submitted reports trigger a notification to COMPLIANCE_REVIEWER"
        - "NCA codes and report code tables are read-only for tenants; EAGLE_ADMIN only can modify"
        - "All master data changes logged in audit trail regardless of who made the change"
        - "Master data queryable via API for integration with client systems"
      acceptance_criteria:
        - "AIFM or AIF name change does not retroactively alter historical submission records — the name at the time of submission is preserved in the submission record"
        - "NCA code register query returns consistent results; stale entries flagged per REQ-REF-001 staleness policy"

    - id: REQ-DAT-002
      title: "Historical dynamic data retention across reporting periods"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P7, P10]
      regulatory: [AIFMD, CDR231, DORA, GDPR]
      description: >
        Position datasets and canonical report records are retained for all
        completed reporting periods, not only the current period. Retention of
        historical data enables three specific workflows:
        (1) Amendment reporting — the original INIT position dataset and canonical
            record are available as the basis for an AMND;
        (2) Frequency change reporting — when a fund transitions from quarterly
            to half-yearly or annual reporting, the historical quarterly position
            datasets are available for consolidation into the new period;
        (3) Audit and regulatory enquiry — NCA or auditor can verify that reported
            figures were derived from the position data held at submission time.
      retained_data_types:
        position_datasets:
          description: "All versions of position datasets per (AIF, reporting_period, NCA_registration)"
          retention: "10 years from period end date"
          note: "Each version is immutable after the review gate approval that references it"
        canonical_records:
          description: "All versions of canonical report records per (AIFM or AIF, reporting_period, NCA_registration)"
          retention: "10 years from period end date"
          includes: "Field provenance per REQ-POS-004; calculation engine version; reference data versions used"
        ingested_raw_payloads:
          description: "Hashes of raw API payloads and file upload content; not the raw data itself"
          retention: "10 years — hash is sufficient for integrity verification; raw data deleted per REQ-SEC-003"
      frequency_change_workflow:
        scenario: "Fund transitions from quarterly (AuM >EUR 1bn) to annual (AuM <EUR 1bn) mid-year"
        available_data: "All quarterly position datasets for the year are retained and accessible"
        consolidation: "Eagle offers a consolidation view showing all quarterly canonical records for the period; client can use as source for the annual report or start fresh"
        user_action: "DATA_PREPARER can select source period datasets for consolidation; derived calculations run on consolidated positions"
      requirements:
        - "Position datasets and canonical records are never automatically purged before 10-year retention period expires"
        - "Historical data is queryable by period, NCA, and fund from both the UI and API"
        - "Period data browsable in the submission history view per REQ-AUD-003"
        - "Amendment workflow (REQ-AMD-001) always pre-populates from the original INIT canonical record; position dataset for the original period available for reference"
        - "Frequency change consolidation view available when a fund's reporting frequency changes"
      acceptance_criteria:
        - "Historical position dataset for a period 3 years ago is accessible and can be used as source for an amendment"
        - "Consolidation view correctly identifies all relevant historical period datasets when frequency changes"

    - id: REQ-DAT-003
      title: "Client data lifecycle management — update, correct and clear"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P4, P8, P10]
      regulatory: [AIFMD, GDPR, DORA]
      description: >
        Clients must be able to manage the full lifecycle of their data within
        Eagle: update or correct master data and historical records, clear
        draft data before submission, archive deactivated funds, and request
        purge of data beyond the minimum retention period. All lifecycle
        actions are governed by role, logged in the audit trail, and subject
        to regulatory retention obligations.
      data_lifecycle_actions:
        update_master_data:
          description: "Update AIFM or AIF master data (name, LEI, profile fields)"
          role: "TENANT_ADMIN"
          effect: "New version created per REQ-DAT-001; historical submissions reference the version at submission time"
          constraint: "LEI changes require EAGLE_ADMIN counter-confirmation for compliance reasons"
        update_draft_position_data:
          description: "Add, amend or remove positions in a period that has not yet been submitted"
          role: "DATA_PREPARER, COMPLIANCE_REVIEWER, TENANT_ADMIN"
          effect: "New position dataset version created; derived calculations re-run automatically"
          constraint: "No constraint — data is in DRAFT status; free editing until review gate"
        update_submitted_position_data:
          description: "Correct position data for a period that has already been submitted to an NCA"
          role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
          effect: "Creates a new position dataset version linked to the period; triggers amendment workflow (REQ-AMD-001)"
          constraint: "Cannot directly overwrite a submitted record; amendment workflow is mandatory"
          audit: "Correction reason required; original and corrected datasets both retained"
        clear_draft_period:
          description: "Clear all ingested data and position data for a period in DRAFT status"
          role: "TENANT_ADMIN"
          effect: "All draft canonical records and position datasets for the selected (AIF, period, NCA) are deleted"
          constraint: "Only available for periods in DRAFT, VALIDATION_PENDING, CAF_FAILED, or REVIEW_PENDING status — not for APPROVED or any post-submission status"
          audit: "Clear event logged with clearing user, timestamp, and record count deleted"
          warning: "UI presents explicit warning listing what will be deleted; requires typed confirmation"
        archive_fund:
          description: "Mark an AIF as archived when it is wound down or no longer active"
          role: "TENANT_ADMIN"
          effect: "AIF removed from active reporting calendar; historical data and submissions retained; fund visible in archived view"
          constraint: "Cannot archive a fund with a pending or overdue submission"
          reversible: "TENANT_ADMIN can reactivate an archived fund; reactivation triggers obligation re-confirmation"
        purge_historical_data:
          description: "Request permanent deletion of data beyond the minimum regulatory retention period"
          role: "TENANT_ADMIN (request) + EAGLE_ADMIN (execution)"
          constraint: "Only available for data older than 10 years; only if no pending regulatory enquiries or active litigation holds"
          process: "TENANT_ADMIN raises purge request; EAGLE_ADMIN reviews and confirms; purge executed with full audit log"
          irreversible: "Purge is permanent and cannot be reversed"
          gdpr_note: "Personal data in audit trail anonymised per REQ-GDPR-001; fund/report data purged after retention period"
      requirements:
        - "All lifecycle actions require the minimum role specified above; lower roles receive a clear error"
        - "Bulk operations (e.g. clear all drafts for a reporting period) supported with a preview step showing the scope before execution"
        - "All lifecycle actions logged in audit trail with action type, scope, user, and timestamp"
        - "Data that cannot be cleared or purged due to regulatory retention rules produces a clear explanatory message stating the constraint and the earliest date the action would be available"
      acceptance_criteria:
        - "Clear draft period for a fund with 200 positions completes within 30 seconds"
        - "Archive fund is blocked if the fund has an OVERDUE status with explanatory message"
        - "Purge request for data within the 10-year retention window is blocked with stated retention end date"

    - id: REQ-DAT-004
      title: "Report archive"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P4, P7, P8, P10]
      regulatory: [AIFMD, DORA, ISO27001]
      description: >
        Every generated submission package — the packaged XML, the validation
        report, and the NCA acknowledgement — is retained in a structured
        report archive for the full retention period. The archive is the
        definitive record of what was sent to the NCA and under what conditions.
        It supports amendment pre-population, NCA enquiry response, regulatory
        audit, and ISAE 3402 evidence.
      archived_components:
        packaged_xml:
          description: "The exact file(s) as packaged and delivered to the NCA per REQ-FMT-001"
          format: "Original file bytes with checksum; includes all NCA-specific packaging"
          retention: "10 years from submission date"
          note: "The file as delivered — not a regenerated version. If packaging changed, this captures what the NCA actually received."
        validation_report:
          description: "Complete L3 and L4 validation output at the time of review gate approval"
          format: "Structured JSON including per-field results, rule engine version, NCA override profile version"
          retention: "10 years from submission date"
        review_gate_record:
          description: "Full review gate audit record per REQ-REV-001"
          format: "Structured JSON including approver identity, role, checklist acknowledgements, canonical record hash"
          retention: "10 years from submission date"
        nca_acknowledgement:
          description: "Raw NCA response as received plus parsed status and reference number"
          format: "Original response file bytes plus parsed structured extract"
          retention: "10 years from submission date"
          note: "For ROBOT and MANUAL channels where no machine-readable acknowledgement is received, client-entered confirmation number is the archive record"
        submission_metadata:
          description: "Submission envelope: NCA code, period, filing type, delivery channel, submission timestamp, file hash"
          format: "Structured JSON"
          retention: "10 years from submission date"
      search_and_retrieval:
        searchable_by: ["NCA code", "Reporting period", "Filing type (INIT/AMND)", "AIF national code", "AIFM national code", "Submission status", "Date range"]
        results_include: "Submission metadata, status, link to full archived package"
        download: "COMPLIANCE_REVIEWER and TENANT_ADMIN can download the complete archive package for any submission"
      amendment_integration:
        description: "Amendment workflow (REQ-AMD-001) pre-populates from the archived canonical record of the original INIT; the archived packaged XML is available for reference alongside the amendment draft"
      requirements:
        - "Report archive is write-once; archived files cannot be modified or deleted before retention period expires"
        - "Archive accessible via UI search and via API"
        - "Archive search results load in < 3 seconds for queries across up to 10 years of history"
        - "Report archive included in the data export per REQ-DORA-003 (packaged XML files included in export)"
        - "Archive integrity monitoring: periodic checksum verification of stored files; failed verification triggers EAGLE_ADMIN alert"
      acceptance_criteria:
        - "Archived package for a submission from 3 years ago is retrievable and matches the original checksum"
        - "Archive search for all Q4 submissions for a specific NCA returns correct results"
        - "Amendment workflow correctly pre-populates from archived INIT canonical record"


# =============================================================================
# 4.  TECHNICAL REQUIREMENTS
# =============================================================================

technical_requirements:

  # ---------------------------------------------------------------------------
  # 4.1  SECURITY
  # ---------------------------------------------------------------------------
  security:

    - id: REQ-SEC-001
      title: "Encryption in transit and at rest"
      layer: [L8_AUDIT, L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, DORA, ISO27001]
      requirements:
        - "All data in transit encrypted via TLS 1.3 (minimum TLS 1.2)"
        - "All data at rest encrypted using AES-256 or equivalent"
        - "Database encryption at infrastructure level using AWS KMS or equivalent"
        - "Encryption keys managed per tenant with rotation supported without data loss"
        - "NCA submission channel encrypted per NCA endpoint requirements"
      acceptance_criteria:
        - "TLS configuration verified by automated scan — Qualys SSL Labs grade A minimum"

    - id: REQ-SEC-002
      title: "Vulnerability management and security testing programme"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [ISO27001, NIS2, DORA]
      requirements:
        - "SAST integrated into CI/CD pipeline; build fails on HIGH or CRITICAL findings"
        - "DAST run against staging before every production release covering OWASP Top 10"
        - "Automated dependency vulnerability scanning (e.g. Dependabot)"
        - "Critical vulnerabilities remediated within 72 hours; high within 14 days"
        - "Penetration test by qualified external party before first client go-live and annually"
        - "All HIGH and CRITICAL findings tracked in remediation register"
      acceptance_criteria:
        - "No production release proceeds with unresolved HIGH or CRITICAL SAST findings"

    - id: REQ-SEC-003
      title: "Data retention and deletion"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, ISO27001]
      requirements:
        - "Canonical records and submission data: 10 years"
        - "Unstructured source documents: deleted immediately after AI extraction"
        - "Structured upload files: deleted after successful ingestion"
        - "S3 Eagle bucket files: deleted after download or after 7 days"
        - "SFTP inbound files: deleted after successful ingestion"
        - "User account data: anonymised within 30 days of deactivation; audit trail entries anonymised not deleted"
        - "Automated deletion jobs with deletion events logged in audit trail"

  # ---------------------------------------------------------------------------
  # 4.2  RESILIENCE AND AVAILABILITY
  # ---------------------------------------------------------------------------
  resilience:

    - id: REQ-RES-001
      title: "Pipeline failure modes and fallback mechanisms"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      failure_handling:
        ingestion_failure:
          response: "Return error to caller with specific cause; no partial state created"
          retry: "Client-initiated; no automatic retry at ingestion"
        ai_transformation_failure:
          response: "Degrade gracefully: present empty candidate mapping with all fields flagged LOW confidence; user completes manually"
          retry: "Once after 30 seconds; fall back to manual on second failure"
        validation_engine_fault:
          note: "Distinct from legitimate CAF results — this is an engine error"
          response: "Block with SYSTEM_ERROR status; notify EAGLE_ADMIN immediately"
        direct_api_submission_failure:
          response: "Retry 3 times with exponential backoff (30s, 120s, 300s); set SUBMISSION_FAILED on all failures; notify COMPLIANCE_REVIEWER"
          fallback: "COMPLIANCE_REVIEWER can switch to MANUAL for the affected period"
        robot_portal_failure:
          response: "Per REQ-NCA-002 fallback procedure"

    - id: REQ-RES-002
      title: "Service availability targets"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      requirements:
        - "Target uptime: 99.5% measured monthly excluding planned maintenance"
        - "Planned maintenance communicated at least 48 hours in advance"
        - "Maintenance windows not within 5 business days of any active submission deadline"
        - "Recovery Time Objective (RTO): 4 hours"
        - "Recovery Point Objective (RPO): 1 hour"
      acceptance_criteria:
        - "RTO and RPO documented in BCP and tested annually"

  # ---------------------------------------------------------------------------
  # 4.3  SCALE ARCHITECTURE
  # ---------------------------------------------------------------------------
  scale_architecture:

    - id: REQ-SCL-001
      title: "Priority queue architecture for pipeline execution"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7]
      regulatory: [DORA]
      description: >
        Durable persistent queues with auto-scaling worker pools per pipeline stage.
        Each AIF record in a batch is an independent queue item — 1,000 AIFs enter
        as 1,000 parallel work items.
      queue_architecture:
        separate_queues_per_layer: "Transformation, validation, quality, XML generation, submission"
        priority_tiers:
          DEADLINE_CRITICAL: "Deadline within 2 business days — processed ahead of all lower tiers"
          STANDARD: "More than 2 business days — FIFO within tier"
        dead_letter_queue: "Items failing after 3 attempts; EAGLE_ADMIN alerted immediately"
      requirements:
        - "Queue is durable; worker failure does not lose the item"
        - "Queue depth, processing lag and worker utilisation monitored in real time"
      acceptance_criteria:
        - "1,000-AIF batch processing begins within 60 seconds of trigger"

    - id: REQ-SCL-002
      title: "Per-client throughput SLA"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P7]
      regulatory: [DORA]
      sla_targets:
        validation_complete: "1,000-AIF batch fully validated within 30 minutes of trigger"
        xml_generation: "1,000-AIF batch XML generated within 10 minutes of review gate approval"
        direct_submission: "Submission transmitted within 15 minutes of XML generation"
        robot_submission: "1,000-AIF batch submitted via robot within 60 minutes of trigger"
        peak_day: "3,000 records per day all validated within 4 hours assuming staggered triggers"
      acceptance_criteria:
        - "Load test demonstrates 1,000-AIF batch validates within 30 minutes under 3x concurrent load"

    - id: REQ-SCL-003
      title: "Batch review gate — bulk approval for clean records"
      layer: [L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8]
      regulatory: [DORA, AI_ACT, AIFMD]
      description: >
        Bulk approval available only for records with zero flags of any category.
        Any record with a CAF, CAM, DQ warning, or override requires individual review.
        Both flows (bulk and individual) can run in parallel within the same batch.
      requirements:
        - "Batch summary shown before bulk approval: total records, clean count, flagged count by type"
        - "Flagged records automatically split for individual review; do not block bulk approval of clean records"
        - "Bulk approval audit record includes record count and Merkle tree root hash of all approved canonical records"
      acceptance_criteria:
        - "Bulk approval of 1,000 clean records completes in under 60 seconds"

    - id: REQ-SCL-004
      title: "Concurrency isolation between tenants"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P9, P7]
      regulatory: [DORA, ISO27001]
      requirements:
        - "Per-tenant resource quotas: no single tenant may consume more than 40% of total worker capacity by default"
        - "Quota enforcement does not cause starvation — items queue, not drop"
        - "EAGLE_ADMIN can temporarily raise a tenant quota as a logged operational action"
      acceptance_criteria:
        - "3 simultaneous 1,000-AIF tenant batches: no tenant's batch exceeds 2x single-tenant baseline time"

    - id: REQ-SCL-005
      title: "Batch submission sequencing and NCA rate limiting"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P7, P8]
      regulatory: [AIFMD, DORA]
      requirements:
        - "AIFM record submitted and acknowledged before any AIF records in the batch"
        - "AIFM submission failure holds all AIF records in the batch"
        - "NCA rate limits configured per NCA in override files (REQ-MOD-001)"
        - "ROBOT sessions serialised per NCA portal — no parallel sessions to the same portal"

  # ---------------------------------------------------------------------------
  # 4.4  PERFORMANCE
  # ---------------------------------------------------------------------------
  performance:

    - id: REQ-PER-001
      title: "Performance targets"
      priority: SHOULD
      phase: 1
      principles: [P1, P7]
      regulatory: []
      targets:
        validation_single_record: "< 5 seconds"
        validation_batch_100_aifs: "< 60 seconds"
        ai_transformation_single_file: "< 30 seconds"
        dashboard_load_50_aifs: "< 2 seconds"
        xml_generation_complete_batch: "< 10 seconds"
        position_derivation_500_positions: "< 5 seconds"
        ecb_rate_cache_lookup: "< 100 ms"
        gleif_lei_cache_lookup: "< 100 ms for 99.9% of requests"
        sftp_inbound_to_dashboard: "< 10 minutes"

  # ---------------------------------------------------------------------------
  # 4.5  MODULARITY AND PORTABILITY
  # ---------------------------------------------------------------------------
  modularity:

    - id: REQ-MOD-001
      title: "Rules, overrides and reference data separated from application code"
      priority: MUST
      phase: 1
      principles: [P6, P10]
      regulatory: [DORA]
      description: >
        Validation rules, NCA override profiles, canonical data model schema,
        packaging configuration, smart default rules, prompt injection system
        prompts, NCA rate limits, and the Claude API field allowlist are all
        version-controlled configuration files loaded at runtime — not hard-coded.
      acceptance_criteria:
        - "Rule file updates deployable independently of application code"
        - "Rule file version recorded on every validation report"
        - "Adding a new NCA requires only new configuration files, no code changes"

    - id: REQ-MOD-002
      title: "AI model replaceability"
      priority: MUST
      phase: 1
      principles: [P6]
      regulatory: [AI_ACT, DORA]
      description: >
        The AI transformation layer (L2) is abstracted behind an interface.
        Replacing Claude with another model or removing AI entirely must not
        require changes to any other pipeline layer.
      acceptance_criteria:
        - "Integration tests pass regardless of which AI model adapter is active"
        - "Model replacement is a configuration change, not a code change"

  # ---------------------------------------------------------------------------
  # 4.6  REFERENCE DATA MANAGEMENT
  # ---------------------------------------------------------------------------
  reference_data:

    - id: REQ-REF-001
      title: "Reference data store with scheduled batch updates"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P7, P10]
      regulatory: [AIFMD, GDPR, ISO27001]
      description: >
        All reference data cached in Eagle's own database and updated via
        scheduled batch jobs. External API calls during the live submission
        pipeline are minimised to avoid dependency failures at critical moments.
      reference_data_types:
        ecb_fx_rates:
          source: "ECB XML feed"
          frequency: "Daily Monday to Friday after ECB publication (~16:00 CET)"
          staleness_warning: "2 business days since last update"
          staleness_block: "10 business days — dependent calculations produce DATA_INCOMPLETE flag"
          manual_override: "EAGLE_ADMIN can enter rate for specific currency pair and date with documented source"
        gleif_lei_register:
          source: "GLEIF Golden Copy files"
          frequency: "Daily"
          staleness_warning: "3 business days"
          staleness_block: "Stale cache produces DQ warning only — LEI format validation is always deterministic"
          real_time_fallback: "On-demand GLEIF API call for LEIs not in cache; result cached immediately"
        nca_register_data:
          source: "ESMA AIFMD registers and individual NCA registers"
          frequency: "Weekly"
          content: "Valid NCA national codes, submission endpoint URLs, operational status"
        mic_codes:
          source: "ISO 10383 MIC register"
          frequency: "Monthly"
          staleness_block: "Stale cache produces DQ warning — MIC format validation is deterministic"
        country_codes:
          source: "ISO 3166-1 alpha-2 — maintained internally"
          frequency: "On ISO publication of changes"
        currency_codes:
          source: "ISO 4217 — maintained internally"
          frequency: "On ISO publication of changes"
      requirements:
        - "Reference data catalogue is a configuration file (REQ-MOD-001)"
        - "Batch update failure generates immediate EAGLE_ADMIN alert"
        - "Reference data version stored with each validation report and each calculated field"
        - "Reference data is read-only from application; updated only by scheduled jobs or EAGLE_ADMIN"
      acceptance_criteria:
        - "ECB rate for a specific date retrievable from cache in < 100 ms"
        - "Batch update failure alert reaches EAGLE_ADMIN within 5 minutes"

    - id: REQ-REF-002
      title: "Reference data freshness dashboard"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P7]
      regulatory: []
      requirements:
        - "EAGLE_ADMIN dashboard: each data type with last successful update, record count, staleness status"
        - "Status colour-coded: GREEN (current), AMBER (warning threshold), RED (block or failed)"
        - "Manual refresh trigger per data type for EAGLE_ADMIN"
        - "TENANT_ADMIN sees simplified staleness indicator for data types affecting their submissions"

