    gtm_requirements: 3
    trial_requirements: 7
    commercial_dashboard_requirements: 3
    total_added: 13
    note: >
      REQ-GTM-001 through REQ-GTM-003: AIFM prospect database, web enrichment
      pipeline, and inbound legitimacy validation with CCO review queue.
      REQ-TRIAL-001 through REQ-TRIAL-007: trial provisioning, feature gating,
      register pre-population, AI strategy orientation, quality scoring with
      COO ops review, health monitoring and upgrade trigger, and GDPR-compliant
      data retention lifecycle.
      REQ-INT-001 through REQ-INT-003: CCO/CRO commercial KPI dashboard,
      trial analytics with enrichment quality metrics (EU AI Act evidence),
      and compliance-as-code automated RoPA draft generation (Phase 2).
      P12 added to principle_index and assigned to all GTM, trial and
      commercial dashboard requirements.
      MOD-OPS renamed to MOD-MANAGEMENT; expanded to cover COO, CCO/CRO, and
      CFO subviews within a single unified internal module.
      REQ-TEN-003 updated: trial self-service provisioning added as explicit
      exception to CS Manager-only provisioning.
      phase_framework added to reference indexes: all 133 requirements now
      carry a phase tag (1, 1.5, or 2) enabling the phasing review pass.
      gdpr_blocker attribute formalised: REQ-GTM-001, REQ-GTM-002, and
