entity_level_manual_obligations:

  - el_id: EL-006
    title: "ISO 27001 clausules 4-10 — complete ISMS governance"
    na_ref: [NA-018, NA-019, NA-020]
    scope: "entity governance"
    description: >
      Context of the organisation, leadership, planning (incl. Statement of Applicability),
      support, operation, performance evaluation, and continual improvement.
      All ISMS-mandatory clausule 4-10 obligations are entity-level.
    manual_obligations:
      - "NA-018: ISMS scope determination and Statement of Applicability (93 Annex A controls)"
      - "NA-019: ISO 27001 internal audit at planned intervals with independent auditor"
      - "NA-020: Management review of ISMS performance and continual improvement decisions"

  - el_id: EL-007
    title: "A.5.1/5.2/5.4 — Information security policy, role assignments, management responsibility"
    na_ref: []
    scope: "entity governance documents"
    description: >
      Top-level information security policy approved and communicated by management.
      Roles and responsibilities for information security defined and assigned.

  - el_id: EL-008
    title: "A.5.5/5.6/5.7 — Contacts with authorities, special interest groups, threat intelligence"
    na_ref: [NA-021]
    scope: "entity governance"
    description: >
      Maintained contacts with relevant authorities and information security special
      interest groups. Threat intelligence programme: collection, analysis and
      actioning of information security threat intelligence (NA-021).

  - el_id: EL-009
    title: "A.5.8/5.10/5.11 — Security in project management, acceptable use policy, return of assets"
    na_ref: []
    scope: "entity HR / governance"
    description: >
      Information security integrated in project management. Acceptable use policy
      for information and associated assets. Return of assets on termination.

  - el_id: EL-010
    title: "A.5.13/5.32 — Information labelling procedures, intellectual property rights"
    na_ref: []
    scope: "entity operational policy and legal"
    description: >
      Procedures for information labelling in line with the data classification scheme
      (REQ-ISAE-008). Procedures for protection of intellectual property rights.

  - el_id: EL-011
    title: "A.6.1/6.2/6.3/6.4/6.6/6.7 — HR security lifecycle"
    na_ref: [NA-022]
    scope: "entity HR"
    description: >
      Pre-employment screening, employment terms and conditions with security obligations,
      security awareness training programme (NA-022), disciplinary process,
      NDAs / confidentiality agreements, remote working policy.

  - el_id: EL-012
    title: "A.8.1/8.23 — User endpoint device policy, web filtering for corporate endpoints"
    na_ref: []
    scope: "entity IT management"
    description: >
      Policy and controls for user endpoint devices (laptops, mobile devices).
      Web filtering for corporate endpoints to prevent access to malicious sites.

  - el_id: EL-013
    title: "A.8.30/8.34 — Outsourced development oversight, protection of information systems during audit testing"
    na_ref: []
    scope: "entity process"
    description: >
      Oversight of outsourced system development activities.
      Protection of information systems during audit testing activities.

