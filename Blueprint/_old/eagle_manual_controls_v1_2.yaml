  # --- Baseline (v1.0, NA-001..008) ---
  - {step_id: "NA-001", step: "Risk assessment, likelihood/impact scoring, mitigation design, risk acceptance",                 requirement: REQ-CR-001}
  - {step_id: "NA-002", step: "Lawful basis determination",                                                                    requirement: REQ-CR-002}
  - {step_id: "NA-003", step: "GDPR Art.6(1)(f) LIA Step 3 balancing test — NEVER automatable",                               requirement: REQ-CR-004}
  - {step_id: "NA-004", step: "Regulatory characterisation, NIS2 threshold decision, authority submission",                    requirement: REQ-CR-003}
  - {step_id: "NA-005", step: "EU AI Act classification judgment",                                                             requirement: REQ-CR-005}
  - {step_id: "NA-006", step: "AI system boundary review judgment",                                                           requirement: REQ-CR-005}
  - {step_id: "NA-007", step: "Complexity tiering, consequence assessment, AIFMD 2.0 impact assessment",                      requirement: REQ-CR-007}
  - {step_id: "NA-008", step: "Control objective mapping and auditor narrative",                                               requirement: REQ-CR-006}
  # --- Addendum v1.9.0..v1.10.0 (NA-009..013) — carried through for completeness ---
  # (NA-009..013 are defined in addenda v1.9.0 and v1.10.0; not reproduced here as those
  #  addenda pre-date v1.12.0 and have no manual controls in this register's scope.)
  # --- Addendum v1.11.0 (NA-014..017) — application-level ---
