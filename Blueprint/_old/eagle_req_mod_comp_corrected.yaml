metadata:
  module: MOD-COMP
  name: "Compliance Engine"
  primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN]
  pipeline_layers: [L3_VALIDATION, L4_QUALITY]
  module_req_count: 11
  cross_req_count: 20
  total_applicable: 31

# =============================================================================
# MODULE REQUIREMENTS  (11 requirements)
# =============================================================================

requirements:

  # -------------------------------------------------------------------------
  # Validation
  # -------------------------------------------------------------------------
  validation:

    - id: REQ-VAL-001
      title: "Deterministic validation against AIFMD rules"
      layer: [L3_VALIDATION]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10]
      regulatory: [AIFMD, CDR231, ESMA_GUIDE, DQEF, IT_TECH_R6]
      description: >
        Every canonical record is validated against the rule engine loaded from
        aifmd_annex_iv_validation_rules_v0_3.yaml. Validation runs once per NCA
        registration using the appropriate override profile. Each rule produces a
        deterministic PASS / FAIL result. Rule engine is separated from application
        code (Principle 6) and loaded at runtime.
      validation_categories:
        CAF:
          label: "Critical Acceptance Failure"
          effect: "Blocks submission. Cannot be submitted without override (REQ-OVR-001)."
          handling: "Returned to DATA_PREPARER for correction, or TENANT_ADMIN may override with justification"
        CAM:
          label: "Critical Acceptance Message"
          effect: "Accepted with flag. Resolution tracked in CAM register (REQ-AIFMD-002)."
          handling: "Presented at review gate; COMPLIANCE_REVIEWER may override with justification"
        DQ_WARNING:
          label: "Data Quality Warning (DQEF statistical/plausibility checks)"
          effect: "Never blocks submission. Requires human acknowledgement."
          handling: "Flagged at review gate; reviewer must acknowledge each warning individually"
      requirements:
        - "Each rule result records rule_id, field_path, result, actual value, constraint, and ESMA error code"
        - "Validation is stateless and repeatable; same input always produces same output"
        - "Rule engine version recorded on every validation report"
        - "Validation report is human-readable with field labels not just field codes"
      acceptance_criteria:
        - "CAF result prevents record from reaching review gate unless explicitly overridden"
        - "Full validation report stored immutably in audit trail per validation run"

    - id: REQ-VAL-002
      title: "Cross-record consistency validation"
      layer: [L3_VALIDATION]
      priority: MUST
      phase: 1
      principles: [P5, P8]
      regulatory: [AIFMD, DQEF]
      cross_record_checks:
        - "AuM sum: AIF-level NAV values consistent with AIFM-level AuM within tolerance"
        - "LEI consistency: AIFMIdentifierNCA in all AIF records matches the AIFM record"
        - "Reporting period: all AIF records in a batch have the same period type and year"
        - "Fund count: number of AIF records matches the count declared in the AIFM record"
        - "Filing type: all records in a batch use the same FilingType (INIT or AMND)"
      acceptance_criteria:
        - "Cross-record CAF results block the entire batch, not individual records"

    - id: REQ-VAL-003
      title: "DQEF quality layer checks"
      layer: [L4_QUALITY]
      priority: MUST
      phase: 1
      principles: [P5, P7, P8, P11]
      regulatory: [DQEF]
      implemented_checks:
        DQ_AUM_OUTLIER: "AuM deviates more than 50% from previous period — flag with explanation field"
        DQ_NAV_PLAUSIBILITY: "NAV per share outside expected range for fund type"
        DQ_LEI_COMPLETENESS: "LEI present but not found in GLEIF register cache"
        DQ_TIMELINESS_T001: "Submission lag exceeds 30 days (45 for FoF) after period end"
        DQ_TIMELINESS_T002: "AMND submitted more than 90 days after original INIT"
        DQ_LEVERAGE_CONSISTENCY: "Gross and Commitment leverage inconsistent with declared leverage flag"
      acceptance_criteria:
        - "Reviewer must acknowledge each DQ flag individually — bulk-dismiss not permitted"
        - "Acknowledgement with explanation stored immutably in audit trail"


  # -------------------------------------------------------------------------
  # Validation override
  # -------------------------------------------------------------------------
  validation_override:

    - id: REQ-OVR-001
      title: "Validation override with documented justification"
      layer: [L3_VALIDATION, L4_QUALITY, L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8, P10]
      regulatory: [AIFMD, DORA, AI_ACT]
      description: >
        Any validation check (CAF, CAM, DQ) may be overridden with a documented
        justification. Compliance responsibility rests entirely with the client.
        Override never modifies the canonical record; the invalid value is submitted
        as-is with the client's documented decision.
        Override is valid for one submission only and does not carry over to re-submissions.
      override_by_category:
        CAF:
          required_role: "TENANT_ADMIN only"
          justification: "Mandatory free-text minimum 100 characters"
          countersignature: "Second TENANT_ADMIN required if available; absence logged as warning"
          eagle_admin_alert: "Automatic notification to EAGLE_ADMIN on every CAF override"
        CAM:
          required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
          justification: "Mandatory free-text minimum 50 characters"
        DQ_WARNING:
          required_role: "COMPLIANCE_REVIEWER or TENANT_ADMIN"
          justification: "Mandatory free-text minimum 50 characters"
      requirements:
        - "Override UI presents full flag detail before justification field"
        - "Override bound to specific rule_id, field_path, and actual value at override time"
        - "Review gate shows all overridden flags in a dedicated section — cannot be hidden"
        - "NCA XML generated from unmodified canonical record — Eagle never alters values"
        - "Monthly override report generated for EAGLE_ADMIN to identify systematic data quality patterns"
      acceptance_criteria:
        - "CAF override without justification text is rejected"
        - "CAF override without countersignature where second TENANT_ADMIN exists is blocked"
        - "Override audit record is immutable and cannot be deleted or modified"


  # -------------------------------------------------------------------------
  # Amendment workflow
  # -------------------------------------------------------------------------
  amendment_workflow:

    - id: REQ-AMD-001
      title: "Client-initiated amendment workflow"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P8]
      regulatory: [AIFMD, DQEF]
      workflow:
        1: "COMPLIANCE_REVIEWER or TENANT_ADMIN initiates amendment on an ACCEPTED submission"
        2: "Eagle creates AMND draft pre-populated from original INIT data"
        3: "DATA_PREPARER corrects erroneous fields"
        4: "Full validation pipeline (L3 + L4) runs on corrected record"
        5: "COMPLIANCE_REVIEWER completes review gate for the AMND record"
        6: "AMND submitted to NCA via configured delivery channel"
        7: "AMND linked to original INIT in submission history"
      acceptance_criteria:
        - "Original INIT record is immutable; only AMND is created"
        - "DQEF DQ-T-002 flag applied if AMND is more than 90 days after original INIT"


  # -------------------------------------------------------------------------
  # AIFMD workflow
  # -------------------------------------------------------------------------
  aifmd_workflow:

    - id: REQ-AIFMD-001
      title: "Ad-hoc reporting trigger and workflow for Art.24(4)"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P2, P8]
      regulatory: [AIFMD, CDR231]
      description: >
        Eagle monitors trigger conditions for Art.24(4) ad-hoc reporting
        (illiquid asset proportion, leverage increase >10%) during L3 validation.
        Detected triggers notify COMPLIANCE_REVIEWER of the potential obligation.
        Ad-hoc workflow uses the same pipeline but with X1/X2 period codes.
      acceptance_criteria:
        - "Trigger conditions configurable with regulatory reference; ad-hoc workflow tested before go-live"

    - id: REQ-AIFMD-002
      title: "CAM flag resolution tracking"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P8]
      regulatory: [DQEF, AIFMD]
      description: >
        Each CAM flag on an accepted submission creates a tracked item in a
        CAM Resolution Register with statuses OPEN, IN_PROGRESS, RESOLVED.
        Unresolved items older than 60 days trigger reminder notifications.
        Items automatically closed when a subsequent submission passes without
        the same flag.
      acceptance_criteria:
        - "CAM register exportable as JSON and PDF for NCA enquiry response"

    - id: REQ-AIFMD-003
      title: "NCA response parsing and status reconciliation"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P8]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        NCA response XML is parsed automatically. ACCEPTED status and NCA reference
        number extracted and stored. REJECTED status maps error codes back to
        canonical record fields with human-readable DQEF descriptions.
        Unparseable responses set RESPONSE_PARSE_ERROR status and alert EAGLE_ADMIN.
      requirements:
        - "NCA error code to DQEF description mapping table version-controlled in configuration"
      acceptance_criteria:
        - "Parsing tested against AFM and CSSF response formats before go-live"

    - id: REQ-AIFMD-004
      title: "Umbrella fund and share class identification"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P4, P8]
      regulatory: [AIFMD, CDR231]
      description: >
        AIF profile supports umbrella_flag. Where set, one or more share classes
        can be registered (share class identifier, ISIN, NAV, currency).
        ShareClassIdentification fields populated in canonical record per
        validation rules.
      acceptance_criteria:
        - "Umbrella fund with 3 share classes produces valid AIF record with correct ShareClassIdentification sub-elements"

    - id: REQ-AIFMD-005
      title: "NCA enquiry response support"
      layer: [L9_ORCHESTRATION]
      priority: COULD
      phase: 1
      principles: [P1, P8]
      regulatory: [AIFMD]
      description: >
        COMPLIANCE_REVIEWER can mark a submission as NCA_ENQUIRY_IN_PROGRESS and
        generate a response pack: validation report, audit trail extract, and
        canonical record as a downloadable bundle.
      acceptance_criteria:
        - "Response pack generated within 5 minutes for a single submission"


  # -------------------------------------------------------------------------
  # AIFMD go-live qualification gate
  # -------------------------------------------------------------------------
  aifmd_go_live_qualification_gate:

  - id: REQ-AIFMD-006
    title: "Per-NCA go-live qualification test against NCA test environment"
    layer: [L7_SUBMISSION]
    priority: MUST
    phase: 1
    principles: [P7, P8, P10]
    regulatory: [AIFMD, IT_TECH_R6, DORA]
    description: >
      Before Eagle delivers a first live submission to any NCA via DIRECT_API or ROBOT_PORTAL,
      a qualification test must be completed against that NCA's test/UAT environment. Closes the
      gap between REQ-REL-004 (synthetic staging data) and live NCA-specific endpoint behaviour.
    when_required:
      - "Before first live submission from any Eagle client to a given NCA via DIRECT_API or ROBOT_PORTAL"
      - "When delivery channel for existing NCA registration changes"
      - "After a MAJOR incident involving NCA submission failure for that NCA"
    nca_test_env_unavailable:
      handling: >
        Where NCA provides no test environment, CTO documents this and sets go_live_cleared = true
        with justification. Exemption recorded and visible to auditors.
    requirements:
      - "No first live submission to an NCA + channel without PASS or NCA_TEST_ENV_UNAVAILABLE test record"
      - "Qualification test records stored in nca_qualification_tests table; retained 5 years"
      - "CTO or Head of Engineering sign-off required before go_live_cleared = true"
    acceptance_criteria:
      - "First live AFM DIRECT_API submission preceded by PASS qualification test record for AFM + DIRECT_API"
      - "ISAE 3402 auditor accepts qualification test records as pre-go-live NCA submission testing evidence"


