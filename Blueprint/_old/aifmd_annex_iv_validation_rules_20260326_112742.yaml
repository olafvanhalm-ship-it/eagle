          xsd_type: UnsignedInteger15pType
          mandatory: conditional
          condition: 'Forbidden for sub-asset types other than: DER_EQD_EQD, DER_FID_FID, DER_CDS_CDS, DER_FEX_INV, DER_FEX_HED, DER_IRD_IRD, DER_CTY_CTY, DER_OTH_OTH'
          description: Notional value for derivatives turnover
      validation_rules:
      - TurnoverSubAssetType must be a valid code from Table 2 (Annex II)
      - OTH_OTH_OTH is the catch-all; may be used without reporting other codes
      - NotionalValue forbidden for all codes except the 8 specified derivative codes
      - "FX SPOT CLASSIFICATION (fields 125-127): FX spot trades must be classified as sub-asset type 'SEC_CSH_CSH' (cash and cash equivalent) when reporting turnover. Note: this differs from individual exposure reporting where 'SEC_CSH_OTHC' is required. Source: ESMA Q&A AIFMD Sect.III Q24, 21 July 2014."
      - "CROSS-CURRENCY INTEREST SWAP CLASSIFICATION (fields 125-127): Cross-currency interest swaps must be classified as 'DER_IRD_IRD' when reporting turnover (not DER_IRD_INTR which applies to individual exposures). Source: ESMA Q&A AIFMD Sect.III Q26, 21 July 2014."
      - 'BOTH MARKET VALUE AND NOTIONAL VALUE are mandatory for derivative turnover codes: DER_EQD_EQD, DER_FID_FID, DER_CDS_CDS, DER_FEX_INV, DER_FEX_HED, DER_IRD_IRD, DER_CTY_CTY, DER_OTH_OTH. Notional value = convert derivative to equivalent position per Art.10 and Annex II Reg.231/2013 using the trade date value (NOT the reporting date). Source: ESMA Q&A AIFMD Sect.III Q45, 30 September 2014; Q48, 11 November 2014.'
      esma_error_codes: []
    CurrencyExposure:
      item: AIF-Item-128-130
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/CurrencyExposures/CurrencyExposure
      mandatory: 'no'
      legal_basis: Art. 24(1) and 3(3)(d)
      description: Currency exposures of the AIF. Optional breakdown of long and short positions per currency.
