        item_id: '105'
        severity: Content error
      - code: CAF-068
        error_message: The market code type is not consistent with the asset type.
        control: The field is mandatory for asset type code different from “NTA_NTA” and forbidden otherwise.
        field_name: Market code type for portfolio concentration
        item_id: '106'
        severity: Content error
      - code: CAF-069
        error_message: The MIC code is not correct
        control: 'The MIC code exists in the reference table of markets.

          ESMA system will not use the validity start date and validity end date of the MIC code to identify the validity of the MIC code.'
        field_name: Market code for portfolio concentration
        item_id: '107'
        severity: Content error
      - code: CAF-070
        error_message: The MIC code is not consistent with the market code type.
        control: The field is mandatory for market type code equal to “MIC” and forbidden otherwise.
        field_name: Market code for portfolio concentration
        item_id: '107'
        severity: Content error
      - code: CAF-071
        error_message: The aggregated value is not consistent with the asset type.
        control: The field is mandatory for asset type code different from “NTA_NTA” and forbidden otherwise.
        field_name: Asset aggregated value  for portfolio concentration
        item_id: '108'
        severity: Content error
      - code: CAF-072
        error_message: The reported value is not consistent with the rank.
        control: The ranks that are assigned to the reported values should be consistent in relation to each other. First rank values are above or equal to the second rank values and so on.
        field_name: Asset aggregated value  for portfolio concentration
