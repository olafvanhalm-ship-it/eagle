        error_message: The counterparty LEI code is not consistent with the counterparty name.
        control: Verify the correctness of the LEI code format rules following the calculation methodology of the 2-last check digits under validation rules using ISO 7064, (“ISO/IEC 7064:2003 Information technology -- Security techniques -- Check character systems”).
        field_name: Counterparty LEI code  for portfolio concentration
        item_id: '111'
        severity: Content error
      - code: CAF-077
        error_message: The BIC code is not consistent with the counterparty name.
        control: The BIC code cannot be filled if the counterparty name is not filled in.
        field_name: Counterparty BIC code for portfolio concentration
        item_id: '112'
        severity: Content error
