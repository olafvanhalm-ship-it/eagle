    LeverageArticle24_2:
      item: AIF-Item-283-301
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFLeverageInfo/AIFLeverageArticle24-2
      mandatory: conditional
      condition: Mandatory for AIFContentType 2 or 4 (includes Art. 24(2))
      legal_basis: Art. 24(2)
      description: 'Leverage details under Article 24(2): borrowings, short positions, controlled structures and borrowing sources.'
      dqef_dimension: accuracy
      validation_rules:
      - 'UnsecuredBorrowingAmount: mandatory for AIFReportingCode in 24(2) and 24(4) set'
      - 'SecuredBorrowingPrimeBrokerageAmount: mandatory for same reporting code set'
      - 'SecuredBorrowingReverseRepoAmount: mandatory for same reporting code set'
      - 'SecuredBorrowingOtherAmount: mandatory for same reporting code set'
      - 'ShortPositionBorrowedSecuritiesValue: mandatory for same reporting code set'
      - 'ControlledStructures LEI: check digits must pass ISO 17442'
      - 'BorrowingSource EntityName: mandatory when BorrowingSourceFlag = true; forbidden otherwise'
      - 'BorrowingSource LEI: check digits must pass ISO 17442; forbidden when BorrowingSourceFlag = false'
      - 'BorrowingSource BIC: forbidden when BorrowingSourceFlag = false'
      - 'LeverageAmount: mandatory when BorrowingSourceFlag = true; ranks consistent'
      - 'AllCounterpartyCollateralRehypothecatedRate: forbidden when RehypothecationFlag = false'
      - 'FIELDS 296-301 CONDITIONALITY: Questions 296-301 must ONLY be answered by AIFMs managing AIFs that employ leverage on a SUBSTANTIVE BASIS per Art.111 Reg.231/2013. Source: ESMA Q&A AIFMD Sect.III Q18, 25 March 2014.'
      - 'SUBSTANTIAL LEVERAGE DEFINITION: An AIF employs leverage on a substantive basis when, over the reporting period, the average daily commitment method exposure exceeds THREE TIMES the average daily NAV (Art.111 Reg.231/2013). When exposure is calculated less frequently than daily: substantive if at least once during the period commitment exposure > 3x NAV. Source: ESMA Q&A AIFMD Sect.III Q31, 21 July 2014; Art.111 Reg.231/2013.'
