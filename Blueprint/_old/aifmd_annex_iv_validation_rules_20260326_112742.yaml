    NAVGeographicalFocus:
      item: AIF-Item-78-85
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/NAVGeographicalFocus
      mandatory: true
      description: 'Percentage of total NAV invested per geographical region. Eight regions: Africa, Asia & Pacific (ex Middle East), Europe (EEA), Europe (ex EEA), Middle East, North America, South America, Supranational/multiple. Individual regional values MAY be negative (e.g. due to net short positions or derivative exposures in a region). The sum of all 8 values must equal 100%. Per-region type is effectively SignedRate15p2Type; UnsignedPercentType incorrectly blocks valid negative values.'
      validation_rules:
      - All 8 regional percentages must be present
      - 'Each percentage: 0.00–100.00 (UnsignedPercentType)'
      - 'Sum of all 8 percentages must equal 100.00 (tolerance: ±0.01)'
      - 'Per-region values may be negative; negative values represent net short exposure in that region. Source: ESMA Q&A AIFMD Sect.III Q4, 25 March 2014.'
      - 'Geographical region = domicile of the issuing company/entity, NOT the trading venue or market of listing. Example: French company trading on NYSE => allocate to Europe (EEA), not North America. For derivatives: apply the same look-through to the underlying instrument issuer domicile. Source: ESMA Q&A AIFMD Sect.III Q73, 2 December 2015.'
      dqef_dimension: accuracy
      dqef_checks:
      - 'DQEF Accuracy: flag when sum of NAV geographical percentages deviates from 100%'
      esma_error_codes:
      - code: CAF-057
        error_message: The sum of all the area NAV percentages should be equal to 100%.
        control: The sum of all the area NAV percentages should be equal to 100%.
        field_name: Africa NAV percentage, Asia Pacific (other than Middle East) NAV percentage, Europe (other than EEA) NAV percentage, Europe EEA NAV percentage, Middle East NAV percentage, North America NAV percentage, South America NAV percentage, Supra National/Multiple regions NAV percentage
        item_id: '78'
        severity: Content error
    AUMGeographicalFocus:
      item: AIF-Item-86-93
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AUMGeographicalFocus
      mandatory: false
      description: Same 8 regions as NAV geographical focus, expressed as % of AuM.
      validation_rules:
      - 'If present: all 8 regional percentages must be present'
      - 'Sum must equal 100.00 (tolerance: ±0.01)'
      - 'Values are based on TOTAL VALUE OF ASSETS UNDER MANAGEMENT per Art. 2 Reg. 231/2013, NOT on NAV. When leverage is applied AuM > NAV; these fields will differ accordingly from NAVGeographicalFocus (fields 78-85). Source: ESMA Q&A AIFMD Sect.III Q38, 30 September 2014.'
      - 'Geographical region = domicile of the issuing company/entity, NOT the trading venue. Source: ESMA Q&A AIFMD Sect.III Q73, 2 December 2015.'
      dqef_dimension: accuracy
      esma_error_codes:
      - code: CAF-058
        error_message: The sum of the percentages should be equal to 100%.
        control: The sum of all the area AUM percentages should be equel to 100%.
        field_name: Africa AuM value percentage *, Asia Pacific (other than Middle East) AuM value percentage *, Europe (other than EEA) AuM value percentage *, Europe EEA AuM value percentage *, Middle East AuM value percentage *, North America AuM value percentage *, South America AuM value percentage *, Supra National/Multiple regions AuM value percentage *
        item_id: '86'
        severity: Content error
      legal_basis: Art. 24(1) and 3(3)(d); Art. 2 Commission Delegated Regulation (EU) No 231/2013; ESMA Q&A AIFMD Sect.III Q5 and Q38, 25 March and 30 September 2014
