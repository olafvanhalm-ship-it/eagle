        control: "An error is generated \nIF Sum(TotalFinancingInDays0to1Rate, TotalFinancingInDays2to7Rate, TotalFinancingInDays8to30Rate, TotalFinancingInDays31to90Rate, TotalFinancingInDays91to180Rate,  TotalFinancingInDays181to365Rate, TotalFinancingInDays365MoreRate) < 99%\nOR\nSum(TotalFinancingInDays0to1Rate, TotalFinancingInDays2to7Rate, TotalFinancingInDays8to30Rate, TotalFinancingInDays31to90Rate, TotalFinancingInDays91to180Rate, TotalFinancingInDays181to365Rate, TotalFinancingInDays365MoreRate) >101%"
        field_name: Percentage of financing amount in 0 to 1 day, Percentage of financing amount in 2 to 7 day, Percentage of financing amount in 8 to 30 day, Percentage of financing amount in 31 to 90 day, Percentage of financing amount in 91 to 180 day, Percentage of financing amount in 181 to 365 day, Percentage of financing amount longer than 365 days
        item_id: '211'
        severity: ''
    PredominantAIFType:
      item: AIF-Item-57
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFDescription/PredominantAIFType
      xsd_type: AIFTypeType
      mandatory: true
      allowed_values:
        HFND: Hedge Fund
        PEQF: Private Equity Fund
        RESF: Real Estate Fund
        FOFS: Fund of Funds
        OTHR: Other
        NONE: None
      validation_rules:
      - Must be one of the allowed values
      - Must be consistent with the investment strategy group reported (e.g. HFND → HedgeFundInvestmentStrategies present)
      - Only one predominant AIF type per fund per period
      dqef_dimension: consistency
      dqef_checks:
      - 'DQEF Consistency: flag when PredominantAIFType = RESF but SubAssetType in MainInstrumentsTraded is not real estate'
      esma_error_codes:
      - code: CAF-079
        error_message: The position size type is not consistent with the predominant AIF type.
        control: The field is mandatory for AIF predominant type “Private Equity funds” and forbidden otherwise.
        field_name: Position size type
        item_id: '113'
        severity: Content error
    InvestmentStrategies:
      item: AIF-Item-58-61
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFDescription/[*]FundInvestmentStrategies
      mandatory: conditional
      condition: Mandatory when PredominantAIFType != 'NONE'. The strategy group must match PredominantAIFType.
      sub_fields:
        StrategyType:
          item: AIF-Item-58
          description: Fund-type-specific strategy code from Annex II Table 3
          validation_rules:
          - Must be from the applicable strategy list for the PredominantAIFType
          - Strategies are mutually exclusive (except 'None')
        PrimaryStrategyFlag:
          item: AIF-Item-59
          xsd_type: BooleanType
          validation_rules:
          - Exactly one strategy per AIF must have PrimaryStrategyFlag = 'true'
        StrategyNAVRate:
          item: AIF-Item-60
          xsd_type: SignedRate15p2Type
          mandatory: conditional
          condition: Optional; if provided for multiple strategies, sum should not exceed 100%
          validation_rules:
          - 'Range: -100.00 to 100.00 (percentage)'
        StrategyTypeOtherDescription:
          item: AIF-Item-61
          xsd_type: StringRestricted300Type
          mandatory: conditional
          condition: Mandatory when StrategyType ends in 'OTH'; forbidden otherwise
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-036
        error_message: The investment strategy code is not consistent with the predominant AIF type.
        control: 'Check that:

          - For predominant AIF type "HFND", the <HedgeFundStrategyTypeType> block is reported

          - For predominant AIF type "PEQF", the <PrivateEquityFundStrategyType> block is reported

          - For predominant AIF type "RESF", the <RealEstateFundStrategyType> block is reported

          - For predominant AIF type "FOFS", the <FundOfFundsStrategyType> block is reported

          - For predominant AIF type "OTHR", the <OtherFundStrategyType> block is reported'
        field_name: Investment strategy code
        item_id: '58'
        severity: Content error
      - code: CAF-037
        error_message: The investment strategy code is not allowed.
        control: "Check that:\n- Different Investment strategies are not reported when the AIF predominant type is different from \"NONE. In that case, only one investment strategy block (HedgeFundInvestmentStrategies, PrivateEquityFundInvestmentStrategies, RealEstateFundInvestmentStrategies, FundOfFundsInvestmentStrategies, OtherFundInvestmentStrategies) can be reported as the investment strategies are mutually exclusive..  \n- Within the <HedgeFundStrategyType> block, if the investment strategy code \"MULT_HFND\" is reported, at least 2 other different hedge fund investment strategy codes should be reported.\n- Within the <PrivateEquityFundStrategyType> block, if the investment strategy code \"MULT_PEQF\" is reported, at least 2 other different Private equity fund investment strategy codes should be reported.\n- Within the <RealEstateFundStrategyType> block, if the investment strategy code \"MULT_PEQF\" is reported, at least 2 other different Private equity fund investment strategy codes should be reported."
        field_name: Investment strategy code
        item_id: '58'
        severity: Content error
      - code: CAF-038
        error_message: Multi strategies investment strategies should be primary strategies.
        control: The flag should be true when the investment strategy code reported is equal to "MULT_PEQF", "MULT_HFND" or "MULT_REST".
        field_name: Primary strategy flag
        item_id: '59'
        severity: Content error
      - code: CAF-039
        error_message: The sum of the percentages should be equal to 100%.
        control: For the reported AIF, the sum of all the reported investment strategy NAV percentages should be 100%
        field_name: Investment strategy NAV percentage
        item_id: '60'
        severity: Content error
      - code: CAF-040
        error_message: There is no NAV percentage reported for multi strategies investment strategies.
        control: The NAV percentage is forbidden when the investment strategy code reported is equal to "MULT_PEQF", "MULT_HFND" or "MULT_REST".
        field_name: Investment strategy NAV percentage
        item_id: '60'
        severity: Content error
      - code: CAF-041
        error_message: The investement strategy code description is not consistent with the reported investment strategy code.
        control: 'The field is mandatory for investement strategy codes equal to:

          -  “OTHR_HFND”

          -  “OTHR_PRIV”

          -  “OTHR_REST”

          -  “OTHR_FOFS”

          -  “OTHR_OTHF”'
        field_name: Description for strategy type Other
        item_id: '61'
        severity: Content error
      validation_rules:
      - 'Report the investment strategy DISCLOSED TO INVESTORS in the fund rules or other offering documents (prospectus, PPM etc.), not the strategy corresponding to the actual portfolio composition on the reporting date. Where a feeder AIF exists, it will in most instances have the same strategy as the master AIF unless investments in other assets change the resulting strategy. Source: ESMA Q&A AIFMD Sect.III Q72 and Q76, 2 December 2015.'
