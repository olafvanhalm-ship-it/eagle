      - MainBeneficialOwnersRate must not be 0
      - ProfessionalInvestorConcentrationRate + RetailInvestorConcentrationRate = 100%
      - 'When ProfessionalInvestorConcentrationRate = 0 AND RetailInvestorConcentrationRate = 0 (breakdown not available), the AssumptionDescription field MUST be populated to indicate that the information is not available. Reporting 0%+0% without an assumption description is non-compliant. Source: ESMA Q&A AIFMD Sect.III Q80, May 2017.'
      esma_error_codes:
      - code: CAF-084
        error_message: MainBeneficialOwnersRate cannot be 0.
        control: ''
        field_name: MainBeneficialOwnersRate
        item_id: '118'
        severity: Content Error
  individual_info:
