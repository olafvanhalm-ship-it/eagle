          For X2 reporting period, only April, May, June, July, August, September, October, November and December rates may be reported.'
        field_name: Percentage of net investment returns for January, Percentage of net investment returns for February, Percentage of net investment returns for March, Percentage of net investment returns for April, Percentage of net investment returns for May, Percentage of net investment returns for June, Percentage of net investment returns for July, Percentage of net investment returns for August, Percentage of net investment returns for September, Percentage of net investment returns for October, Percentage of net investment returns for November, Percentage of net investment returns for December
        item_id: '231'
