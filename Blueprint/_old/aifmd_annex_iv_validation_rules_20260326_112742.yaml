      item: AIF-Item-30
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFIdentification/AIFIdentifierECB
      xsd_type: ECBCodeType
      mandatory: 'no'
      description: ECB fund identifier code
      dqef_dimension: completeness
      validation_rules:
      - If provided, must match ECB code format
      esma_error_codes: []
  principal_info:
    AIFIdentifierLEI:
      item: AIF-Item-24
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFIdentification/AIFIdentifierLEI
      xsd_type: LEICodeType
      mandatory: conditional
      condition: Strongly recommended; mandatory when LEI is available
      format: 20-character ISO 17442 LEI
      validation_rules:
      - Must match pattern [0-9A-Z]{18}[0-9]{2}
      - Must be an active LEI in GLEIF
      - Check digits must pass ISO 17442 Luhn-mod-97 validation
      - LEI entity name in GLEIF should match AIFName
      dqef_dimension: completeness
      dqef_checks:
      - 'DQEF Completeness: flag AIF records where LEI is absent but can be found via GLEIF name lookup'
      - 'DQEF Consistency: flag where LEI in report differs from LEI in ESMA register for the same AIFNationalCode'
      esma_error_codes:
      - code: CAF-013
        error_message: The check digits of the LEI code are not correct.
        control: Verify the correctness of the LEI code format rules following the calculation methodology of the 2-last check digits under validation rules using ISO 7064, (“ISO/IEC 7064:2003 Information technology -- Security techniques -- Check character systems”)
        field_name: AIF LEI code
        item_id: '24'
        severity: Content error
    AIFIdentifierISIN:
      item: AIF-Item-25
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFIdentification/AIFIdentifierISIN
      xsd_type: ISINInstrumentIdentificationType
      mandatory: false
      format: 12-character ISO 6166 ISIN — pattern [A-Z]{2}[A-Z0-9]{9}[0-9]
      validation_rules:
      - Must match ISIN format if provided
      - ISIN check digit must be valid
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-014
        error_message: The check digit of the ISIN code is not correct.
        control: Verify the correctness of the ISIN code format rules following the calculation methodology of the last check digit
        field_name: AIF ISIN code
        item_id: '25'
        severity: Content error
    ShareClassFlag:
      item: AIF-Item-33
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/ShareClassFlag
      xsd_type: BooleanType
      mandatory: true
      validation_rules:
      - '''true'' when AIF has multiple share classes'
      - 'When ''true'': ShareClassIdentification should be present with at least one entry'
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-016
        error_message: The share class national code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class national code
        item_id: '34'
        severity: Content error
      - code: CAF-017
        error_message: The check digit of the ISIN code is not correct.
        control: Verify the correctness of the ISIN code format rules following the calculation methodology of the last check digit
        field_name: Share class ISIN code
        item_id: '35'
        severity: Content error
      - code: CAF-018
        error_message: The share class ISIN code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class ISIN code
        item_id: '35'
        severity: Content error
      - code: CAF-019
        error_message: The share class SEDOL code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class SEDOL code
        item_id: '36'
        severity: Content error
      - code: CAF-020
        error_message: The share class CUSIP code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class CUSIP code
        item_id: '37'
        severity: Content error
      - code: CAF-021
        error_message: The share class Bloomberg code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class Bloomberg code
        item_id: '38'
        severity: Content error
      - code: CAF-022
        error_message: The share class Reuters code is not consistent with the share class flag.
        control: The field is forbidden for AIF share class equal to false and optional otherwise.
        field_name: Share class Reuters code
        item_id: '39'
        severity: Content error
      - code: CAF-023
        error_message: The share class name is not consistent with the share class flag.
        control: The field is mandatory for AIF share class equal to true and Forbidden otherwise.
        field_name: Share class name
        item_id: '40'
        severity: Content error
    AIFMasterFeederStatus:
      item: AIF-Item-41
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFDescription/AIFMasterFeederStatus
      xsd_type: AIFMasterFeederStatusType
      mandatory: true
      allowed_values:
        MSTR: Master AIF
        FEED: Feeder AIF
        NONE: Neither master nor feeder
      validation_rules:
      - 'When ''FEED'': MasterAIFsIdentification must be present'
      - 'When ''MSTR'' or ''NONE'': MasterAIFsIdentification must be absent'
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-024
        error_message: The master AIF name is not consistent with the master feeder status.
        control: The field is optional for Master feeder status equal to "FEEDER" and forbidden otherwise.
        field_name: Master AIF name
        item_id: '42'
        severity: Content error
      - code: CAF-025
        error_message: The country of the master AIF national code is not correct and should be an EEA or EU country.
        control: The country code should exist in the reference table of countries and should be referenced as EEA country
        field_name: Master AIF national identifier - Reporting Member State
        item_id: '43'
        severity: Content error
      - code: CAF-026
        error_message: The master AIF name is not consistent with the master feeder status.
        control: The field is optional for Master feeder status equal to "FEEDER" and forbidden otherwise.
        field_name: Master AIF national identifier - Reporting Member State
        item_id: '43'
        severity: Content error
      - code: CAF-027
        error_message: The master AIF national code is not consistent with the master feeder status.
        control: The field is optional for Master feeder status equal to "FEEDER" and forbidden otherwise.
        field_name: Master AIF national identifier - National code
        item_id: '44'
        severity: Content error
    AIFBaseCurrencyDescription:
      item: AIF-Item-49-52
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFDescription/AIFBaseCurrencyDescription
      mandatory: true
      sub_fields:
        BaseCurrency:
          item: AIF-Item-49
          xsd_type: CurrencyCodeType
          mandatory: true
          validation_rules:
          - Must be a valid ISO 4217 active currency code
          - Only one base currency should be reported per AIF
        AUMAmountInBaseCurrency:
          item: AIF-Item-48
          xsd_type: UnsignedInteger15pType
          mandatory: true
          validation_rules:
          - Must be >= 0
          - No decimal places
          - Must be consistent with AIFNetAssetValue (AuM >= NAV generally true; exceptions for leveraged funds)
          - 'INTERNALLY MANAGED AIFs — OWN FUNDS EXCLUSION: For internally managed AIFs, AuM must EXCLUDE the initial capital and additional own funds (Art.9 AIFMD). Same principle as for NAV field (item 53). Source: ESMA_QA_2227, 02-07-2024; European Commission; Art.9 AIFMD.'
          dqef_checks:
          - 'DQEF Accuracy: flag if AuM deviates > threshold from prior period'
          - 'DQEF Accuracy: flag if AuM < NAV without leverage explanation'
        FXEURReferenceRateType:
          item: AIF-Item-51
          xsd_type: FXEURReferenceRateTypeType
          mandatory: conditional
          condition: Mandatory when BaseCurrency != EUR; forbidden otherwise
          allowed_values:
          - ECB
          - OTH
        FXEURRate:
          item: AIF-Item-50
          xsd_type: UnsignedDecimal15p4Type
          mandatory: conditional
          condition: Mandatory when BaseCurrency != EUR; forbidden otherwise
          validation_rules:
          - Must be > 0
          - 'Cross-check: AUMAmountInBaseCurrency / FXEURRate should approximate Euro equivalent'
        FXEUROtherReferenceRateDescription:
          item: AIF-Item-52
          xsd_type: StringRestricted30Type
          mandatory: conditional
          condition: Mandatory when FXEURReferenceRateType = 'OTH'; forbidden otherwise
      esma_error_codes:
      - code: CAF-029
        error_message: The currency code is not correct.
        control: The currency code exists in the reference table of currencies
        field_name: Base currency of the AIF
        item_id: '49'
        severity: Content error
      - code: CAF-030
        error_message: The FX rate is not consistent with the AIF base currency.
        control: The field is mandatory for AIF base currency different from EUR and forbidden otherwise
        field_name: Base currency / EUR FX rate
        item_id: '50'
        severity: Content error
      - code: CAF-031
        error_message: The FX reference rate type is not consistent with the AIF base currency.
        control: The field is mandatory for AIF base currency different from EUR and forbidden otherwise.
        field_name: Base currency / EUR FX reference rate type
        item_id: '51'
        severity: Content error
      - code: CAF-032
        error_message: The reference rate description is not consistent with the  FX reference rate type.
        control: The field is mandatory for reference rate type equal to "OTH" and forbidden otherwise
        field_name: Base currency / EUR FX reference rate description for no ECB rates
        item_id: '52'
        severity: Content error
    AIFNetAssetValue:
      item: AIF-Item-53
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/AIFDescription/AIFNetAssetValue
      xsd_type: SignedInteger15pType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: Signed integer in base currency, no decimal places. Negative values permitted (e.g. distressed funds).
      validation_rules:
      - Integer value, no decimal places
      - Typically positive; negative values trigger consistency warning
      - Must be reported in base currency
      - 'INTERNALLY MANAGED AIFs — OWN FUNDS EXCLUSION: For internally managed AIFs (AIF itself is the AIFM per Art.5(1)(b) AIFMD) and self-managed UCITS investment companies, the reported NAV must EXCLUDE the initial capital and additional own funds held pursuant to Art.9 AIFMD. Own funds are NOT part of the fund investment assets; they are maintained to cover professional liability (Art.9 AIFMD) and must remain within minimum capital requirements at all times. They are neither invested per the fund strategy nor available for distribution to redeeming investors (Art.18 AIFMD; Art.31 UCITS Directive; Art.60(2) Reg.231/2013). Reported NAV = fund investment assets ONLY. Source: ESMA_QA_2227, 02-07-2024; European Commission; Art.9 and 18 AIFMD.'
      dqef_dimension: accuracy
      dqef_checks:
      - 'DQEF Accuracy: flag if NAV is zero or negative (unless LastReportingFlag = true)'
      - 'DQEF Accuracy: outlier detection — flag if NAV deviates significantly from prior period without structural explanation'
