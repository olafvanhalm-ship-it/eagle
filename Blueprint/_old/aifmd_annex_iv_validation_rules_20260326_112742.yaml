metadata:
  title: AIFMD Annex IV Validation Rules
  schema_version: '1.2'
  rule_set_version: '0.4'
  created: '2025-03-20'
  last_reviewed: '2026-03-25'
  review_status: >-
    v0.4 issued 2026-03-25. Applied 25 gaps identified by review of ESMA34-32-352 Q&A AIFMD (through 14 June 2023) and ESMA IT-tool Q&As through 25 March 2026 (QADownload25032026.pdf). Changes cover: type correction on NAVGeographicalFocus (signed values), interpretation rules for residual maturity, FX spot and cross-currency swap classification, position type derivation, liquidity bucketing, subscription/redemption value basis, leverage percentage format, stress test procedure for closed-ended unleveraged AIFs, and own-funds exclusion for internally managed AIFs (ESMA_QA_2227). Forward-looking note added for AIFMD II LMTs (ESMA_QA_2736). Next review due: 2027-03-25 or upon ESMA XSD publication (expected ~April 2027).
  owner: Project Eagle — Head of Compliance & Risk
  review_cycle: Annual (aligned with ESMA DQEF technical document cycle)
  legal_framework:
  - Directive 2011/61/EU (AIFMD), Articles 3(3)(d), 24(1), 24(2), 24(4)
  - Commission Delegated Regulation (EU) No 231/2013, Articles 2, 10, 110–127
  - ESMA Guidelines on AIFMD Reporting (ESMA/2014/869rev)
  - ESMA Q&A on AIFMD reporting
  - ESMA Q&A AIFMD ESMA34-32-352 (through 14 June 2023)
  - 'ESMA IT-tool Q&As: ESMA_QA_2227 (02-07-2024), ESMA_QA_2736 (18-12-2025)'
  dqef_reference: ESMA50-1605533872-8305 (May 2025)
  dqef_technical_doc: ESMA50-1605533872-8344
  xsd_files:
  - AIFMD_DATMAN_V1_2.xsd
  - AIFMD_DATAIF_V1_2.xsd
  - AIFMD_REPORTING_DataTypes_V1_2.xsd
  changelog:
  - version: '0.2'
    date: '2025-03-20'
    changes:
    - Added esma_error_codes to all existing fields using ESMA CAF/CAM error list
    - 'Added new fields: OldAIFMIdentifierNCA, OldAIFIdentifierNCA, PrimeBrokerIdentification, FundingSourceCountries, AIFReportingObligationChangeQuarter (AIF), LastReportingFlag (AIF)'
    - Expanded individual_info section from stub to full field coverage with all CAF-067 through CAF-219 error codes mapped to relevant fields
  - version: '0.3'
    date: '2025-03-20'
    changes:
    - Added AIFM/AIF record_header fields 10-11 (ReportingObligationChange codes), 14-15 (QuestionNumber, AssumptionDescription)
    - Added AIF identification fields 26-30 (CUSIP, SEDOL, Bloomberg/Ticker, Reuters/RIC, ECB codes)
    - 'Added AIF principal_info: ShareClassIdentification sub-fields, HFTData (F62-63), TurnoverByAssetType (F125-127), CurrencyExposure (F128-130), InvestorConcentration'
    - 'Added AIF individual_info: TotalOpenPositions, SpecialArrangements (F197-209), InvestorGroupBreakdown, StressTests (F279-280), RehypothecationData (F281-282)'
    - Extended AIFReportingCode allowed_values from 29 to 45 (full code set incl. non-EU PPR AIFMs)
    - Added reference_tables section with Tables 1-7 complete allowed value sets
    - Added allowed_values for RiskMeasureType, StressTestsResultType, VARCalculationMethodCodeType
    - 'Fixed AIFM PrincipalMarkets/Instruments: EUR requirement per Rev6 ref 91'
    - 'Fixed InceptionDate: mandatory per guidance (M, not conditional)'
    - Added IT Technical Guidance Revision 6 and AIFMD 2.0 metadata
  - version: '0.4'
    date: '2026-03-25'
    changes:
    - 'Gap 1: Residual maturity rule added to IndividualExposure — use residual maturity at reporting date, not at issuance (ESMA Q&A Sect.III Q3)'
    - 'Gap 2: NAVGeographicalFocus — per-region values may be negative; description and validation rules updated; type note changed to SignedRate15p2Type (ESMA Q&A Sect.III Q4)'
    - 'Gap 3: AUMGeographicalFocus — legal note added: grondslag is Art.2 Reg.231/2013 AuM, not NAV (ESMA Q&A Sect.III Q5, Q38)'
    - 'Gap 4: IndividualExposure — FX spot classification: SEC_CSH_OTHC for exposure fields (ESMA Q&A Sect.III Q24)'
    - 'Gap 5: IndividualExposure — cross-currency interest swap: DER_IRD_INTR for exposure (ESMA Q&A Sect.III Q26)'
    - 'Gap 4+5 TurnoverByAssetType: FX spot SEC_CSH_CSH, cross-currency DER_IRD_IRD; both notional and market value mandatory for derivative codes (ESMA Q&A Sect.III Q24, Q26, Q45, Q48)'
    - 'Gap 6: OperationalRiskProfile — repos in securities traded (148-149): only received securities (ESMA Q&A Sect.III Q27)'
    - 'Gap 7: RehypothecationData — AllCounterpartyCollateralRehypothecatedRate is a period measure, not snapshot (ESMA Q&A Sect.III Q33)'
    - 'Gap 8: IndividualExposure — position type for derivatives based on underlying exposure, not contract (ESMA Q&A Sect.III Q41)'
    - 'Gap 9: TotalOpenPositions — all cash accounts must be included (ESMA Q&A Sect.III Q43)'
    - 'Gap 10: OperationalRiskProfile — subscriptions/redemptions = value of orders, not count; cash-flow month; PE drawdowns not commitments (ESMA Q&A Sect.III Q50, Q57)'
    - 'Gap 11: OperationalRiskProfile — NAV change = total net effect of subs + performance (ESMA Q&A Sect.III Q51)'
    - 'Gap 12: OperationalRiskProfile — dividend distributions are NOT redemptions (ESMA Q&A Sect.III Q61)'
    - 'Gap 13: IndividualExposure — leveraged syndicated loans always SEC_LON_LEVL (ESMA Q&A Sect.III Q68)'
    - 'Gap 14: InvestmentStrategies — report disclosed strategy, not actual portfolio (ESMA Q&A Sect.III Q72)'
    - 'Gap 15: NAVGeographicalFocus + AUMGeographicalFocus — geographical focus = domicile of issuer, not trading venue (ESMA Q&A Sect.III Q73)'
    - 'Gap 16: GrossMethodLeverage + CommitmentMethodLeverage — expressed as percentage (>= 100.00), not ratio (ESMA Q&A Sect.III Q75)'
    - 'Gap 17: InvestorConcentration — when both rates = 0%, AssumptionDescription mandatory (ESMA Q&A Sect.III Q80)'
    - 'Gap 18: IndividualExposure — secondary market loans: report NAV valuation, not notional (ESMA Q&A Sect.III Q81)'
    - 'Gap 19: StressTests — closed-ended unleveraged AIFs: NONE + mandatory description (ESMA Q&A Sect.III Q83; Art.16(1) AIFMD)'
    - 'Gap 20: IndividualExposure — bank overdrafts = short positions in Cash and Cash Equivalent (ESMA Q&A Sect.III Q46)'
    - 'Gap 21: IndividualExposure — EU sovereign bonds take priority over Non-G10 category (ESMA Q&A Sect.III Q49)'
    - 'Gap 22: LiquidityRiskProfile — illiquid assets with undeterminable liquidity → longest bucket; settlement period conservative (ESMA Q&A Sect.III Q10, Q42)'
    - 'Gap 23: LiquidityRiskProfile — investor liquidity based on shortest withdrawal period per fund docs (ESMA Q&A Sect.III Q11)'
    - 'Gap 24: LeverageArticle24_2 — substantial leverage threshold (3x NAV, Art.111 Reg.231/2013) for fields 296-301 (ESMA Q&A Sect.III Q18, Q31)'
    - 'Additional: InceptionDate — definition added (ESMA Q&A Sect.III Q12)'
    - 'Additional: XR-007 added — non-EU AIFM Art.42 reporting continues while investors present (ESMA Q&A Sect.III Q36)'
    - 'Additional: XR-008 added — non-EU AIFM single unified reporting frequency across Member States (ESMA Q&A Sect.III Q37)'
  - version: 0.4-delta-2026
    date: '2026-03-25'
    source: QADownload25032026.pdf (ESMA IT-tool, filter AIFMD >= 2024-01-01)
    changes:
    - 'Gap 25: AIFNetAssetValue + AUMAmountInBaseCurrency + AUMAmountInEuro — internally managed AIFs must EXCLUDE Art.9 own funds from NAV and AuM (ESMA_QA_2227, 02-07-2024; European Commission)'
    - 'Forward-looking note added to SpecialArrangements: AIFMD II (Directive 2024/927) LMT obligation including non-EU AIFs managed by EU AIFM; XSD update expected ~2027 (ESMA_QA_2736, 18-12-2025)'
    - Non-relevant Q&As documented in changelog (2734, 2374, 2372, 2370, 2230, 2229, 2176, 2174, 711)
  it_technical_guidance_revision: 6
  it_technical_guidance_applicable_from: '2023-11-22'
  xsd_version: '1.2'
  aifmd_2_0_notice: AIFMD 2.0 (OJ March 2024, in force April 2024) requires member states to apply new rules by 16 April 2026. ESMA implementing technical standards and new XSD schemas are expected around April 2027. No schema changes are required before that date.
data_types:
  LEICodeType:
    base: xs:string
    pattern: '[0-9A-Z]{18}[0-9]{2}'
    length: 20
    description: 'Legal Entity Identifier per ISO 17442. Chars 1–4: LOU prefix; 5–6: reserved zeros; 7–18: entity-specific; 19–20: check digits.

      '
  BICCodeType:
    base: xs:string
    pattern: '[A-Z0-9]{11}'
    length: 11
    description: BIC per ISO 9362.
  CountryCodeType:
    base: xs:string
    pattern: '[A-Z]{2}'
    length: 2
    description: ISO 3166-1 alpha-2 country code.
  CurrencyCodeType:
    base: xs:string
    pattern: '[A-Z]{3}'
    length: 3
    description: ISO 4217 3-character currency code.
  MICCodeType:
    base: xs:string
    pattern: '[0-9A-Z]{4}'
    length: 4
    description: ISO 10383 Market Identifier Code.
  ISINInstrumentIdentificationType:
    base: xs:string
    pattern: '[A-Z]{2}[A-Z0-9]{9}[0-9]{1}'
    length: 12
    description: ISO 6166 ISIN code.
  VersionType:
    base: xs:string
    pattern: ([0-9])+\.([0-9])+
    description: Schema version number, e.g. "1.2".
  FilingTypeType:
    base: xs:string
    allowed_values:
    - INIT
    - AMND
    description: 'INIT = initial filing for the period; AMND = amendment to a previous filing.

      '
  ReportingPeriodTypeType:
    base: xs:string
    allowed_values:
    - Q1
    - Q2
    - Q3
    - Q4
    - H1
    - H2
    - Y1
    - X1
    - X2
    description: 'Period type: quarterly (Q1–Q4), half-yearly (H1–H2), yearly (Y1), or transition periods (X1 = Q1–Q3, X2 = Q2–Q4).

      '
  BooleanType:
    base: xs:boolean
    allowed_values:
    - 'true'
    - 'false'
  UnsignedInteger15pType:
    base: xs:integer
    min_inclusive: 0
    total_digits: 15
    fraction_digits: 0
    description: Non-negative integer, up to 15 digits, no decimal places.
  SignedInteger15pType:
    base: xs:integer
    min_exclusive: -1000000000000000
    max_exclusive: 1000000000000000
    total_digits: 15
    fraction_digits: 0
    description: Signed integer, up to 15 digits, no decimal places.
  UnsignedDecimal15p4Type:
    base: xs:decimal
    min_inclusive: 0
    max_exclusive: 1000000000000000
    total_digits: 19
    fraction_digits: 4
    description: Non-negative decimal with exactly 4 decimal places.
  UnsignedPercentType:
    base: xs:decimal
    min_inclusive: 0
    max_inclusive: 100
    total_digits: 5
    fraction_digits: 2
    description: Percentage 0.00–100.00.
  SignedRate15p2Type:
    base: xs:decimal
    min_exclusive: -1000000000000000
    max_exclusive: 1000000000000000
    total_digits: 17
    fraction_digits: 2
    description: Signed decimal with 2 decimal places.
  StringRestricted300Type:
    base: xs:string
    max_length: 300
  StringRestricted30Type:
    base: xs:string
    max_length: 30
  FiveRankingType:
    base: xs:integer
    allowed_values:
    - 1
    - 2
    - 3
    - 4
    - 5
  RiskMeasureTypeType:
    description: Risk measure types for market risk profile (field 138)
    allowed_values:
      NET_EQTY_DELTA: Net equity delta — mandatory under Art. 24(2)
      NET_DV01: Net DV01 (interest rate sensitivity) — mandatory under Art. 24(2)
      NET_CS01: Net CS01 (credit spread sensitivity) — mandatory under Art. 24(2)
      NET_FX_DELTA: Net FX delta — optional
      NET_CTY_DELTA: Net commodity delta — optional
      VEGA_EXPO: Vega exposure — optional
      VAR: Value at Risk — optional
  StressTestsResultType:
    description: Result of stress test (fields 279-280)
    allowed_values:
      PASS: Stress test passed
      FAIL: Stress test failed
      NONE: Stress test not performed (not applicable)
  VARCalculationMethodCodeTypeType:
    description: Calculation method for Value at Risk (field 302)
    allowed_values:
      HISTO: Historical simulation
      CARLO: Monte Carlo simulation
      PARAM: Parametric method
aifm_report:
  description: 'AIFM-level Annex IV report. Contains one or more AIFMRecordInfo or CancellationAIFMRecordInfo elements. Submitted by the AIFM''s home NCA (or the NCA of the marketing Member State for non-EEA AIFMs under Art. 42).

    '
  envelope:
    ReportingMemberState:
      item: AIFM-Item-1
      xml_path: AIFMReportingInfo/@ReportingMemberState
      xsd_type: CountryCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 2-character ISO 3166-1 alpha-2 country code
      dqef_dimension: completeness
      validation_rules:
      - Must be a valid ISO 3166-1 alpha-2 code
      - Must match the jurisdiction of the supervising NCA
    Version:
      item: AIFM-Item-2
      xml_path: AIFMReportingInfo/@Version
      xsd_type: VersionType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 'Pattern [0-9]+.[0-9]+ — current value: 1.2'
      validation_rules:
      - Must match pattern [0-9]+\.[0-9]+
      - Value must be '1.2' for current XSD version
    CreationDateAndTime:
      item: AIFM-Item-3
      xml_path: AIFMReportingInfo/@CreationDateAndTime
      xsd_type: xs:dateTime
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: ISO 8601 — yyyy-mm-ddThh:mm:ss in UTC
      validation_rules:
      - Must be a valid xs:dateTime value
      - Must be expressed as UTC (no offset, or explicit Z suffix)
      - Must not be a future date beyond the submission date
  record_header:
    FilingType:
      item: AIFM-Item-4
      xml_path: AIFMRecordInfo/FilingType
      xsd_type: FilingTypeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      allowed_values:
        INIT: Initial filing for the reporting period
        AMND: Amendment to a previously submitted reporting
      validation_rules:
      - Must be 'INIT' or 'AMND'
      - AMND requires that an INIT record exists for the same AIFMNationalCode and period
      dqef_dimension: completeness
    AIFMContentType:
      item: AIFM-Item-5
      xml_path: AIFMRecordInfo/AIFMContentType
      xsd_type: AIFMContentTypeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      allowed_values:
        '1': Art. 24(1) reporting contents for all AIFs managed
        '2': Art. 3(3)(d) reporting contents for all AIFs managed
        '3': Art. 24(1) reporting contents for all AIFs marketed in the Member State
      validation_rules:
      - Must be 1, 2, or 3
      - Must be consistent with AIFMReportingCode (e.g. code 1 = registered AIFM → content type 2)
      dqef_dimension: consistency
    ReportingPeriodStartDate:
      item: AIFM-Item-6
      xml_path: AIFMRecordInfo/ReportingPeriodStartDate
      xsd_type: xs:date
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: yyyy-mm-dd — must be first calendar day of January, April, July or October
      validation_rules:
      - Must be a valid xs:date
      - Day must be 01
      - Month must be 01, 04, 07, or 10
      - Must be consistent with ReportingPeriodType and ReportingPeriodYear
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-002
        error_message: The reporting period start date is not allowed.
        control: 'For quarterly reporting (Q1, Q2, Q3, Q4)

          Validate that the reporting start date is the beginning of a quarter.

          Allowed values are YYYY-10-01, YYYY-07-01, YYYY-04-01, YYYY-01-01

          For half-yearly reporting (H1, H2)

          Validate that the reporting start date is the beginning of a half-yearly period (H1, H2)

          Allowed values are YYYY-07-01, YYYY-01-01

          For yearly reporting (Y1)

          Validate that the reporting start date is the beginning of the calendar year (Y1)

          Allowed value is YYYY-01-01


          Validate that the reporting period start date has the same year that the reporting year.'
        field_name: Reporting period start date
        item_id: '6.0'
        severity: ''
    ReportingPeriodEndDate:
      item: AIFM-Item-7
      xml_path: AIFMRecordInfo/ReportingPeriodEndDate
      xsd_type: xs:date
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: yyyy-mm-dd — last calendar day of March, June, September or December
      validation_rules:
      - Must be a valid xs:date
      - Must be the last day of the month (28/29/30/31)
      - Month must be 03, 06, 09, or 12 (or last day of existence for final report)
      - ReportingPeriodEndDate must be >= ReportingPeriodStartDate
      - Period span must be consistent with ReportingPeriodType (Q=3m, H=6m, Y=12m)
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-003
        error_message: The reporting period end date is not allowed
        control: 'Validate that the reporting end date is less or equal to the end of the last reporting period according to the reporting year and reporting period type.

          For quarterly reporting (Q1, Q2, Q3, Q4) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-03-31 for Q1, YYYY-06-30 for Q2, YYYY-09-30 for Q3, YYYY-12-31 for Q4.

          For half-yearly reporting (H1, H2) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-06-30 for H1,  YYYY-12-31 for H2.

          For yearly reporting (Y1) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-12-31 for Y1.


          Validate that the reporting end date is greater than the reporting start date and has the same year.'
        field_name: Reporting period end date
        item_id: '7.0'
        severity: Content error
    ReportingPeriodType:
      item: AIFM-Item-8
      xml_path: AIFMRecordInfo/ReportingPeriodType
      xsd_type: ReportingPeriodTypeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      allowed_values:
        Q1: 1st quarter
        Q2: 2nd quarter
        Q3: 3rd quarter
        Q4: 4th quarter
        H1: 1st half
        H2: 2nd half
        Y1: Calendar year
        X1: Q1 to Q3 (obligation change)
        X2: Q2 to Q4 (obligation change)
      validation_rules:
      - Must match one of the allowed values
      - Must be consistent with AIFMReportingCode (registered AIFMs = Y1; authorised with quarterly = Q1–Q4)
      - X1/X2 only valid when AIFMReportingObligationChangeFrequencyCode is present
      dqef_dimension: consistency
    ReportingPeriodYear:
      item: AIFM-Item-9
      xml_path: AIFMRecordInfo/ReportingPeriodYear
      xsd_type: xs:gYear
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 4-digit year, e.g. 2024
      validation_rules:
      - Must be a valid 4-digit calendar year
      - Must be >= 2013 (first AIFMD reporting year)
      - Must match the year in ReportingPeriodStartDate
      dqef_dimension: consistency
    AIFMReportingObligationChangeFrequencyCode:
      item: AIFM-Item-10
      xml_path: AIFMRecordInfo/AIFMReportingObligationChangeFrequencyCode
      xsd_type: ReportingObligationChangeFrequencyCodeType
      mandatory: 'no'
      condition: Optional; present when the AIFM reporting obligation frequency changes
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 10
      format: Change frequency code (e.g. YH, YQ, HY, HQ, QY, QH, NQ, NH, NY)
      dqef_dimension: consistency
      validation_rules:
      - Must be a valid code from the frequency change code table (Table 10 Annex II)
      - Mandatory when AIFMReportingObligationChangeQuarter is filled in
      esma_error_codes: []
    AIFMReportingObligationChangeContentsCode:
      item: AIFM-Item-11
      xml_path: AIFMRecordInfo/AIFMReportingObligationChangeContentsCode
      xsd_type: AIFMReportingObligationChangeContentsCodeType
      mandatory: 'no'
      condition: Optional; present when the AIFM reporting obligation contents change
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 8
      format: Integer code 1-6 per AIFM contents change table
      dqef_dimension: consistency
      allowed_values:
        '1': From 24(1) for all AIFs managed → 3(3d) for all AIFs managed
        '2': From 24(1) for all AIFs managed → 24(1) for all AIFs marketed in the Member State
        '3': From 24(1) for all AIFs marketed → 3(3d) for all AIFs managed
        '4': From 24(1) for all AIFs marketed → 24(1) for all AIFs managed
        '5': From 3(3d) for all AIFs managed → 24(1) for all AIFs marketed
        '6': From 3(3d) for all AIFs managed → 24(1) for all AIFs managed
      validation_rules:
      - Must be a valid code 1-6
      - Mandatory when AIFMReportingObligationChangeQuarter is filled in and contents changed
      esma_error_codes: []
    AIFMReportingObligationChangeQuarter:
      item: AIFM-Item-12
      xml_path: AIFMRecordInfo/AIFMReportingObligationChangeQuarter
      xsd_type: ReportingObligationChangeQuarterType
      mandatory: conditional
      condition: Required when AIFMReportingObligationChangeFrequencyCode or AIFMReportingObligationChangeContentsCode is present
      allowed_values:
      - Q1
      - Q2
      - Q3
      - Q4
      legal_basis: Art. 24(1) and 3(3)(d)
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-004
        error_message: The quarter for the AIMF reporting obligation change should be reported
        control: The field is mandatory for <AIFReportingObligationChangeFrequencyCode> or <AIFReportingObligationChangeContentsCode> filled in
        field_name: Change in AIFM reporting obligation Quarter
        item_id: '12.0'
        severity: Content error
    LastReportingFlag:
      item: AIFM-Item-13
      xml_path: AIFMRecordInfo/LastReportingFlag
      xsd_type: BooleanType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: true | false
      validation_rules:
      - Set to 'true' only when the AIFM has been deregistered/de-authorised or ceases activity
      - If 'true', no subsequent AIFMRecordInfo with the same AIFMNationalCode should appear
      dqef_dimension: consistency
    QuestionNumber:
      item: AIFM-Item-14
      xml_path: AIFMRecordInfo/AssumptionList/QuestionNumber
      xsd_type: UnsignedInteger3pType
      mandatory: conditional
      condition: Mandatory when AssumptionDescription is filled in; forbidden otherwise
      format: Integer 1-999
      dqef_dimension: completeness
      validation_rules:
      - Must refer to a valid question number in the AIFM template
      - Mandatory when AssumptionDescription is present
      esma_error_codes: []
    AssumptionDescription:
      item: AIFM-Item-15
      xml_path: AIFMRecordInfo/AssumptionList/AssumptionDescription
      xsd_type: StringRestricted300Type
      mandatory: conditional
      condition: Mandatory when QuestionNumber is filled in; forbidden otherwise
      format: Free text, max 300 characters
      dqef_dimension: completeness
      validation_rules:
      - Must be present when QuestionNumber is filled in
      - Used to document assumptions made for specific questions
      esma_error_codes: []
  identification:
    AIFMReportingCode:
      item: AIFM-Item-16
      xml_path: AIFMRecordInfo/AIFMReportingCode
      xsd_type: AIFMReportingCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 8
      allowed_values:
        '1': Registered AIFM under Art. 3
        '2': Authorised AIFM (opt-in) under Art. 7
        '3': Authorised AIFM with only unleveraged AIFs (non-listed / control) under Art. 7
        '4': Authorised AIFM with half-yearly obligation under Art. 7
        '5': Authorised AIFM with quarterly obligation under Art. 7
        '6': Non-EU AIFM PPR annual obligation under Art. 42
        '7': Non-EU AIFM PPR unleveraged / non-listed / control under Art. 42
        '8': Non-EU AIFM PPR half-yearly obligation under Art. 42
        '9': Non-EU AIFM PPR quarterly obligation under Art. 42
      validation_rules:
      - Must match the AIFM's authorisation / registration status in the NCA register
      - Code 1 implies content type 2 and period type Y1
      - Codes 5, 9 imply quarterly period types (Q1–Q4)
      - Codes 4, 8 imply half-yearly or lower frequency period types
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-025
        error_message: The reporting code of the AIFMs and AIFs should be consistent
        control: "An error is generated when the AIFM reporting code is not consistent with the AIF reporting code:\n   - WHEN NOT(AIFReportingCode=1 AND AIFMReportingCode=1)\n   - OR NOT (2=<AIFReportingCode=<34 AND 2=<AIFMReportingCode<=5)\n   - OR NOT (AIFReportingCode>=35 AND 6<=AIFMReportingCode<=9)"
        field_name: AIFM reporting code
        item_id: '16.0'
        severity: ''
    AIFMJurisdiction:
      item: AIFM-Item-17
      xml_path: AIFMRecordInfo/AIFMJurisdiction
      xsd_type: CountryCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 2-character ISO 3166-1 alpha-2
      validation_rules:
      - Must be a valid ISO 3166-1 alpha-2 code
      - 'For EEA AIFMs: must match AIFMEEAFlag = true'
      - Must be consistent with ReportingMemberState for domestic reports
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-005
        error_message: The jurisdiction of the AIF is not correct.
        control: The country code should exist in the reference table of countries
        field_name: AIFM jurisdiction
        item_id: '17.0'
        severity: Content error
    AIFMNationalCode:
      item: AIFM-Item-18
      xml_path: AIFMRecordInfo/AIFMNationalCode
      xsd_type: AIFMNationalCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: Alphanumeric, NCA-assigned unique identifier
      validation_rules:
      - Must not be empty
      - Must match the code in the NCA's register
      - Used as primary key together with ReportingPeriodType and ReportingPeriodYear
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAM-006
        error_message: The AIFM national code does not exist in the ESMA Register.
        control: The AIFM national code should exist in the ESMA register for the reporting Member State
        field_name: AIFM National Code
        item_id: '18.0'
        severity: Content error
      - code: CAM-021
        error_message: The authorised AIFM national code does not exist in the ESMA register
        control: The AIFM for which reporting code is comprised between 2 and 5 (included) should be valid in the ESMA register.
        field_name: AIFM reporting code
        item_id: '16.0'
        severity: Content error
      - code: CAM-022
        error_message: The authorised AIFM is not referenced as an Head Office in the ESMA Register
        control: The AIFM for which reporting code is comprised between 2 and 5 (included) should not be referenced in the ESMA register with a Branch type.
        field_name: AIFM reporting code
        item_id: '16.0'
        severity: Content error
      - code: CAM-023
        error_message: The authorised AIFM is no more active in the ESMA Register
        control: The AIFM for which reporting code is comprised between 2 and 5 (included) should be referenced in the ESMA Register with an AIFM authorisation date less or equal to the reporting period start date and with an authorisation end date (when filled in) greater or equal to the reporting period end date.
        field_name: AIFM reporting code
        item_id: '16.0'
        severity: Content error
      - code: CAM-024
        error_message: The reporting period dates are not consistent with the authorisation period dates registered in the ESMA Register for AIFM national code
        control: For AIFMs already existing in the ESMA Register, the system verifies that the AIFM Authorisation Period is consistent (not in conflict) with the Reporting Period of the DATMAN file that is being submitted.
        field_name: AIFM National Code
        item_id: '18.0'
        severity: Notification
    AIFMName:
      item: AIFM-Item-19
      xml_path: AIFMRecordInfo/AIFMName
      xsd_type: StringRestricted300Type
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: Free text, max 300 characters
      validation_rules:
      - Must not be empty
      - Strongly recommended to match the legal name corresponding to LEI
      dqef_dimension: completeness
    AIFMEEAFlag:
      item: AIFM-Item-20
      xml_path: AIFMRecordInfo/AIFMEEAFlag
      xsd_type: BooleanType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      validation_rules:
      - '''true'' for AIFMs established in EEA member states'
      - '''false'' for non-EEA AIFMs (e.g. marketing under Art. 42)'
      - Must be consistent with AIFMJurisdiction (EEA country codes)
      dqef_dimension: consistency
    AIFMNoReportingFlag:
      item: AIFM-Item-21
      xml_path: AIFMRecordInfo/AIFMNoReportingFlag
      xsd_type: BooleanType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      validation_rules:
      - '''true'' when AIFM has no AIFs to report (e.g. newly authorised, no AIF yet started)'
      - 'When ''true'': AIFMCompleteDescription must be absent'
      - 'When ''false'': AIFMCompleteDescription must be present'
      dqef_dimension: consistency
  complete_description:
    AIFMIdentifierLEI:
      item: AIFM-Item-22
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMIdentifier/AIFMIdentifierLEI
      xsd_type: LEICodeType
      mandatory: conditional
      condition: Strongly recommended; mandatory when available. Forbidden if no LEI exists.
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 20-character ISO 17442 LEI
      validation_rules:
      - Must match pattern [0-9A-Z]{18}[0-9]{2}
      - Must be an active, registered LEI in the GLEIF database
      - Check digits (positions 19–20) must pass ISO 17442 Luhn-mod-97 validation
      - LEI entity name in GLEIF should match AIFMName
      dqef_dimension: completeness
      dqef_checks:
      - 'DQEF Completeness: flag AIFM records where LEI is absent but a matching LEI can be found via public register (GLEIF lookup on AIFMName)'
      esma_error_codes:
      - code: CAM-007
        error_message: Verify the correctness of the LEI code format rules following the calculation methodology of the 2-last check digits
        control: Verify the correctness of the LEI code format rules following the calculation methodology of the 2-last check digits under validation rules using ISO 7064, (“ISO/IEC 7064:2003 Information technology -- Security techniques -- Check character systems”).
        field_name: AIFM LEI Code
        item_id: '22.0'
        severity: Content error
    AIFMIdentifierBIC:
      item: AIFM-Item-23
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMIdentifier/AIFMIdentifierBIC
      xsd_type: BICCodeType
      mandatory: conditional
      condition: Provide if no LEI is available. At least one of LEI or BIC should be present.
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 11-character ISO 9362 BIC — pattern [A-Z0-9]{11}
      validation_rules:
      - Must match pattern [A-Z0-9]{11}
      dqef_dimension: completeness
    AIFMPrincipalMarkets:
      item: AIFM-Item-26-29
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMPrincipalMarkets
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      description: Exactly 5 principal market entries (rankings 1–5 required)
      validation_rules:
      - Exactly 5 AIFMFivePrincipalMarket elements with Ranking values 1, 2, 3, 4, 5
      - No duplicate rankings
      - MarketCodeType must be 'MIC', 'OTC', or 'NOT'
      - 'If MarketCodeType = ''MIC'': MarketMIC must be a valid ISO 10383 MIC code'
      - 'If MarketCodeType = ''OTC'' or ''NOT'': MarketMIC must be absent'
      - 'AggregatedValueAmount (Item-29): optional; if present must be unsigned integer'
      - 'AggregatedValueAmount (Item-29): must be expressed in EURO (Rev6 correction, ref 91)'
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAM-010
        error_message: The MIC code is not correct
        control: 'The field is mandatory when the market code type is equal to "MIC" and forbidden otherwise.

          The MIC code exists in the reference table of markets.

          ESMA system will not use the validity start date and validity end date of the MIC code to identify the validity of the MIC code.'
        field_name: MIC code of the principal market in which the AIFM trades
        item_id: '28.0'
        severity: Content error
      - code: CAM-011
        error_message: The field is mandatory for market code type different from  “NOT”.
        control: The field is mandatory for market code type different from  “NOT”.
        field_name: Aggregated value of the principal market in which the AIFM trades
        item_id: '29.0'
        severity: Content error
      - code: CAM-012
        error_message: The reported value is not consistent with the rank.
        control: The ranks that are assigned to the reported values should be consistent in relation to each other. First rank values are above or equal to the second rank values and so on.
        field_name: Aggregated value of the principal market in which the AIFM trades
        item_id: '29.0'
        severity: Content error
    AIFMPrincipalInstruments:
      item: AIFM-Item-30-32
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMPrincipalInstruments
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      description: Exactly 5 principal instrument entries (rankings 1–5)
      validation_rules:
      - Exactly 5 AIFMPrincipalInstrument elements with Ranking values 1, 2, 3, 4, 5
      - SubAssetType must be a valid code from Annex II Table 1
      - Use 'NTA_NTA_NOTA' when fewer than 5 instruments apply
      - 'AggregatedValueAmount (Item-32): optional; if present must be unsigned integer'
      - 'AggregatedValueAmount (Item-32): must be expressed in EURO (Rev6 correction, ref 91)'
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAM-013
        error_message: The aggregated value is not consistent with the sub-asset type.
        control: The field is mandatory for sub-asset type code different from “NTA_NTA_NOTA” and optional otherwise.
        field_name: Aggregated value of the principal instrument
        item_id: '32.0'
        severity: Content error
      - code: CAM-014
        error_message: The reported value is not consistent with the rank.
        control: The ranks that are assigned to the reported values should be consistent in relation to each other. First rank values are above or equal to the second rank values and so on.
        field_name: Aggregated value of the principal instrument
        item_id: '32.0'
        severity: Content error
    AUMAmountInEuro:
      item: AIFM-Item-33
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AUMAmountInEuro
      xsd_type: UnsignedInteger15pType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d); Reg. 231/2013 Arts. 2 and 10
      format: Non-negative integer (EUR), no decimal places, max 15 digits
      validation_rules:
      - Must be >= 0
      - Must be expressed in Euro without decimal places
      - 'For EUR-denominated AIFMs: must equal AUMAmountInBaseCurrency'
      - 'For non-EUR: AUMAmountInEuro = AUMAmountInBaseCurrency / FXEURRate (tolerance: 1%)'
      - 'INTERNALLY MANAGED AIFs — OWN FUNDS EXCLUSION: For AIFMs that are themselves internally managed AIFs (investment companies), the reported AuM must EXCLUDE the initial capital and additional own funds held under Art.9 AIFMD. Own funds are structurally separate from managed investment assets and must not inflate AuM figures. Source: ESMA_QA_2227, 02-07-2024; European Commission; Art.9 AIFMD.'
      dqef_dimension: accuracy
      dqef_checks:
      - 'DQEF Accuracy: flag if AuM deviates by more than threshold % from prior period without structural explanation'
      - 'DQEF Accuracy: flag if AIFM-level AuM < sum of AIF-level AuM values (considering all managed AIFs in the same period)'
      esma_error_codes:
      - code: CAM-016
        error_message: The total AuM amount in base currency is not consistent with the  total AuM amount in Euro.
        control: The total AuM amount expressed in base currency should be equal to the total AuM amount in Euro * Base currency / EUR FX rate.
        field_name: ''
        item_id: ''
        severity: Notification
    AUMAmountInBaseCurrency:
      item: AIFM-Item-34
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMBaseCurrencyDescription/AUMAmountInBaseCurrency
      xsd_type: UnsignedInteger15pType
      mandatory: conditional
      condition: Mandatory when BaseCurrency != EUR; forbidden when BaseCurrency = EUR
      legal_basis: Art. 24(1) and 3(3)(d)
      format: Non-negative integer in base currency, no decimal places
      validation_rules:
      - Must be present when BaseCurrency is not EUR
      - Must be absent when BaseCurrency is EUR
      - 'INTERNALLY MANAGED AIFs — OWN FUNDS EXCLUSION: Same principle as AUMAmountInEuro. Own funds (Art.9 AIFMD) excluded from AuM. Source: ESMA_QA_2227, 02-07-2024; European Commission; Art.9 AIFMD.'
      dqef_dimension: consistency
    BaseCurrency:
      item: AIFM-Item-35
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMBaseCurrencyDescription/BaseCurrency
      xsd_type: CurrencyCodeType
      mandatory: conditional
      condition: Mandatory when all AIFs managed by the AIFM share one base currency and it differs from EUR
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 3-character ISO 4217 currency code
      validation_rules:
      - Must be a valid ISO 4217 active currency code
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAM-017
        error_message: The currency code does not exist in the reference table of countries
        control: The currency code should exist in the reference table of countries
        field_name: AIFM Base currency
        item_id: '35.0'
        severity: Content error
    FXEURReferenceRateType:
      item: AIFM-Item-36
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMBaseCurrencyDescription/FXEURReferenceRateType
      xsd_type: FXEURReferenceRateTypeType
      mandatory: conditional
      condition: Mandatory when BaseCurrency != EUR; forbidden otherwise
      allowed_values:
        ECB: ECB euro reference rate
        OTH: Other reference rate source
      validation_rules:
      - 'When ''ECB'': FXEUROtherReferenceRateDescription must be absent'
      - 'When ''OTH'': FXEUROtherReferenceRateDescription must be present'
      dqef_dimension: consistency
    FXEURRate:
      item: AIFM-Item-37
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMBaseCurrencyDescription/FXEURRate
      xsd_type: UnsignedDecimal15p4Type
      mandatory: conditional
      condition: Mandatory when BaseCurrency != EUR; forbidden otherwise
      format: Positive decimal with 4 decimal places, e.g. 1.0821
      validation_rules:
      - Must be > 0
      - Must be expressed at the end-of-period reporting date
      - 'Cross-check: AUMAmountInEuro * FXEURRate ≈ AUMAmountInBaseCurrency (tolerance: 1%)'
      dqef_dimension: accuracy
    FXEUROtherReferenceRateDescription:
      item: AIFM-Item-38
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMBaseCurrencyDescription/FXEUROtherReferenceRateDescription
      xsd_type: StringRestricted30Type
      mandatory: conditional
      condition: Mandatory when FXEURReferenceRateType = 'OTH'; forbidden otherwise
      format: Free text, max 30 characters
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAM-020
        error_message: The reference rate description is not consistent with the reference rate type.
        control: The field is mandatory for Base currency / EUR FX reference rate type equal to "OTH" and forbidden otherwise
        field_name: Base currency / EUR FX reference rate description for no ECB rates
        item_id: '38.0'
        severity: Content error
    OldAIFMIdentifierNCA:
      item: AIFM-Item-24-25
      xml_path: AIFMRecordInfo/AIFMCompleteDescription/AIFMIdentifier/OldAIFMIdentifierNCA
      mandatory: conditional
      condition: Mandatory when AIFMNationalCode changes; forbidden otherwise
      legal_basis: Art. 24(1) and 3(3)(d)
      description: Former national identification code when the AIFM national code changes.
      sub_fields:
        ReportingMemberState:
          item: AIFM-Item-24
          xsd_type: CountryCodeType
          mandatory: conditional
          condition: Mandatory when OldAIFMNationalCode is present
          validation_rules:
          - Must be a valid ISO 3166-1 alpha-2 country code
        AIFMNationalCode:
          item: AIFM-Item-25
          xsd_type: AIFMNationalCodeType
          mandatory: conditional
          condition: Mandatory when ReportingMemberState of OldAIFMIdentifierNCA is present
          validation_rules:
          - Must not be empty when parent ReportingMemberState is filled
      esma_error_codes:
      - code: CAM-008
        error_message: The country code does not exist in the reference table of countries
        control: The country code should exist in the reference table of countries
        field_name: Old AIFM national identifier - Reporting Member State
        item_id: '24.0'
        severity: Content error
      - code: CAM-009
        error_message: The field is mandatory when the  old AIFM national identifier - Reporting Member State is filled in.
        control: The field is mandatory when the  old AIFM national identifier - Reporting Member State is filled in.
        field_name: Old AIFM national identifier - National code
        item_id: '25.0'
        severity: Content error
aif_report:
  description: 'AIF-level Annex IV report. Contains one or more AIFRecordInfo elements. Submitted alongside the AIFM report; cross-referenced via AIFMNationalCode.

    '
  envelope:
    ReportingMemberState:
      item: AIF-Item-1
      xml_path: AIFReportingInfo/@ReportingMemberState
      xsd_type: CountryCodeType
      mandatory: true
      format: 2-character ISO 3166-1 alpha-2
      validation_rules:
      - Must match the ReportingMemberState in the corresponding AIFM report
    Version:
      item: AIF-Item-2
      xml_path: AIFReportingInfo/@Version
      xsd_type: VersionType
      mandatory: true
      validation_rules:
      - Must match pattern [0-9]+\.[0-9]+
      - Must be '1.2' for current schema
    CreationDateAndTime:
      item: AIF-Item-3
      xml_path: AIFReportingInfo/@CreationDateAndTime
      xsd_type: xs:dateTime
      mandatory: true
      format: ISO 8601 UTC
      validation_rules:
      - Must be a valid xs:dateTime
      - Should be the same or later than the AIFM report CreationDateAndTime
  record_header:
    FilingType:
      item: AIF-Item-4
      xml_path: AIFRecordInfo/FilingType
      xsd_type: FilingTypeType
      mandatory: true
      allowed_values:
      - INIT
      - AMND
      validation_rules:
      - AMND requires that an INIT record exists for the same AIFNationalCode and period
      - Must match FilingType of corresponding AIFMRecordInfo
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAF-005
        error_message: Data have been reported twice for the same reporting period.
        control: "For one specific calendar year and AIF, it is not possible to have reporting overlap.\nIt is not possible to be reported with:\n   - H1 and Q1\n   - H1 and Q2\n   - H2 and Q3\n   - H2 and Q4\n   - Y1 and Q1\n   - Y1 and Q2\n   - Y1 and Q3\n   - Y1 and Q4\n   - Y1 and H1\n   - Y1 and H2"
        field_name: Reporting period type
        item_id: '8'
        severity: Warning
    AIFContentType:
      item: AIF-Item-5
      xml_path: AIFRecordInfo/AIFContentType
      xsd_type: AIFContentTypeType
      mandatory: true
      allowed_values:
        '1': Art. 24(1) reporting obligation
        '2': Art. 24(1) + 24(2) reporting obligation
        '3': Art. 3(3)(d) reporting obligation
        '4': Art. 24(1) + 24(2) + 24(4) reporting obligation
        '5': Art. 24(1) + 24(4) reporting obligation
      validation_rules:
      - Must be consistent with AIFReportingCode and fund characteristics
      - Content type 2 or 4 (includes Art. 24(2)) required for leveraged AIFs above thresholds
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-002
        error_message: The reported AIF information does not correspond to the AIF content type.
        control: 'For AIF content type equal to "4" or "5" (24(4) contents), validate that the AIFLeverageArticle24.4 block is reported.

          When the AIF no reporting flag is false, validate that the AIFPrincipalInfo block is reported.

          When the AIF no reporting flag is false and AIF content type equal to "2", "4" or "5" (24(2) contents), validate that the AIFIndividualInfo block is reported.'
        field_name: AIF content type
        item_id: '5'
        severity: Warning
    ReportingPeriodStartDate:
      item: AIF-Item-6
      xml_path: AIFRecordInfo/ReportingPeriodStartDate
      xsd_type: xs:date
      mandatory: true
      format: yyyy-mm-dd — first calendar day of January, April, July or October
      validation_rules:
      - Must match ReportingPeriodStartDate of the corresponding AIFMRecordInfo
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-003
        error_message: The reporting period start date is not allowed.
        control: 'For quarterly reporting (Q1, Q2, Q3, Q4)

          Validate that the reporting start date is the beginning of a quarter.

          Allowed values are YYYY-10-01, YYYY-07-01, YYYY-04-01, YYYY-01-01

          For half-yearly reporting (H1, H2)

          Validate that the reporting start date is the beginning of a half-yearly period (H1, H2)

          Allowed values are YYYY-07-01, YYYY-01-01

          For yearly reporting (Y1)

          Validate that the reporting start date is the beginning of the calendar year (Y1)

          Allowed value is YYYY-01-01


          Validate that the reporting period start date has the same year that the reporting year.'
        field_name: Reporting period start date
        item_id: '6'
        severity: Content error
    ReportingPeriodEndDate:
      item: AIF-Item-7
      xml_path: AIFRecordInfo/ReportingPeriodEndDate
      xsd_type: xs:date
      mandatory: true
      format: yyyy-mm-dd — last calendar day of March, June, September or December
      validation_rules:
      - Must match ReportingPeriodEndDate of the corresponding AIFMRecordInfo
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-004
        error_message: The reporting period end date is not allowed
        control: 'Validate that the reporting end date is less or equal to the end of the last reporting period according to the reporting year and reporting period type.

          For quarterly reporting (Q1, Q2, Q3, Q4) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-03-31 for Q1, YYYY-06-30 for Q2, YYYY-09-30 for Q3, YYYY-12-31 for Q4.

          For half-yearly reporting (H1, H2) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-06-30 for H1,  YYYY-12-31 for H2.

          For yearly reporting (Y1) and reporting year YYYY:

          Validate that the reporting end date is less or equal to YYYY-12-31 for Y1.


          Validate that the reporting end date is greater than the reporting start date and has the same year.'
        field_name: Reporting period end date
        item_id: '7'
        severity: Content error
    ReportingPeriodType:
      item: AIF-Item-8
      xml_path: AIFRecordInfo/ReportingPeriodType
      xsd_type: ReportingPeriodTypeType
      mandatory: true
      allowed_values:
      - Q1
      - Q2
      - Q3
      - Q4
      - H1
      - H2
      - Y1
      - X1
      - X2
      validation_rules:
      - Must match ReportingPeriodType of the corresponding AIFMRecordInfo
      dqef_dimension: consistency
    ReportingPeriodYear:
      item: AIF-Item-9
      xml_path: AIFRecordInfo/ReportingPeriodYear
      xsd_type: xs:gYear
      mandatory: true
      validation_rules:
      - Must match ReportingPeriodYear of the corresponding AIFMRecordInfo
      dqef_dimension: consistency
    LastReportingFlag:
      item: AIF-Item-13
      xml_path: AIFRecordInfo/LastReportingFlag
      xsd_type: BooleanType
      mandatory: true
      validation_rules:
      - Set to 'true' only when AIF has been liquidated, merged or wound up during the period
      - 'If ''true'': no subsequent AIFRecordInfo with the same AIFNationalCode should appear'
      dqef_dimension: consistency
    AIFReportingObligationChangeQuarter:
      item: AIF-Item-12
      xml_path: AIFRecordInfo/AIFReportingObligationChangeQuarter
      xsd_type: ReportingObligationChangeQuarterType
      mandatory: conditional
      condition: Mandatory when AIFReportingObligationChangeFrequencyCode or AIFReportingObligationChangeContentsCode is present; forbidden otherwise
      allowed_values:
      - Q1
      - Q2
      - Q3
      - Q4
      legal_basis: Art. 24(1) and 3(3)(d)
      dqef_dimension: consistency
      validation_rules:
      - Must be one of Q1, Q2, Q3, Q4
      - Mandatory when AIFReportingObligationChangeFrequencyCode or AIFReportingObligationChangeContentsCode is present
      - Forbidden otherwise
      esma_error_codes:
      - code: CAF-006
        error_message: The quarter for the AIF reporting obligation change should be reported
        control: The field is mandatory for <AIFReportingObligationChangeFrequencyCode> or <AIFReportingObligationChangeContentsCode> filled in
        field_name: Change in AIF reporting obligation Quarter
        item_id: '12'
        severity: Content error
    AIFReportingObligationChangeFrequencyCode:
      item: AIF-Item-10
      xml_path: AIFRecordInfo/AIFReportingObligationChangeFrequencyCode
      xsd_type: ReportingObligationChangeFrequencyCodeType
      mandatory: 'no'
      condition: Optional; present when the AIF reporting obligation frequency changes
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 10
      format: Change frequency code (e.g. YH, YQ, HY, HQ, QY, QH, NQ, NH, NY)
      dqef_dimension: consistency
      validation_rules:
      - Must be a valid code from the frequency change code table (Table 10 Annex II)
      esma_error_codes: []
    AIFReportingObligationChangeContentsCode:
      item: AIF-Item-11
      xml_path: AIFRecordInfo/AIFReportingObligationChangeContentsCode
      xsd_type: AIFReportingObligationChangeContentsCodeType
      mandatory: 'no'
      condition: Optional; present when the AIF reporting obligation contents change
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 9
      format: Integer code 1-25 per AIF contents change table
      dqef_dimension: consistency
      allowed_values:
        '1': 24(1)+(2)+(4) → 24(1)+(2)
        '2': 24(1)+(2)+(4) → 24(1)
        '3': 24(1)+(2)+(4) → 3(3d)
        '4': 24(1)+(2)+(4) → 24(1)+(4)
        '5': 24(1)+(2) → 24(1)+(2)+(4)
        '6': 24(1)+(2) → 24(1)
        '7': 24(1)+(2) → 3(3d)
        '8': 24(1)+(2) → 24(1)+(4)
        '9': 24(1) → 24(1)+(2)+(4)
        '10': 24(1) → 24(1)+(2)
        '11': 24(1) → 3(3d)
        '12': 24(1) → 24(1)+(4)
        '13': 3(3d) → 24(1)+(2)+(4)
        '14': 3(3d) → 24(1)+(2)
        '15': 3(3d) → 24(1)
        '16': 3(3d) → 24(1)+(4)
        '17': 24(1)+(4) → 24(1)+(2)+(4)
        '18': 24(1)+(4) → 24(1)+(2)
        '19': 24(1)+(4) → 24(1)
        '20': 24(1)+(4) → 3(3d)
        '21': New AIF with 24(1)+(2)+(4)
        '22': New AIF with 24(1)+(2)
        '23': New AIF with 24(1)
        '24': New AIF with 3(3d)
        '25': New AIF with 24(1)+(4)
      validation_rules:
      - Must be a valid code 1-25
      esma_error_codes: []
    QuestionNumber:
      item: AIF-Item-14
      xml_path: AIFRecordInfo/AssumptionList/QuestionNumber
      xsd_type: UnsignedInteger3pType
      mandatory: conditional
      condition: Mandatory when AssumptionDescription is filled in; forbidden otherwise
      format: Integer 1-999
      dqef_dimension: completeness
      validation_rules:
      - Must refer to a valid AIF template question number
      - Mandatory when AssumptionDescription is present
      esma_error_codes: []
    AssumptionDescription:
      item: AIF-Item-15
      xml_path: AIFRecordInfo/AssumptionList/AssumptionDescription
      xsd_type: StringRestricted300Type
      mandatory: conditional
      condition: Mandatory when QuestionNumber is filled in; forbidden otherwise
      format: Free text, max 300 characters
      dqef_dimension: completeness
      validation_rules:
      - Must be present when QuestionNumber is filled in
      esma_error_codes: []
  identification:
    AIFMNationalCode:
      item: AIF-Item-16
      xml_path: AIFRecordInfo/AIFMNationalCode
      xsd_type: AIFMNationalCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      validation_rules:
      - Must correspond to an existing AIFMNationalCode in the associated AIFM report
      - 'Foreign key relationship: AIFRecordInfo → AIFMRecordInfo'
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-007
        error_message: The AIFM national code does not exist in the AIFM reference table.
        control: The AIFM national code exists in the ESMA register for the reporting Member State
        field_name: AIFM National Code
        item_id: '16'
        severity: Content error
    AIFNationalCode:
      item: AIF-Item-17
      xml_path: AIFRecordInfo/AIFNationalCode
      xsd_type: AIFNationalCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: Alphanumeric, NCA-assigned unique identifier
      validation_rules:
      - Must be unique per AIFM per reporting period
      - Primary key together with AIFMNationalCode, ReportingPeriodType, ReportingPeriodYear
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAF-008
        error_message: The AIF national code does not exist in the AIF reference table.
        control: The reporting period end date is not allowed
        field_name: AIF national code
        item_id: '17'
        severity: Content error
    AIFName:
      item: AIF-Item-18
      xml_path: AIFRecordInfo/AIFName
      xsd_type: StringRestricted300Type
      mandatory: true
      format: 'Free text, max 300 characters. For umbrella funds: report umbrella + sub-fund name.'
      validation_rules:
      - Must not be empty
      - Should match the legal name on the LEI registration when LEI is provided
      dqef_dimension: completeness
    AIFEEAFlag:
      item: AIF-Item-19
      xml_path: AIFRecordInfo/AIFEEAFlag
      xsd_type: BooleanType
      mandatory: true
      validation_rules:
      - '''true'' for AIFs domiciled in EEA member states'
      - '''false'' for non-EEA AIFs'
      - Must be consistent with AIFDomicile (EEA country code → true)
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-009
        error_message: The EEA flag is not correct.
        control: The AIF domicile should belong to the EEA or EU area when the AIF EEA flag is true.
        field_name: AIF EEA Flag
        item_id: '19'
        severity: Content error
    AIFReportingCode:
      item: AIF-Item-20
      xml_path: AIFRecordInfo/AIFReportingCode
      xsd_type: AIFReportingCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d); Annex II Table 9
      allowed_values:
        '1': AIF of a Registered AIFM
        '2': Leveraged EU AIF (opt-in AIFM)
        '3': Leveraged non-EU AIF marketed in the Union (opt-in AIFM)
        '4': Leveraged non-EU AIF not marketed in the Union (opt-in AIFM)
        '5': Unleveraged EU AIF (opt-in AIFM)
        '6': Unleveraged non-EU AIF marketed in the Union (opt-in AIFM)
        '7': Unleveraged non-EU AIF not marketed in the Union (opt-in AIFM)
        '8': Unleveraged EU AIF (AIFM with unleveraged/non-listed/control only)
        '9': Unleveraged non-EU AIF marketed in the Union (AIFM with unleveraged/non-listed/control only)
        '10': Unleveraged non-EU AIF not marketed in the Union (AIFM with unleveraged/non-listed/control only)
        '11': Under 500M Leveraged EU AIF (AIFM with half-yearly obligation)
        '12': Under 500M Leveraged non-EU AIF marketed in the Union (AIFM with half-yearly obligation)
        '13': Under 500M Leveraged non-EU AIF not marketed in the Union (AIFM with half-yearly obligation)
        '14': Under 500M Unleveraged EU AIF (AIFM with half-yearly obligation)
        '15': Under 500M Unleveraged non-EU AIF marketed in the Union (AIFM with half-yearly obligation)
        '16': Under 500M Unleveraged non-EU AIF not marketed in the Union (AIFM with half-yearly obligation)
        '17': Unleveraged EU AIF, non-listed/control (AIFM with half-yearly obligation)
        '18': Unleveraged non-EU AIF marketed, non-listed/control (AIFM with half-yearly obligation)
        '19': Unleveraged non-EU AIF not marketed, non-listed/control (AIFM with half-yearly obligation)
        '20': Over 500M Leveraged EU AIF (AIFM with half-yearly obligation)
        '21': Over 500M Leveraged non-EU AIF marketed (AIFM with half-yearly obligation)
        '22': Over 500M Leveraged non-EU AIF not marketed (AIFM with half-yearly obligation)
        '23': Over 500M Unleveraged EU AIF (AIFM with half-yearly obligation)
        '24': Over 500M Unleveraged non-EU AIF marketed (AIFM with half-yearly obligation)
        '25': Over 500M Unleveraged non-EU AIF not marketed (AIFM with half-yearly obligation)
        '26': Leveraged EU AIF (AIFM with quarterly obligation)
        '27': Leveraged non-EU AIF marketed (AIFM with quarterly obligation)
        '28': Leveraged non-EU AIF not marketed (AIFM with quarterly obligation)
        '29': Unleveraged EU AIF (AIFM with quarterly obligation)
        '30': Leveraged non-EU AIF marketed in the Union (AIFM with quarterly obligation)
        '31': Leveraged non-EU AIF not marketed in the Union (AIFM with quarterly obligation)
        '32': Unleveraged EU AIF (AIFM with quarterly obligation)
        '33': Unleveraged non-EU AIF marketed in the Union (AIFM with quarterly obligation)
        '34': Unleveraged non-EU AIF not marketed in the Union (AIFM with quarterly obligation)
        '35': Leveraged AIF marketed in the Union (non-EU AIFM under PPR with annual obligation)
        '36': Unleveraged AIF marketed in the Union (non-EU AIFM under PPR with annual obligation)
        '37': Unleveraged AIF marketed (non-EU AIFM under PPR with unleveraged/non-listed/control only)
        '38': Under 500M Leveraged AIF marketed (non-EU AIFM under PPR with half-yearly obligation)
        '39': Under 500M Unleveraged AIF marketed (non-EU AIFM under PPR with half-yearly obligation)
        '40': Unleveraged AIF (non-listed/control) marketed (non-EU AIFM under PPR with half-yearly obligation)
        '41': Over 500M Leveraged AIF marketed (non-EU AIFM under PPR with half-yearly obligation)
        '42': Over 500M Unleveraged AIF marketed (non-EU AIFM under PPR with half-yearly obligation)
        '43': Unleveraged AIF (non-listed/control) marketed (non-EU AIFM under PPR with quarterly obligation)
        '44': Leveraged AIF marketed (non-EU AIFM under PPR with quarterly obligation)
        '45': Unleveraged AIF marketed (non-EU AIFM under PPR with quarterly obligation)
      validation_rules:
      - Must be consistent with AIFMReportingCode of the parent AIFM
      - EEA/non-EEA designation in code must match AIFEEAFlag
      - Leveraged/unleveraged designation must be consistent with leverage data in AIFLeverageInfo
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-201
        error_message: Check the AIF national code and the authorised entities notifications sent to ESMA and resend the file.
        control: The AIFM identifier (home member state and AIFM national code) for which its AIF reporting code is comprised between 2 and 34 (included) should exist in the ESMA register as a head office type.
        field_name: AIF reporting code
        item_id: '20'
        severity: Content error
      - code: CAF-202
        error_message: Check the AIF national code and the authorised entities notifications sent to ESMA and resend the file.
        control: The AIF national code should exist in the ESMA register (current historic versions) when AIF reporting code is comprised between 2 and 34 (included).
        field_name: AIF reporting code
        item_id: '20'
        severity: Content error
      - code: CAF-205
        error_message: The reporting code of the AIFMs and AIFs should be consistent
        control: "An error is generated when the AIF reporting code is not consistent with the AIFM reporting code:\n   - WHEN NOT(AIFReportingCode=1 AND AIFMReportingCode=1)\n   - OR NOT (2=<AIFReportingCode=<34 AND 2=<AIFMReportingCode<=5)\n   - OR NOT (AIFReportingCode>=35 AND 6<=AIFMReportingCode<=9)"
        field_name: AIF reporting code
        item_id: '20'
        severity: Content error
    AIFDomicile:
      item: AIF-Item-21
      xml_path: AIFRecordInfo/AIFDomicile
      xsd_type: CountryCodeType
      mandatory: true
      legal_basis: Art. 24(1) and 3(3)(d)
      format: 2-character ISO 3166-1 alpha-2
      validation_rules:
      - Must be a valid ISO 3166-1 alpha-2 country code
      - Must be consistent with AIFEEAFlag
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-010
        error_message: The domicile of the AIF is not correct.
        control: The country code exists in the reference table of countries
        field_name: Domicile of the AIF
        item_id: '21'
        severity: Content error
      - code: CAF-203
        error_message: The domicile of the AIF is not correct based on the register of authorised entities
        control: The country code exists in the reference table of countries
        field_name: Domicile of the AIF
        item_id: '20'
        severity: Content error
    InceptionDate:
      item: AIF-Item-22
      xml_path: AIFRecordInfo/InceptionDate
      xsd_type: xs:date
      mandatory: 'yes'
      condition: Mandatory for all AIF records. For new AIFs first reported mid-period, the inception date reflects the actual fund launch date; the reporting period may be an incomplete quarter (per Rev5 Q&A clarification).
      format: yyyy-mm-dd
      validation_rules:
      - Must be <= ReportingPeriodEndDate
      - Should be consistent with NCA authorisation date
      - 'INCEPTION DATE DEFINITION: (a) AIF subject to pre-authorisation: inception date = date of authorisation. (b) AIF established without pre-authorisation: inception date = date of establishment. (c) AIF subject to post-establishment registration obligation: inception date = date of constitution. Source: ESMA Q&A AIFMD Sect.III Q12, 25 March 2014.'
      dqef_dimension: completeness
      esma_error_codes:
      - code: CAF-011
        error_message: The inception date is not allowed as it should be before the reporting start date
        control: The inception date should be before the reporting period start date.
        field_name: Inception Date
        item_id: '22'
        severity: Warning
    AIFNoReportingFlag:
      item: AIF-Item-23
      xml_path: AIFRecordInfo/AIFNoReportingFlag
      xsd_type: BooleanType
      mandatory: true
      validation_rules:
      - '''true'' when AIF has no activity to report in the period'
      - 'When ''true'': AIFCompleteDescription must be absent'
      - 'When ''false'': AIFCompleteDescription must be present'
      dqef_dimension: consistency
      esma_error_codes:
      - code: CAF-012
        error_message: The AIF no reporting flag is not consistent with the reported information.
        control: The AIFCompleteDescription block is not filled in when the AIF no reporting flag is true.
        field_name: AIF no reporting flag
        item_id: '23'
        severity: Content error
    LastReportingFlag:
      item: AIF-Item-13
      xml_path: AIFRecordInfo/LastReportingFlag
      xsd_type: BooleanType
      mandatory: 'yes'
      legal_basis: Art. 24(1) and 3(3)(d)
      format: true | false
      dqef_dimension: consistency
      validation_rules:
      - Set to 'true' only when the AIF ceases activity (final report)
      - 'If ''true'': no subsequent AIFRecordInfo with the same AIFNationalCode should appear'
      esma_error_codes: []
    AIFIdentifierCUSIP:
