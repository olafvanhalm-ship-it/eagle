      - code: CAF-090
        error_message: The long position value is not consistent with the currency code.
        control: ''
        field_name: LongPositionValue
        item_id: '129'
        severity: Content Error
      - code: CAF-091
        error_message: The short position value is not consistent with the currency code.
        control: ''
        field_name: ShortPositionValue
        item_id: '130'
        severity: Content Error
    InvestorConcentration:
      item: AIF-Item-118-120
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFPrincipalInfo/InvestorConcentration
      mandatory: 'yes'
      legal_basis: Art. 24(1) and 3(3)(d)
      description: Breakdown of AIF investors by top-5 ownership and professional vs retail.
      dqef_dimension: accuracy
      sub_fields:
        MainBeneficialOwnersRate:
          item: AIF-Item-118
          xsd_type: UnsignedPercentType
          mandatory: 'yes'
          description: Percentage of NAV beneficially owned by the top 5 beneficial owners
          validation_rules:
          - Must not be 0 (CSSF-047 equivalent)
        ProfessionalInvestorConcentrationRate:
          item: AIF-Item-119
          xsd_type: UnsignedPercentType
          mandatory: 'yes'
          description: Percentage of NAV held by professional investors
          validation_rules:
          - Must be >= 0
          - Sum of ProfessionalInvestorConcentrationRate + RetailInvestorConcentrationRate must equal 100%
        RetailInvestorConcentrationRate:
          item: AIF-Item-120
          xsd_type: UnsignedPercentType
