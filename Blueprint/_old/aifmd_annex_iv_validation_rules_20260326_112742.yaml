      xsd_type: UnsignedInteger15pType
      mandatory: 'no'
      legal_basis: Art. 24(2)
      description: Total number of open positions at the reporting date.
      dqef_dimension: accuracy
      validation_rules:
      - Must be a non-negative integer if provided
      - 'ALL CASH ACCOUNTS must be included in the total number of open positions (field 218). Each cash account held by the AIF, regardless of currency or custodian, constitutes one open position for counting purposes. Source: ESMA Q&A AIFMD Sect.III Q43, 30 September 2014.'
      esma_error_codes: []
    SpecialArrangements:
      item: AIF-Item-197-207
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFIndividualInfo/LiquidityProfile/SpecialArrangements
      mandatory: 'no'
      legal_basis: Art. 24(2)
      description: Percentages of NAV subject to special liquidity arrangements (gates, side pockets, etc.).
      dqef_dimension: completeness
      sub_fields:
        SidePocketRate:
          item: AIF-Item-197
          xsd_type: UnsignedPercentType
          mandatory: 'no'
          description: '% of NAV in side pockets'
        GatesRate:
          item: AIF-Item-198
          xsd_type: UnsignedPercentType
          mandatory: 'no'
          description: '% of NAV subject to gates'
        DealingSuspensionRate:
          item: AIF-Item-199
          xsd_type: UnsignedPercentType
          mandatory: 'no'
          description: '% of NAV subject to dealing suspension'
        OtherArrangementType:
          item: AIF-Item-200
          xsd_type: StringRestricted300Type
          mandatory: conditional
          condition: Mandatory when OtherArrangementRate is present; optional otherwise
        OtherArrangementRate:
          item: AIF-Item-201
          xsd_type: UnsignedPercentType
          mandatory: conditional
          condition: Mandatory when OtherArrangementType is present; optional otherwise
        TotalArrangementRate:
          item: AIF-Item-202
          xsd_type: UnsignedPercentType
          mandatory: 'no'
          description: Total % of NAV subject to any special arrangement
        InvestorPreferentialTreatmentFlag:
          item: AIF-Item-203
          xsd_type: BooleanType
          mandatory: 'no'
        DisclosureTermsPreferentialTreatmentFlag:
          item: AIF-Item-204
          xsd_type: BooleanType
          mandatory: 'no'
        LiquidityTermsPreferentialTreatmentFlag:
          item: AIF-Item-205
          xsd_type: BooleanType
          mandatory: 'no'
        FeeTermsPreferentialTreatmentFlag:
          item: AIF-Item-206
          xsd_type: BooleanType
          mandatory: 'no'
        OtherTermsPreferentialTreatmentFlag:
          item: AIF-Item-207
          xsd_type: BooleanType
          mandatory: 'no'
      validation_rules:
      - OtherArrangementType and OtherArrangementRate are mutually dependent (both or neither)
      esma_error_codes: []
      forward_looking_note: 'AIFMD II LMTs (Directive 2024/927, applicable from 16 April 2026): EU AIFMs managing open-ended AIFs must select and implement at least TWO liquidity management tools (LMTs) from Annex V of the Directive. Per ESMA_QA_2736 (18-12-2025) this obligation also applies to non-EU open-ended AIFs managed by EU AIFMs (Art.16(2b) refers to AIFs, not EU AIFs). Current SpecialArrangements fields (gates, side pockets, dealing suspension) partially overlap with LMT categories but new XSD fields are expected when ESMA publishes updated schemas (~April 2027). ACTION: review and extend this block upon ESMA XSD publication. Source: ESMA_QA_2736, 18 December 2025; Directive (EU) 2024/927 Art.16(2b).'
    InvestorGroupBreakdown:
      item: AIF-Item-208-209
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFIndividualInfo/LiquidityProfile/InvestorTypes/InvestorType
      mandatory: 'yes'
      legal_basis: Art. 24(2)
      description: Breakdown of AIF NAV by investor group type. Repeating element with at least one entry. Investor group codes from Table 7 Annex II.
      dqef_dimension: accuracy
      sub_fields:
        InvestorGroupType:
          item: AIF-Item-208
          xsd_type: InvestorGroupTypeType
          mandatory: 'yes'
          allowed_values:
            NFCO: Non-financial corporations
            BANK: Banks
            INSC: Insurance corporations
            OFIN: Other financial institutions
            PFND: Pension plans / funds
            GENG: General government
            OCIU: Other collective investment undertaking (e.g. fund of funds or master)
            HHLD: Households
            UNKN: Unknown
            NONE: None
        InvestorGroupRate:
          item: AIF-Item-209
          xsd_type: UnsignedPercentType
          mandatory: 'yes'
          description: Percentage of NAV attributable to this investor group
      validation_rules:
      - At least one InvestorType entry required
      - InvestorGroupType must be a valid code from Table 7
      - Sum of all InvestorGroupRate values should equal 100%
      esma_error_codes: []
    StressTests:
      item: AIF-Item-279-280
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFIndividualInfo/OperationalAndOtherRiskAspects
      mandatory: 'yes'
      legal_basis: Art. 24(2)
      description: Results of stress tests conducted under AIFMD Articles 15(3)(b) and 16(1).
      dqef_dimension: completeness
      sub_fields:
        StressTestsResultArticle15:
          item: AIF-Item-279
          xsd_type: StressTestsResultType
          mandatory: 'yes'
          description: Result of stress test per Art. 15(3)(b) — portfolio liquidity stress test
          allowed_values:
            PASS: Stress test passed
            FAIL: Stress test failed
            NONE: Stress test not performed
        StressTestsResultArticle16:
          item: AIF-Item-280
          xsd_type: StressTestsResultType
          mandatory: 'yes'
          description: Result of stress test per Art. 16(1) second subparagraph — liquidity risk stress test
          allowed_values:
            PASS: Stress test passed
            FAIL: Stress test failed
            NONE: Stress test not performed
      validation_rules:
      - Both StressTestsResultArticle15 and StressTestsResultArticle16 mandatory
      - 'Must be one of: PASS, FAIL, NONE'
      - "CLOSED-ENDED UNLEVERAGED AIFs: AIFs that are closed-ended AND unleveraged are exempt from liquidity stress tests under Art.16(1) AIFMD. For these AIFs: (a) StressTestsResultArticle16 (field 280) must be set to 'NONE'; (b) the fund's closed-ended unleveraged nature must be documented in the description field or in AssumptionDescription; (c) if the AIFM voluntarily conducts liquidity stress tests, report the actual results (PASS/FAIL) instead of NONE. Source: ESMA Q&A AIFMD Sect.III Q83, 4 December 2019; Art.16(1) AIFMD."
      esma_error_codes: []
    RehypothecationData:
      item: AIF-Item-281-282
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFIndividualInfo/OperationalAndOtherRiskAspects
      mandatory: 'yes'
      legal_basis: Art. 24(2)
      description: Rehypothecation flag and percentage of collateral rehypothecated.
      dqef_dimension: accuracy
      sub_fields:
        AllCounterpartyCollateralRehypothecationFlag:
          item: AIF-Item-281
          xsd_type: BooleanType
          mandatory: 'yes'
          description: '''true'' when the AIF rehypothecates collateral received; ''false'' otherwise'
        AllCounterpartyCollateralRehypothecatedRate:
          item: AIF-Item-282
          xsd_type: UnsignedPercentType
          mandatory: conditional
          condition: Optional when rehypothecation flag = true; forbidden when flag = false
          description: 'Percentage of total collateral received that was rehypothecated DURING the reporting period (period-based FLOW measure, NOT a snapshot at period-end). Calculated as: aggregated market value of collateral rehypothecated during the reporting period by ALL counterparties divided by the aggregated market value of all collateral posted by the AIFM to all counterparties. Source: ESMA Q&A AIFMD Sect.III Q33, 21 July 2014.'
      validation_rules:
      - AllCounterpartyCollateralRehypothecatedRate forbidden when RehypothecationFlag = false
      - AllCounterpartyCollateralRehypothecatedRate optional when RehypothecationFlag = true
      - 'AllCounterpartyCollateralRehypothecatedRate is a PERIOD measure (flow), not a point-in-time snapshot. Report the aggregate for the full reporting period. Source: ESMA Q&A AIFMD Sect.III Q33, 21 July 2014.'
      esma_error_codes:
      - code: CAF-139
        error_message: AllCounterpartyCollateralRehypothecatedRate not consistent with RehypothecationFlag.
        control: ''
        field_name: AllCounterpartyCollateralRehypothecatedRate
        item_id: '282'
        severity: Content Error
  leverage_info:
    description: 'Leverage data required under Article 24(2) for leveraged AIFs. Two methods: Gross Method and Commitment Method per Regulation 231/2013 Annex II.

      '
    fields:
      GrossMethodLeverage:
        description: 'Leverage calculated under the Gross Method (Art. 7 Reg. 231/2013) Expressed as a PERCENTAGE (e.g. 150.00 for 1.5x leverage, 100.00 for unlevered). Do NOT report as a ratio (e.g. 1.5 is INCORRECT; correct value is 150.00). Minimum value for any invested fund is 100.00. Source: ESMA Q&A AIFMD Sect.III Q75, 2 December 2015.'
        xsd_type: UnsignedDecimal15p4Type
        mandatory: conditional
        condition: Mandatory for leveraged AIFs (AIFContentType 2, 4, or 5)
        validation_rules:
        - 'Expressed as a PERCENTAGE: minimum value 100.00 for any leveraged or invested fund. 100.00 = fully invested without leverage; 200.00 = 2x leverage. Source: ESMA Q&A AIFMD Sect.III Q75, 2 December 2015.'
        - Gross Method leverage >= Commitment Method leverage (generally)
        dqef_dimension: accuracy
        dqef_checks:
        - 'DQEF Accuracy: outlier detection — flag if leverage exceeds defined threshold multiplier'
        - 'DQEF Consistency: flag if leverage code = ''leveraged'' but reported leverage < 1.0'
      CommitmentMethodLeverage:
        description: 'Leverage calculated under the Commitment Method (Art. 8 Reg. 231/2013) Expressed as a PERCENTAGE (e.g. 150.00 for 1.5x leverage, 100.00 for unlevered). Do NOT report as a ratio (e.g. 1.5 is INCORRECT; correct value is 150.00). Minimum value for any invested fund is 100.00. Source: ESMA Q&A AIFMD Sect.III Q75, 2 December 2015.'
        xsd_type: UnsignedDecimal15p4Type
        mandatory: conditional
        condition: Mandatory for leveraged AIFs (AIFContentType 2, 4, or 5)
        validation_rules:
        - 'Expressed as a PERCENTAGE: minimum value 100.00 for any leveraged or invested fund. 100.00 = fully invested without leverage; 200.00 = 2x leverage. Source: ESMA Q&A AIFMD Sect.III Q75, 2 December 2015.'
        - Must be <= GrossMethodLeverage (in general)
        - 'SUBSTANTIAL LEVERAGE THRESHOLD (fields 296-301): Fields 296-301 must ONLY be answered by AIFMs managing AIFs where the average daily commitment-method exposure exceeds THREE TIMES (3x) the average daily NAV over the reporting period (Art. 111 Reg. 231/2013). This corresponds to CommitmentMethodLeverage > 300.00 on average. When exposure is calculated less frequently than daily: substantive leverage applies if AT LEAST ONCE during the reporting period the commitment method exposure exceeds 3x NAV. Source: ESMA Q&A AIFMD Sect.III Q18, 25 March 2014; Q31, 21 July 2014; Art.111 Reg.231/2013.'
        dqef_dimension: accuracy
        dqef_checks:
        - 'DQEF Accuracy: outlier detection — flag if leverage exceeds defined threshold'
cross_record_rules:
- id: XR-001
  name: AIFM-AIF National Code linkage
  description: 'Every AIFRecordInfo.AIFMNationalCode must match exactly one AIFMRecordInfo.AIFMNationalCode within the same ReportingMemberState, ReportingPeriodType, and ReportingPeriodYear.

    '
  dqef_dimension: consistency
  severity: error
- id: XR-002
  name: Reporting period alignment
  description: 'ReportingPeriodStartDate, ReportingPeriodEndDate, ReportingPeriodType, and ReportingPeriodYear must be identical across all AIFMRecordInfo and all linked AIFRecordInfo records in a single submission batch.

    '
  dqef_dimension: consistency
  severity: error
- id: XR-003
  name: AIFM AuM vs sum of AIF AuM
  description: 'AIFM AUMAmountInEuro should be approximately equal to the sum of AUMAmountInBaseCurrency (converted to EUR) across all linked AIFRecordInfo records for the same period. Tolerance: see DQEF Technical Document threshold.

    '
  dqef_dimension: accuracy
  severity: warning
  dqef_checks:
  - 'DQEF Accuracy test: AIFM AuM vs sum-of-AIF AuM outlier detection'
- id: XR-004
  name: No duplicate AIF records per period
  description: 'For a given combination of (AIFNationalCode, AIFMNationalCode, ReportingPeriodType, ReportingPeriodYear), only one INIT record and at most one AMND record should exist.

    '
  dqef_dimension: consistency
  severity: error
- id: XR-005
  name: LastReportingFlag continuity
  description: 'If an AIFMRecordInfo or AIFRecordInfo has LastReportingFlag = true, no further records with the same national code should appear in any subsequent reporting period.

    '
  dqef_dimension: consistency
  severity: warning
- id: XR-006
  name: Feeder AIF master linkage
  description: 'When AIFMasterFeederStatus = ''FEED'', the MasterAIFsIdentification must reference at least one master AIF. If the master AIF is also reported to the same NCA, the referenced AIFNationalCode must exist.

    '
  dqef_dimension: consistency
  severity: warning
- id: XR-007
  name: Non-EU AIFM Art.42 — reporting continues while investors present
  description: For non-EU AIFMs marketing AIFs in the Union under Art.42 AIFMD, the reporting obligation to national competent authorities does NOT depend on the actual marketing period. Reporting must continue as long as INVESTORS FROM THAT JURISDICTION remain invested in the AIF, even after active marketing has ceased. The obligation ends only when the AIFM confirms no investors in the NCA jurisdiction are invested.
  legal_basis: Art.42 AIFMD; ESMA Q&A AIFMD Sect.III Q36, 30 September 2014
  dqef_dimension: consistency
  severity: warning
- id: XR-008
  name: Non-EU AIFM multiple Member States — single unified reporting frequency
  description: A non-EU AIFM marketing AIFs in multiple Member States under Art.42 AIFMD must calculate a SINGLE reporting frequency taking into account ALL AIFs marketed in the Union (Art.110 Reg.231/2013) and apply this same frequency to all Member States. AuM figures in AIFM fields 33-34 must reflect ALL AIFs marketed in the Union, not per Member State individually.
  legal_basis: Art.110 Reg.231/2013; ESMA Q&A AIFMD Sect.III Q37, 26 March 2015
  dqef_dimension: consistency
  severity: error
dqef_checks:
  framework_reference: ESMA50-1605533872-8305
  technical_document: ESMA50-1605533872-8344
  execution_frequency: semi-annual (mirroring ESMA cycle)
  dimensions:
    completeness:
      description: 'Checks whether expected data is present, both at record level and for individual key fields within records.

        '
      checks:
      - id: DQ-C-001
        name: LEI completeness — AIFM
        description: 'Flag AIFM records where AIFMIdentifierLEI is absent, and where a matching LEI can be identified via GLEIF name/country lookup based on AIFMName and AIFMJurisdiction.

          '
        source: DQEF Table 1 — Completeness example 2
        action: 'Eagle: trigger enrichment workflow to retrieve LEI from GLEIF API before submission; flag to client for confirmation.

          '
      - id: DQ-C-002
        name: LEI completeness — AIF
        description: 'Flag AIF records where AIFIdentifierLEI is absent, and where a matching LEI can be found in GLEIF.

          '
        source: DQEF Table 1 — Completeness example 2
        action: 'Eagle: same enrichment workflow as DQ-C-001 applied to AIF records.

          '
      - id: DQ-C-003
        name: Expected records for period
        description: 'Verify that each AIFM/AIF that reported in the prior period has also submitted a record for the current period (unless LastReportingFlag = true or an explicit no-reporting flag is set).

          '
        source: DQEF Table 1 — Completeness example 1
        action: 'Eagle: check register against submitted batch; alert on gaps.'
    consistency:
      description: 'Checks for internal consistency within and across records. Inconsistencies generally indicate accuracy problems caught through cross-field validation.

        '
      checks:
      - id: DQ-S-001
        name: LEI consistency — AIFM vs register
        description: 'The AIFMIdentifierLEI reported must match the LEI held in the NCA/ESMA register for the corresponding AIFMNationalCode.

          '
        source: DQEF Table 1 — Consistency example 1
        action: 'Eagle: cross-check against NCA register before submission.'
      - id: DQ-S-002
        name: LEI consistency — AIF vs register
        description: 'The AIFIdentifierLEI reported must match the LEI in the ESMA AIFMD register for the corresponding AIFNationalCode.

          '
        source: DQEF Table 1 — Consistency example 1
      - id: DQ-S-003
        name: Fund type vs liquidity consistency
        description: 'PredominantAIFType and reported liquidity profile (redemption terms, portfolio liquidity) should be internally consistent (e.g. a money market fund claiming fully illiquid portfolio warrants review).

          '
        source: DQEF Table 1 — Consistency example 2
      - id: DQ-S-004
        name: Leveraged classification vs leverage ratio
        description: 'AIFReportingCode classification (leveraged/unleveraged) must be consistent with reported GrossMethodLeverage and CommitmentMethodLeverage values.

          '
    accuracy:
      description: 'Outlier detection and plausibility checks for key financial figures. DQEF uses statistical methods; Eagle mirrors these checks with configurable thresholds.

        '
      checks:
      - id: DQ-A-001
        name: AuM outlier detection — AIFM
        description: 'Flag AIFM-level AUMAmountInEuro values that deviate significantly from the prior reporting period without a documented structural reason (new fund, liquidation, large redemption).

          '
        source: DQEF Table 1 — Accuracy example 1
        threshold: Configurable; initial threshold per DQEF Technical Document
        action: 'Eagle: alert client; request confirmation or restatement.'
      - id: DQ-A-002
        name: NAV plausibility — AIF
        description: 'Flag AIF records where AIFNetAssetValue is zero, negative, or deviates significantly from the prior period without explanation.

          '
        source: DQEF Table 1 — Accuracy example 2
        threshold: Configurable; initial threshold per DQEF Technical Document
      - id: DQ-A-003
        name: AuM vs sum of instruments
        description: 'Sum of MainInstrumentsTraded PositionValues should not exceed AUMAmountInBaseCurrency by more than a defined factor.

          '
        source: DQEF Table 1 — Accuracy example 1
      - id: DQ-A-004
        name: Leverage outlier detection
        description: 'GrossMethodLeverage and CommitmentMethodLeverage values are checked for statistical outliers against the fund type and the prior period.

          '
        source: DQEF Section 3.3 — risk-based approach
      - id: DQ-A-005
        name: NAV geographical focus sum
        description: 'The sum of all 8 NAVGeographicalFocus percentages must equal 100%. Tolerance: ±0.01 percentage point.

          '
    timeliness:
      description: 'Checks relating to the lag between the end of the reporting period and the effective submission of data to the NCA / ESMA.

        '
      deadline_rules:
        aifm_to_nca:
          description: 'AIFMD submission deadline: 1 month after end of reporting period'
          exception: 'Funds of funds: additional 15 days'
          source: AIFMD Art. 24(1)
        nca_to_esma:
          description: No explicit AIFMD deadline; DQEF cycle starts 45 days after quarter end
          source: DQEF Section 3.4
        dqef_feedback_window:
          description: NCAs have 12 weeks to respond to ESMA with false positives or remediation actions
          source: DQEF Section 3.4
      checks:
      - id: DQ-T-001
        name: Submission lag — AIFM to NCA
        description: 'Calculate the number of days between ReportingPeriodEndDate and the CreationDateAndTime of the submission. Flag if lag exceeds 30 days (or 45 days for funds of funds).

          '
        source: DQEF Table 1 — Timeliness example 1
        action: 'Eagle: track submission timestamps; alert when approaching deadline.'
      - id: DQ-T-002
        name: Amendment timeliness
        description: 'AMND records should be submitted as soon as errors are identified. Flag AMND records submitted more than 90 days after the original INIT to indicate systemic quality issues.

          '
cancellation_rules:
  aifm_cancellation:
    element: CancellationAIFMRecordInfo
    required_fields:
    - CancelledAIFMNationalCode
    - CancelledReportingPeriodType
    - CancelledReportingPeriodYear
    - CancelledRecordFlag
    validation_rules:
    - CancelledRecordFlag must be 'C'
    - CancelledAIFMNationalCode must match an existing AIFM record
    - CancelledReportingPeriodType and CancelledReportingPeriodYear must identify an existing record
    - Cannot cancel a record that has already been cancelled
  aif_cancellation:
    element: CancellationAIFRecordInfo
    required_fields:
    - CancelledAIFMNationalCode
    - CancelledAIFNationalCode
    - CancelledReportingPeriodType
    - CancelledReportingPeriodYear
    - CancelledRecordFlag
    validation_rules:
    - CancelledRecordFlag must be 'C'
    - CancelledAIFNationalCode + CancelledAIFMNationalCode must identify an existing AIF record
    - Cannot cancel a record that has already been cancelled
implementation_notes:
  eagle_layer_mapping:
    deterministic_core:
      description: 'All validation_rules listed in individual fields must be implemented in the deterministic core layer. These checks are rule-based, binary (pass/fail), and must run before any submission is sent to the NCA. Per Project Eagle Principle 5 (Deterministic core, probabilistic edge).

        '
      examples:
      - Format checks (LEI pattern, ISO codes)
      - Mandatory field presence
      - Enumeration value checks
      - Cross-field conditional logic
      - Period consistency checks
      - Sum validation (NAV geography = 100%)
    dqef_quality_layer:
      description: 'All dqef_checks are implemented in the quality assurance layer. These checks are statistical / probabilistic and run post-validation, flagging potential issues for human review before submission. Per Project Eagle Principle 8 (Compliance-proof by design).

        '
      examples:
      - AuM outlier detection
      - NAV plausibility
      - LEI completeness enrichment
      - Submission lag monitoring
    human_escalation_triggers:
      description: 'The following conditions must always escalate to a human reviewer before submission proceeds (per Principle 2: Code-first, human-by-exception).

        '
      triggers:
      - LastReportingFlag = true (fund termination)
      - Any DQ-A-* (accuracy) check flagging an outlier
      - Any cross-record rule XR-* with severity = error
      - AMND filing with material changes to AuM or NAV (> 10% change)
      - First-time submission of a new AIFM or AIF
  single_source_of_truth:
    description: 'All field values, code lists, and reference data used in validation must be sourced from the canonical data model (Project Eagle Principle 4).

      '
    reference_data_sources:
      lei_database: GLEIF API — https://gleif.org
      currency_codes: ISO 4217 maintained list
      country_codes: ISO 3166-1 maintained list
      mic_codes: ISO 10383 maintained list (SWIFT)
      aifm_register: NCA register (per ReportingMemberState)
      sub_asset_types: ESMA AIFMD Annex II Table 1 (embedded in code list)
  versioning:
    description: 'This YAML rule set is versioned independently of the XSD schema. When ESMA updates the DQEF Technical Document annually, the dqef_checks section must be reviewed and updated. Rule set version and XSD version are tracked separately.

      '
    update_trigger: ESMA DQEF annual technical document revision
    owner: Head of Compliance & Risk
