    InvestorConcentration:
      item: AIF-Item-118-120
      xml_path: AIFRecordInfo/AIFCompleteDescription/AIFIndividualInfo/MostImportantConcentration/InvestorConcentration
      mandatory: conditional
      condition: Mandatory when AIFContentType includes Art. 24(2)
