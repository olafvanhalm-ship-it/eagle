# =============================================================================
# Project Eagle — Requirements Overview
# Version:  1.0 (Baseline) | Date: 2026-03-23 | Owner: CTO / CPO
# Status:   Baselined v1.0
#
# Purpose:  Master reference. Contains:
#   - Metadata, principles, indexes, frameworks          (section 1)
#   - Platform/product taxonomy & document split guide   (section 2)
#   - Module index                                       (section 3)
#   - Pipeline architecture                              (section 4)
#   - Cross-cutting requirement DEFINITIONS (70 reqs)    (section 5)
#   - ISO 27001 / GDPR / AI Act / DORA controls          (sections 6–9)
#   - Out of scope, module assignment, traceability      (sections 10–13)
#
# Module-specific requirements are defined ONLY in their module files:
#   eagle_req_mod_admin.yaml        MOD-ADMIN    13 reqs  (TEN,USR,REF,NCA,DAT)
#   eagle_req_mod_management.yaml   MOD-MGMT     34 reqs  (OPS,INT,CS,CR,AIFMD,ISAE)
#   eagle_req_mod_gtm.yaml          MOD-GTM       3 reqs  (GTM-001..003)
#   eagle_req_mod_trial.yaml        MOD-TRIAL     7 reqs  (TRIAL-001..007)
#   eagle_req_mod_client.yaml       MOD-CLIENT   14 reqs  (MJ,OBL,DSH,NOT,DAT)
#   eagle_req_mod_data.yaml         MOD-DATA     17 reqs  (ING,LEG,POS,TRN)
#   eagle_req_mod_comp.yaml         MOD-COMP     11 reqs  (VAL,OVR,AMD,AIFMD)
#   eagle_req_mod_review.yaml       MOD-REVIEW    1 req   (REV-001)
#   eagle_req_mod_sub.yaml          MOD-SUB       8 reqs  (FMT,DEL,NCA,SUB)
#   eagle_req_mod_audit.yaml        MOD-AUDIT     8 reqs  (AUD,LIN)
#   eagle_req_mod_api.yaml          MOD-API       2 reqs  (API-001..002)
#   eagle_req_mod_billing.yaml      MOD-BILLING   stub (Phase 1.5)
#
# Manual controls → eagle_manual_controls.yaml:
#   REQ-CR-001..007  REQ-GDPR-006..007
# =============================================================================

# =============================================================================
# 1.  METADATA AND REFERENCE INDEXES
# =============================================================================

metadata:
  title:   "Project Eagle — Company Requirements"
  version: "1.0"
  date:    "2026-03-23"
  scope:   "Company-wide — platform layer + AIFMD Annex IV product; extensible for future regulatory reporting products"
  owner:   "CTO / CPO"
  status:  "Baselined v1.0 — ratified 2026-03-23"


principle_index:
  P1:  "Customer experience first — simplicity, reliability, predictability over customisation"
  P2:  "Code-first, human-by-exception — automated orchestration; humans for exceptions only"
  P3:  "Standardised product with predictable output — fixed scope per product, reproducible quality, no bespoke; client variation handled through configuration, not custom engineering. Legacy format adapters (e.g. M adapter, ESMA legacy) are configured delivery — they are generic adapters for classes of input formats, not bespoke per-client builds."
  P4:  "Single source of truth — canonical data model; quality, lineage and ownership explicit"
  P5:  "Deterministic core, probabilistic edge — AI for transformation only; all compliance logic rule-based"
  P6:  "Modular and portable — logic, data and rules separated from AI models and infrastructure; product-specific logic isolated from platform layer"
  P7:  "Resilience — every process has defined failure modes, fallbacks and escalation paths"
  P8:  "Compliance-proof by design — deterministic, auditable, explainable; AI supports, never decides"
  P9:  "Security by design — client data isolated, least-privilege access, encrypted in transit and at rest"
  P10: "Founder-independent — all knowledge, rules and processes fully codified in systems"
  P11: "Continuous learning — every process generates feedback data to improve models, rules and outputs"
  P12: "Ambitious growth and profitability — cash flow positive within two years; >€1M ARR; >50% EBITDA margin"
  P13: "Internationally oriented — products offered worldwide; all communication in English"
  P14: "Database-first — all operational state, metrics, scores and reports stored in the database as first-class records; file exports (PDF, CSV, JSON) are generated views of DB data, never the system of record; no loose extract workflows"
  P15: "Platform-first, product-second — platform capabilities (multi-tenancy, IAM, audit trail, pipeline orchestration, AI layer, management intelligence) are product-agnostic; regulatory product logic (validation rules, NCA overrides, canonical models, submission channels) is isolated in product modules and replaceable without platform changes; adding a new regulatory reporting product must not require changes to any platform module"
  P16: "Location-independent by design — Eagle operates as a virtual office; no physical headquarters required; every role, process and communication channel is designed to function fully from any location; async-first by default; real-time interaction by exception; presence is never a proxy for performance or trust"


regulatory_index:
  AIFMD:      "Directive 2011/61/EU — Arts. 3(3)(d), 24(1), 24(2), 24(4)"
  CDR231:     "CDR (EU) No 231/2013 — Arts. 2, 10, 110-127"
  ESMA_GUIDE: "ESMA Guidelines on AIFMD Reporting ESMA/2014/869rev"
  DQEF:       "ESMA DQEF ESMA50-1605533872-8305 (May 2025)"
  IT_TECH_R6: "ESMA IT Technical Guidance Revision 6 (from 2023-11-22)"
  DORA:       "Regulation (EU) 2022/2554 — DORA"
  GDPR:       "Regulation (EU) 2016/679 — GDPR"
  AI_ACT:     "Regulation (EU) 2024/1689 — EU AI Act"
  ISO27001:   "ISO/IEC 27001:2022 — Information Security Management"
  NIS2:       "Directive (EU) 2022/2555 — NIS2"
  CRA:        "Regulation (EU) 2024/2847 — EU Cyber Resilience Act — OUT OF SCOPE (SaaS exclusion; see EL-006)"


priority_framework:
  MUST:   "Non-negotiable. Regulatory compliance or core product function. Phase 1."
  SHOULD: "Important. Significant risk or commercial value if deferred. Phase 1."
  COULD:  "Beneficial. Acceptable to defer to Phase 2."
  WONT:   "Explicitly out of scope for this version."


not_automatable_register:
  description: >
    An explicit register of compliance steps that are NOT automatable by design.
    These steps require a human judgment by a qualified compliance professional
    and cannot be generated, approximated, inferred, or auto-approved by the
    system under any circumstances. Automating these steps would violate the
    second-line independence model (project_eagle_compliance_risk.md s.5).
    For the full NA-001..022 register (incl. addenda v1.11.0 and v1.12.0)
    see eagle_manual_controls.yaml — that file is the single source of truth
    for the complete not_automatable_register.
  entries:
    # Baseline (v1.0) — NA-001..008
    - {step_id: "NA-001", step: "Risk assessment — likelihood/impact scoring and mitigation design", requirement: REQ-CR-001}
    - {step_id: "NA-002", step: "GDPR Art.6 lawful basis determination", requirement: REQ-CR-002}
    - {step_id: "NA-003", step: "LIA Step 3 — GDPR Art.6(1)(f) balancing test", requirement: REQ-CR-004}
    - {step_id: "NA-004", step: "DORA Art.18 / NIS2 Art.23 regulatory characterisation and authority submission", requirement: REQ-CR-003}
    - {step_id: "NA-005", step: "EU AI Act classification of AI components", requirement: REQ-CR-005}
    - {step_id: "NA-006", step: "AI boundary review — validating AI components stay within permitted boundary", requirement: REQ-CR-005}
    - {step_id: "NA-007", step: "Client regulatory risk complexity tiering and consequence assessment", requirement: REQ-CR-007}
    - {step_id: "NA-008", step: "ISAE 3402 / SOC 2 control objective mapping and auditor narrative", requirement: REQ-CR-006}
    # Note: NA-009..013 are defined in addenda v1.9.0 and v1.10.0; those controls
    # carry no not_automatable fields and are not listed here.
    # Addendum v1.11.0 — NA-014..017 (application-level)
    - {step_id: "NA-014", step: "Management assertion — senior management sign-off that service description is accurate and controls suitably designed", requirement: REQ-ISAE-002}
    - {step_id: "NA-015", step: "Fraud risk assessment — identification and scoring of fraud scenarios relevant to Eagle's service delivery", requirement: REQ-ISAE-004}
    - {step_id: "NA-016", step: "Control deficiency materiality assessment — judgment whether a control failure is material to the audit opinion", requirement: REQ-ISAE-013}
    - {step_id: "NA-017", step: "Auditor scope agreement and readiness determination — judgment whether Eagle is ready for Type I audit engagement", requirement: REQ-ISAE-014}
    # Addendum v1.12.0 — NA-018..022 (entity-level / Company Compliance)
    - {step_id: "NA-018", step: "ISMS scope and Statement of Applicability — determining ISMS boundary and justified inclusion/exclusion of all 93 Annex A controls", requirement: "entity-level / Company Compliance"}
    - {step_id: "NA-019", step: "ISO 27001 internal audit — independent audit of ISMS at planned intervals; auditor selection for objectivity and impartiality", requirement: "entity-level / Company Compliance"}
    - {step_id: "NA-020", step: "ISO 27001 management review — top management review of ISMS performance, context changes and continual improvement decisions", requirement: "entity-level / Company Compliance"}
    - {step_id: "NA-021", step: "Threat intelligence programme — collection, analysis and actioning of information security threat intelligence (A.5.7)", requirement: "entity-level / Company Compliance"}
    - {step_id: "NA-022", step: "Security awareness and training programme — annual information security education for all personnel and relevant interested parties (A.6.3)", requirement: "entity-level / Company Compliance"}


phase_framework:
  1:   "Launch-critical. Must be live before or at first client go-live."
  1.5: "Post-launch, pre-scale. Target: first 10 clients or first funding round."
  2:   "Scale phase. Target: >€1M ARR or Series A."
  note: >
    Phase tags are indicative and subject to the roadmap constraint model
    (CTO/CPO owns sequencing). Phase tags enable the phasing review pass
    without restructuring individual requirements. All MUST requirements
    without a phase tag are implicitly Phase 1.


gdpr_blocker_definition:
  description: >
    A formal requirement attribute. When gdpr_blocker: true is set on a
    requirement, that requirement cannot be deployed to production until
    the corresponding RoPA entry has status SIGNED_OFF in the compliance
    workflow (REQ-INT-003, Phase 2). In Phase 1, gdpr_blocker requirements
    are tracked manually by Head of Compliance and Risk as a go-live gate.
  values:
    true:  "Deployment to production blocked until RoPA entry is SIGNED_OFF"
    false: "No RoPA blocker — default for all requirements unless explicitly set"
  phase_1_process: >
    Before REQ-INT-003 is built, Head of Compliance and Risk manually
    confirms RoPA sign-off for all gdpr_blocker: true requirements.
    This confirmation is recorded as a dated sign-off in the compliance
    risk register. The automated gate (REQ-INT-003) replaces this manual
    process in Phase 2.


# =============================================================================
# 2.  PLATFORM / PRODUCT TAXONOMY AND DOCUMENT SPLIT GUIDE
# =============================================================================

platform_product_taxonomy:
  strategic_constraint: >
    Future products built on the Eagle platform serve the same client base (AIFMs
    and their service providers operating in the EU regulatory reporting market).
    Platform expansion into different market segments (non-AIFM regulated entities,
    retail financial services, banking prudential reporting) is not in scope and
    requires a separate strategic decision by the CEO and board.

  PLATFORM:
    definition: >
      Product-agnostic capability owned at platform level. Must not contain
      any reference to AIFMD, Annex IV, NCA, or any specific regulatory regime.
      Applies unchanged to every product built on the Eagle platform.
    future_document: "eagle_platform_requirements.yaml"
    sections:
      - "4.1  Security (REQ-SEC-001..003)"
      - "4.2  Resilience (REQ-RES-001..002)"
      - "4.3  Scale architecture (REQ-SCL-001..005)"
      - "4.4  Performance (REQ-PER-001)"
      - "4.5  Modularity and portability (REQ-MOD-001..002)"
      - "4.6  Reference data management — platform data types (REQ-REF-001..002)"
      - "4.7  API and integration (REQ-API-001..002)"
      - "3.1  Tenant and organisation management (REQ-TEN-001..004)"
      - "3.3  User management and access control (REQ-USR-001..003)"
      - "3.16 Audit trail and lineage — platform events (REQ-AUD-001..002, REQ-AUD-004)"
      - "3.17 Notifications (REQ-NOT-001)"
      - "3.18 Dashboards — platform shell (REQ-DSH-001 platform elements)"
      - "3.19 COO operations (REQ-OPS-001..014)"
      - "3.20 Field lineage and logic transparency (REQ-LIN-001..003)"
      - "4.8  DORA operational compliance (REQ-CPL-001..003)"
      - "4.9  Change and release management (REQ-REL-001..010)"
      - "4.10 Engineering operations (REQ-ENG-001..010)"
      - "4.11 Customer success operations (REQ-CS-001..008)"
      - "4.13 Compliance & risk operations (REQ-CR-001..007)"
      - "4.15 ISAE 3402 / SOC 2 (REQ-ISAE-001)"
      - "5.   ISO 27001 controls (REQ-ISO-001..014)"
      - "6.   GDPR controls (REQ-GDPR-001..008)"
      - "7.   EU AI Act controls (REQ-AIACT-001..006)"
      - "8.   DORA operational requirements (REQ-DORA-001..006)"
      - "GTM and trial (REQ-GTM-001..003, REQ-TRIAL-001..007, REQ-INT-001..003)"

  PRODUCT:
    definition: >
      Specific to one regulatory reporting product. Contains regime-specific
      validation logic, NCA overrides, canonical data models, submission
      channels, and regulatory obligation management for that product.
      Moving to a new product requires building a new PRODUCT document;
      the platform layer is reused unchanged.
    current_products:
      AIFMD_ANNEX_IV:
        future_document: "eagle_product_aifmd_requirements.yaml"
        sections:
          - "3.2  Multi-jurisdiction and NCA registration (REQ-MJ-001..006)"
          - "3.4  Reporting obligation management (REQ-OBL-001..003)"
          - "3.5  Data ingestion (REQ-ING-001..004)"
          - "3.6  Legacy template adapters (REQ-LEG-001..006)"
          - "3.7  Position data and provenance (REQ-POS-001..005)"
          - "3.8  Transformation and derivation (REQ-TRN-001..002)"
          - "3.9  Validation (REQ-VAL-001..003)"
          - "3.10 NCA override management (REQ-OVR-001)"
          - "3.11 NCA submission channels (REQ-NCA-001..004)"
          - "3.12 File format and packaging (REQ-FMT-001)"
          - "3.13 Delivery channels (REQ-DEL-001..002)"
          - "3.14 Submission mechanics (REQ-SUB-001..003)"
          - "3.15 Amendment workflow (REQ-AMD-001)"
          - "3.16 AIFMD-specific audit (REQ-AUD-003, REQ-AUD-005)"
          - "3.18 Dashboards — AIFMD content (REQ-DSH-002)"
          - "3.19 Data management — AIFMD-specific (REQ-DAT-001..004)"
          - "AIFMD workflow (REQ-AIFMD-001..007)"
          - "4.14 AIFMD supplemental (REQ-AIFMD-006..007)"
          - "ISO 27001 — NCA submission specific (REQ-ISO-004 change management, REQ-ISO-007 env separation)"

  SHARED:
    definition: >
      Currently implemented in the AIFMD product context but designed to be
      generalised to the platform layer when a second product is built.
      Flagged here so the platform architect knows where refactoring will be
      needed at that point. No action required until a second product is scoped.
    items:
      - "REQ-REV-001 (review gate) — logic is product-agnostic but current acceptance criteria reference AIFMD specifics"
      - "REQ-OBL-001..003 (obligation management) — regime logic is AIFMD-specific; the obligation calendar pattern is reusable"
      - "REQ-DAT-004 (report archive) — archive pattern is platform-level; current acceptance criteria reference AIFMD submission formats"
      - "REQ-CR-007 (client regulatory risk profile) — profile fields contain AIFMD-specific items; profile pattern is platform-level"

module_split_guide:
  description: >
    When the document split is executed (triggered by scoping a second regulatory
    reporting product), the following rules apply.
  split_trigger: "Decision to build a second regulatory reporting product on the Eagle platform"
  split_rules:
    - "PLATFORM requirements are extracted verbatim into eagle_platform_requirements.yaml; IDs are preserved"
    - "PRODUCT requirements for AIFMD are extracted verbatim into eagle_product_aifmd_requirements.yaml; IDs are preserved"
    - "SHARED requirements are reviewed at split time: generalise to platform or keep in AIFMD product"
    - "New product requirements start from a new ID series (e.g. REQ-EMIR-*, REQ-SFDR-*)"
    - "Cross-references between platform and product documents use full REQ-IDs; these remain globally unique"
    - "The platform requirements document becomes the master reference for all cross-cutting obligations (GDPR, DORA, ISO 27001, AI Act)"
  id_series_reserved_for_future_products:
    REQ-EMIR:  "EMIR transaction reporting product (if scoped)"
    REQ-SFDR:  "SFDR/ESG reporting product (if scoped)"
    REQ-MIFIR: "MiFIR transaction reporting product (if scoped)"
    REQ-NAT:   "National register reporting product (if scoped)"
  current_document_note: >
    Until the split is executed this document remains the single source of
    truth for all requirements. The taxonomy tags (PLATFORM / PRODUCT / SHARED)
    are metadata only and do not affect requirement validity or implementation priority.


# =============================================================================
# 3.  MODULE INDEX
# =============================================================================

module_index:

  MOD-ADMIN:
    name: "Eagle Administration"
    description: >
      Internal Eagle operations surface. Used exclusively by EAGLE_ADMIN role.
      Covers tenant provisioning and lifecycle, user account management,
      system configuration, reference data management, NCA credential vault
      administration, and system-wide audit log access.
    primary_users: [EAGLE_ADMIN]
    pipeline_layers: [L11_IAM, L9_ORCHESTRATION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-ADMIN-SPEC v1.0"

  MOD-MANAGEMENT:
    name: "Company Management Intelligence"
    description: >
      See the MOD-MANAGEMENT entry in the module_index above for the full
      description (updated in v1.3.0 — company-wide scope, DB-first).
    primary_users: [EAGLE_ADMIN, COO, CCO, CRO, CFO, CCO_DELEGATE]
    pipeline_layers: [L9_ORCHESTRATION, L8_AUDIT]
    specification_status: >
      COO-view requirements in this document (REQ-OPS-001 through REQ-OPS-006,
      added v1.1.0). CCO/CRO-view requirements added v1.2.0 (REQ-INT-001,
      REQ-INT-002). Detailed spec deferred to MOD-MANAGEMENT-SPEC v1.0.
    renamed_from: "MOD-OPS (v1.1.0) → MOD-INTERNAL (v1.2.0) → MOD-MANAGEMENT (v1.3.0)"

  MOD-BILLING:
    name: "Billing and Subscriptions"
    description: >
      Commercial operations module. Manages subscription plans, per-client
      pricing configuration, usage-based billing inputs (submission count,
      AIF count, NCA registrations), invoice generation, and payment status
      tracking. Billing data is strictly isolated from the compliance pipeline.
      No billing logic touches canonical records or audit trail.
      Trial-to-paid conversion flow is owned by MOD-TRIAL (trigger) and
      MOD-BILLING (subscription activation); the handoff is defined in
      REQ-TRIAL-001 and REQ-TRIAL-006.
    primary_users: [EAGLE_ADMIN, CFO]
    pipeline_layers: []
    specification_status: "Detailed spec deferred to MOD-BILLING-SPEC v1.0 (Phase 1.5)"
    note: >
      Phase 1 billing is handled operationally. Application billing module
      is a Phase 1.5 item triggered at approximately 10 or more clients or
      first external funding round. Trial-to-paid conversion trigger point
      is defined in Phase 1 (REQ-TRIAL-006) even though full billing module
      is deferred.

  MOD-GTM:
    name: "Go-to-Market Automation"
    description: >
      Internal module for Eagle's commercial acquisition pipeline. Manages the
      internal AIFM prospect database (built from ESMA and national registers),
      web-based strategy enrichment, inbound legitimacy validation, MQL scoring,
      and CRM integration. Not visible to prospects or clients. Outputs feed
      MOD-TRIAL (provisioning trigger) and MOD-MANAGEMENT CCO-view (funnel metrics).
      The external toolstack (email sequencing, LinkedIn outreach) is out of scope
      for this module; the integration endpoints that connect those tools to Eagle
      are in scope.
    primary_users: [EAGLE_ADMIN, CCO, CRO, CCO_DELEGATE]
    pipeline_layers: [L9_ORCHESTRATION]
    specification_status: >
      Core requirements added in v1.2.0 (REQ-GTM-001 through REQ-GTM-003).
      Detailed spec deferred to MOD-GTM-SPEC v1.0.
    gdpr_note: >
      Processing of prospect personal data requires a legitimate interest basis
      documented in the Eagle RoPA before go-live. See REQ-GTM-002.

  MOD-TRIAL:
    name: "Trial Account Lifecycle"
    description: >
      Manages the full lifecycle of trial tenants from self-service registration
      through expiry or conversion to a paid account. Covers: inbound legitimacy
      validation gate (fed by MOD-GTM score), self-service trial provisioning,
      configurable time limit (default 60 days), feature gating (no Annex IV
      download or NCA submission), pre-population from register data, AI-assisted
      strategy orientation, pre-population quality scoring with COO ops review,
      trial health monitoring, upgrade trigger to Pipedrive and MOD-BILLING, and
      trial data retention. Trial tenants are isolated from paid tenants at the
      data and IAM layers.
    primary_users: [EAGLE_ADMIN, COO, CCO_DELEGATE, TRIAL_USER]
    pipeline_layers: [L1_INGESTION, L1B_ADAPTER, L2_TRANSFORMATION,
                      L9_ORCHESTRATION, L11_IAM]
    specification_status: >
      Core requirements added in v1.2.0 (REQ-TRIAL-001 through REQ-TRIAL-007).
      Detailed spec deferred to MOD-TRIAL-SPEC v1.0.
    dependencies:
      - "MOD-GTM: legitimacy score input to REQ-TRIAL-001 provisioning gate"
      - "MOD-ADMIN: trial tenant creation via existing provisioning path"
      - "MOD-DATA: pre-population uses L1/L2 pipeline with TRIAL_PRE_POP flag"
      - "MOD-BILLING: trial-to-paid conversion handoff at REQ-TRIAL-006 trigger"
      - "MOD-MANAGEMENT: trial health and quality metrics feed CCO-view dashboard"

  MOD-CLIENT:
    name: "Client Compliance Portal"
    description: >
      The primary tenant-facing application surface. Covers the full
      compliance workflow from reporting obligation setup through submission
      confirmation: AIFM and AIF profile management, reporting calendar,
      NCA obligation matrix, data upload and status tracking, validation
      result review, submission history, and notifications. This is the
      module clients interact with day-to-day.
    primary_users: [TENANT_ADMIN, COMPLIANCE_REVIEWER, DATA_PREPARER, READ_ONLY]
    pipeline_layers: [L9_ORCHESTRATION, L11_IAM]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-CLIENT-SPEC v1.0"

  MOD-DATA:
    name: "Data Ingestion and Processing"
    description: >
      Covers the full data intake and preparation pipeline: all five ingestion
      channels (API, file upload, SFTP, manual entry, AI-assisted parsing),
      legacy template adapters, position data management, derived field
      calculations (leverage, AuM, rankings), AI transformation layer, and
      canonical data model. Produces a validated canonical record ready for
      L3 compliance checking.
    primary_users: [DATA_PREPARER, COMPLIANCE_REVIEWER]
    pipeline_layers: [L1_INGESTION, L1B_ADAPTER, L2_TRANSFORMATION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-DATA-SPEC v1.0"

  MOD-COMP:
    name: "Compliance Engine"
    description: >
      The deterministic compliance core. Covers AIFMD Annex IV field-level
      validation (L3), ESMA DQEF quality checks (L4), CAF/CAM/DQ override
      management, amendment workflow, and AIFM-level aggregation logic.
      No AI involvement at this layer. All logic is rule-based, version-
      controlled, and auditable. This module is the regulatory heart of Eagle.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN]
    pipeline_layers: [L3_VALIDATION, L4_QUALITY]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-COMP-SPEC v1.0"

  MOD-REVIEW:
    name: "Review and Approval Gate"
    description: >
      The mandatory human review gate (L5). Supports individual record
      review, bulk approval for zero-flag records, cross-NCA grouped approval
      for content-identical variants, and the diff view for NCA variants with
      override differences. Non-bypassable. This gate is the primary DORA
      Art.30 oversight control and the structural condition for non-high-risk
      EU AI Act classification.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN]
    pipeline_layers: [L5_REVIEW]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-REVIEW-SPEC v1.0"

  MOD-SUB:
    name: "Submission and Delivery"
    description: >
      NCA file packaging (L6) and delivery (L7). Covers XML generation and
      wrapping, NCA-specific packaging configuration (compression, naming,
      structure), all five delivery channels (DIRECT_API, ROBOT_PORTAL,
      S3_CLIENT_BUCKET, S3_EAGLE_BUCKET, SFTP_EAGLE_SERVER, MANUAL), portal
      robot management, NCA credential vault, and submission acknowledgement
      processing. Produces the submission audit record.
    primary_users: [EAGLE_ADMIN, COMPLIANCE_REVIEWER]
    pipeline_layers: [L6_PACKAGING, L7_SUBMISSION]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-SUB-SPEC v1.0"

  MOD-AUDIT:
    name: "Audit Trail, Lineage and Archive"
    description: >
      Immutable event log (L8), field-level lineage view, logic transparency
      panel, submission archive, and traceability reports. Serves internal
      compliance sign-off, NCA enquiry response, ISAE 3402/SOC 2 auditor
      review, and EU AI Act evidence requirements. All data in this module
      is append-only and retained for ten years.
    primary_users: [COMPLIANCE_REVIEWER, TENANT_ADMIN, READ_ONLY, EAGLE_ADMIN]
    pipeline_layers: [L8_AUDIT]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-AUDIT-SPEC v1.0"

  MOD-API:
    name: "External API and Integration"
    description: >
      Versioned REST API (L10) for programmatic data ingestion, status
      retrieval, and white-label embedding. Covers API authentication
      (OAuth 2.0 / API keys), versioning policy, rate limiting, OpenAPI
      specification, and the white-label embedding capability for service
      providers who want to surface Eagle within their own platform.
    primary_users: [External integrators, service providers]
    pipeline_layers: [L10_API]
    specification_status: "Requirements in this document — detailed spec deferred to MOD-API-SPEC v1.0"

  MOD-CCEV:
    name: "Certification & Compliance Evidence View"
    description: >
      Platform-level module for ISAE 3402 / SOC 2 certification artefacts that
      sit outside the operational compliance subview of MOD-MANAGEMENT. Covers
      the management assertion (REQ-ISAE-002), fraud risk assessment (REQ-ISAE-004),
      and the auditor engagement and Type I readiness programme (REQ-ISAE-014).
      The control deficiency log (REQ-ISAE-013) surfaces in MOD-MANAGEMENT's
      compliance subview but is also governed under the CCEV framework.
      MOD-CCEV is product-agnostic: the certification artefacts apply to the
      Eagle platform as a whole, not to any specific regulatory reporting product.
    primary_users: [HEAD_OF_COMPLIANCE_RISK, EAGLE_ADMIN, CEO, CTO]
    pipeline_layers: [L9_ORCHESTRATION]
    layer_tag: PLATFORM
    specification_status: "Requirements defined in eagle_req_mod_management.yaml (REQ-ISAE-002, REQ-ISAE-004, REQ-ISAE-013, REQ-ISAE-014) — detailed spec deferred to MOD-CCEV-SPEC v1.0"


# =============================================================================
# 4.  PIPELINE ARCHITECTURE
# =============================================================================

pipeline_layers:

  L1_INGESTION:
    name: "Data Ingestion"
    description: >
      Receives fund data and position data via five channels: REST API push,
      structured file upload (CSV/Excel/JSON), SFTP inbound, manual web UI entry,
      and AI-assisted unstructured document parsing. Includes automatic format
      detection for known legacy template formats. Produces a raw,
      channel-agnostic payload for the adapter or transformation layer.
    principles: [P2, P4, P5, P6, P9]

  L1B_ADAPTER:
    name: "Legacy Template Adapter"
    description: >
      Sits between L1 and L2. Processes known legacy template formats
      (M registered, M authorised, ESMA legacy) and applies
      deterministic enrichment calculations (AuM aggregation, leverage derivation,
      currency conversion) before passing a normalised intermediate record to L2.
      Fully deterministic; no AI involvement at this layer.
    principles: [P5, P6, P10]

  L2_TRANSFORMATION:
    name: "AI Transformation and Derivation"
    description: >
      Two distinct functions at this layer:
      (a) Claude normalises and maps raw input to the Eagle canonical data model
          for unstructured sources and non-standard layouts. Output is always a
          candidate mapping requiring human confirmation.
      (b) The deterministic calculation engine derives Annex IV reportable fields
          from position-level data (rankings, leverage, unencumbered cash, AuM
          aggregation). All calculations are rule-based and fully auditable.
      AI output never flows directly into a regulatory submission. Every
      AI-mapped field must pass L3 before it enters the canonical record.
    principles: [P5, P6, P8, P11]
    regulatory: [AI_ACT]
    ai_act_note: >
      This layer is classified non-high-risk under the EU AI Act because AI
      output never flows directly into a regulatory submission. The deterministic
      validation core (L3) is the mandatory gate. This classification is
      conditional on that gate remaining non-bypassable.

  L3_VALIDATION:
    name: "Deterministic Validation Core"
    description: >
      Rule-based validation of every field against the AIFMD canonical data
      model and aifmd_annex_iv_validation_rules.yaml. Validation is run
      once per NCA registration per record, applying the NCA-specific override
      profile for each target. Produces a structured validation report per field
      per NCA: PASS / CAF / CAM / DQ-WARNING. All logic is deterministic,
      version-controlled and auditable. No AI involvement.
    principles: [P4, P5, P8, P10]
    regulatory: [AIFMD, CDR231, ESMA_GUIDE, DQEF, IT_TECH_R6]

  L4_QUALITY:
    name: "DQEF Quality Layer"
    description: >
      Statistical and plausibility checks per the ESMA DQEF framework.
      Runs after L3. Flags issues for human review. Never blocks a submission
      autonomously — escalates to the human review gate.
    principles: [P5, P7, P8, P11]
    regulatory: [DQEF]

  L5_REVIEW:
    name: "Human Review and Approval Gate"
    description: >
      Mandatory pre-submission gate. An authorised user must explicitly review
      and approve the record before submission proceeds. Non-bypassable by any
      means including API calls. Supports both individual record review and
      bulk approval for zero-flag records. Cross-NCA grouped approval offered
      automatically when NCA variants are content-identical.
      This gate is the primary DORA Art.30 oversight control, the liability
      protection mechanism, and the structural condition maintaining the
      non-high-risk EU AI Act classification.
    principles: [P2, P8]
    regulatory: [DORA, AIFMD, AI_ACT]

  L6_PACKAGING:
    name: "NCA File Packaging"
    description: >
      Wraps validated XML into the file format required by the target NCA.
      Packaging is configurable per NCA: XML structure (single vs multi-AIF),
      compression (none / ZIP / ZIP-per-AIF / ZIP-of-ZIPs / GZIP), file naming
      template, and minor XML variations. Configuration loaded from NCA override
      files at runtime. Packaging never alters XML content.
    principles: [P3, P6, P10]
    regulatory: [AIFMD, IT_TECH_R6]

  L7_SUBMISSION:
    name: "NCA Delivery"
    description: >
      Delivers the packaged submission to the NCA or to the client for onward
      delivery, via the channel configured per NCA registration: DIRECT_API,
      ROBOT_PORTAL, S3_CLIENT_BUCKET, S3_EAGLE_BUCKET, SFTP_EAGLE_SERVER,
      or MANUAL download. All channels produce an equivalent audit record.
    principles: [P2, P3, P7, P8, P9]
    regulatory: [AIFMD, DORA]

  L8_AUDIT:
    name: "Audit Trail and Lineage"
    description: >
      Immutable, append-only log of every event across all pipeline layers.
      AI-assisted steps tagged distinctly. Field provenance recorded per field.
      Reference data versions recorded per calculation. Supports ISAE 3402,
      SOC 2, ISO 27001 and EU AI Act evidence requirements.
    principles: [P4, P8, P9, P10]
    regulatory: [DORA, GDPR, ISO27001, AI_ACT]

  L9_ORCHESTRATION:
    name: "Orchestration, Workflow and Queue"
    description: >
      Priority queue architecture for on-demand pipeline execution. Manages
      state machine transitions, per-client resource quotas, deadline monitoring,
      notification dispatch, and escalation triggers. Central control layer
      per Principle 2. Scales horizontally via auto-scaling worker pools.
    principles: [P2, P7, P10]
    regulatory: [DORA]

  L10_API:
    name: "External API and Integration"
    description: >
      Versioned REST API for programmatic data ingestion and status retrieval.
      White-label embedding capability. Secured with OAuth 2.0 / API keys.
    principles: [P3, P6, P9, P13]
    regulatory: [GDPR, DORA]

  L11_IAM:
    name: "Identity, Access and Tenant Management"
    description: >
      Multi-tenant access control. Manages organisations, users, roles,
      permissions, and NCA credential vault. Enforces per-client data isolation.
      Supports AIFM-direct and service-provider tenancy models.
    principles: [P9, P10]
    regulatory: [GDPR, DORA, ISO27001]


# =============================================================================
# 5.  CROSS-CUTTING REQUIREMENTS  (72 requirements)
# Defined here. Apply to all modules. Not duplicated in module files.
# Module files reference these by REQ-ID in cross_cutting_requirements_applied.
# =============================================================================

technical_requirements:

  # ---------------------------------------------------------------------------
  # 5.0  PLATFORM ARCHITECTURE — PRODUCT EXTENSIBILITY
  # ---------------------------------------------------------------------------
  platform_extensibility:

    - id: REQ-ARCH-001
      title: "Platform product isolation — regulatory product logic must not couple to platform layer"
      layer: [L9_ORCHESTRATION, L3_VALIDATION, L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P6, P10, P15]
      regulatory: []
      taxonomy: PLATFORM
      description: >
        Eagle is a multi-product regulatory reporting platform. The current
        product is AIFMD Annex IV. Future products (e.g. EMIR, SFDR/ESG when
        in scope, national register reporting) must be addable without changes
        to platform modules (MOD-ADMIN, MOD-MANAGEMENT, MOD-AUDIT, MOD-API,
        security, resilience, IAM, GDPR, DORA, ISO 27001 controls).
        Product isolation means: all regime-specific logic — validation rules,
        NCA override profiles, canonical data models, submission channel
        adapters, obligation calendars, and packaging configuration — is
        encapsulated in product-specific modules and configuration files.
        The platform pipeline (orchestration, AI transformation interface,
        audit trail, review gate, management intelligence) operates on an
        abstract product context, not on AIFMD-specific constructs.
        This principle is the architectural expression of P15. Its enforcement
        is a pre-condition for the future module document split.
      product_isolation_boundaries:
        platform_must_not_contain:
          - "Hard-coded references to AIFMD, Annex IV, NCA codes, or XSD schema versions"
          - "AIFMD-specific field names in platform layer code (orchestration, IAM, audit, management)"
          - "Submission channel logic tied to a specific regulatory regime"
          - "Obligation frequency logic (quarterly/half-yearly/annual) in platform orchestration"
        product_must_contain:
          - "All validation rule logic and NCA override profiles for that product"
          - "The canonical data model schema for that product"
          - "All submission channel adapters specific to that product's NCAs or authorities"
          - "The obligation calendar generation logic for that product's regime"
          - "All regime-specific error codes and DQEF equivalents"
        platform_interfaces:
          pipeline_trigger: "Platform orchestration triggers product pipeline via a product_context object; product identity resolved at runtime"
          audit_trail:      "Platform audit trail accepts generic event records; product-specific field names are payload, not schema"
          review_gate:      "Platform review gate is product-agnostic; product provides the review checklist configuration"
          management_view:  "Platform management intelligence stores product-agnostic metrics; product-specific metrics are additive, not structural"
      acceptance_criteria:
        - "A new regulatory reporting product can be scaffolded by adding product-specific configuration files and a new product module without modifying any platform module"
        - "Platform integration tests pass with a mock product context substituted for the AIFMD product context"
        - "No AIFMD-specific field names appear in platform layer source code outside of the AIFMD product module"

    - id: REQ-ARCH-002
      title: "Product registry — runtime product discovery and routing"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P6, P10, P15]
      regulatory: []
      taxonomy: PLATFORM
      description: >
        The platform maintains a product registry: a configuration-driven list
        of active regulatory reporting products. The pipeline orchestration layer
        uses the product registry to route a submission to the correct product
        module at runtime. In Phase 1 the registry contains one entry (AIFMD
        Annex IV). Adding a second product requires adding a registry entry and
        a product module — no platform code changes. The registry is a
        version-controlled configuration file per REQ-MOD-001.
      registry_entry_fields:
        product_id:              "Unique product identifier (e.g. AIFMD_ANNEX_IV, EMIR_EMIR)"
        product_name:            "Human-readable product name"
        product_module_ref:      "Reference to the product module configuration bundle"
        status:                  "ACTIVE / INACTIVE / DEVELOPMENT"
        applicable_client_types: "Which tenant types can activate this product"
        regulatory_frameworks:   "List of regulatory_index keys this product implements"
      requirements:
        - "Product registry is a version-controlled configuration file loaded at runtime (REQ-MOD-001)"
        - "EAGLE_ADMIN can view the product registry; modifications require CTO authorisation per REQ-ISO-004"
        - "A client tenant is associated with one or more active products at provisioning"
        - "Deactivating a product for a tenant does not delete historical submission data for that product"
      acceptance_criteria:
        - "Product registry with AIFMD_ANNEX_IV entry deployed and active before first client go-live"
        - "Adding a mock second product entry to the registry does not break any existing test"

    - id: REQ-ARCH-003
      title: "Tenant-product assignment — per-tenant product activation"
      layer: [L11_IAM, L9_ORCHESTRATION]
      priority: MUST
      phase: 1.5
      principles: [P6, P9, P10, P15]
      regulatory: []
      taxonomy: PLATFORM
      description: >
        Each tenant is associated with one or more active products from the
        product registry (REQ-ARCH-002). In Phase 1, every tenant is
        automatically assigned the AIFMD_ANNEX_IV product. When a second product
        is added to the registry, EAGLE_ADMIN explicitly activates that product
        for each eligible tenant. A tenant cannot access a product that has not
        been activated for them; the pipeline routes submissions to the correct
        product module based on the tenant's active product assignment.
        Product deactivation for a tenant does not delete historical submission
        data for that product — historical records are retained per applicable
        retention requirements.
      tenant_product_record_fields:
        tenant_id:        "Reference to tenant"
        product_id:       "Reference to product registry entry (REQ-ARCH-002)"
        activated_at:     "Timestamp of product activation"
        activated_by:     "EAGLE_ADMIN identity"
        status:           "ACTIVE / INACTIVE"
        deactivated_at:   "Timestamp of deactivation (if applicable)"
        deactivation_reason: "Free-text — reason for deactivation"
      requirements:
        - "In Phase 1, AIFMD_ANNEX_IV is auto-assigned to every paid tenant at activation (REQ-TEN-003)"
        - "For future products: EAGLE_ADMIN explicitly assigns product to tenant; assignment logged"
        - "Tenant attempting to access a product not assigned to them receives a clear access-denied response"
        - "Product assignment visible to TENANT_ADMIN in their account settings"
        - "EAGLE_ADMIN can view all tenant-product assignments in MOD-ADMIN"
      acceptance_criteria:
        - "Phase 1: all paid tenants have AIFMD_ANNEX_IV in their product assignment list"
        - "Tenant without a product assignment cannot trigger the submission pipeline"
        - "Adding a mock second product to the registry and assigning it to one tenant does not affect other tenants"


  # ---------------------------------------------------------------------------
  # 5.1  SECURITY
  # ---------------------------------------------------------------------------
  security:

    - id: REQ-SEC-001
      title: "Encryption in transit and at rest"
      layer: [L8_AUDIT, L11_IAM]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, DORA, ISO27001]
      requirements:
        - "All data in transit encrypted via TLS 1.3 (minimum TLS 1.2)"
        - "All data at rest encrypted using AES-256 or equivalent"
        - "Database encryption at infrastructure level using AWS KMS or equivalent"
        - "Encryption keys managed per tenant with rotation supported without data loss"
        - "NCA submission channel encrypted per NCA endpoint requirements"
      acceptance_criteria:
        - "TLS configuration verified by automated scan — Qualys SSL Labs grade A minimum"

    - id: REQ-SEC-002
      title: "Vulnerability management and security testing programme"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [ISO27001, NIS2, DORA]
      requirements:
        - "SAST integrated into CI/CD pipeline; build fails on HIGH or CRITICAL findings"
        - "DAST run against staging before every production release covering OWASP Top 10"
        - "Automated dependency vulnerability scanning (e.g. Dependabot)"
        - "Critical vulnerabilities remediated within 72 hours; high within 14 days"
        - "Penetration test by qualified external party before first client go-live and annually"
        - "All HIGH and CRITICAL findings tracked in remediation register"
      acceptance_criteria:
        - "No production release proceeds with unresolved HIGH or CRITICAL SAST findings"

    - id: REQ-SEC-003
      title: "Data retention and deletion"
      layer: [L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P9]
      regulatory: [GDPR, ISO27001]
      requirements:
        - "Canonical records and submission data: 10 years"
        - "Unstructured source documents: deleted immediately after AI extraction"
        - "Structured upload files: deleted after successful ingestion"
        - "S3 Eagle bucket files: deleted after download or after 7 days"
        - "SFTP inbound files: deleted after successful ingestion"
        - "User account data: anonymised within 30 days of deactivation; audit trail entries anonymised not deleted"
        - "Automated deletion jobs with deletion events logged in audit trail"


  # ---------------------------------------------------------------------------
  # 5.2  RESILIENCE AND AVAILABILITY
  # ---------------------------------------------------------------------------
  resilience:

    - id: REQ-RES-001
      title: "Pipeline failure modes and fallback mechanisms"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      failure_handling:
        ingestion_failure:
          response: "Return error to caller with specific cause; no partial state created"
          retry: "Client-initiated; no automatic retry at ingestion"
        ai_transformation_failure:
          response: "Degrade gracefully: present empty candidate mapping with all fields flagged LOW confidence; user completes manually"
          retry: "Once after 30 seconds; fall back to manual on second failure"
        validation_engine_fault:
          note: "Distinct from legitimate CAF results — this is an engine error"
          response: "Block with SYSTEM_ERROR status; notify EAGLE_ADMIN immediately"
        direct_api_submission_failure:
          response: "Retry 3 times with exponential backoff (30s, 120s, 300s); set SUBMISSION_FAILED on all failures; notify COMPLIANCE_REVIEWER"
          fallback: "COMPLIANCE_REVIEWER can switch to MANUAL for the affected period"
        robot_portal_failure:
          response: "Per REQ-NCA-002 fallback procedure"

    - id: REQ-RES-002
      title: "Service availability targets"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      requirements:
        - "Target uptime: 99.5% measured monthly excluding planned maintenance"
        - "Planned maintenance communicated at least 48 hours in advance"
        - "Maintenance windows not within 5 business days of any active submission deadline"
        - "Recovery Time Objective (RTO): 4 hours"
        - "Recovery Point Objective (RPO): 1 hour"
      acceptance_criteria:
        - "RTO and RPO documented in BCP and tested annually"


  # ---------------------------------------------------------------------------
  # 5.3  SCALE ARCHITECTURE
  # ---------------------------------------------------------------------------
  scale_architecture:

    - id: REQ-SCL-001
      title: "Priority queue architecture for pipeline execution"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7]
      regulatory: [DORA]
      description: >
        Durable persistent queues with auto-scaling worker pools per pipeline stage.
        Each AIF record in a batch is an independent queue item — 1,000 AIFs enter
        as 1,000 parallel work items.
      queue_architecture:
        separate_queues_per_layer: "Transformation, validation, quality, XML generation, submission"
        priority_tiers:
          DEADLINE_CRITICAL: "Deadline within 2 business days — processed ahead of all lower tiers"
          STANDARD: "More than 2 business days — FIFO within tier"
        dead_letter_queue: "Items failing after 3 attempts; EAGLE_ADMIN alerted immediately"
      requirements:
        - "Queue is durable; worker failure does not lose the item"
        - "Queue depth, processing lag and worker utilisation monitored in real time"
      acceptance_criteria:
        - "1,000-AIF batch processing begins within 60 seconds of trigger"

    - id: REQ-SCL-002
      title: "Per-client throughput SLA"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P7]
      regulatory: [DORA]
      sla_targets:
        validation_complete: "1,000-AIF batch fully validated within 30 minutes of trigger"
        xml_generation: "1,000-AIF batch XML generated within 10 minutes of review gate approval"
        direct_submission: "Submission transmitted within 15 minutes of XML generation"
        robot_submission: "1,000-AIF batch submitted via robot within 60 minutes of trigger"
        peak_day: "3,000 records per day all validated within 4 hours assuming staggered triggers"
      acceptance_criteria:
        - "Load test demonstrates 1,000-AIF batch validates within 30 minutes under 3x concurrent load"

    - id: REQ-SCL-003
      title: "Batch review gate — bulk approval for clean records"
      layer: [L5_REVIEW]
      priority: MUST
      phase: 1
      principles: [P2, P8]
      regulatory: [DORA, AI_ACT, AIFMD]
      description: >
        Bulk approval available only for records with zero flags of any category.
        Any record with a CAF, CAM, DQ warning, or override requires individual review.
        Both flows (bulk and individual) can run in parallel within the same batch.
      requirements:
        - "Batch summary shown before bulk approval: total records, clean count, flagged count by type"
        - "Flagged records automatically split for individual review; do not block bulk approval of clean records"
        - "Bulk approval audit record includes record count and Merkle tree root hash of all approved canonical records"
      acceptance_criteria:
        - "Bulk approval of 1,000 clean records completes in under 60 seconds"

    - id: REQ-SCL-004
      title: "Concurrency isolation between tenants"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P9, P7]
      regulatory: [DORA, ISO27001]
      requirements:
        - "Per-tenant resource quotas: no single tenant may consume more than 40% of total worker capacity by default"
        - "Quota enforcement does not cause starvation — items queue, not drop"
        - "EAGLE_ADMIN can temporarily raise a tenant quota as a logged operational action"
      acceptance_criteria:
        - "3 simultaneous 1,000-AIF tenant batches: no tenant's batch exceeds 2x single-tenant baseline time"

    - id: REQ-SCL-005
      title: "Batch submission sequencing and NCA rate limiting"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P7, P8]
      regulatory: [AIFMD, DORA]
      requirements:
        - "AIFM record submitted and acknowledged before any AIF records in the batch"
        - "AIFM submission failure holds all AIF records in the batch"
        - "NCA rate limits configured per NCA in override files (REQ-MOD-001)"
        - "ROBOT sessions serialised per NCA portal — no parallel sessions to the same portal"


  # ---------------------------------------------------------------------------
  # 5.4  PERFORMANCE
  # ---------------------------------------------------------------------------
  performance:

    - id: REQ-PER-001
      title: "Performance targets"
      priority: SHOULD
      phase: 1
      principles: [P1, P7]
      regulatory: []
      targets:
        validation_single_record: "< 5 seconds"
        validation_batch_100_aifs: "< 60 seconds"
        ai_transformation_single_file: "< 30 seconds"
        dashboard_load_50_aifs: "< 2 seconds"
        xml_generation_complete_batch: "< 10 seconds"
        position_derivation_500_positions: "< 5 seconds"
        ecb_rate_cache_lookup: "< 100 ms"
        gleif_lei_cache_lookup: "< 100 ms for 99.9% of requests"
        sftp_inbound_to_dashboard: "< 10 minutes"


  # ---------------------------------------------------------------------------
  # 5.5  MODULARITY AND PORTABILITY
  # ---------------------------------------------------------------------------
  modularity:

    - id: REQ-MOD-001
      title: "Rules, overrides and reference data separated from application code"
      priority: MUST
      phase: 1
      principles: [P6, P10]
      regulatory: [DORA]
      description: >
        Validation rules, NCA override profiles, canonical data model schema,
        packaging configuration, smart default rules, prompt injection system
        prompts, NCA rate limits, the Claude API field allowlist, and the
        product registry (REQ-ARCH-002) are all version-controlled configuration
        files loaded at runtime — not hard-coded.
      acceptance_criteria:
        - "Rule file updates deployable independently of application code"
        - "Rule file version recorded on every validation report"
        - "Adding a new NCA requires only new configuration files, no code changes"

    - id: REQ-MOD-002
      title: "AI model replaceability"
      priority: MUST
      phase: 1
      principles: [P6]
      regulatory: [AI_ACT, DORA]
      description: >
        The AI transformation layer (L2) is abstracted behind an interface.
        Replacing Claude with another model or removing AI entirely must not
        require changes to any other pipeline layer.
      acceptance_criteria:
        - "Integration tests pass regardless of which AI model adapter is active"
        - "Model replacement is a configuration change, not a code change"


  # ---------------------------------------------------------------------------
  # 5.6  DORA OPERATIONAL COMPLIANCE
  # ---------------------------------------------------------------------------
  dora_operational:

    - id: REQ-CPL-001
      title: "ICT incident classification and authority reporting workflow"
      priority: MUST
      phase: 1
      principles: [P7, P10]
      regulatory: [DORA, NIS2]
      description: >
        Eagle classifies ICT incidents per DORA severity criteria and provides
        structured authority notification reports. Two distinct streams:
        DORA Art.18 (supporting client NCA reporting) and NIS2 Art.23 (Eagle's
        own NCSC reporting). Both supported in a single incident reporting workflow.
      severity_levels:
        MAJOR:
          definition: "Outage within 5 days of client deadline OR data integrity incident"
          client_notification: "Within 4 hours"
          authority_report: "Available within 4 hours for DORA Art.18 and NIS2 24hr early warning"
        SIGNIFICANT:
          definition: "Service degradation >1 hour not near deadline"
          client_notification: "Within 24 hours"
        MINOR:
          definition: "Isolated fault with no client impact"
          client_notification: "Monthly service report"
      requirements:
        - "Incident reporting workflow generates structured reports with all DORA Art.18 and NIS2 Art.23 required fields"
        - "Post-incident review within 5 business days for MAJOR incidents"
        - "Lessons-learned structured section with remediation tracking (REQ-DORA-002)"

    - id: REQ-CPL-002
      title: "DORA Art.30 contractual information pack"
      priority: MUST
      phase: 1
      principles: [P10]
      regulatory: [DORA]
      description: >
        All information required for DORA Art.30 compliant client contracts
        maintained and version-controlled alongside each Eagle software release.
        Sub-processor changes are operationalised via the notification workflow
        defined in REQ-DORA-006; this document defines the contractual content.
        The ISAE 3402 service description and CUECs (REQ-ISAE-001) are included
        as annexes to this pack.
      content:
        - "Service description and SLA parameters per REQ-RES-002"
        - "AWS EU regions used for data processing and storage"
        - "Anthropic as sub-processor with processing location"
        - "Exit strategy and data portability specification"
        - "Sub-processor change notification procedure (operationalised via REQ-DORA-006)"
        - "Delivery channels in use per NCA type"
        - "ICT incident notification timelines"
        - "ISAE 3402 service description (REQ-ISAE-001)"
        - "Complementary User Entity Controls — CUECs (REQ-ISAE-001)"
        - "AI Transparency Statement (REQ-AIACT-006)"

    - id: REQ-CPL-003
      title: "DORA register of information export for clients"
      priority: MUST
      phase: 1
      principles: [P10]
      regulatory: [DORA]
      required_fields:
        eagle_legal_name: "Project Eagle B.V."
        eagle_lei: "Eagle LEI — registered and maintained"
        service_description: "AIFMD Annex IV regulatory reporting processing service"
        data_location: "AWS EU regions (current list maintained)"
        sub_processors: "Anthropic (Claude API) — EU inference endpoints"
        criticality: "Critical or Important function — regulatory reporting"


  # ---------------------------------------------------------------------------
  # 5.7  CHANGE AND RELEASE MANAGEMENT
  # ---------------------------------------------------------------------------
  change_and_release_management:

    - id: REQ-REL-001
      iso_control: "8.29 / 8.32 — Regression testing gate for validation rule changes"
      title: "Validation rule and pipeline regression test suite"
      layer: [L3_VALIDATION, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10, P11]
      regulatory: [ISO27001, DORA, AI_ACT]
      description: >
        REQ-ISO-004 significant change category requires "regression test suite
        must pass" before production deployment of changes to validation rule
        logic, canonical model, XSD processing, AI model version, Claude API
        allowlist, or system prompt. This requirement defines and governs that
        suite. The suite is a mandatory gate in the CI/CD pipeline (REQ-REL-002)
        and cannot be bypassed for any change category. Ownership sits with CTO;
        execution is automated on every relevant build.
      suite_scope:
        validation_rules:
          description: >
            One test per ESMA validation rule and per active NCA override rule.
            Each test asserts the expected PASS / CAF / CAM / DQ-WARNING outcome
            for a defined canonical record input. Tests are generated from
            aifmd_annex_iv_validation_rules.yaml and NCA override files
            so that adding a new rule automatically adds a test.
          minimum_coverage:
            - "100% of active ESMA validation rules have at least one PASS test and one CAF/CAM test"
            - "100% of active NCA override rules have at least one test verifying override behaviour"
            - "100% of cross-field dependency rules have at least one test covering the dependency"
        pipeline_integration:
          description: >
            End-to-end pipeline smoke tests running a canonical record through
            all layers (L1 through L8) and asserting the correct final state.
            Covers at minimum: successful submission path, CAF-blocked path,
            AI transformation fallback path, manual override path.
          minimum_scenarios:
            - "Full pipeline: structured ingestion → AI transform → validation PASS → XML → MANUAL delivery"
            - "Full pipeline: validation CAF block → review gate hold — record does not proceed to XML"
            - "Full pipeline: AI transformation failure → graceful degradation → manual completion"
            - "Full pipeline: manual override of derived field → lock indicator set → history retained"
        xml_schema_conformance:
          description: >
            Generated XML validated against the current ESMA XSD schema for
            every test record. Fails the suite if any generated XML is
            schema-non-conformant.
          note: >
            When AIFMD 2.0 XSD is published (~April 2027), a parallel schema
            conformance test set must be added. The suite must support running
            against multiple schema versions simultaneously.
      gate_behaviour:
        significant_changes: >
          Suite must pass with zero failures before any significant change
          (as defined in REQ-ISO-004) is promoted to staging or production.
          A single test failure blocks promotion.
        standard_changes: >
          Suite runs on every build. Failures block promotion to staging.
          Promotion to production requires a passing suite run on the staging
          build, not just on the code build.
        emergency_changes: >
          Suite runs on the emergency fix. If a pre-identified subset of the
          suite passes (emergency fast-track set defined in the runbook), the
          fix may be promoted under expedited review per REQ-ISO-004. Full
          suite must pass within 24 hours of emergency deployment; failure
          triggers immediate rollback assessment.
      ownership:
        suite_ownership: "CTO — defines scope, coverage thresholds and pass criteria"
        execution: "Automated CI/CD pipeline — no manual execution path permitted"
        review_cadence: >
          Suite coverage reviewed at each quarterly Head of Engineering sync
          and at each ESMA guidance update. New rules added to validation files
          automatically extend the suite via code generation — no manual
          test authoring required for standard rules.
      requirements:
        - "Suite executed automatically on every build; results surfaced in CI/CD dashboard with per-rule pass/fail detail"
        - "Test input data is synthetic only; no production client data permitted in test suite per REQ-ISO-007 and REQ-ISO-008"
        - "New rule added to aifmd_annex_iv_validation_rules.yaml automatically generates at least one PASS test and one failing test within the suite generation process"
        - "Suite results retained for minimum 3 years as evidence for ISAE 3402, SOC 2 and ISO 27001 surveillance audits"
        - "Head of Engineering reports suite coverage and failure trend to CTO monthly; regression in coverage below threshold triggers immediate escalation"
      acceptance_criteria:
        - "On first production release: 100% of ESMA validation rules and active NCA override rules have passing test cases in the suite"
        - "Promoting a significant change to production with a failing suite result is architecturally blocked — no manual override path exists"
        - "Suite run time does not exceed 15 minutes for the full set"
        - "Suite results exportable as a structured report for auditor review"

    - id: REQ-REL-002
      iso_control: "8.32 / 8.29 — CI/CD pipeline integrity and mandatory gates"
      title: "CI/CD pipeline: formal definition, mandatory gates and integrity"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P6, P8, P9, P10]
      regulatory: [ISO27001, DORA]
      description: >
        The CI/CD pipeline is the sole permitted path for all code, rule and
        configuration changes to staging and production. No manual deployment
        to either environment is permitted under any circumstances, including
        emergency changes. All mandatory quality, security and compliance
        gates are enforced in the pipeline and cannot be disabled or bypassed
        via any configuration or operational action.
      mandatory_gates_per_build:
        code_quality:
          - "Linting: build fails on linting errors in production code paths"
          - "Unit test suite: build fails on any failing unit test"
          - "Test coverage: build fails if coverage for validation layer (L3) falls below 95%; for all other layers below 80%"
        security:
          - "SAST: build fails on HIGH or CRITICAL findings (per REQ-SEC-002)"
          - "Dependency vulnerability scan: build fails on CRITICAL findings; HIGH findings require documented exception"
        regression:
          - "Regression test suite (REQ-REL-001): build fails on any failure for significant changes; must pass before staging promotion for all changes"
        staging_promotion:
          - "DAST scan against staging must pass before production promotion (per REQ-ISO-003)"
          - "Staging acceptance test (REQ-REL-004) must pass before production promotion"
          - "Production deployment approval gate (REQ-REL-003) must be satisfied"
        compliance_gates:
          - "REQ-AIACT-002 classification flag check: automated test verifies ai_produces_regulatory_output is FALSE; build fails if check fails"
          - "gdpr_blocker gate (REQ-INT-003, Phase 2): production promotion of a gdpr_blocker requirement blocked until RoPA status is SIGNED_OFF"
      pipeline_integrity:
        - "Pipeline configuration stored in version control; changes to the pipeline itself are subject to REQ-ISO-004 change management"
        - "Deployments are signed; signature verified before execution in staging and production"
        - "Pipeline infrastructure is separated from application infrastructure; compromise of the application environment does not grant pipeline modification rights"
        - "All pipeline executions logged with build ID, git commit hash, gate results, approver identity, deployment timestamp"
      no_manual_deployment:
        - "Production and staging environments are locked — no direct SSH, console or infrastructure-level deployment is permitted outside the pipeline"
        - "Emergency changes use an expedited pipeline path with a defined fast-track gate set per REQ-ISO-004; they do not bypass the pipeline"
        - "EAGLE_ADMIN cannot trigger an ad-hoc deployment; all production changes originate from a pipeline run"
      requirements:
        - "Pipeline build logs retained for minimum 3 years for ISAE 3402 evidence"
        - "Failed gate results include sufficient detail for the developer to diagnose and resolve without pipeline access"
        - "Pipeline health (build success rate, gate failure breakdown) visible to CTO in MOD-MANAGEMENT view"
      acceptance_criteria:
        - "Attempt to deploy directly to production bypassing the pipeline is blocked at the infrastructure layer; no pipeline workaround exists"
        - "On first production release: all mandatory gates are active and verified as non-bypassable by an independent review"

    - id: REQ-REL-003
      iso_control: "8.32 — Production deployment approval gate"
      title: "Four-eyes production deployment approval gate"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P8, P10]
      regulatory: [ISO27001, DORA]
      description: >
        All production deployments require explicit approval by an authorised
        approver who is distinct from the engineer who authored the change.
        This four-eyes principle applies to all change categories and is
        enforced in the CI/CD pipeline (REQ-REL-002); no deployment proceeds
        without a recorded approval.
      approval_requirements_by_category:
        standard:
          approver: "Any EAGLE_ADMIN or Head of Engineering (distinct from the change author)"
          form: "Explicit approval action in the CI/CD pipeline"
          timing: "Before production promotion; after staging acceptance criteria pass (REQ-REL-004)"
        significant:
          approver: "Head of Engineering (technical approval) AND Head of Compliance and Risk (compliance sign-off)"
          note: "Both approvals required; either alone is insufficient"
          form: "Explicit approval actions in the CI/CD pipeline for each approver"
          timing: "After regression test suite passes (REQ-REL-001) and staging acceptance criteria pass (REQ-REL-004)"
        emergency:
          approver: "CTO (or nominated delegate) for immediate approval; Head of Compliance and Risk retrospective sign-off within 48 hours"
          form: "Explicit CTO approval in pipeline; retrospective Compliance sign-off recorded in change log"
          note: "Emergency path does not remove the four-eyes principle — CTO approval is the second pair of eyes"
      constraints:
        - "Author of a change cannot be their own approver under any circumstances"
        - "Approval is tied to the specific pipeline build ID being promoted — approving build N does not authorise build M"
        - "Approvals are logged in the change log (REQ-ISO-004) with approver identity, role, timestamp and build ID"
        - "During Phase 1 with a single founder, CTO acts as approver for standard changes authored by Head of Engineering; for changes authored by the CTO, Head of Engineering or COO acts as second approver"
      requirements:
        - "Approval gate is enforced in the CI/CD pipeline; cannot be bypassed via configuration"
        - "Pending approvals visible to approver in MOD-ADMIN dashboard with change summary, diff link, gate results"
        - "Standard changes pending > 24 hours trigger a reminder; significant changes pending > 48 hours trigger EAGLE_ADMIN escalation"
      acceptance_criteria:
        - "Attempt to promote a build to production without approval is blocked at the pipeline layer"
        - "Approval audit trail for any production deployment retrievable within 5 minutes for ISAE 3402 audit"

    - id: REQ-REL-004
      iso_control: "8.29 — Staging environment acceptance criteria"
      title: "Staging acceptance test: mandatory pass criteria before production promotion"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7, P8, P10]
      regulatory: [ISO27001, DORA]
      description: >
        REQ-ISO-004 requires staging validation before production promotion.
        This requirement defines what "validated in staging" means. A staging
        acceptance run is a defined automated test execution against the staging
        environment using synthetic data. All criteria must pass before
        production promotion is permitted.
      acceptance_test_set:
        smoke_tests:
          description: "Automated tests verifying all MUST-priority pipeline paths are operational"
          required_scenarios:
            - "Structured file ingestion → canonical record created with correct field values"
            - "AI transformation → candidate mapping returned within SLA (< 30 seconds)"
            - "Deterministic validation → CAF/CAM errors correctly identified against known test records"
            - "Review gate → approval by authorised user promotes record to XML generation"
            - "XML generation → output validates against ESMA XSD schema"
            - "MANUAL delivery → packaged file available for download with correct naming"
            - "Audit trail → every pipeline stage has a corresponding audit event with correct lineage"
        nca_submission_path:
          description: "At least one end-to-end submission path per active NCA channel type must succeed"
          required: "MANUAL (always); DIRECT_API (where staging NCA sandbox available); ROBOT (staging portal where available)"
        security_gates:
          - "DAST scan against staging must return no HIGH or CRITICAL findings (per REQ-ISO-003)"
          - "Authentication and session management smoke: MFA challenge, session timeout, brute-force lockout"
        reference_data:
          - "ECB rate cache populated and returning correct rates for last business day"
          - "GLEIF LEI lookup returning expected result for a known test LEI"
      pass_criteria:
        - "All smoke test scenarios pass with zero failures"
        - "DAST scan has no blocking findings"
        - "No SYSTEM_ERROR status in any pipeline step across all test runs"
      failure_response:
        - "Any failure blocks production promotion until the failing test passes"
        - "Test results published to CI/CD pipeline with per-scenario detail"
        - "Failures older than 24 hours without resolution trigger EAGLE_ADMIN escalation"
      requirements:
        - "Staging acceptance test runs are fully automated; no manual test execution in the staging gate"
        - "Test execution uses synthetic data only (per REQ-ISO-007 and REQ-ISO-008)"
        - "Staging acceptance results logged with build ID and retained for 3 years"
      acceptance_criteria:
        - "First production release: all staging acceptance scenarios documented and passing"
        - "Promoting a build with a failing staging acceptance result is blocked in the pipeline"

    - id: REQ-REL-005
      title: "Change freeze window around NCA submission deadlines"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P7, P8]
      regulatory: [DORA, AIFMD]
      description: >
        NCA submission deadlines are non-recoverable. A defect introduced by a
        production deployment within the pre-deadline window could cause a
        missed deadline with direct regulatory consequence for clients. A
        mandatory change freeze applies to all standard changes during the
        defined window. Only emergency changes (per REQ-ISO-004) may be
        deployed during a freeze and require CTO explicit approval.
      freeze_definition:
        trigger: >
          Any active client has an NCA submission deadline within the next
          5 business days. The freeze activates automatically based on the
          submission calendar (REQ-DAT-004).
        scope:
          frozen:
            - "Standard changes to application code"
            - "Standard changes to validation rule files"
            - "Standard changes to NCA override configuration files"
            - "Standard changes to AI model version or system prompt"
          permitted:
            - "Emergency changes (REQ-ISO-004 emergency category) — CTO approval required"
            - "Security patches for CRITICAL vulnerabilities — CTO approval required; post-deployment verification mandatory"
            - "Infrastructure-only changes with no application code change — CTO approval required"
        freeze_calendar:
          - "Submission calendar queried daily; freeze window computed automatically per active client deadline set"
          - "EAGLE_ADMIN and CTO notified at freeze activation and deactivation"
          - "Freeze window visible in the CI/CD pipeline dashboard; standard change promotions blocked at the pipeline gate during freeze"
      requirements:
        - "CI/CD pipeline enforces the freeze automatically: standard change promotion to production is blocked during an active freeze window"
        - "Emergency change during a freeze requires CTO explicit approval recorded in the pipeline and the change log"
        - "CTO can temporarily lift the freeze for a specific build with documented justification; lift action logged"
        - "Planned releases should be timed to complete production promotion at least 5 business days before the next deadline cluster"
      acceptance_criteria:
        - "Attempt to promote a standard change to production during an active deadline freeze window is blocked by the pipeline gate"
        - "Freeze activation and deactivation events visible in change log with affected deadline context"

    - id: REQ-REL-006
      title: "Post-deployment verification and rollback trigger conditions"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7, P8, P10]
      regulatory: [DORA, ISO27001]
      description: >
        Every production deployment is followed by a mandatory post-deployment
        verification window. During this window, defined health checks and
        error rate monitors are active. If any trigger condition is met, an
        automatic rollback assessment is initiated. The deployment is declared
        stable only after the verification window closes without any trigger
        being met.
      post_deployment_verification:
        window_duration: "30 minutes from production deployment completion"
        automated_checks:
          - "Pipeline smoke test (subset of REQ-REL-004 smoke tests) executed against production within 5 minutes of deployment"
          - "Validation engine error rate (SYSTEM_ERROR per 100 pipeline executions): trigger if > 0.5% within window"
          - "API 5xx error rate: trigger if > 1% sustained over 5 minutes"
          - "Submission queue depth above 3x baseline for sustained 10 minutes: trigger"
          - "Clock sync breach (REQ-ISO-006): any breach within window is a trigger"
        stability_declaration:
          - "Deployment declared STABLE after 30-minute window closes with no triggers fired"
          - "STABLE status logged in change log with build ID and verification run timestamp"
      rollback_trigger_response:
        automatic:
          - "Any trigger condition fires an immediate EAGLE_ADMIN and CTO alert"
          - "Submission queue paused automatically pending rollback decision"
        decision_authority:
          - "CTO or Head of Engineering makes rollback decision within 15 minutes of trigger alert"
          - "If no decision within 15 minutes: automatic rollback to last STABLE build is initiated"
        rollback_execution:
          - "Rollback to previous STABLE build via pipeline (not manual) — REQ-REL-002 no-manual-deployment applies"
          - "Rollback completes within 30 minutes of decision (REQ-ISO-004 rollback SLA)"
          - "Post-rollback: full verification window re-runs on the restored build"
          - "DORA incident record opened if the deployment caused client-visible service degradation"
      requirements:
        - "Post-deployment verification automation is part of the CI/CD pipeline (REQ-REL-002)"
        - "Rollback trigger log and decision record retained as part of the change log entry (REQ-ISO-004)"
        - "Previous STABLE build is always retained in the deployment pipeline until the new build achieves STABLE status"
      acceptance_criteria:
        - "Simulated trigger condition fires EAGLE_ADMIN and CTO alert within 5 minutes"
        - "Rollback to last STABLE build achievable within 30 minutes of decision"
        - "Post-deployment verification smoke test passes on at least one real production deployment before first client go-live"

    - id: REQ-REL-007
      title: "Release communication to clients"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P10, P13]
      regulatory: [DORA]
      description: >
        Clients must be able to understand what has changed in the Eagle system
        they depend on for regulatory reporting. A structured release communication
        process ensures appropriate notice periods and consistent information
        across all release types. Complements the DORA Art.30 contractual
        information pack (REQ-CPL-002) and the significant change notification
        in REQ-ISO-004.
      communication_tiers:
        tier_1_significant:
          trigger: "Significant change as defined in REQ-ISO-004 (validation rule logic, canonical model, XSD, AI model, allowlist, system prompt)"
          notice_period: "Minimum 5 business days before production deployment (per REQ-ISO-004)"
          content:
            - "Nature of the change in plain language"
            - "Impact on validation behaviour — which rules change, what outcomes change"
            - "Any required client action (e.g. resubmission of pending records)"
            - "Effective date of change"
            - "Rollback plan reference if the change causes unexpected client impact post-deployment"
          channel: "Direct notification to TENANT_ADMIN and COMPLIANCE_REVIEWER of all active tenants"
        tier_2_standard:
          trigger: "Any production deployment with new features, workflow changes, or UI changes visible to clients"
          notice_period: "Release notes published no later than 24 hours after production deployment"
          content:
            - "Release version identifier (per REQ-REL-010)"
            - "Summary of changes: new features, resolved issues, workflow changes"
            - "No action required note if applicable"
          channel: "In-application release notes accessible from client dashboard; email to TENANT_ADMIN optional"
        tier_3_emergency:
          trigger: "Emergency change as defined in REQ-ISO-004"
          notice_period: "Post-deployment notification within 4 hours of deployment completion"
          content:
            - "Nature of the emergency and resolution"
            - "Any client-visible impact during the incident window"
            - "DORA incident reference if applicable"
          channel: "Direct notification to TENANT_ADMIN; linked to DORA incident record if applicable"
      requirements:
        - "Release notes for Tier 2 and Tier 3 events stored in the application and accessible to TENANT_ADMIN at any time"
        - "Tier 1 communication log (who was notified, when, what content) retained for DORA Art.30 evidence"
        - "Communication templates for each tier maintained in version control alongside application code"
      acceptance_criteria:
        - "First significant post-launch change: Tier 1 notification sent to all active TENANT_ADMINs at least 5 business days before deployment"
        - "Release notes for every standard production deployment available in-application within 24 hours of deployment"

    - id: REQ-REL-008
      iso_control: "8.9 — Configuration management via Infrastructure as Code"
      title: "Infrastructure as Code: all environments defined in version-controlled IaC"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P6, P9, P10]
      regulatory: [ISO27001, DORA]
      description: >
        All infrastructure components — networking, compute, databases, queue
        services, monitoring, and access controls — for all environments
        (development, staging, production) are defined exclusively in
        version-controlled IaC. No infrastructure configuration may be applied
        manually outside the IaC pipeline. This ensures environments are
        reproducible, auditable, and consistent; and is a prerequisite for
        configuration drift detection (REQ-REL-009).
      requirements:
        - "All AWS infrastructure defined in IaC (Terraform, CDK or equivalent); no manual console changes to production or staging"
        - "IaC configuration stored in version control alongside application code; changes subject to REQ-ISO-004 change management"
        - "IaC includes: VPC/networking, security groups, RDS configuration, queue configuration, IAM roles and policies, KMS key configuration, CloudWatch alarms"
        - "Environment creation from IaC definition must be fully automated — spinning up a new staging environment requires no manual steps"
        - "No credentials or secrets in IaC configuration; all secrets referenced from a secrets manager (AWS Secrets Manager or equivalent)"
        - "IaC change history provides a complete audit trail of infrastructure changes for ISAE 3402 evidence"
      acceptance_criteria:
        - "A complete new staging environment can be created from the IaC definition within 60 minutes with no manual steps"
        - "IaC audit trail for any infrastructure change retrievable in under 5 minutes"

    - id: REQ-REL-009
      iso_control: "8.9 / 8.16 — Configuration drift detection and alerting"
      title: "Automated configuration drift detection between IaC definition and live environment"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1.5
      principles: [P9, P10]
      regulatory: [ISO27001, DORA]
      description: >
        Automated daily reconciliation between the IaC definition in version
        control (REQ-REL-008) and the actual state of production and staging
        infrastructure. Any divergence is treated as an anomaly and triggers
        an EAGLE_ADMIN alert. Drift indicates either an unauthorised manual
        change or an IaC failure and must be investigated and resolved.
      requirements:
        - "Automated IaC plan or equivalent drift check runs daily against production and staging environments"
        - "Any detected drift triggers an EAGLE_ADMIN alert within 1 hour of detection"
        - "Drift alert includes: resource affected, expected state (IaC definition), actual state (live), detected timestamp"
        - "Drift older than 24 hours without resolution triggers escalation to CTO"
        - "Drift events logged in audit trail; open drift items visible in MOD-ADMIN security dashboard"
        - "Drift check results retained for 3 years as ISO 27001 and DORA control evidence"
      acceptance_criteria:
        - "Simulated manual infrastructure change detected and alerted within 1 hour of detection run"
        - "Drift check result dashboard visible to EAGLE_ADMIN showing last run timestamp and any open items"

    - id: REQ-REL-010
      iso_control: "8.32 — Release record and semantic versioning"
      title: "Formal release record: semantic versioning tying software, rules and configuration"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P8, P10, P13]
      regulatory: [ISO27001, DORA]
      description: >
        Every production deployment produces a formal release record identified
        by a semantic version (MAJOR.MINOR.PATCH). The release manifest ties
        together the application software version, validation rule file version,
        NCA override file versions, AI model version, and Claude API allowlist
        version. This is the authoritative version reference for the change log,
        client communications, audit trail, and ISAE 3402 evidence.
      semantic_versioning:
        MAJOR: "Breaking change to validation behaviour, canonical data model, or XSD output format"
        MINOR: "New feature, new NCA support, or non-breaking behaviour change"
        PATCH: "Bug fix, security patch, or configuration-only change with no behavioural impact"
        note: >
          Version increments are determined by the CTO at each release.
          Significant changes (REQ-ISO-004) always produce at least a MINOR version bump.
      release_manifest:
        required_fields:
          - "Release version (MAJOR.MINOR.PATCH)"
          - "Release date and deployment timestamp"
          - "Git commit hash for application code"
          - "Version of aifmd_annex_iv_validation_rules.yaml (or successor)"
          - "Version of each active NCA override file"
          - "AI model identifier and version in use at deployment"
          - "Claude API allowlist file version"
          - "IaC version (git commit hash)"
          - "Summary of changes (linked to change log entries)"
          - "Staging acceptance test run ID (REQ-REL-004) confirming this build passed"
          - "Approver identity and approval timestamp (REQ-REL-003)"
      requirements:
        - "Release manifest generated automatically by CI/CD pipeline at production deployment"
        - "Release manifest stored immutably in audit trail (L8_AUDIT) alongside deployment event"
        - "Current release manifest accessible to EAGLE_ADMIN from MOD-ADMIN dashboard"
        - "Historical release manifests searchable by version, date, and component version"
        - "Validation reports (REQ-MOD-001) reference the application release version in addition to the rule file version"
        - "Release version surfaced to TENANT_ADMIN in the application UI (e.g. footer or about screen)"
      acceptance_criteria:
        - "Release manifest for any production deployment retrievable within 5 minutes for auditor review"
        - "Validation report references the correct release version when queried post-deployment"


  # ---------------------------------------------------------------------------
  # 5.8  ENGINEERING OPERATIONS
  # ---------------------------------------------------------------------------
  engineering_operations:

    - id: REQ-ENG-001
      title: "Production code test coverage thresholds"
      layer: [L1_INGESTION, L2_TRANSFORMATION, L3_VALIDATION, L4_CANONICAL,
              L5_REVIEW, L6_XSD, L7_SUBMISSION, L8_AUDIT, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P5, P8, P10]
      regulatory: [ISO27001, DORA]
      description: >
        Minimum automated test coverage thresholds enforced in the CI/CD
        pipeline for all production code. Two tiers apply: a higher threshold
        for core reporting logic where a gap could produce a silent compliance
        failure, and a standard threshold for all remaining production code.
        Coverage is measured as line coverage by the automated test suite;
        manual or exploratory tests do not count toward these thresholds.
      coverage_tiers:
        core_reporting:
          definition: >
            All code in pipeline layers L2 (transformation), L3 (validation),
            L4 (canonical model), L6 (XSD generation), and L7 (submission
            formatting and delivery). Includes all validation rule logic,
            canonical field derivation, XSD serialisation, and submission
            channel adapters.
          threshold: "90% line coverage minimum"
          rationale: >
            A coverage gap in these layers could produce a silent compliance
            failure: incorrect validation, wrong field derivation, or malformed
            submission. 90% is the minimum acceptable confidence level for
            compliance-critical code in a regulated reporting factory.
        all_other_production_code:
          definition: >
            All remaining production code: ingestion (L1), review gate (L5),
            audit trail (L8), orchestration (L9), IAM (L11), and all
            application-level modules (MOD-ADMIN, MOD-MANAGEMENT, MOD-CLIENT,
            MOD-API, MOD-GTM, MOD-TRIAL, MOD-BILLING).
          threshold: "80% line coverage minimum"
      requirements:
        - "Coverage thresholds enforced as hard gates in CI/CD pipeline (REQ-REL-002); builds below threshold blocked from promotion to staging"
        - "Coverage report generated on every build; per-layer and per-module breakdown surfaced in CI/CD dashboard"
        - "Coverage trend tracked over time; regression of more than 2 percentage points from prior release triggers Head of Engineering alert"
        - "Test input data is synthetic only; no production client data permitted in test suite (REQ-ISO-007, REQ-ISO-008)"
        - "Coverage results retained for minimum 3 years as evidence for ISAE 3402 and ISO 27001 surveillance audits"
        - "Head of Engineering reports coverage status to CTO at each monthly engineering review"
      acceptance_criteria:
        - "Build with core reporting layer coverage below 90% is blocked at the pipeline gate; no manual override path exists"
        - "Build with any other production code coverage below 80% is blocked at the pipeline gate"
        - "Coverage report for any production build retrievable within 5 minutes for auditor review"

    - id: REQ-ENG-002
      title: "Incident runbook management"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7, P10]
      regulatory: [ISO27001, DORA]
      description: >
        Incident runbooks are the first-response reference for MAJOR and
        SIGNIFICANT DORA incidents. The version-controlled repository is the
        single source of truth; MOD-ADMIN provides a read interface for
        EAGLE_ADMIN during an incident. Runbooks must be live from the first
        day of production — reactive runbook creation during an incident is
        not acceptable in a regulated reporting factory.
      runbook_inventory_phase_1:
        required_runbooks:
          - "Pipeline total failure: all submissions blocked"
          - "AI transformation service unavailable: fallback to manual mapping"
          - "Validation engine fault: SYSTEM_ERROR status triggered"
          - "Direct API submission failure: NCA endpoint unreachable"
          - "Robot portal failure: portal login or session failure"
          - "Database unavailability: read or write path down"
          - "Authentication service failure: users unable to log in"
          - "Scheduled deadline miss: submission window closing with unsubmitted records"
        runbook_structure:
          - "Incident classification (MAJOR / SIGNIFICANT / MINOR per DORA Art.3)"
          - "Detection signal: monitoring alert name or manual report path"
          - "Immediate containment actions (first 15 minutes)"
          - "Escalation path: who to contact, in what order, via what channel"
          - "Root cause investigation steps"
          - "Recovery procedure"
          - "Client notification trigger: when to escalate to COO for client comms"
          - "Post-recovery verification checklist"
      repository_requirements:
        - "Runbooks stored as markdown files in the version-controlled engineering repository"
        - "Runbook changes subject to standard code review process (REQ-REL-002)"
        - "Each runbook carries a last_reviewed date; runbooks not reviewed within 90 days flagged in MOD-ADMIN"
        - "New runbook created within 5 business days of any MAJOR or SIGNIFICANT incident not covered by an existing runbook"
        - "Runbook updated within 5 business days after any incident reveals a gap or error in the procedure"
      app_interface_requirements:
        - "MOD-ADMIN provides a runbook library: all runbooks readable by EAGLE_ADMIN without repository access"
        - "Runbook library synced from repository on each production deployment"
        - "Runbooks searchable by keyword and filterable by incident type"
        - "Stale runbook indicator (last_reviewed > 90 days) visible in MOD-ADMIN listing"
      acceptance_criteria:
        - "All Phase 1 required runbooks present in repository before first client go-live"
        - "EAGLE_ADMIN can read any runbook in MOD-ADMIN within 30 seconds without repository access"
        - "Runbook updated after incident; updated version visible in MOD-ADMIN within one deployment cycle"

    - id: REQ-ENG-003
      title: "Monitoring and alerting infrastructure"
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P10]
      regulatory: [ISO27001, DORA, NIS2]
      description: >
        Defines the minimum monitoring coverage, alerting thresholds, and
        dashboard requirements for the production system. Tooling choice is
        left to the Head of Engineering; this requirement specifies what must
        be monitored and what must trigger an alert, not how. The system
        health dashboard is accessible to both CTO and COO — each escalates
        different failure types per the DORA incident lanes defined in
        project_eagle_head_engineering_v1_0.md section 4.5.
      monitoring_coverage:
        infrastructure_layer:
          - "API gateway availability and error rate (5xx) per endpoint"
          - "Worker pool utilisation per pipeline stage"
          - "Queue depth per pipeline stage (ingestion, transformation, validation, submission)"
          - "Database connection pool availability and query latency (p50, p95, p99)"
          - "Storage utilisation and I/O per environment"
          - "Memory and CPU utilisation per service"
        pipeline_layer:
          - "Submission pipeline success rate: submissions completed without manual intervention"
          - "Submission pipeline error rate: SYSTEM_ERROR status per hour"
          - "AI transformation failure rate: fallback-to-manual trigger rate per hour"
          - "Validation engine fault rate: distinct from legitimate CAF/CAM outcomes"
          - "NCA submission channel error rate per channel type (direct API, robot, manual)"
          - "Deadline proximity: submissions not in SUBMITTED status within 24 hours of active deadline"
        application_layer:
          - "Authentication failure rate"
          - "Active user session count"
          - "EAGLE_ADMIN action rate (anomaly detection baseline)"
      alerting_tiers:
        immediate_oncall:
          recipients: "Primary on-call engineer (REQ-ENG-010 in Phase 2; CTO / Head of Engineering in Phase 1)"
          triggers:
            - "API availability drops below 99.5% in any 15-minute window"
            - "Any SYSTEM_ERROR in the validation engine"
            - "Queue depth exceeds 1,000 items with no active workers"
            - "Database write failure on canonical record"
            - "Any submission deadline within 24 hours with records not in SUBMITTED status"
        eagle_admin_alert:
          recipients: "EAGLE_ADMIN and Head of Engineering"
          triggers:
            - "AI transformation fallback rate exceeds 10% of submissions in any 1-hour window"
            - "NCA submission error rate exceeds 5% on any single channel in any 1-hour window"
            - "Infrastructure cost anomaly: daily spend exceeds 2x 30-day average"
            - "Authentication failure rate exceeds 20 failures in any 5-minute window"
        cto_escalation:
          recipients: "CTO"
          triggers:
            - "Any MAJOR DORA incident classification triggered (REQ-ISO-005)"
            - "Deployment failure in production after watch window (REQ-REL-006)"
            - "Primary and secondary on-call both unresponsive within 30 minutes (Phase 2)"
      dashboard_requirements:
        - "System health dashboard accessible to EAGLE_ADMIN, CTO, and COO without additional login beyond Eagle application"
        - "Dashboard shows real-time status for all monitored metrics with configurable time window (1h, 6h, 24h, 7d)"
        - "Dashboard highlights any metric currently in alert state with classification (IMMEDIATE / EAGLE_ADMIN / CTO)"
        - "Submission deadline proximity view: all active clients with deadlines within 5 business days and current submission status"
        - "Pipeline health summary: current queue depth, worker pool status, last successful end-to-end submission"
      requirements:
        - "Monitoring infrastructure live from first day of production; no production operation without monitoring"
        - "Every alert has a defined recipient and acknowledged escalation path before going live"
        - "Monitoring configuration version-controlled and deployed via IaC (REQ-REL-008)"
        - "Monitoring coverage reviewed and updated after every MAJOR incident"
        - "All alert firings logged with timestamp, metric value, threshold, and recipient acknowledgement"
      acceptance_criteria:
        - "Simulated pipeline failure triggers IMMEDIATE alert within 2 minutes"
        - "System health dashboard load time under 3 seconds for EAGLE_ADMIN"
        - "Submission deadline proximity view correctly shows all active clients with deadlines within 5 business days"

    - id: REQ-ENG-004
      title: "Infrastructure cost tracking and reporting"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P10, P12, P14]
      regulatory: []
      description: >
        Infrastructure cost per submission is a key unit economics input.
        REQ-OPS-010 tracks cost-per-submission at the operational model level;
        this requirement defines the engineering-layer cost tracking that
        feeds that model: per-environment breakdown, per-category allocation,
        and a monthly cost view in MOD-MANAGEMENT alongside COO and CFO views.
        All cost data stored as first-class DB records per P14; no cost
        tracking in spreadsheets or external files.
      cost_tracking_scope:
        environments:
          - "Production — primary cost environment"
          - "Staging — maintained continuously; cost tracked separately"
          - "Development — tracked at aggregate level"
        cost_categories:
          - "Compute: API gateway, worker pool, orchestration services"
          - "Storage: database (primary + replica), object store, backup"
          - "AI model inference: Claude API cost per period (token-based)"
          - "NCA submission infrastructure: robot execution environment"
          - "Monitoring and observability tooling"
          - "Third-party APIs: GLEIF, ECB rate feed (if applicable)"
        derived_metrics:
          cost_per_submission: "Total production cost / total submissions processed in period"
          cost_per_aif: "Total production cost / total AIF records processed in period"
          ai_cost_share: "Claude API cost as % of total infrastructure cost"
      db_schema:
        infrastructure_cost_records:
          fields:
            - "period_start, period_end (monthly granularity)"
            - "environment (production / staging / development)"
            - "cost_category (compute / storage / ai_inference / submission / monitoring / third_party)"
            - "provider_reference (cloud billing export reference or invoice ID)"
            - "amount_eur"
            - "recorded_by (EAGLE_ADMIN identity), recorded_at"
        cost_per_submission_snapshot:
          description: "Derived record computed monthly; feeds REQ-OPS-010 simulation tool"
          fields:
            - "period, submissions_processed, aif_records_processed"
            - "total_cost_eur, cost_per_submission_eur, cost_per_aif_eur, ai_cost_share_pct"
      mod_management_view:
        location: "MOD-MANAGEMENT — engineering cost subview; accessible to EAGLE_ADMIN, CTO, CFO"
        required_elements:
          - "Monthly cost trend chart: total production cost by month for trailing 12 months"
          - "Cost breakdown by category for selected month"
          - "Cost-per-submission trend: trailing 12 months alongside submission volume"
          - "AI inference cost share trend: Claude API cost as % of total by month"
          - "Environment comparison: production vs staging cost ratio"
          - "Anomaly indicator: month where cost-per-submission deviates more than 20% from 3-month average"
      requirements:
        - "Infrastructure cost records entered by EAGLE_ADMIN monthly from cloud provider billing exports"
        - "Cost-per-submission snapshot computed automatically on first business day of each month"
        - "Cost records stored in DB as first-class records per P14; CSV or spreadsheet exports are views only"
        - "Head of Engineering reviews cost-per-submission trend with CFO quarterly"
        - "Cost anomaly (month-on-month increase > 30%) triggers automatic alert to CTO and CFO"
      acceptance_criteria:
        - "Cost-per-submission for any historical month computable within 10 seconds from DB"
        - "MOD-MANAGEMENT engineering cost view accessible to CFO without additional login"
        - "Cost anomaly alert fires within 24 hours of cost record entry that triggers the threshold"

    - id: REQ-ENG-005
      title: "SLO framework per system component"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1.5
      principles: [P1, P7, P10, P14]
      regulatory: [DORA, ISO27001]
      description: >
        REQ-RES-002 defines a single system-wide availability target (99.5%).
        This requirement extends that into a formal SLO framework with
        component-level targets for availability, latency, and error rate.
        SLO performance is stored as first-class DB records per P14 and
        reviewed monthly. The framework is a prerequisite for the engineering
        metrics dashboard (REQ-ENG-008) and the on-call escalation model
        (REQ-ENG-010).
      slo_targets:
        pipeline_ingestion:
          availability: "99.5% — successful ingestion events / total ingestion attempts per month"
          latency_p95: "< 5 seconds from upload receipt to canonical record created"
          error_rate: "< 0.5% SYSTEM_ERROR responses on ingestion endpoint"
        ai_transformation:
          availability: "98.0% — Claude API calls returning a structured response / total calls (degraded-mode counts as available)"
          latency_p95: "< 30 seconds per file"
          fallback_rate: "< 5% of files requiring manual completion after AI fallback"
        validation_engine:
          availability: "99.9% — any SYSTEM_ERROR on validation engine is a MAJOR incident trigger"
          latency_p95: "< 5 seconds per record"
          error_rate: "0% SYSTEM_ERROR target; any occurrence triggers IMMEDIATE alert (REQ-ENG-003)"
        submission_delivery:
          availability: "99.5% — successful transmission events / total submission attempts per month"
          latency_p95: "< 15 minutes from APPROVED status to transmission complete (direct API channel)"
          error_rate: "< 1% permanent submission failure after all retries exhausted"
        application_api:
          availability: "99.5% — measured monthly excluding planned maintenance (REQ-RES-002)"
          latency_p95: "< 2 seconds for dashboard load (REQ-PER-001)"
          error_rate: "< 0.1% 5xx responses on all API endpoints"
      slo_management:
        db_schema:
          slo_records:
            fields:
              - "component, period_start, period_end"
              - "slo_type (availability / latency_p95 / error_rate / fallback_rate)"
              - "target_value, actual_value, slo_met (boolean)"
              - "error_budget_consumed_pct"
              - "measurement_source (monitoring system reference)"
              - "recorded_at"
        error_budget_model:
          description: "Monthly error budget per component; consumed by downtime or threshold breaches"
          alert_triggers:
            - "Error budget > 50% consumed within the first 15 days of a month triggers Head of Engineering review"
            - "Error budget exhausted in any month triggers CTO escalation and DORA resilience review"
      requirements:
        - "SLO targets defined per component before Phase 1.5 go-live; CTO approves targets"
        - "SLO performance measured automatically from monitoring infrastructure (REQ-ENG-003)"
        - "SLO records stored in DB per P14; no SLO tracking in spreadsheets or external files"
        - "Monthly SLO report generated automatically on first business day of month; reviewed by Head of Engineering and CTO"
        - "SLO breach (component misses target for the month) documented with root cause in SLO record"
        - "SLO targets reviewed annually or after any MAJOR incident affecting the component"
      acceptance_criteria:
        - "SLO dashboard showing all components and current-month performance accessible in MOD-ADMIN"
        - "Error budget exhaustion alert fires within 1 hour of threshold being crossed"
        - "Monthly SLO record generated automatically without manual trigger"

    - id: REQ-ENG-006
      title: "Schema migration framework for regulatory versioning"
      layer: [L2_TRANSFORMATION, L3_VALIDATION, L4_CANONICAL, L6_XSD]
      priority: SHOULD
      phase: 1.5
      principles: [P6, P10]
      regulatory: [ISO27001, DORA]
      description: >
        AIFMD 2.0 content is explicitly out of scope per OOS-001, pending
        ESMA ITS publication (~April 2027). However, the technical framework
        required to migrate canonical data model schemas, validation rule sets,
        and XSD structures across regulatory versions must be built in Phase
        1.5 — before the content change arrives. Without the framework, AIFMD
        2.0 delivery would require emergency architectural work under a hard
        regulatory deadline. This requirement covers the migration framework
        only; AIFMD 2.0 content requirements will be added in a future version.
      framework_scope:
        canonical_model_versioning:
          - "Schema version identifier on every canonical record (field: schema_version)"
          - "Forward migration functions: upgrade a v1 record to v2 schema without data loss"
          - "Backward compatibility: v1 records remain readable and processable under v2 application code"
          - "Migration dry-run mode: test migration against a full tenant dataset without committing changes"
        validation_rule_versioning:
          - "Validation rule files carry a schema_version scope tag per rule (YAML structure already supports this)"
          - "Validation engine routes records to the correct rule version based on canonical record schema_version"
          - "Both v1 and v2 rule sets can execute simultaneously during transition periods"
        xsd_versioning:
          - "XSD generation module parameterised by schema version; existing v1 generation path unchanged"
          - "XSD output tagged with schema_version; submission record references XSD version used"
        migration_tooling:
          - "Migration script format: versioned, idempotent, reversible"
          - "Migration executed as a significant change per REQ-ISO-004; Head of Engineering approves migration script"
          - "Dry-run report produced before any live migration: record count, field changes, validation outcome delta"
          - "Rollback procedure defined and tested for every migration script before production approval"
      requirements:
        - "Schema migration framework designed and documented before Phase 1.5 close"
        - "Framework tested against a synthetic dataset representing a full AIFMD Annex IV reporting cycle"
        - "Framework supports at minimum two concurrent schema versions running in parallel"
        - "Migration scripts stored in version-controlled repository alongside validation rule files (REQ-MOD-001)"
        - "Framework reviewed by Head of Compliance and Risk to confirm auditability of migrated records"
      acceptance_criteria:
        - "Synthetic v1→v2 migration dry-run completes without data loss on a 1,000-record dataset"
        - "v1 records remain accessible and processable after v2 migration in parallel-version test"
        - "Dry-run report produced within 10 minutes for a 1,000-record dataset"
      note: >
        AIFMD 2.0 content requirements are explicitly out of scope per OOS-001.
        This requirement governs the technical migration framework only.
        Content requirements will be added when ESMA publishes implementing
        technical standards (~April 2027).

    - id: REQ-ENG-007
      title: "Engineering onboarding and codebase documentation"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P10]
      regulatory: [ISO27001, DORA]
      description: >
        Principle 10 (Founder-independent by design) requires that the
        engineering team, processes, and codebase are understandable and
        operable by people who were not present at the start. This requirement
        formalises the minimum documentation artefacts required at first
        production release and defines a maintenance discipline to prevent
        decay. Documentation is stored in the version-controlled repository;
        MOD-ADMIN surfaces a links registry for EAGLE_ADMIN.
      required_documentation_phase_1:
        architecture_overview:
          content:
            - "Pipeline layer diagram (L1 through L11) with component descriptions"
            - "Data flow: canonical record lifecycle from ingestion to submission"
            - "AI boundary diagram: what enters Claude, what is returned, what validation enforces"
            - "Infrastructure topology: environments, services, dependencies"
            - "External dependencies: GLEIF, ECB, NCA APIs, Claude API"
          owner: "CTO (defines) — Head of Engineering (maintains)"
          format: "Markdown with diagrams in repository"
        codebase_guide:
          content:
            - "Repository structure: top-level directories and their purpose"
            - "Module-to-code mapping: directories implementing each application module"
            - "Key abstractions: canonical model, validation engine, orchestration pipeline"
            - "Configuration files: location and purpose of all external configuration (REQ-MOD-001)"
            - "Test structure: where tests live, how to run them, coverage report generation"
          owner: "Head of Engineering"
          format: "Markdown in repository"
        development_environment_setup:
          content:
            - "Prerequisites: language runtime, toolchain, container runtime"
            - "Step-by-step local environment setup from clean state"
            - "Test data: how to populate synthetic test data for local development"
            - "Running the pipeline locally: ingestion → validation → output"
            - "CI/CD pipeline: how to read pipeline results and diagnose a failing build"
          owner: "Head of Engineering"
          format: "Markdown in repository; executable setup script where practical"
        runbook_library:
          description: "Covered by REQ-ENG-002; cross-referenced here for completeness"
      maintenance_requirements:
        - "All required documentation present in repository before first client go-live"
        - "Architecture overview reviewed and updated at every significant feature addition (REQ-ISO-004)"
        - "Development environment setup guide tested on a clean machine at each new engineering hire"
        - "Documentation gap (required section missing or last updated > 6 months on a recently changed component) triggers Head of Engineering alert in MOD-ADMIN"
      acceptance_criteria:
        - "New engineer can run the full pipeline locally following the setup guide without assistance from founders"
        - "Architecture overview reviewed and signed off by CTO before first client go-live"
        - "All required documentation sections present and last_reviewed within 6 months at first go-live"

    - id: REQ-ENG-008
      title: "Engineering metrics dashboard"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1.5
      principles: [P10, P12, P14]
      regulatory: [DORA, ISO27001]
      description: >
        The four Head of Engineering KPIs not already surfaced in existing
        MOD-MANAGEMENT views — MTTR, deployment frequency, test coverage
        trend, and technical debt ratio — are formalised as DB-stored records
        and surfaced in MOD-MANAGEMENT as an engineering subview alongside
        the COO and CFO views. All metrics are stored as first-class DB records
        per P14. MTTR and deployment frequency are auto-populated from existing
        incident records (REQ-ISO-005) and release manifest records (REQ-REL-010);
        test coverage from CI/CD pipeline data (REQ-ENG-001); technical debt ratio
        entered manually by the Head of Engineering per sprint.
      metrics_definitions:
        mttr:
          definition: "Mean time to recovery: average elapsed time from MAJOR or SIGNIFICANT incident detection to system restoration"
          measurement: "Computed from incident records (REQ-ISO-005): resolution_at minus detected_at for MAJOR and SIGNIFICANT incidents in period"
          granularity: "Monthly rolling average; trailing 6-month trend"
        deployment_frequency:
          definition: "Number of successful production deployments per week"
          measurement: "Count of production deployment events in release manifest records (REQ-REL-010) per calendar week"
          granularity: "Weekly count; trailing 12-week trend"
        test_coverage_trend:
          definition: "Production code test coverage over time: core reporting tier and all-code tier separately"
          measurement: "Coverage percentage from CI/CD pipeline per production deployment (REQ-ENG-001)"
          granularity: "Per-deployment data point; trailing 12-deployment trend per tier"
          alert: "Downward trend crossing threshold defined in REQ-ENG-001 triggers Head of Engineering alert"
        technical_debt_ratio:
          definition: "Percentage of engineering sprint capacity allocated to maintenance and debt remediation vs new capability"
          measurement: "Manually recorded by Head of Engineering per sprint from sprint planning records"
          granularity: "Per-sprint; trailing 6-sprint trend"
          alert: "Ratio > 30% for two consecutive sprints triggers automatic alert to CTO"
      db_schema:
        engineering_metrics:
          fields:
            - "metric_type (mttr / deployment_frequency / test_coverage / technical_debt_ratio)"
            - "period_start, period_end"
            - "value (numeric), unit (minutes / deployments_per_week / percentage)"
            - "tier (core_reporting / all_code — for test_coverage only)"
            - "source (automatic / manual)"
            - "recorded_by, recorded_at"
      mod_management_view:
        location: "MOD-MANAGEMENT — engineering metrics subview; accessible to EAGLE_ADMIN, CTO, Head of Engineering only"
        required_elements:
          - "MTTR trend chart: trailing 6 months, MAJOR vs SIGNIFICANT breakdown"
          - "Deployment frequency chart: trailing 12 weeks"
          - "Test coverage trend: two lines (core reporting / all code), trailing 12 deployments, with threshold indicators"
          - "Technical debt ratio trend: trailing 6 sprints with 30% threshold indicator"
          - "Summary row: current-month values for all four metrics vs prior period"
      requirements:
        - "MTTR and deployment frequency populated automatically from existing DB records within 1 hour of source record creation"
        - "Test coverage populated automatically from CI/CD pipeline data (REQ-ENG-001)"
        - "Technical debt ratio entered manually by Head of Engineering per sprint; overdue entry (> 14 days after sprint close) triggers reminder"
        - "Engineering metrics view not accessible to tenant roles"
        - "Head of Engineering presents all four metrics to CTO at monthly engineering review"
      acceptance_criteria:
        - "MTTR value for any historical period auto-computed from incident records without manual input"
        - "Engineering metrics view loads within 3 seconds in MOD-MANAGEMENT"
        - "Technical debt ratio > 30% for two consecutive sprints generates automatic alert to CTO"

    - id: REQ-ENG-009
      title: "Post-incident root cause analysis process"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 2
      principles: [P7, P10, P11]
      regulatory: [DORA, ISO27001]
      description: >
        A written root cause analysis (RCA) is required after every MAJOR
        DORA incident and recommended after SIGNIFICANT incidents. The RCA is
        stored as a structured DB record linked to the technical incident
        record (REQ-ISO-005) and the operational client impact record
        (REQ-OPS-006). Remediation actions feed the DORA lessons-learned
        register (REQ-DORA-002) and the automation gap analysis (REQ-OPS-008).
        The RCA process is distinct from the immediate post-incident review
        (REQ-OPS-013): the post-incident review is operational; the RCA is
        technical and owned by the Head of Engineering.
      rca_scope:
        mandatory: "All MAJOR DORA incidents"
        recommended: "All SIGNIFICANT incidents at Head of Engineering discretion"
        deadline: "RCA completed and linked to incident record within 5 business days of incident resolution"
      rca_structure:
        incident_summary:
          - "Incident ID, classification, detection time, resolution time, MTTR"
          - "Affected components and pipeline layers"
          - "Client impact summary (reference to REQ-OPS-006 impact register)"
        timeline:
          - "Chronological sequence: first symptom → detection → escalation → containment → resolution"
          - "Each event timestamped from monitoring logs or audit trail"
        root_cause:
          - "Primary root cause: technical, process, or human factor"
          - "Contributing factors: conditions that enabled the primary cause to produce an incident"
          - "Detection gap: why was the incident not detected or contained earlier"
        remediation_actions:
          - "Immediate actions: taken during incident response"
          - "Short-term actions: to be completed within 30 days"
          - "Long-term actions: architectural or process improvements with target dates"
          - "Each action assigned to a named owner with a target completion date"
        lessons_learned:
          - "What worked well in the response"
          - "What would have reduced impact or accelerated resolution"
          - "Monitoring or runbook gaps identified (feeds REQ-ENG-003 and REQ-ENG-002 review cycles)"
      app_requirements:
        - "RCA record stored in DB linked to incident record (REQ-ISO-005) by incident_id"
        - "RCA status tracked: DRAFT / IN_REVIEW / APPROVED; APPROVED status requires CTO sign-off"
        - "Remediation actions in approved RCA automatically appear in DORA lessons-learned register (REQ-DORA-002)"
        - "MAJOR incident without an approved RCA within 5 business days triggers escalation alert to CTO"
        - "RCA records retained for minimum 5 years for ISAE 3402 and DORA audit purposes"
      acceptance_criteria:
        - "MAJOR incident without approved RCA within 5 business days generates automatic CTO alert"
        - "RCA remediation actions visible in DORA lessons-learned register without manual duplication"
        - "RCA record linked to incident record retrievable within 5 minutes for auditor review"

    - id: REQ-ENG-010
      title: "On-call rota and escalation procedures"
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 2
      principles: [P7, P10]
      regulatory: [DORA, ISO27001]
      description: >
        A formal on-call rota is required once the engineering team is large
        enough to sustain rotation (Phase 2, when 2+ engineers are available
        beyond the Head of Engineering). In Phase 1, the CTO and Head of
        Engineering share informal on-call coverage per the DORA incident
        lanes. This requirement formalises and operationalises that coverage
        as the team grows. The rota is directly coupled to the DORA incident
        classification model (REQ-DORA-001, REQ-ISO-005) and the monitoring
        alerting tiers (REQ-ENG-003).
      rota_structure:
        primary_oncall:
          description: "First responder for all IMMEDIATE-tier monitoring alerts (REQ-ENG-003)"
          rotation_cadence: "Weekly rotation"
          eligibility: "Head of Engineering and any senior engineers who have completed runbook training"
          response_time: "Acknowledge alert within 15 minutes; initial assessment communicated within 30 minutes"
        secondary_oncall:
          description: "Escalation contact if primary on-call cannot be reached within 30 minutes"
          rotation_cadence: "Weekly rotation, offset from primary"
          eligibility: "CTO or Head of Engineering — always one of these two in the secondary slot"
          response_time: "Acknowledge escalation within 30 minutes"
        cto_escalation:
          trigger: "MAJOR DORA incident classification; or primary and secondary both unresponsive within 30 minutes"
          response_time: "Acknowledge within 30 minutes; incident commander role for all MAJOR incidents"
      runbook_training_requirement:
        - "Engineer must complete structured runbook walkthrough before joining primary on-call rotation"
        - "Walkthrough covers all Phase 1 required runbooks (REQ-ENG-002)"
        - "Completion recorded in engineering team record with date and reviewer"
      rota_management:
        - "On-call schedule published at minimum 2 weeks in advance"
        - "Schedule stored in version-controlled engineering repository; not tracked exclusively in external tools"
        - "Schedule changes require Head of Engineering approval; last-minute change (< 24 hours) requires CTO notification"
        - "On-call schedule must not have coverage gaps; every hour has a named primary and secondary"
      post_oncall_review:
        - "Any shift with a MAJOR or SIGNIFICANT incident triggers a brief post-shift review (30 minutes)"
        - "Review covers: alerts received, response time, runbook adequacy, escalation decisions"
        - "Findings feed the runbook maintenance process (REQ-ENG-002)"
      requirements:
        - "On-call rota live before Phase 2 go-live; Head of Engineering owns the rota"
        - "All on-call engineers have completed runbook training before first shift"
        - "On-call escalation path tested quarterly: simulated IMMEDIATE alert through to CTO escalation"
        - "On-call schedule and escalation contacts accessible in MOD-ADMIN runbook library (REQ-ENG-002)"
      acceptance_criteria:
        - "Full on-call schedule for next 2 weeks published in repository before Phase 2 go-live"
        - "Quarterly escalation test completed with result documented; gaps remediated within 5 business days"
        - "Every production IMMEDIATE-tier alert has a named on-call recipient at time of firing (REQ-ENG-003)"


# =============================================================================
# 6.  ISO 27001:2022 APPLICATION-LEVEL CONTROLS  (14 requirements)
# =============================================================================

iso27001_controls:

  - id: REQ-ISO-001
    iso_control: "8.13 — Information backup"
    title: "Automated backup with verified recovery"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7, P9]
    regulatory: [ISO27001, DORA]
    requirements:
      - "Automated backup every 1 hour — aligned with RPO in REQ-RES-002"
      - "Backups encrypted at rest using same key management as production"
      - "Backups stored in a geographically separate AWS region"
      - "Integrity verified automatically after each backup via checksum"
      - "Full restoration test performed quarterly; results documented"
      - "Backup failure triggers immediate EAGLE_ADMIN alert"
      - "Audit trail backups immutable — backup storage prevents deletion or overwrite"
    acceptance_criteria:
      - "Full tenant restore from backup completes within 4-hour RTO"
      - "Restoration test results retained for ISO 27001 and ISAE 3402 evidence"
    bcp_reference:
      description: >
        RTO and RPO targets are defined in the ICT Business Continuity Plan (BCP)
        maintained externally by Head of Compliance & Risk and COO. The BCP document
        reference (version, location, last review date) is recorded as a metadata
        entry in MOD-MANAGEMENT compliance subview. The BCP is tested annually;
        test evidence is stored as an immutable artefact referenced from REQ-CR-006.
      bcp_metadata_fields:
        document_title:    "ICT Business Continuity Plan"
        owner:             "Head of Compliance & Risk (primary) / COO (co-owner)"
        version:           "Recorded in MOD-MANAGEMENT"
        storage_location:  "Recorded in MOD-MANAGEMENT"
        last_review_date:  "Recorded in MOD-MANAGEMENT"
        next_review_due:   "Annual from last review"
        annual_test_ref:   "Reference to test evidence artefact in audit trail"
      requirements:
        - "BCP document metadata maintained in MOD-MANAGEMENT compliance subview"
        - "EAGLE_ADMIN alerted when next_review_due is overdue by more than 5 business days"
        - "Annual BCP test results stored as immutable artefact (REQ-AUD-001) and referenced here"

  - id: REQ-ISO-002
    iso_control: "8.14 — Redundancy of information processing facilities"
    title: "Infrastructure redundancy and automatic failover"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7]
    regulatory: [ISO27001, DORA]
    requirements:
      - "Application deployed across minimum two AWS Availability Zones in primary EU region"
      - "Database uses multi-AZ deployment with automatic failover"
      - "Load balancer distributes traffic across healthy instances; unhealthy instances removed automatically"
      - "No single point of failure in the request path for any MUST-priority feature"
      - "Failover is automatic with no manual intervention for infrastructure-level failures"
    acceptance_criteria:
      - "Simulated AZ failure in staging results in service resumption within RTO"

  - id: REQ-ISO-003
    iso_control: "8.29 — Security testing in development and acceptance"
    title: "Security testing programme"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [ISO27001, NIS2, DORA]
    requirements:
      - "SAST in CI/CD pipeline; build fails on HIGH or CRITICAL findings"
      - "DAST run against staging before every production release"
      - "OWASP Top 10 coverage verified in DAST scan configuration"
      - "Penetration test before first client go-live and annually"
      - "All HIGH and CRITICAL findings tracked in remediation register with target dates"
      - "Security test results retained for minimum 3 years"
    acceptance_criteria:
      - "No production release with unresolved HIGH or CRITICAL SAST findings"
      - "Pen test report available for ISAE 3402 auditor review"

  - id: REQ-ISO-004
    iso_control: "8.32 — Change management"
    title: "Formal change management for application, rules and configuration"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P6, P8, P10]
    regulatory: [ISO27001, DORA]
    change_categories:
      standard: "Pre-approved low-risk repeatable changes — automated pipeline with peer review; four-eyes approval gate per REQ-REL-003"
      significant: "Changes to validation rule logic, canonical model, XSD processing, AI model version, Claude API allowlist, or system prompt — requires Head of Compliance and Risk sign-off AND Head of Engineering technical approval (REQ-REL-003); regression test suite (REQ-REL-001) must pass with zero failures; staging acceptance criteria (REQ-REL-004) must pass before production promotion"
      emergency: "Unplanned fix to restore service — CTO approval required; expedited pipeline path; post-implementation review within 48 hours; Head of Compliance and Risk retrospective sign-off within 48 hours"
    requirements:
      - "All changes deployed to staging and validated before production (staging acceptance criteria defined in REQ-REL-004)"
      - "Rollback procedure defined and tested per change category (rollback trigger conditions defined in REQ-REL-006)"
      - "Change log maintained with change ID, description, category, authoriser, timestamp, rollback status"
      - "Clients notified of significant changes affecting validation behaviour at least 5 business days in advance (full release communication tiers in REQ-REL-007)"
      - "Change freeze window enforced per REQ-REL-005 — standard changes blocked from production promotion during active NCA deadline freeze windows"
    acceptance_criteria:
      - "Change log exportable for ISAE 3402 auditor"
      - "Production change rollback achievable within 30 minutes"

  - id: REQ-ISO-005
    iso_control: "5.24 — Information security incident management"
    title: "Security incident management procedure"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7, P10]
    regulatory: [ISO27001, DORA, NIS2]
    security_incident_types:
      data_breach: "Unauthorised access to client fund data or personal data — AP notification within 72hr (GDPR)"
      unauthorised_access: "Authentication bypass or privilege escalation — revoke sessions, force reset"
      audit_trail_tamper: "Attempt to modify or delete audit records — treat as MAJOR incident"
      ai_output_manipulation: "Prompt injection detected — quarantine batch, notify client, review AI output"
    requirements:
      - "Incident response runbook per type maintained in system"
      - "EAGLE_ADMIN receives automated alerts for all incident types"
      - "Post-incident report retained for minimum 3 years"
      - "Incident register exportable for ISAE 3402 and ISO 27001 surveillance audit"
      - "Lessons-learned section in post-incident report; improvements tracked to closure"

  - id: REQ-ISO-006
    iso_control: "8.17 — Clock synchronisation"
    title: "Authoritative time source for audit timestamps"
    layer: [L8_AUDIT]
    priority: MUST
    phase: 1
    principles: [P8, P9]
    regulatory: [ISO27001, DORA]
    description: >
      All audit timestamps must originate from a single authoritative time source.
      Submission timestamps have direct regulatory significance under DQEF DQ-T-001
      and DQ-T-002 — clock drift could affect deadline compliance evidence.
    requirements:
      - "All servers synchronised to AWS Time Sync Service (GPS/atomic clock source)"
      - "Maximum permitted clock drift: 1 second from authoritative source"
      - "Clock sync status monitored; drift beyond threshold triggers EAGLE_ADMIN alert"
      - "All audit timestamps stored in UTC with millisecond precision"
    acceptance_criteria:
      - "Clock sync monitoring alert tested and functional before first production client"

  - id: REQ-ISO-007
    iso_control: "8.31 — Separation of development, test and production environments"
    title: "Environment separation and production data protection"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9, P10]
    regulatory: [ISO27001, GDPR, DORA]
    requirements:
      - "Three strictly separated environments: development, staging, production"
      - "Production data — client fund data, canonical records, audit trail, personal data — must never be copied to development or staging under any circumstances"
      - "Staging uses only synthetic or anonymised test data per REQ-ISO-008"
      - "Production database credentials are not accessible from development or staging"
      - "Environment separation enforced at network layer; no routing between environments"
      - "Production access restricted to defined EAGLE_ADMIN set; developer standing access prohibited"
    acceptance_criteria:
      - "Environment separation verified by network architecture review"
      - "Production access control list reviewed quarterly"

  - id: REQ-ISO-008
    iso_control: "8.11 / 8.33 — Data masking and test information"
    title: "Synthetic test data generation and anonymisation"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [ISO27001, GDPR]
    requirements:
      - "Synthetic test data generator produces realistic AIFMD datasets with GLEIF test-registry LEIs and plausible AuM ranges"
      - "Anonymisation function replaces real LEIs, fund names and identifiers with synthetic equivalents"
      - "All staging test scenarios use synthetic data only per REQ-ISO-007"
    acceptance_criteria:
      - "Test data generator produces valid AIFMD XML that passes the deterministic validation core"
      - "Anonymised output verified: no original identifier recoverable"

  - id: REQ-ISO-009
    iso_control: "8.16 — Monitoring activities"
    title: "Operational monitoring and anomaly alerting"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7, P9]
    regulatory: [ISO27001, DORA, NIS2]
    monitored_categories:
      authentication_anomalies:
        - "Repeated failed logins across multiple accounts from same IP"
        - "Login from new country or device for existing user"
        - "MFA bypass attempt"
      data_access_anomalies:
        - "High volume data reads from single user in short period"
        - "EAGLE_ADMIN access to client tenant outside logged support ticket"
        - "API key used from unexpected IP range"
      pipeline_anomalies:
        - "AI transformation failure rate exceeds threshold within rolling hour"
        - "Validation rule engine error (distinct from legitimate CAF results)"
        - "NCA submission failure rate exceeds threshold"
        - "Robot failure rate exceeds 10%"
      infrastructure_anomalies:
        - "CPU, memory or disk usage beyond thresholds"
        - "Backup job failure"
        - "Clock drift beyond threshold"
        - "Reference data batch update failure"
    requirements:
      - "All alerts routed to EAGLE_ADMIN via dedicated alerting channel"
      - "Alert thresholds configurable without code deployment"
      - "On-call escalation procedure defined for out-of-hours MAJOR alerts"
    acceptance_criteria:
      - "Mean time to alert from event occurrence to receipt < 5 minutes for security anomalies"

  - id: REQ-ISO-010
    iso_control: "8.20 / 8.21 / 8.22 — Network security"
    title: "Network security architecture"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [ISO27001, DORA, NIS2]
    requirements:
      - "All public-facing endpoints behind WAF configured to block OWASP Top 10 patterns"
      - "Application components run in private subnets; no direct internet access to internal components"
      - "Egress traffic to external services (NCA endpoints, GLEIF, Claude API, AWS) restricted to defined allowlist"
      - "All inter-service communication encrypted via TLS"
      - "Network security groups enforce least-privilege rules between components"
      - "Network architecture diagram maintained and reviewed at each significant infrastructure change"
    acceptance_criteria:
      - "WAF ruleset reviewed and updated at minimum annually"
      - "Egress allowlist reviewed quarterly; additions require EAGLE_ADMIN authorisation"

  - id: REQ-ISO-011
    iso_control: "8.26 — Application security requirements (OWASP Top 10)"
    title: "Application security baseline"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [ISO27001]
    owasp_mitigations:
      A01_broken_access_control: "RBAC at API and service layer; tenant isolation at data layer"
      A02_cryptographic_failures: "TLS 1.3 in transit; AES-256 at rest; no sensitive data in URLs or logs"
      A03_injection: "Parameterised queries only; input sanitisation before AI processing"
      A04_insecure_design: "Threat model produced before build; updated per feature addition"
      A05_security_misconfiguration: "IaC with security defaults; environment separation; automated config scanning"
      A06_vulnerable_components: "Dependency scanning in CI/CD; critical patching SLA per REQ-SEC-002"
      A07_auth_failures: "MFA; session timeout; brute-force lockout per REQ-USR-002"
      A08_software_integrity: "Signed deployments; CI/CD pipeline integrity; change management per REQ-ISO-004"
      A09_logging_monitoring: "Comprehensive immutable audit trail; active monitoring per REQ-ISO-009"
      A10_ssrf: "Egress allowlist; no user-controlled URL parameters reaching server-side HTTP clients"
    requirements:
      - "Threat model produced before build start; updated at each significant feature addition"
      - "OWASP Top 10 mitigation status reviewed in each security test cycle"

  - id: REQ-ISO-012
    iso_control: "8.6 — Capacity management"
    title: "Capacity planning and auto-scaling"
    layer: [L9_ORCHESTRATION]
    priority: SHOULD
    phase: 1
    principles: [P7, P12]
    regulatory: [ISO27001, DORA]
    requirements:
      - "Auto-scaling configured for API and validation processing layers"
      - "Load testing before go-live simulating all active tenants triggering validation within a 2-hour window"
      - "Capacity plan reviewed and updated quarterly as client base grows"
      - "Queue-based processing for validation jobs: requests queued rather than rejected under high load"
    acceptance_criteria:
      - "Load test demonstrates performance targets from REQ-PER-001 met under 2x expected peak concurrency"

  # New requirements added v1.8.0 (audit gap analysis)

  - id: REQ-ISO-013
    iso_control: "5.18 — Access rights"
    title: "Periodic formal IAM access rights review"
    layer: [L11_IAM]
    priority: MUST
    phase: 1
    principles: [P9, P10]
    regulatory: [ISO27001, GDPR, DORA]
    description: >
      ISO 27001:2022 control 5.18 requires access rights reviewed at regular intervals.
      REQ-ISO-007 mandates quarterly review as an acceptance criterion only. This requirement
      formalises the quarterly review as a structured operational process with dual sign-off
      and evidence stored for ISAE 3402.
    review_scope:
      - "All active EAGLE_ADMIN accounts (quarterly)"
      - "All production system access accounts — DB, infrastructure, CI/CD (quarterly)"
      - "Sample TENANT_ADMIN accounts > 10% of active tenants (quarterly)"
      - "All API keys with TENANT_ADMIN or higher scope (quarterly)"
    requirements:
      - "Review record auto-created 7 days before review due date"
      - "OVERDUE review escalated to CTO within 5 business days"
      - "Any ORPHAN account finding revoked within 2 business days"
      - "Two-person sign-off: reviewer and second EAGLE_ADMIN cannot be same person"
      - "Review records retained for minimum 5 years"
      - "Visible in REQ-CR-006 access_control panel"
    acceptance_criteria:
      - "First quarterly review produces complete record with dual sign-off within the 90-day window"
      - "ORPHAN account revoked within 2 business days; revocation logged in REQ-AUD-001"
      - "IAM review records accepted by ISAE 3402 auditor as ISO 27001 5.18 evidence"

  - id: REQ-ISO-014
    iso_control: "8.24 — Use of cryptography"
    title: "Cryptographic key management — rotation schedules, compromise protocol, access control"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9, P10]
    regulatory: [ISO27001, GDPR, DORA]
    description: >
      ISO 27001:2022 control 8.24 requires a cryptographic policy including key management.
      REQ-SEC-001 states rotation is "supported" but defines no rotation schedule, compromise
      protocol or access controls. This requirement closes that gap.
    key_rotation_schedule:
      database_encryption_key: "Annual — AWS KMS automatic rotation enabled"
      application_secrets:      "90 days maximum — no application secret unchanged beyond 90 days"
      nca_portal_credentials:   "Per NCA password policy; minimum annual"
      claude_api_key:           "90 days"
      client_api_keys:          "1 year — TENANT_ADMIN alerted at 11 months"
    key_compromise_protocol:
      revocation_sla:    "Compromised key revoked within 1 hour of detection"
      replacement_sla:   "Replacement key provisioned within 4 hours"
      incident_creation: "Incident record per REQ-ISO-005 with key_compromise type"
    requirements:
      - "EAGLE_ADMIN alerted 14 days before any key reaches its maximum rotation period"
      - "Unrotated keys beyond maximum period trigger CTO escalation"
      - "No production keys in development or staging environments (REQ-ISO-007)"
      - "Key management metadata stored in MOD-MANAGEMENT compliance subview"
    acceptance_criteria:
      - "Key rotation alert fires 14 days before expiry for all key types"
      - "Simulated compromise triggers revocation within 1 hour"
      - "Key management records accepted by ISAE 3402 auditor as ISO 27001 8.24 evidence"


# =============================================================================
# 7.  GDPR APPLICATION-LEVEL CONTROLS  (8 requirements)
# =============================================================================

gdpr_controls:

  - id: REQ-GDPR-001
    title: "Data subject rights request workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [GDPR]
    description: >
      Application workflow for receiving, processing and responding to DSR
      requests within the 30-day GDPR deadline. Covers user account data
      and user identity in audit trail events. Annex IV fund data is not
      personal data and is not in scope for DSR.
    dsr_types:
      access_Art15: "EAGLE_ADMIN triggers DSR export for named user: all personal data including audit trail references; JSON; available within 30 days"
      rectification_Art16: "EAGLE_ADMIN updates user account fields with correction note logged in audit trail"
      erasure_Art17: "On deactivation plus erasure request: anonymise user identity in audit trail entries; delete account data"
      restriction_Art18: "EAGLE_ADMIN flags account as RESTRICTED: processing ceases; restriction recorded with reason"
      objection_Art21: "Handled via restriction workflow; objection recorded with timestamp"
    requirements:
      - "DSR register maintained with request date, type, status and completion date"
      - "All DSR actions logged in audit trail with EAGLE_ADMIN identity"
      - "DSR register exportable for AP review"
    acceptance_criteria:
      - "DSR export for single user completes within 5 minutes"
      - "Anonymisation verified: no name or email recoverable from anonymised audit entries"

  - id: REQ-GDPR-002
    title: "Data breach communication workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P9, P10]
    regulatory: [GDPR]
    description: >
      When a breach is likely to result in high risk to data subjects, Art.34
      requires individual notification without undue delay.
    requirements:
      - "EAGLE_ADMIN can initiate breach communication workflow from an incident record"
      - "Notification contains nature of breach, likely consequences, measures taken, DPO contact"
      - "All sent notifications logged in incident record with recipient list, content hash, timestamp"
      - "Alert fires at T+48hr from breach declaration if notification not yet dispatched"
    acceptance_criteria:
      - "Breach communication log available alongside incident record in audit trail"

  - id: REQ-GDPR-003
    title: "Systematic data minimisation controls"
    layer: [L1_INGESTION, L8_AUDIT]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [GDPR]
    requirements:
      - "Structured upload files deleted after successful ingestion into canonical record"
      - "API payloads stored only as hash in ingestion audit event; full payload not persisted"
      - "S3 Eagle bucket files deleted after download or 7 days"
      - "SFTP inbound files deleted after successful ingestion"
      - "Unstructured source documents deleted immediately after AI extraction"
      - "User identity stored as pseudonymous user_id reference in audit events; name/email resolved at display time only"
    acceptance_criteria:
      - "File deletion after ingestion verified by automated test in CI/CD pipeline"

  - id: REQ-GDPR-004
    title: "GDPR DPA existence check at tenant activation"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P8, P10]
    regulatory: [GDPR]
    requirements:
      - "DPA confirmation is a mandatory onboarding checklist step per REQ-TEN-003"
      - "Tenant cannot be activated without DPA execution date and document reference recorded"
      - "DPA termination or expiry triggers TENANT_ADMIN and EAGLE_ADMIN alert"
    acceptance_criteria:
      - "Tenant activation hard-blocked if DPA confirmation is absent"

  - id: REQ-GDPR-005
    title: "Anthropic sub-processor transfer control"
    layer: [L2_TRANSFORMATION]
    priority: MUST
    phase: 1
    principles: [P9]
    regulatory: [GDPR]
    description: >
      Data sent to the Claude API constitutes an international transfer under
      GDPR Chapter V. A documented field allowlist controls exactly which canonical
      data fields may be sent to the API.
    requirements:
      - "Allowlist stored as a versioned configuration file (REQ-MOD-001)"
      - "Fields not on the allowlist stripped from payload before transmission"
      - "Allowlist changes are 'significant' changes requiring compliance sign-off (REQ-ISO-004)"
      - "Each Claude API call logs: field names sent (not values), model version, timestamp, transfer basis (SCC/DPF/adequacy)"
      - "Transfer basis configuration maintained and updated when legal basis changes"
    acceptance_criteria:
      - "Automated test verifies Claude API payload contains no fields outside approved allowlist"
      - "Allowlist reviewed and reconfirmed by Head of Compliance at minimum annually"

  # -------------------------------------------------------------------------
  # REQ-GDPR-006 and REQ-GDPR-007 are manual controls (not_automatable: true)
  # Full definitions in eagle_manual_controls.yaml
  # -------------------------------------------------------------------------
  - id: REQ-GDPR-006
    title: "GDPR Art.33 supervisory authority breach notification workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    gdpr_blocker: false
    principles: [P7, P8, P10]
    regulatory: [GDPR, DORA]
    description: >
      GDPR Art.33 requires notification to the supervisory authority within 72 hours
      of becoming aware of a personal data breach. Distinct from REQ-GDPR-002 (Art.34
      — data subject notification) and REQ-CR-003 (DORA regulatory incident notification).
      The workflow auto-starts a 72-hour deadline counter on breach classification in
      REQ-ISO-005, assembles a structured report from existing incident records, and
      stores the submitted notification as an immutable audit artefact.
    not_automatable: >
      The Art.33(1) threshold test (whether a breach is likely to result in risk to
      natural persons) is a legal judgment by the Head of Compliance & Risk (NA-004).
      The system tracks the deadline and assembles the report; threshold determination
      and actual AP submission are human acts.
    requirements:
      - "AP notification record auto-created within 5 minutes of PERSONAL_DATA_BREACH classification in REQ-ISO-005"
      - "72-hour deadline counter displayed in MOD-MANAGEMENT compliance subview"
      - "AT_RISK alert (< 12 hours remaining) sent to Head of Compliance & Risk and EAGLE_ADMIN"
      - "BREACHED alert fires immediately if 72-hour deadline passes without submission"
      - "threshold_assessment field is mandatory before status can be set to SUBMITTED or EXEMPTED"
      - "Submitted AP notification PDF stored as immutable audit artefact (REQ-AUD-001)"
      - "Records retained for minimum 5 years per GDPR Art.33(5)"
      - "Visible in REQ-CR-006 certification evidence view under gdpr_controls panel"
    acceptance_criteria:
      - "PERSONAL_DATA_BREACH classification creates AP notification record with 72-hour counter within 5 minutes"
      - "AT_RISK alert fires with at least 12 hours remaining on the deadline"
      - "Submitted AP notification PDF accepted by ISAE 3402 auditor as GDPR Art.33 evidence"


  - id: REQ-GDPR-007
    title: "DPIA trigger mechanism — high-risk processing activity detection"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    gdpr_blocker: false
    principles: [P8, P10]
    regulatory: [GDPR]
    description: >
      GDPR Art.35 requires a DPIA before processing likely to result in high risk to
      natural persons. The system flags when a new processing activity crosses a
      high-risk threshold and alerts the Head of Compliance & Risk. The DPIA record is
      stored in MOD-MANAGEMENT. This addresses the application-level trigger mechanism;
      the entity-level DPIA programme governance remains outside application scope.
    not_automatable: >
      The DPIA content — risk identification, evaluation, and mitigation determination —
      is a compliance judgment. The system detects triggers and provides structure only.
    high_risk_trigger_conditions:
      - "New processing activity involving special categories (Art.9) — retained for completeness; not currently applicable to Eagle's B2B processing scope"
      - "New processing activity involving special categories of personal data (Art.9) per RoPA entry"
      - "Manual trigger: EAGLE_ADMIN or Head of Compliance & Risk flags activity for DPIA"
    requirements:
      - "DPIA trigger alert sent to Head of Compliance & Risk within 1 business day of trigger condition"
      - "DPIA record pre-populated from RoPA entry (REQ-CR-002) where available"
      - "Processing activity cannot go live where trigger condition met and DPIA status not COMPLETE"
      - "DPIA records stored in dpia_records table in MOD-MANAGEMENT compliance subview"
      - "Records retained for minimum 10 years"
    acceptance_criteria:
      - "New RoPA entry with Art.9 special categories flag or systematic AI monitoring flag triggers DPIA alert to Head of Compliance & Risk within 1 business day"
      - "A requirement with a high-risk trigger and no COMPLETE DPIA is flagged before go-live"


  - id: REQ-GDPR-008
    title: "Retention enforcement monitoring — automated deletion job verification"
    layer: [L9_ORCHESTRATION, L8_AUDIT]
    priority: MUST
    phase: 1
    gdpr_blocker: false
    principles: [P2, P9, P10, P14]
    regulatory: [GDPR, ISO27001]
    description: >
      REQ-SEC-003 and REQ-GDPR-003 define deletion schedules. Neither governs
      whether the deletion jobs actually execute. This requirement closes that gap:
      every scheduled deletion job produces a deletion_audit_record; failed or
      missed jobs escalate to EAGLE_ADMIN within 1 hour.
    deletion_jobs_monitored:
      - "User data anonymisation (daily — accounts deactivated > 30 days)"
      - "Trial tenant data purge (per REQ-TRIAL-007 lifecycle)"
      - "Structured file deletion on ingestion completion"
      - "S3 Eagle bucket 7-day TTL expiry"
      - "SFTP inbound deletion on ingestion"
      - "Unstructured source document deletion post-AI-extraction"
    requirements:
      - "Every deletion job produces a deletion_audit_record in the DB regardless of outcome"
      - "FAILED or MISSED status triggers EAGLE_ADMIN alert within 1 hour"
      - "Deletion job results visible in MOD-MANAGEMENT compliance subview"
      - "Monthly deletion compliance summary stored as DB record per P14"
      - "Deletion audit records retained for minimum 5 years"
    acceptance_criteria:
      - "Simulated deletion job failure generates EAGLE_ADMIN alert within 1 hour"
      - "Monthly summary correctly reflects actual deletion job success rates without manual assembly"


# =============================================================================
# 8.  EU AI ACT APPLICATION-LEVEL CONTROLS  (6 requirements)
# =============================================================================

ai_act_controls:

  - id: REQ-AIACT-001
    title: "AI input data quality controls"
    layer: [L2_TRANSFORMATION]
    priority: MUST
    phase: 1
    principles: [P5, P8, P11]
    regulatory: [AI_ACT]
    description: >
      Art.26(1) requires deployers to ensure input data is of adequate quality.
      Pre-processing checks run before any document is passed to Claude.
    requirements:
      - "File is readable, text-extractable, and within size limits before Claude call"
      - "Unreadable or corrupted files rejected at ingestion with descriptive error"
      - "For structured files: minimum column presence check run before Claude call"
      - "Pre-processing check results logged in AI step audit record"
    acceptance_criteria:
      - "Corrupted files rejected at ingestion with clear user error message"

  - id: REQ-AIACT-002
    title: "AI classification safeguard — formal in-application control"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P5, P8, P10]
    regulatory: [AI_ACT]
    description: >
      The non-high-risk EU AI Act classification is conditional on AI never
      producing final regulatory output. This is enforced by a hardcoded
      configuration flag that cannot be set via any user interface or API.
    requirements:
      - "Compile-time constant ai_produces_regulatory_output is hardcoded FALSE in application code; it is a compile-time constant, not a runtime configuration flag, and cannot be overridden without a code change subject to REQ-ISO-004 change management"
      - "Flag cannot be set TRUE via any user interface, API call, or configuration file"
      - "Submission pipeline checks flag before generating NCA XML; if ever TRUE halts with CLASSIFICATION_REVIEW_REQUIRED"
      - "Flag value logged in every submission audit event as per-submission classification evidence"
      - "Any code change modifying this flag or its check is automatically flagged in CI/CD as requiring compliance sign-off"
    acceptance_criteria:
      - "Automated test in every deployment verifies flag is FALSE"
      - "Classification flag visible in Use of AI Register export (REQ-AUD-004)"

  - id: REQ-AIACT-003
    title: "AI serious incident reporting to Anthropic"
    layer: [L9_ORCHESTRATION]
    priority: SHOULD
    phase: 1
    principles: [P8, P11]
    regulatory: [AI_ACT]
    serious_incident_definition:
      - "Claude produced a field value that passed L3 but was incorrect and was identified after NCA submission"
      - "Claude hallucinated a regulatory identifier (LEI, NCA code) that passed format validation"
      - "Prompt injection via unstructured document produced unexpected output that reached the review gate"
    requirements:
      - "EAGLE_ADMIN can file AI Serious Incident Report linked to an incident record"
      - "Report captures model version, input characteristics, harmful output, review gate outcome, corrective action"
      - "Transmission to Anthropic logged in incident record"

  - id: REQ-AIACT-004
    title: "Prompt injection prevention for unstructured ingestion"
    layer: [L1_INGESTION, L2_TRANSFORMATION]
    priority: MUST
    phase: 1
    principles: [P5, P8, P9]
    regulatory: [AI_ACT, ISO27001]
    requirements:
      - "System prompt instructs Claude to treat all document content as data to extract, not instructions to follow"
      - "System prompt version-controlled; changes require compliance sign-off (REQ-ISO-004)"
      - "Claude output parsed against strict schema; unexpected keys or structural deviations rejected"
      - "Documents with suspicious instruction-like patterns flagged to EAGLE_ADMIN before Claude processing"
    acceptance_criteria:
      - "Automated test suite includes prompt injection scenarios; Claude output verified to be schema-confined"

  # New requirements added v1.8.0 (audit gap analysis — corrects 16/16 claim)

  - id: REQ-AIACT-005
    title: "Post-market monitoring plan — formal documented artefact per Art.26(5)"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P8, P10, P11, P14]
    regulatory: [AI_ACT]
    description: >
      EU AI Act Art.26(5) requires deployers to implement post-market monitoring.
      REQ-OPS-014 and REQ-INT-002 collect the monitoring data. This requirement
      produces the formal documented plan artefact — specifying what is monitored,
      at what frequency, against what thresholds, who reviews, and what corrective
      action is triggered. Without this artefact the prior 16/16 AI Act coverage
      claim was incorrect; this requirement corrects it.
    plan_content:
      monitored_metrics:
        - "Field suggestion accuracy per confidence tier (REQ-INT-002)"
        - "Override rate per field per model version (REQ-OPS-014)"
        - "AI_PROPOSED fields modified at review gate (REQ-AUD-002)"
        - "Serious incident count (REQ-AIACT-003)"
        - "ai_produces_regulatory_output flag status — always FALSE (REQ-AIACT-002)"
      review_frequency:
        routine:      "Quarterly review by Head of Compliance & Risk"
        triggered:    "Within 10 business days of MAJOR incident with AI involvement"
        model_change: "Full review before and after each AI model version change"
      thresholds:
        accuracy_floor:  "< 70% HIGH confidence accuracy over 30-day window → CTO notification + boundary review"
        override_ceiling: "> 30% override rate for any single field → REQ-OPS-008 automation gap logged"
        serious_incident: "Any AI serious incident with regulatory consequence → CEO escalation + model suspension"
    requirements:
      - "Plan stored as versioned DB record in MOD-MANAGEMENT; PDF on demand per P14"
      - "Only HEAD_OF_COMPLIANCE_RISK can sign off a new plan version"
      - "Quarterly review record auto-populated from REQ-OPS-014 and REQ-INT-002 metrics"
      - "Plan document visible in REQ-CR-006 ai_governance panel"
      - "Plan exportable for EU AI Act supervisory authority requests"
    acceptance_criteria:
      - "Post-market monitoring plan v1.0 signed off before first production AI model deployment"
      - "Quarterly review record auto-populated within 1 business day of review due date"
      - "Plan PDF accepted by ISAE 3402 auditor as Art.26(5) evidence"

  - id: REQ-AIACT-006
    title: "AI transparency notice to users — in-app and contractual per Art.13"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P1, P8, P10, P13]
    regulatory: [AI_ACT, GDPR]
    description: >
      EU AI Act Art.13 requires that persons interacting with an AI system are
      informed they are doing so. Met through two channels: (1) in-app notice when
      AI-processed content is present; (2) contractual AI Transparency Statement as
      DPA appendix. REQ-AUD-004 and REQ-CR-005 cover internal documentation; this
      requirement covers user-facing transparency.
    in_app_notice:
      trigger_conditions:
        - "Any canonical record field with provenance = AI_PROPOSED displayed to user"
        - "User accesses review gate with AI_PROPOSED fields present"
        - "First-time login for any COMPLIANCE_REVIEWER or DATA_PREPARER (one-time)"
      notice_content:
        - "Statement that Claude (Anthropic) AI extracts and suggests field values"
        - "Confirmation that AI suggestions are candidate mappings requiring human review"
        - "Confirmation that AI never makes final regulatory decisions"
        - "Link to full AI Transparency Statement"
      placement:
        first_login:  "Modal on first login; acknowledgement stored in audit trail"
        review_gate:  "Persistent non-dismissible banner when AI_PROPOSED fields present"
    contractual_notice:
      document_title: "Eagle AI Transparency Statement"
      delivery:
        - "Appendix to DPA — confirmed at paid tenant activation (REQ-TEN-003 checklist)"
        - "Current version accessible from TENANT_ADMIN dashboard at all times"
      version_control:
        - "Document versioned alongside application releases (REQ-REL-010)"
        - "Material changes require client re-notification per REQ-DORA-006 / REQ-REL-007 Tier 1"
    requirements:
      - "First-login AI notice displayed to all new COMPLIANCE_REVIEWER and DATA_PREPARER users"
      - "First-login acknowledgement logged in audit trail (REQ-AUD-001)"
      - "Review gate AI banner present and non-dismissible when AI_PROPOSED fields in batch"
      - "AI Transparency Statement v1.0 produced before first paid tenant activation"
    acceptance_criteria:
      - "New COMPLIANCE_REVIEWER sees AI notice on first login; acknowledgement logged"
      - "Review gate banner with AI_PROPOSED fields cannot be dismissed"
      - "AI Transparency Statement v1.0 accepted by ISAE 3402 auditor as Art.13 evidence"


# =============================================================================
# 9.  DORA OPERATIONAL REQUIREMENTS  (5 requirements)
# =============================================================================

dora_requirements:

  - id: REQ-DORA-001
    title: "ICT incident authority notification workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7, P10]
    regulatory: [DORA, NIS2]
    description: >
      Generates structured incident reports for authority notifications:
      DORA Art.18 (supporting client AIFM reporting to their NCAs) and
      NIS2 Art.23 (Eagle's own NCSC reporting). Combined in one workflow.
    requirements:
      - "Incident reporting workflow produces complete regulator-ready report within 30 minutes of data entry"
      - "DORA Art.18 report available within 4 hours of MAJOR incident declaration"
      - "NIS2 24-hour early warning template pre-populated from incident record"
      - "NIS2 72-hour full notification template pre-populated from incident record"
      - "All notification events logged with report hash, recipient and timestamp"
    acceptance_criteria:
      - "Report template reviewed and approved by Head of Compliance before go-live"

  - id: REQ-DORA-002
    title: "ICT incident lessons-learned feedback loop"
    layer: [L9_ORCHESTRATION]
    priority: SHOULD
    phase: 1
    principles: [P7, P11]
    regulatory: [DORA]
    requirements:
      - "Post-incident report includes structured lessons-learned section with root cause and recommended improvements"
      - "Improvements tracked in remediation register linked to incident record"
      - "Open improvements older than 90 days trigger EAGLE_ADMIN escalation alert"
      - "Closed improvements reference the change record that resolved them"

  - id: REQ-DORA-003
    title: "Client data export and exit support"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P7, P10]
    regulatory: [DORA, GDPR]
    description: >
      DORA Art.30(2)(d) requires exit provisions. Clients can retrieve all their
      data in portable format at any time, not only at contract termination.
    requirements:
      - "TENANT_ADMIN can trigger full data export at any time"
      - "Export includes: all canonical records (JSON), submission records (JSON + original XML), audit trail (JSON), all profile configurations (JSON)"
      - "Export generated asynchronously; TENANT_ADMIN notified when ready"
      - "Export available for download for 7 days then deleted"
      - "Export format documented in API specification to enable migration to alternative providers"
    acceptance_criteria:
      - "Full export for tenant with 50 AIFs and 2 years of submissions completes within 30 minutes"
      - "Exported JSON importable into a clean Eagle tenant (round-trip test)"

  - id: REQ-DORA-004
    title: "Structured auditor access workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P8, P10]
    regulatory: [DORA]
    description: >
      DORA Art.30(2)(f) audit rights require Eagle to support client and NCA
      audits without bespoke data extracts for every request.
    requirements:
      - "EAGLE_ADMIN can create time-limited READ_ONLY auditor account scoped to a specific tenant (maximum 90 days)"
      - "Auditor account can access: full audit trail, submission history, validation reports, profile configurations for scoped tenant"
      - "Auditor account cannot modify data or trigger workflows"
      - "Auditor account creation notifies the scoped TENANT_ADMIN"
      - "Auditor account auto-deactivated at expiry; extension requires new EAGLE_ADMIN action"
    acceptance_criteria:
      - "All auditor actions logged as AUDITOR_ACCESS events filterable in audit trail"

  - id: REQ-DORA-006
    title: "Sub-processor change notification workflow"
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P1, P8, P10]
    regulatory: [DORA, GDPR]
    description: >
      DORA Art.30(2)(c) and GDPR Art.28(2) require clients to be informed when
      sub-processors are added, changed, or removed. REQ-CPL-002 includes sub-processor
      change notification as contractual content but defines no operational workflow.
      This requirement formalises the notification process. Routine AI model version
      updates within the same service are covered by REQ-REL-007 Tier 2, not this
      requirement. This applies to changes to sub-processor entity, service type, or
      processing location.
    sub_processor_change_types:
      ADDITION: "30 days advance notice before new sub-processor begins processing"
      CHANGE:   "30 days advance notice for entity, service type, or location change"
      REMOVAL:  "Notification within 5 business days of removal"
    requirements:
      - "Notice_deadline alert fires 7 days before deadline to Head of Compliance & Risk and EAGLE_ADMIN"
      - "Head of Compliance & Risk sign-off required before dispatch"
      - "Dispatch log records delivery status per client; DORA Art.30 evidence"
      - "All notification records retained for minimum 5 years"
      - "REQ-CPL-002 updated at each sub-processor change to reference this workflow"
    acceptance_criteria:
      - "Sub-processor ADDITION notification reaches all active clients at least 30 days before effective date"
      - "Dispatch without sign-off is blocked by the system"
      - "Dispatch log accepted by ISAE 3402 auditor as DORA Art.30 evidence"


# =============================================================================
# 10.  OUT OF SCOPE
# =============================================================================

out_of_scope:
  - id: OOS-001
    item: "AIFMD 2.0 Annex IV reporting engine implementation"
    rationale: >
      The AIFMD 2.0 Directive (OJ March 2024) requires member state transposition by 16 April 2026
      (legislative deadline — affects national law, not yet Annex IV reporting content). ESMA
      implementing technical standards and updated XSD schemas for Annex IV reporting are expected
      approximately April 2027; the actual new reporting obligation applies to reporting periods
      starting ~2028. The reporting engine implementation is out of scope until ESMA publishes
      those standards. REQ-ENG-006 (schema migration framework) is designed to accommodate this
      change when standards arrive. Horizon scanning and client communication obligations are in
      scope via REQ-AIFMD-007 (Phase 1.5). The distinction between the legislative transposition
      deadline (April 2026) and the technical reporting standards timeline (~April 2027) must be
      proactively communicated to clients.

  - id: OOS-002
    item: "SFDR / ESG reporting"
    rationale: "Out of scope Phase 1. Revisit if ESG functionality is added to the product roadmap."

  - id: OOS-003
    item: "EMIR / MiFIR transaction reporting"
    rationale: "Eagle provides AIFMD Annex IV only. Different regulatory regime."

  - id: OOS-004
    item: "Portfolio management or investment decision support"
    rationale: "Eagle is a reporting factory, not a portfolio management system (Principle 3)."

  - id: OOS-005
    item: "Bespoke system-to-system connectors to client systems"
    rationale: "Data ingestion via API and file upload covers integration needs. Bespoke connectors are out of scope (Principle 3)."

  - id: OOS-006
    item: "Self-service paid tenant registration"
    rationale: >
      Paid tenant onboarding is CS Manager-driven (REQ-TEN-003). Self-service
      creates misconfiguration risk for paid accounts. Trial self-service is
      explicitly in scope via MOD-TRIAL (REQ-TRIAL-001).

  - id: OOS-007
    item: "Non-EU regulatory reporting"
    rationale: "UK and US clients use Eagle exclusively for EU Annex IV obligations. No non-EU reporting is in scope."


