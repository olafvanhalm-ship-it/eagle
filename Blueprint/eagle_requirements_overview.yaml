  cra_scope_exclusion:
    regulation:      "Regulation (EU) 2024/2847 — EU Cyber Resilience Act"
    assessed_by:     "Head of Compliance & Risk"
    assessed_date:   "2026-03-23"
    conclusion:      "OUT OF SCOPE — SaaS exclusion"
    rationale: >
      The CRA applies to 'products with digital elements' (PWE) placed or made available
      on the EU market — defined as software or hardware installed or deployed at the user
      (Art. 3(1), Recital 12). Eagle is a pure SaaS: fully cloud-hosted on AWS (ECS, RDS, S3),
      accessed exclusively via web browser (Next.js). No software component is installed at
      the client, no SDK or library is distributed for integration, and no on-premise
      deployment option exists. Remote data processing that is the service itself — rather
      than a component bundled with a placed product — falls outside CRA scope per Recital 12.
    scope_exclusion_basis:
      - "No software placed on the EU market at the user — pure cloud-hosted SaaS (Recital 12)"
      - "No downloadable client application, desktop agent or browser extension"
      - "No SDK or library distributed to clients for integration into their own systems"
      - "No on-premise deployment option"
      - "API access over HTTPS is the service, not a component of a placed product"
    indirect_relevance:
      supply_chain_benefit: >
        Eagle's upstream software suppliers (Python packages, npm modules, Docker base images,
        AWS SDKs, Anthropic SDK) become CRA-obligated manufacturers from December 2027.
        This produces structural improvements to Eagle's supply chain security:
        mandatory SBOMs, CVD policies, and security update obligations on all upstream
        vendors. Eagle's existing supply chain controls (lock files, base image provenance
        per Component 16 of eagle_techstack_baseline_v2_1.yaml) are already aligned
        with what CRA will require upstream.
      watch_triggers: >
        CRA applicability must be re-assessed if Eagle introduces any of the following:
        (1) client-side browser extension or desktop application;
        (2) SDK or library distributed to clients for integration;
        (3) on-premise deployment option.
        The Head of Compliance & Risk owns this re-assessment trigger.
    review_cadence:     "Annual, or on product architecture change"
    reference_document: "controls_cra_v1_0.yaml — independent CRA control baseline"

