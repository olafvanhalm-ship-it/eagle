requirements:

  # -------------------------------------------------------------------------
  # COO operations
  # -------------------------------------------------------------------------
  coo_operations:

    - id: REQ-OPS-001
      title: "EAGLE_ADMIN cross-client operations dashboard"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P2, P4, P10]
      regulatory: [DORA]
      description: >
        A dedicated internal dashboard — visible only to EAGLE_ADMIN — that
        provides a real-time cross-tenant view of the reporting factory. This
        is the primary operational control surface for the COO role. It
        aggregates status across all active clients into a single operational
        health view, distinct from the per-client compliance dashboard
        (REQ-DSH-001) which is client-facing.
      required_elements:
        factory_overview:
          - "Total active clients with count of AIFs and NCA registrations"
          - "Submissions in progress: count by pipeline stage (INGESTING, VALIDATING, REVIEW_PENDING, SUBMITTING)"
          - "Queue depth: number of records waiting in each stage across all tenants"
          - "Submission success rate for the current and previous reporting period (% accepted / % rejected / % pending)"
          - "Automation ratio indicator: current rolling 30-day automation ratio (see REQ-OPS-002)"
        deadline_pressure_view:
          - "All NCA deadlines within the next 14 days, sorted by urgency, showing client, NCA, period, status, and days remaining"
          - "Color-coded urgency: GREEN (>7 days), AMBER (3-7 days), RED (<3 days), BLACK (overdue)"
          - "One-click drill-down to the client's submission in the admin tenant view"
        per_client_health_row:
          - "Table of all clients, each row showing: client name, active AIF count, last submission date, current period status, SLA performance score (last 12 months), open exception count"
          - "Sortable by any column; filterable by status and SLA score"
          - "Clients with deteriorating health (SLA score below threshold or open exceptions above threshold) highlighted automatically"
        ingestion_status:
          - "Per-client data receipt status for the current period: RECEIVED, PARTIAL, NOT_YET_RECEIVED, OVERDUE"
          - "Expected vs. received feed counts where clients use scheduled SFTP or API push"
          - "Flag for clients where ingest is overdue relative to their submission deadline minus configured lead time"
        reference_data_panel:
          - "Simplified version of REQ-REF-002: ECB rate freshness, GLEIF freshness, NCA register freshness — with status indicators"
      requirements:
        - "Dashboard loads in < 3 seconds for up to 200 active clients"
        - "All data reflects pipeline state with maximum 60-second refresh lag"
        - "Dashboard accessible from any authenticated EAGLE_ADMIN session without tenant context"
        - "Dashboard state (filters, sort) persisted in DB per user — not browser state; consistent across devices and sessions"
        - "Mobile-responsive layout for on-call access"
      acceptance_criteria:
        - "EAGLE_ADMIN sees all active clients in a single scrollable view without navigating per tenant"
        - "A client with OVERDUE status is prominently distinguishable from the rest within 5 seconds of opening the dashboard"
        - "Ingestion overdue flag fires correctly when a client's SFTP feed has not arrived within the configured lead time"

    - id: REQ-OPS-002
      title: "Automation ratio tracking and reporting"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P2, P4, P10, P11]
      regulatory: [DORA]
      description: >
        The automation ratio — the proportion of AIF submissions processed
        end-to-end without any manual intervention — is the primary operational
        KPI for the reporting factory (COO document section 8: target >90% by
        Phase 2). The application must record every manual touchpoint against
        a submission and compute the automation ratio at multiple granularities.
        A submission is counted as automated only if it completes all pipeline
        stages L1 through L7 without any of the defined manual interventions.
      manual_intervention_types:
        MANUAL_FIELD_ENTRY:     "Any field entered manually via web UI rather than derived or ingested"
        MANUAL_FIELD_OVERRIDE:  "Override of a derived or AI-proposed field value"
        MANUAL_CAF_OVERRIDE:    "Override of a CAF (critical mandatory) validation failure"
        MANUAL_CAM_OVERRIDE:    "Override of a CAM (critical additional mandatory) validation failure"
        MANUAL_DQ_ACKNOWLEDGE:  "Explicit acknowledgement of a DQEF DQ-WARNING flag"
        MANUAL_REVIEW_WITH_FLAGS: "Review gate approval of a record that carries unresolved flags"
        MANUAL_SUBMISSION:      "Submission via MANUAL download channel (not automated NCA delivery)"
        MANUAL_EXCEPTION_RESOLUTION: "Any exception in the operational exception log linked to this submission"
      automation_ratio_definition: >
        automation_ratio = count(submissions with zero manual_intervention_types) /
                           count(all completed submissions) * 100
        Calculated per period, per client, and as a rolling 30-day factory-wide figure.
        MANUAL_DQ_ACKNOWLEDGE is excluded from the ratio denominator when the DQ flag
        is a known-good exception documented in the CAM register (REQ-OVR-001).
      requirements:
        - "Every manual intervention type is recorded against the submission record at the moment of occurrence"
        - "Automation ratio computed and stored per (client, reporting_period, NCA_registration) on submission completion"
        - "Rolling 30-day factory-wide automation ratio available in REQ-OPS-001 dashboard"
        - "Automation ratio trend chart available in MOD-MANAGEMENT: monthly bars for the last 12 months, factory-wide and per client"
        - "Breakdown by intervention type available: which manual touchpoints are most frequent and on which clients"
        - "Automation ratio stored as a first-class record in the management_metrics table per (client, reporting_period, NCA_registration) — queryable directly; no intermediate file store"
        - "PDF and CSV exports of automation ratio data generated on demand from DB records in MOD-MANAGEMENT; the export is a view of the DB record, not a separate data store"
        - "EAGLE_ADMIN can set an automation ratio alert threshold; alert fires when the rolling 30-day ratio drops below the threshold"
      acceptance_criteria:
        - "A submission where a DATA_PREPARER manually entered one field is correctly counted as non-automated"
        - "A submission processed entirely via API ingestion, AI transformation confirmed without change, zero validation flags, bulk approved, and delivered via DIRECT_API is counted as automated"
        - "Monthly automation ratio chart reflects actual intervention data — not estimated"
        - "Alert fires within 60 minutes of the rolling ratio crossing the configured threshold"

    - id: REQ-OPS-003
      title: "Per-submission SLA throughput metrics"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P1, P4, P10]
      regulatory: [DORA]
      description: >
        In addition to deadline conformity (whether a submission was made before
        the NCA deadline), the COO needs to measure factory throughput: how long
        each submission took to move from initial data receipt to NCA delivery.
        These metrics drive SLA definition, capacity planning, and identification
        of pipeline bottlenecks.
      metrics_to_capture:
        total_cycle_time:
          definition: "Elapsed time from first ingestion event to NCA submission confirmation"
          unit: "Hours (decimal)"
          recorded_per: "(client, AIF, reporting_period, NCA_registration)"
        stage_dwell_times:
          definition: "Time spent in each pipeline stage: INGESTING, TRANSFORMATION, VALIDATION, REVIEW_PENDING, PACKAGING, SUBMITTING"
          unit: "Hours (decimal)"
          note: "REVIEW_PENDING dwell time is the primary indicator of human review bottleneck"
        deadline_margin:
          definition: "Hours between NCA submission confirmation and the NCA deadline"
          sign: "Positive = on time; negative = overdue"
        manual_intervention_dwell:
          definition: "Sum of time attributed to manual intervention types per REQ-OPS-002"
          note: "Derived: total_cycle_time minus automated stage processing time"
      requirements:
        - "All stage timestamps derived from the existing audit trail (REQ-AUD-001) — no separate timing infrastructure required"
        - "Per-submission SLA metrics stored as first-class records in the submission_metrics table per (client, AIF, reporting_period, NCA_registration) — queryable directly from MOD-MANAGEMENT without file export"
        - "SLA performance view in MOD-MANAGEMENT: average and P90 cycle time per client per period"
        - "Pipeline bottleneck report: which stage accounts for the most dwell time across all submissions in a period"
        - "Deadline margin distribution chart: histogram of hours-before-deadline for all submissions in the last 12 months"
      acceptance_criteria:
        - "Total cycle time for a submission is consistent with the difference between first ingestion timestamp and submission confirmation timestamp in the audit trail"
        - "REVIEW_PENDING dwell time is correctly identified as the dominant stage for any submission where the reviewer took more than 24 hours"
        - "Deadline margin is correctly negative for any submission where the NCA confirmation timestamp post-dates the configured deadline"

    - id: REQ-OPS-004
      title: "Operational exception log"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P2, P4, P7, P10]
      regulatory: [DORA]
      description: >
        A structured, searchable operational exception log maintained by
        EAGLE_ADMIN for tracking non-automated resolutions, pipeline failures,
        and escalated issues. This is distinct from the immutable audit trail
        (REQ-AUD-001) which records all events; the exception log is an
        operational register of issues requiring attention or tracking.
        Exceptions may be opened automatically by the system (e.g. robot
        failure, reference data update failure) or manually by EAGLE_ADMIN.
      exception_categories:
        PIPELINE_FAILURE:      "Pipeline stage failed for technical reason — e.g. transformation timeout, robot failure"
        DATA_QUALITY_ISSUE:    "Client data arrived malformed, incomplete, or with unexpected structure"
        SLA_AT_RISK:           "Submission is at risk of missing deadline — triggered by REQ-OPS-001 deadline pressure view"
        REFERENCE_DATA_STALE:  "Reference data batch update failed or exceeded staleness threshold"
        MANUAL_ESCALATION:     "EAGLE_ADMIN or client raised an issue requiring operational attention"
        DORA_INCIDENT_LINKED:  "Exception linked to an open DORA incident (REQ-OPS-006)"
      exception_record_fields:
        id:              "Auto-generated exception ID"
        opened_at:       "Timestamp — auto (system-generated) or manual entry"
        category:        "One of the exception categories above"
        severity:        "LOW / MEDIUM / HIGH / CRITICAL"
        client:          "Linked tenant / AIFM sub-entity"
        period:          "Reporting period affected (if applicable)"
        pipeline_stage:  "Pipeline stage at point of exception (if applicable)"
        description:     "Free-text description of the issue"
        status:          "OPEN / IN_PROGRESS / RESOLVED / CLOSED"
        assigned_to:     "EAGLE_ADMIN user responsible"
        resolution_time: "Elapsed hours from opened_at to RESOLVED status"
        root_cause:      "Free-text root cause (required before status can be set to CLOSED)"
        linked_audit_events: "References to audit trail event IDs relevant to this exception"
        linked_dora_incident: "Reference to DORA incident ID if applicable (REQ-OPS-006)"
      requirements:
        - "System auto-opens exceptions for: robot failure (REQ-NCA-002), reference data update failure (REQ-REF-001 alert), NCA submission rejection (REQ-SUB-003), and OVERDUE status reached"
        - "EAGLE_ADMIN can manually open, update, assign, and close exceptions"
        - "Exception log searchable and filterable by all fields"
        - "Open exception count per client surfaced in REQ-OPS-001 client health row"
        - "Root cause is required before an exception can be set to CLOSED"
        - "Exception log stored in the exceptions table — all fields indexed and queryable from MOD-MANAGEMENT; CSV and JSON export generated on demand as views of the DB record, not separate stores"
        - "Monthly exception summary computed from DB records and stored as a monthly_exception_summary record; displayed in MOD-MANAGEMENT without requiring manual assembly"
        - "Exception records retained for 5 years"
      acceptance_criteria:
        - "A robot failure event (REQ-NCA-002) automatically creates an exception record within 5 minutes of the failure event"
        - "Attempting to close an exception without entering a root cause is blocked with an explanatory message"
        - "EAGLE_ADMIN can filter all open HIGH and CRITICAL exceptions across all clients in one view"

    - id: REQ-OPS-005
      title: "Cross-client reporting capacity calendar"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P2, P4, P10]
      regulatory: []
      description: >
        An EAGLE_ADMIN-only calendar view that aggregates all NCA submission
        deadlines across all active clients and NCA registrations into a single
        factory capacity view. This view enables the COO to identify peak
        submission periods, anticipate capacity requirements, and plan
        operational resources in advance. It is the cross-tenant counterpart
        to the per-client reporting calendar in REQ-DSH-001.
      required_elements:
        calendar_view:
          - "Monthly and weekly views showing all NCA submission deadlines across all clients"
          - "Each deadline shown as a bar or marker labeled with: client name, NCA code, number of AIFs in scope, submission channel"
          - "Peak-load indicator: total number of submissions due within any 7-day window highlighted when above configurable threshold"
        load_distribution:
          - "Bar chart of submission count by calendar week for the next 6 months"
          - "Configurable peak threshold; weeks above threshold highlighted in amber/red"
        scenario_planning:
          - "Ability to add projected future client deadlines (for clients in onboarding) to the calendar without activating them"
          - "Projection mode: show estimated load assuming 2x and 5x current client count based on current deadline distribution"
      requirements:
        - "Calendar populated automatically from all active NCA registration deadline schedules"
        - "Updates automatically when a new client is onboarded or a reporting frequency changes"
        - "Calendar data stored in the capacity_calendar table — DB record is the source of truth; PDF export generated on demand as a view of the DB record"
      acceptance_criteria:
        - "Calendar correctly shows all deadlines for 50 active clients with varying NCA registrations and reporting frequencies"
        - "Peak-load alert fires when a 7-day window contains more submissions than the configured threshold"
        - "Projected 2x client load view is available and clearly labeled as a projection"

    - id: REQ-OPS-006
      title: "DORA incident client impact register"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P4, P7, P10]
      regulatory: [DORA]
      description: >
        A structured register of client impacts for each DORA MAJOR or
        SIGNIFICANT incident, owned by the COO (operational impact lane per
        project_eagle_coo_v1_1.md section 4.5). This register is the input
        to the DORA Art.18 regulatory notification process owned by the Head
        of Compliance and Risk, and provides the basis for client SLA
        remediation tracking.
        This requirement complements the technical incident register
        (REQ-ISO-005) which is owned by the CTO. Each DORA incident has two
        linked records: a technical incident record (REQ-ISO-005) and an
        operational client impact record (this requirement).
      impact_register_fields:
        incident_id:            "Reference to the DORA technical incident record (REQ-ISO-005)"
        incident_classification: "MAJOR / SIGNIFICANT per DORA Art.3 and REQ-DORA-001"
        detected_at:            "Timestamp of first detection"
        affected_clients:
          structure:            "List of affected client records, one per client"
          per_client_fields:
            client_name:        "Tenant / AIFM sub-entity name"
            impact_type:        "SUBMISSION_DELAYED / DATA_UNAVAILABLE / PORTAL_INACCESSIBLE / AUDIT_TRAIL_UNAVAILABLE / OTHER"
            submission_at_risk: "Boolean — is there a submission deadline within 5 business days of incident start?"
            deadline:           "Date of submission deadline at risk (if applicable)"
            sla_breach:         "Boolean — did or will the incident cause an SLA breach?"
            client_notified_at: "Timestamp of client notification"
            notification_channel: "EMAIL / IN_APP / PHONE (free text)"
            remediation_commitment: "Free text — what Eagle has committed to the client"
            remediation_status: "PENDING / IN_PROGRESS / COMPLETED"
        regulatory_notification_required: "Boolean — derived from classification; triggers alert to Head of Compliance"
        regulatory_notification_deadline: "Deadline for DORA Art.18 initial notification (4 hours for MAJOR)"
        post_incident_review_due: "5 business days after incident resolution for MAJOR incidents"
        lessons_learned:        "Free text — linked to operational improvement programme"
      requirements:
        - "Impact register record created automatically when a DORA incident is classified as MAJOR or SIGNIFICANT in REQ-ISO-005"
        - "EAGLE_ADMIN populates affected client list and impact details; system pre-populates clients with active submissions near the incident window"
        - "If regulatory_notification_required is TRUE, an urgent alert is sent to the Head of Compliance and Risk role with the notification deadline"
        - "SLA breach flag on any client record triggers automatic notification to that client's Head of Customer Success contact"
        - "Impact register visible in REQ-OPS-001 dashboard during an active incident"
        - "All impact register records retained for 5 years per DORA retention requirements"
        - "Impact register exportable as PDF and JSON for inclusion in post-incident report (REQ-ISO-005)"
      acceptance_criteria:
        - "Creating a MAJOR incident in REQ-ISO-005 automatically creates a linked impact register record within 5 minutes"
        - "Alert to Head of Compliance and Risk fires with the correct 4-hour notification deadline for a MAJOR incident"
        - "Impact register export produces a self-contained document suitable for inclusion in a DORA Art.18 notification package"

