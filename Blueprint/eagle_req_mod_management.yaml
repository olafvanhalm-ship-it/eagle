  # -------------------------------------------------------------------------
  # CCO / CRO commercial dashboard
  # -------------------------------------------------------------------------
  cco_cro_commercial_dashboard:

    - id: REQ-INT-001
      title: "CCO/CRO commercial KPI dashboard (MOD-MANAGEMENT CCO-view)"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      gdpr_blocker: false
      principles: [P1, P2, P4, P10, P12]
      regulatory: []
      description: >
        The CCO-view within MOD-MANAGEMENT provides a real-time commercial
        intelligence dashboard covering the full funnel from prospect
        database to signed ARR. It consolidates data from MOD-GTM,
        MOD-TRIAL, Pipedrive (via webhook/API), and MOD-BILLING. All
        stakeholder-specific views (CCO, CRO, CFO) are subsets of the
        same underlying dataset — no duplicate data stores.
      funnel_metrics:
        prospect_database:
          - "Total AIFM prospects in database by NCA jurisdiction"
          - "Coverage rate: % of ESMA register represented in database"
          - "Enrichment completion rate: % of prospects with MEDIUM+ confidence on PredominantAIFType"
        outbound_pipeline:
          - "Outbound volume: emails and LinkedIn messages sent (from external tool webhooks)"
          - "MQL rate: % of outreach resulting in trial registration, demo request or form fill"
          - "Inbound lead volume: website forms + content downloads + AI chat leads per month"
        legitimacy_queue:
          - "Pending legitimacy reviews: count, average age in hours"
          - "Approval rate by legitimacy score tier (HIGH auto / MEDIUM approved / LOW rejected)"
        trial_funnel:
          - "Active trials: count by health tier (HOT / WARM / COLD / INACTIVE)"
          - "Trial activation rate: % of provisioned trials that uploaded data"
          - "Trial-to-demo rate: % of HOT/WARM trials that requested a demo or contacted Eagle"
          - "Trial-to-paid conversion rate: % of trials converting within trial period"
          - "Average days to conversion (trial start to contract signed)"
      revenue_metrics:
        - "New ARR: signed contract value per month and rolling 12 months"
        - "Pipeline ARR: probability-weighted ARR per Pipedrive stage"
        - "Sales cycle length: average days from first MQL to signed contract"
        - "CAC: total sales and marketing spend divided by new clients in period"
        - "LTV:CAC ratio: computed from average contract value, average retention and CAC"
        - "NRR: net revenue retention including expansion and churn"
        - "ICP hit rate: % of closed deals matching the defined ICP criteria"
        - "Scope exception rate: % of deals requiring non-standard product commitments"
      cfo_subview:
        - "ARR bridge: opening ARR + new ARR + expansion ARR - churn ARR = closing ARR"
        - "MRR with month-over-month trend"
        - "Revenue forecast: pipeline-weighted ARR projection for next 3 months"
      requirements:
        - "Dashboard data refreshed at minimum every 4 hours; manual refresh available"
        - "Revenue concentration alert: when any single client's ARR exceeds 30% of total ARR, an automatic alert is sent to CFO and CEO; concentration percentage displayed in CFO subview; alert threshold configurable per REQ-MOD-001"
        - >
          Pipedrive integration via webhook: deal stage changes in Pipedrive
          update Eagle CCO-view within 15 minutes. Webhook endpoint is
          configuration-driven per REQ-MOD-001.
        - >
          Funnel metrics (prospect through trial) computed from Eagle-internal
          data. Revenue metrics sourced from Pipedrive + MOD-BILLING.
        - "All metric definitions documented and version-controlled alongside the dashboard code"
        - "Dashboard accessible to EAGLE_ADMIN, CCO, CRO, CFO — scoped by role where noted"
        - "Export to PDF for weekly pipeline review with CEO"
        - "Pipedrive webhook staleness: if no webhook event received for > 2 hours, dashboard displays a staleness indicator with last-known-good timestamp on all Pipedrive-sourced metrics; EAGLE_ADMIN alerted; manual refresh trigger available"
      acceptance_criteria:
        - "Dashboard loads in < 3 seconds with full dataset"
        - "Pipedrive deal stage update reflected in pipeline ARR within 15 minutes"
        - "Coverage rate metric correctly reflects % of ESMA register in MOD-GTM database"
        - "All funnel and revenue metrics stored as first-class records in the commercial_metrics table; PDF export generated on demand as a view of those records, not a separate document store"

    - id: REQ-INT-002
      title: "Trial analytics and enrichment quality metrics"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      gdpr_blocker: false
      principles: [P2, P4, P11, P12]
      regulatory: [AI_ACT]
      description: >
        Dedicated analytics view within MOD-MANAGEMENT tracking the
        accuracy and effectiveness of the pre-population and orientation
        system. Feeds the continuous improvement loop for REQ-GTM-001
        enrichment and REQ-TRIAL-005 quality scoring. Also provides
        the AI Act evidence for AI component performance monitoring
        per REQ-AUD-004.
      enrichment_quality_metrics:
        - "Pre-population suggestion accuracy: % of AI_PROPOSED_INDICATIVE fields confirmed vs corrected by users, by confidence tier"
        - "Most frequently corrected fields (top 5 by correction count)"
        - "COO ops correction rate: % of LOW-score trials that were corrected vs approved-as-is vs suppressed"
        - "Blank workspace fallback rate: % of trials provisioned in blank mode (score too low or ops timeout)"
        - "Source domain accuracy: per enrichment source URL domain, % of suggestions confirmed — enables EAGLE_ADMIN to suppress low-accuracy domains"
      trial_effectiveness_metrics:
        - "Time-to-first-validation: median hours from trial provisioning to first L3 run"
        - "Pre-populated vs blank workspace comparison: time-to-first-validation for each cohort"
        - "Strategy suggestion accuracy: % of AI_PROPOSED_INDICATIVE PredominantAIFType suggestions confirmed at first review"
        - "Trial health score distribution at T+7, T+14, T+30 days"
      ai_act_evidence:
        description: >
          These metrics constitute the ongoing AI component performance
          monitoring required by the EU AI Act for the enrichment AI
          component. Metrics stored per model version to detect accuracy
          drift across model updates.
        retention: "5 years per REQ-AUD-004"
      requirements:
        - "Metrics available from first 10 completed trial provisioning events"
        - "EAGLE_ADMIN can suppress a specific enrichment source domain via configuration (REQ-MOD-001)"
        - "Accuracy metrics segmented by confidence tier (HIGH / MEDIUM / LOW)"
        - "Model version tag on all accuracy records to detect accuracy drift across updates"
      acceptance_criteria:
        - "After 50 trial events, suggestion accuracy calculable and visible for each confidence tier"
        - "Source domain suppression takes effect within 1 hour without code deployment"
        - "Blank workspace fallback rate visible and filterable by reason (LOW score vs ops timeout)"

    - id: REQ-INT-003
      title: "Compliance-as-code: automated RoPA draft generation"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: COULD
      phase: 2
      gdpr_blocker: false
      principles: [P2, P8, P10]
      regulatory: [GDPR]
      description: >
        MOD-MANAGEMENT generates a structured RoPA draft automatically from
        GDPR-relevant requirements in the application requirements YAML on
        each new version release. The pipeline extracts processing purpose,
        lawful basis, personal data categories, recipients, retention periods
        and technical measures from requirements tagged regulatory: [GDPR].
        Output is a versioned draft requiring Head of Compliance and Risk
        sign-off — only the diff versus the prior signed version is presented
        for review, not the full document. LIA steps 1 and 2 are generated
        automatically; step 3 (balancing test) is presented as a structured
        template requiring human completion and sign-off before the relevant
        module may go live. This requirement replaces the Phase 1 manual
        RoPA sign-off process with an automated gate in the deployment
        pipeline.
      ropa_generation_trigger:
        - "New application requirements version published"
        - "Any requirement with regulatory: [GDPR] added, changed or removed"
        - "Any requirement with gdpr_blocker: true added or modified"
      review_workflow:
        draft_produced_by: "Automated pipeline from requirements YAML"
        review_scope: "Diff versus prior signed version only"
        sign_off_by: "Head of Compliance and Risk"
        sign_off_recorded: "MOD-MANAGEMENT audit trail with role, identity, timestamp, version"
        go_live_gate: >
          Requirements with gdpr_blocker: true cannot be deployed to
          production until the corresponding RoPA entry status is
          SIGNED_OFF in this workflow
      lia_automation:
        step_1_purpose_test: "Generated from requirement description and module purpose"
        step_2_necessity_test: "Generated from requirement justification and alternatives considered"
        step_3_balancing_test: >
          Structured template generated with processing context pre-filled.
          Free-text field for human balancing judgment. Cannot be auto-approved.
          Head of Compliance and Risk must complete and sign.
      requirements:
        - >
          On each requirements version bump, system produces RoPA diff
          within 24 hours and notifies Head of Compliance and Risk via
          MOD-MANAGEMENT dashboard and email
        - "Signed RoPA versions stored immutably in MOD-MANAGEMENT audit partition"
        - >
          gdpr_blocker: true requirement blocks deployment pipeline to
          production until corresponding RoPA entry status is SIGNED_OFF
        - >
          LIA step 3 template pre-filled with processing context;
          free-text field for balancing judgment; sign-off mandatory
        - >
          Signed RoPA exportable as PDF for supervisory authority requests
          and SOC 2 / ISAE 3402 evidence
        - >
          Phase 1 manual process (Head of Compliance and Risk sign-off
          in compliance risk register) is superseded by this automated
          workflow when REQ-INT-003 goes live
      acceptance_criteria:
        - "New GDPR-tagged requirement in a release produces a RoPA diff entry within 24 hours"
        - "Deployment pipeline blocks production release of gdpr_blocker requirement without SIGNED_OFF status"
        - "Signed RoPA PDF export passes ISAE 3402 auditor review as sufficient evidence"
        - "LIA step 3 template for a new processing activity is pre-filled with relevant context from the triggering requirement"


  # -------------------------------------------------------------------------
  # Customer success operations
  # -------------------------------------------------------------------------
  customer_success_operations:

    - id: REQ-CS-001
      title: "CS subview in MOD-MANAGEMENT"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P10, P12, P14]
      regulatory: []
      description: >
        A dedicated Customer Success subview within MOD-MANAGEMENT, accessible
        to the Head of Customer Success and EAGLE_ADMIN. This is the operational
        workspace for managing onboarding, health, renewal, expansion and client
        feedback. All data surfaces from first-class DB records per P14; no
        spreadsheet or file-based workarounds. The CS subview is a peer to the
        COO-view (REQ-OPS-001) and CCO/CRO-view (REQ-INT-001) within the same
        management intelligence module.
      subview_sections:
        health_overview:
          description: "Per-client health scorecard table — links to REQ-CS-002"
          primary_user: "Head of Customer Success, EAGLE_ADMIN"
        renewal_pipeline:
          description: "Contract renewal tracker — links to REQ-CS-003"
          primary_user: "Head of Customer Success"
        expansion_pipeline:
          description: "Expansion opportunity log — links to REQ-CS-005"
          primary_user: "Head of Customer Success, CRO"
        constraint_log:
          description: "Voice of the Client constraint log — links to REQ-CS-006"
          primary_user: "Head of Customer Success"
        contact_register:
          description: "Client contact register — links to REQ-CS-004"
          primary_user: "Head of Customer Success, COO (incident lane)"
        incident_followup:
          description: "Post-incident client follow-up tracker — links to REQ-CS-007"
          primary_user: "Head of Customer Success, COO"
      access_control:
        - "CS subview accessible to HEAD_OF_CS role and EAGLE_ADMIN"
        - "CRO has read access to expansion pipeline section only"
        - "CS subview not accessible to tenant roles"
        - "COO has read access to contact register section (incident communication use)"
      requirements:
        - "CS subview loads within 3 seconds for up to 200 active clients"
        - "All data in the CS subview sourced from DB records; no manual data entry into the view itself"
        - "Each section links to the underlying DB record for drill-down and edit"
        - "CS subview state (filters, selected client) persisted in DB per user per P14"
      acceptance_criteria:
        - "HEAD_OF_CS user can access the CS subview without navigating through COO-view"
        - "All six sections render with live data on first load; no section shows a loading error"
        - "Tenant role attempting to access CS subview receives access denied response"

    - id: REQ-CS-002
      title: "Client health scorecard"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION, L8_AUDIT]
      priority: MUST
      phase: 1
      principles: [P1, P2, P4, P10, P11, P14]
      regulatory: [DORA]
      description: >
        A composite, rule-driven health score per active client, stored as a
        first-class DB record and surfaced in the CS subview (REQ-CS-001) and
        the COO operations dashboard (REQ-OPS-001). This requirement completes
        the health score definition introduced in REQ-OPS-007 (v1.3.0), which
        defined auto-actions on RED/AMBER tiers but did not specify the score
        composition, weight model or CS workflow integration.
        In a regulated reporting product, client health is not a satisfaction
        proxy — it is a composite of compliance outcomes, operational performance,
        engagement signals and commercial proximity. The score is the primary
        early-warning instrument for the Head of Customer Success.
      score_components:
        submission_success_rate:
          definition: "Percentage of submissions in the last 12 months delivered to NCA without error or late delivery"
          weight: 35
          source: "submission_metrics table (REQ-OPS-003)"
          red_threshold:   "< 85%"
          amber_threshold: "85–94%"
          green_threshold: "≥ 95%"
        sla_performance:
          definition: "Average deadline margin (hours before NCA deadline) across all submissions in last 12 months"
          weight: 25
          source: "submission_metrics.deadline_margin (REQ-OPS-003)"
          red_threshold:   "< 12 hours average margin, or any submission with negative margin"
          amber_threshold: "12–47 hours average margin"
          green_threshold: "≥ 48 hours average margin"
        support_ticket_frequency:
          definition: "Count of client-reported exceptions in the operational exception log (REQ-OPS-004) in the last 90 days"
          weight: 20
          source: "exceptions table (REQ-OPS-004)"
          red_threshold:   "≥ 5 open or recently closed client-reported exceptions"
          amber_threshold: "2–4 exceptions"
          green_threshold: "0–1 exceptions"
        engagement_level:
          definition: "Active user sessions in MOD-CLIENT portal in the last 30 days relative to expected activity for the reporting period"
          weight: 10
          source: "Derived from audit trail (REQ-AUD-001) user_session events"
          red_threshold:   "No portal activity in a period where activity is expected"
          amber_threshold: "Below-average session count relative to prior periods"
          green_threshold: "Normal or above-average engagement"
        renewal_proximity:
          definition: "Days to contract renewal date"
          weight: 10
          source: "client_contracts table (REQ-CS-003)"
          red_threshold:   "< 60 days to renewal with no renewal conversation logged"
          amber_threshold: "60–90 days to renewal with no renewal conversation logged"
          green_threshold: "> 90 days, or renewal conversation already initiated"
      composite_score:
        calculation: >
          Weighted average of component scores on a 0–100 scale.
          Component RAG tier converted to numeric: GREEN = 100, AMBER = 50, RED = 0.
          composite_score = sum(component_score × weight) / 100
        rag_tiers:
          GREEN:  "composite_score ≥ 75"
          AMBER:  "composite_score 50–74, or any single component RED regardless of composite"
          RED:    "composite_score < 50, or submission_success_rate component RED"
      storage_and_automation:
        - "Health score computed and stored per client as a client_health_scores record after every reporting period close"
        - "On-demand recompute available to HEAD_OF_CS from the CS subview at any time"
        - "Score record carries: client_id, score_date, composite_score, rag_tier, per-component breakdown, triggered_by (PERIODIC / MANUAL)"
        - "Health score history retained indefinitely — never overwritten; each recompute creates a new record per P14"
        - "Score feeds REQ-OPS-001 per_client_health_row (SLA performance score column)"
      auto_actions:
        amber:
          - "CS subview flags client with AMBER indicator; HEAD_OF_CS notified by in-app alert"
          - "Suggested action prompt: 'Schedule proactive client call'"
        red:
          - "CS subview flags client with RED indicator; in-app alert to HEAD_OF_CS and EAGLE_ADMIN"
          - "Automatic creation of a high-priority exception in REQ-OPS-004 exception log linked to the health record"
          - "If renewal_proximity component is RED: also alert CRO"
      requirements:
        - "Health scorecard computed automatically without manual EAGLE_ADMIN input"
        - "AMBER and RED auto-actions fire within 1 hour of score computation"
        - "HEAD_OF_CS can override the rag_tier with a written justification; override logged in audit trail"
        - "Per-component breakdown visible in CS subview drill-down without separate report generation"
      acceptance_criteria:
        - "Client with submission_success_rate below 85% receives RED health score regardless of other components"
        - "Manual override of rag_tier stored as a distinct audit trail event linked to the health score record"
        - "Score history for a client shows all prior scores in reverse-chronological order in the CS subview drill-down"

    - id: REQ-CS-003
      title: "Renewal tracker"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P10, P12, P14]
      regulatory: []
      description: >
        A structured contract renewal calendar giving the Head of Customer
        Success complete visibility of all upcoming renewal dates, with advance
        alerting and per-client next-action tracking. In a subscription business
        with long sales cycles and high CAC, a renewal that lapses due to a missed
        conversation is an avoidable and disproportionate commercial loss. The
        renewal tracker is the operational safeguard against that failure.
      client_contracts_table:
        fields:
          client_id:               "Reference to tenant record"
          contract_start_date:     "Date of contract commencement"
          contract_end_date:       "Date of contract expiry (renewal trigger date)"
          contract_arr:            "Annual Recurring Revenue for this contract term"
          auto_renew:              "Boolean — does contract auto-renew by default?"
          renewal_status:          "NOT_STARTED / IN_CONVERSATION / AGREED / AT_RISK / CHURNED"
          renewal_initiated_date:  "Date when renewal conversation was first logged"
          renewal_owner:           "HEAD_OF_CS (primary) or CRO (if commercial terms in negotiation)"
          renewal_notes:           "Free text — last conversation summary, next action, blockers"
          next_action_date:        "Date by which next renewal action is due"
          churn_risk_flag:         "Boolean — manually set by HEAD_OF_CS; triggers CRO alert"
      alerting:
        ninety_day_alert:
          trigger: "contract_end_date minus 90 days"
          action: "In-app alert to HEAD_OF_CS; renewal_status auto-set to NOT_STARTED if still null"
          purpose: "Initiate renewal conversation with sufficient runway"
        sixty_day_alert:
          trigger: "contract_end_date minus 60 days; renewal_status still NOT_STARTED"
          action: "Escalation alert to HEAD_OF_CS and EAGLE_ADMIN"
        thirty_day_alert:
          trigger: "contract_end_date minus 30 days; renewal_status NOT IN (AGREED, CHURNED)"
          action: "Urgent alert to HEAD_OF_CS and CRO"
        churn_risk_alert:
          trigger: "churn_risk_flag set to TRUE by HEAD_OF_CS"
          action: "Immediate alert to CRO and CEO"
      requirements:
        - "Renewal tracker populated by HEAD_OF_CS at contract signature; EAGLE_ADMIN creates the initial record"
        - "Renewal calendar view in CS subview: all active contracts sorted by contract_end_date ascending, colour-coded by renewal_status and proximity"
        - "ARR at risk metric: sum of contract_arr for all clients with renewal_status = NOT_STARTED or AT_RISK and contract_end_date within 90 days"
        - "ARR at risk figure visible in MOD-MANAGEMENT CRO/CCO-view alongside new ARR pipeline (REQ-INT-001)"
        - "Contract records retained for 5 years post-expiry per standard commercial retention"
      acceptance_criteria:
        - "90-day alert fires automatically; no manual trigger required"
        - "Renewal_status change from NOT_STARTED to IN_CONVERSATION logged in audit trail with timestamp and user"
        - "ARR at risk figure in CRO/CCO-view matches sum of qualifying contract_arr records without manual computation"

    - id: REQ-CS-004
      title: "Client contact register"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P7, P10, P14]
      regulatory: [DORA]
      description: >
        A structured register of named contacts per client for use in
        proactive CS communications, incident notifications and renewal
        conversations. REQ-OPS-006 references "the client's Head of Customer
        Success contact" for SLA breach notifications but does not define
        where that contact is stored or maintained. This requirement formalises
        that data structure and extends it to cover all CS communication
        scenarios.
      contact_register_table:
        fields:
          client_id:            "Reference to tenant record"
          contact_type:         "PRIMARY_CS / SECONDARY_CS / INCIDENT_ESCALATION / EXECUTIVE_SPONSOR / BILLING"
          full_name:            "Contact full name"
          job_title:            "Contact role at the AIFM"
          email:                "Primary email address"
          phone:                "Mobile number for incident escalation (mandatory for INCIDENT_ESCALATION type)"
          preferred_channel:    "EMAIL / PHONE / IN_APP"
          language_preference:  "ISO 639-1 language code"
          do_not_contact_flag:  "Boolean — set if contact has requested to be removed from non-critical comms"
          last_contacted_date:  "Date of last outreach by HEAD_OF_CS; updated manually"
          notes:                "Free text — relationship context, role changes, sensitivities"
      minimum_contacts_per_client:
        - "At least one PRIMARY_CS contact required before paid tenant activation (REQ-TEN-003 onboarding checklist)"
        - "At least one INCIDENT_ESCALATION contact with phone number required before first live submission"
      integration:
        - "INCIDENT_ESCALATION contacts automatically available in REQ-OPS-006 DORA incident impact register"
        - "PRIMARY_CS contact email used as default recipient for renewal alerts (REQ-CS-003) and health score deterioration alerts (REQ-CS-002)"
        - "Contact register accessible to COO in read-only mode for incident communication purposes"
      requirements:
        - "HEAD_OF_CS owns and maintains the contact register; EAGLE_ADMIN can read and create records"
        - "Contact record changes logged in audit trail with prior value, new value, timestamp and user"
        - "Missing INCIDENT_ESCALATION contact triggers warning in CS subview and blocks first live submission (REQ-CS-004 prerequisite gate in REQ-TEN-003)"
        - "Contact register exportable as PDF and CSV on demand from CS subview per P14"
      acceptance_criteria:
        - "Tenant without an INCIDENT_ESCALATION contact cannot reach ACTIVE_TENANT status"
        - "DORA incident record (REQ-OPS-006) pre-populates affected client notification fields from contact register without manual re-entry"
        - "Contact change event appears in audit trail with full before/after record"

    - id: REQ-CS-005
      title: "Expansion opportunity log"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 1
      principles: [P1, P10, P12, P14]
      regulatory: []
      description: >
        A structured per-client log of identified expansion opportunities within
        the existing client base, surfaced in the CS subview and shared with the
        CRO for commercial follow-up. The log and data structure are active from
        Phase 1. The CRO_HANDOFF workflow (HANDED_TO_CRO status and handoff
        tasks to REQ-CS-003 renewal pipeline) is dormant until the CRO role is
        filled; prior to that point, expansion items are tracked and owned by
        Head of Customer Success only. Expansion types in the Eagle model include
        additional AIFs added to scope, additional NCA submissions, new user
        tiers, and additional reporting frequencies. This log converts
        relationship signals observed by the Head of CS into a structured
        commercial pipeline visible to the CRO alongside new ARR.
      expansion_opportunities_table:
        fields:
          client_id:              "Reference to tenant record"
          opportunity_type:       "ADDITIONAL_AIF / ADDITIONAL_NCA / ADDITIONAL_USER_TIER / OTHER"
          description:            "Free text — what the opportunity is and how it was identified"
          identified_date:        "Date opportunity was logged by HEAD_OF_CS"
          identified_by:          "HEAD_OF_CS (standard) or EAGLE_ADMIN"
          estimated_arr_uplift:   "Estimated incremental ARR if opportunity converts (decimal EUR)"
          probability_tier:       "HIGH / MEDIUM / LOW"
          status:                 "IDENTIFIED / QUALIFIED / HANDED_TO_CRO / WON / LOST / PARKED"
          cro_handoff_date:       "Date opportunity was formally handed to CRO for commercial terms"
          won_arr:                "Actual ARR uplift if WON (populated on conversion)"
          lost_reason:            "Free text — reason if status = LOST"
          notes:                  "Free text — context, next steps, client signals"
      pipeline_integration:
        - "Expansion ARR pipeline (sum of estimated_arr_uplift × probability weight) visible in MOD-MANAGEMENT CRO/CCO-view alongside new ARR pipeline (REQ-INT-001)"
        - "Status change to HANDED_TO_CRO triggers in-app notification to CRO with opportunity summary"
        - "WON expansion ARR feeds ARR bridge in REQ-INT-001 (opening ARR + new ARR + expansion ARR - churn ARR = closing ARR)"
      requirements:
        - "HEAD_OF_CS owns the expansion log; CRO has read and status-update access for opportunities in HANDED_TO_CRO status"
        - "Expansion opportunity log not visible to tenant roles"
        - "Monthly expansion pipeline summary (count, estimated ARR, status breakdown) stored as a DB record per P14; accessible in CRO/CCO-view"
        - "Expansion log exportable as PDF and CSV on demand"
      acceptance_criteria:
        - "Status change from IDENTIFIED to HANDED_TO_CRO fires CRO notification within 5 minutes"
        - "Expansion ARR pipeline figure in CRO/CCO-view is consistent with sum of qualifying opportunity records without manual computation"
        - "WON expansion ARR contributes to ARR bridge within one business day of status update"

    - id: REQ-CS-006
      title: "Client constraint log (Voice of the Client)"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P10, P11, P14]
      regulatory: []
      description: >
        A structured log of workflow friction, onboarding obstacles and recurring
        support issues observed across the client base, maintained by the Head
        of Customer Success and presented monthly to the CTO/CPO as evidence-based
        product constraints. This is not a feature wishlist — it is a structured
        register of client experience failures with quantified impact on retention.
        The CTO/CPO decides whether and when to act on constraints; the Head of CS
        provides the evidence and the retention context.
      constraint_log_table:
        fields:
          constraint_id:          "Auto-generated unique identifier"
          constraint_type:        "WORKFLOW_FRICTION / ONBOARDING_OBSTACLE / RECURRING_SUPPORT / DATA_FORMAT / OTHER"
          title:                  "Short descriptive title (max 100 chars)"
          description:            "Detailed description of the friction or failure observed"
          first_observed_date:    "Date the issue was first logged"
          client_count_affected:  "Number of active clients where this constraint has been observed"
          support_ticket_count:   "Number of exception log entries (REQ-OPS-004) attributable to this constraint"
          estimated_retention_impact: "LOW / MEDIUM / HIGH — HEAD_OF_CS assessment of churn risk if unresolved"
          linked_client_ids:      "List of client_ids where this constraint has been observed"
          linked_exception_ids:   "References to REQ-OPS-004 exception records supporting this constraint"
          status:                 "OPEN / PRESENTED_TO_CTO / IN_PRODUCT_ROADMAP / RESOLVED / CLOSED_NOT_PRODUCT"
          resolution_notes:       "Free text — CTO/CPO response or resolution description"
          presented_date:         "Date first presented to CTO/CPO in monthly session"
          cto_response_date:      "Date CTO/CPO provided a decision on this constraint"
      monthly_session:
        - "HEAD_OF_CS prepares a monthly constraint summary: all OPEN constraints sorted by (client_count_affected DESC, support_ticket_count DESC)"
        - "Summary stored as a monthly_constraint_summary DB record; presentation-ready view generated on demand per P14"
        - "CTO/CPO response (decision + rationale) recorded in constraint record within 5 business days of monthly session"
        - "Constraints with status = IN_PRODUCT_ROADMAP linked to a product roadmap item reference"
      requirements:
        - "HEAD_OF_CS owns the constraint log; CTO and CPO have read and response-write access"
        - "Constraint log not visible to tenant roles"
        - "Constraint status change logged in audit trail with timestamp and user"
        - "Monthly summary auto-generated from DB on the first business day of each month per P14"
      acceptance_criteria:
        - "Monthly constraint summary generated automatically without HEAD_OF_CS manual assembly"
        - "Constraint with client_count_affected ≥ 3 automatically flagged as HIGH priority in CS subview"
        - "CTO/CPO response recorded in the constraint record without requiring HEAD_OF_CS to duplicate the information"

    - id: REQ-CS-007
      title: "Post-incident client follow-up tracking"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P1, P7, P10, P14]
      regulatory: [DORA]
      description: >
        Tracking of written post-incident follow-up communications to clients
        affected by MAJOR DORA incidents, linked to the DORA incident client
        impact register (REQ-OPS-006). The Head of CS role document (section 4.5)
        requires a written follow-up summary to affected clients within 5 business
        days of MAJOR incident resolution. This requirement formalises that
        obligation as a system-enforced workflow with deadline tracking and
        escalation if the deadline is missed.
        REQ-OPS-006 covers the incident impact register and immediate
        notification; this requirement covers the post-resolution follow-up lane.
      follow_up_tracking_table:
        fields:
          incident_id:              "Reference to DORA incident record (REQ-ISO-005)"
          client_id:                "Reference to affected client"
          incident_classification:  "MAJOR / SIGNIFICANT (inherited from REQ-OPS-006)"
          follow_up_required:       "Boolean — TRUE for all MAJOR incidents; FALSE for SIGNIFICANT unless HEAD_OF_CS flags otherwise"
          follow_up_deadline:       "incident_resolved_at + 5 business days (auto-computed)"
          follow_up_status:         "PENDING / IN_PREPARATION / SENT / ACKNOWLEDGED_BY_CLIENT / WAIVED"
          follow_up_sent_at:        "Timestamp of written follow-up sent to client"
          follow_up_channel:        "EMAIL / IN_APP / PORTAL_MESSAGE"
          follow_up_content_ref:    "Reference to stored communication (audit trail link)"
          client_acknowledged_at:   "Timestamp of client acknowledgement (optional)"
          waiver_justification:     "Free text — required if status = WAIVED; must be approved by COO"
      automation:
        - "Follow-up record created automatically when a MAJOR incident is resolved in REQ-ISO-005, one record per affected client in REQ-OPS-006"
        - "follow_up_deadline computed automatically from incident_resolved_at timestamp"
        - "Daily check: if follow_up_status = PENDING and follow_up_deadline is within 24 hours, send reminder to HEAD_OF_CS"
        - "If follow_up_deadline passes with status still PENDING: escalation alert to HEAD_OF_CS and COO; exception auto-opened in REQ-OPS-004"
      requirements:
        - "HEAD_OF_CS owns the follow-up log; COO has read and waiver-approval access"
        - "Follow-up status changes logged in audit trail"
        - "Overdue follow-up (deadline passed, status PENDING) displayed prominently in CS subview incident follow-up section"
        - "All follow-up records retained for 5 years per DORA Art.30 retention requirements"
        - "Monthly follow-up completion rate (SENT or above / total required) stored as a DB metric per P14"
      acceptance_criteria:
        - "Follow-up record created automatically within 30 minutes of MAJOR incident resolution for each affected client"
        - "Escalation alert fires if deadline passes with no follow-up sent; alert visible in both CS subview and COO-view"
        - "WAIVED status requires COO approval; waiver without approval is rejected by the system"

    - id: REQ-CS-008
      title: "NPS and CSAT programme"
      module: MOD-MANAGEMENT
      layer: [L9_ORCHESTRATION]
      priority: SHOULD
      phase: 2
      principles: [P1, P10, P11, P12, P14]
      regulatory: []
      description: >
        A structured Net Promoter Score and Customer Satisfaction measurement
        programme, delivered quarterly via in-app or email survey. Results
        stored as first-class DB records per P14, segmented by client size and
        tenure, with trend tracking over time. NPS and CSAT are lagging
        indicators that complement the leading-indicator health scorecard
        (REQ-CS-002). They are Phase 2 because Phase 1 client counts make
        statistical significance impractical; the tooling investment is
        deferred until the client base justifies it.
      survey_model:
        nps:
          question: "On a scale of 0–10, how likely are you to recommend Eagle to a colleague?"
          scoring: "Promoters (9–10) minus Detractors (0–6) as a percentage of respondents"
          frequency: "Quarterly; sent within 5 business days after reporting period close"
          minimum_responses_for_validity: 5
        csat:
          question: "How satisfied are you with Eagle's support and service this quarter? (1–5)"
          frequency: "Quarterly; same send cycle as NPS"
      storage:
        nps_csat_records_table:
          fields:
            client_id:       "Reference to tenant"
            survey_date:     "Date survey was sent"
            period:          "Reporting period this survey relates to"
            nps_score:       "Respondent's 0–10 NPS answer (null if not responded)"
            csat_score:      "Respondent's 1–5 CSAT answer (null if not responded)"
            free_text:       "Optional qualitative comment from respondent"
            responded_at:    "Timestamp of response"
            respondent_type: "PRIMARY_CS / COMPLIANCE_REVIEWER / EXECUTIVE_SPONSOR (from REQ-CS-004 contact type)"
        aggregate_records:
          - "Quarterly NPS and CSAT aggregate stored as a DB record per period: response count, NPS score, CSAT average, segmented by client_size_tier and client_tenure_months"
          - "Aggregate auto-computed from individual records; no manual assembly required per P14"
      requirements:
        - "Survey dispatch and response collection tooling choice left to HEAD_OF_CS; this requirement specifies storage and reporting only"
        - "Individual and aggregate NPS/CSAT records visible in CS subview trend view"
        - "NPS trend and CSAT trend charts available in CS subview: trailing 8 quarters, factory-wide and per client"
        - "Segment breakdowns: clients < 12 months tenure vs ≥ 12 months; clients < 5 AIFs vs ≥ 5 AIFs"
        - "NPS/CSAT data not accessible to tenant roles"
      acceptance_criteria:
        - "Quarterly aggregate record generated automatically from individual response records within 1 business day of survey close"
        - "NPS trend chart in CS subview reflects actual response data without manual data preparation"
        - "Individual response record includes respondent_type enabling segment analysis"


