  - id: REQ-AIFMD-007
    title: "AIFMD 2.0 horizon scanning and client readiness communication"
    module: MOD-MANAGEMENT
    layer: [L9_ORCHESTRATION]
    priority: SHOULD
    phase: 1.5
    gdpr_blocker: false
    principles: [P8, P10, P13]
    regulatory: [AIFMD, DORA]
    description: >
      Formalises the regulatory horizon scanning programme per project_eagle_compliance_risk_v1_3.md
      section 4.1. OOS-001 correctly scopes Annex IV engine implementation as out of scope until
      ESMA ITS publication (~April 2027). This requirement tracks ESMA publication status and
      mandates client communication when status changes. The per-client AIFMD 2.0 impact flag
      in REQ-CR-007 is linked to this requirement.
    aifmd20_timeline:
