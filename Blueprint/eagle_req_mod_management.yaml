      - "MAJOR incident closure triggers risk review prompt within 24 hours"
      - "Risk register PDF accepted by ISAE 3402 auditor as second-line risk oversight evidence"

  - id: REQ-CR-002
    title: "RoPA Phase 1 — structured manual Register of Processing Activities"
    module: MOD-MANAGEMENT
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    gdpr_blocker: false
    principles: [P2, P8, P10, P14]
