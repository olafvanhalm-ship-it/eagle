  compliance_risk_manual_controls_see_eagle_manual:

  - id: REQ-CR-001
    title: "Risk register — DB-first structured compliance risk register"
    module: MOD-MANAGEMENT
    layer: [L9_ORCHESTRATION]
    priority: MUST
    phase: 1
    principles: [P2, P8, P10, P14]
    regulatory: [DORA, GDPR, ISO27001]
