metadata:
  module: MOD-SUB
  name: "Submission and Delivery"
  primary_users: [EAGLE_ADMIN, COMPLIANCE_REVIEWER]
  pipeline_layers: [L6_PACKAGING, L7_SUBMISSION]
  module_req_count: 9  # +1: REQ-DQEF-001 added via DQEF Technical Document gap analysis (2025-03-26)
  cross_req_count: 20
  total_applicable: 29

# =============================================================================
# MODULE REQUIREMENTS  (8 requirements)
# =============================================================================

requirements:

  # -------------------------------------------------------------------------
  # NCA file format
  # -------------------------------------------------------------------------
  nca_file_format:

    - id: REQ-FMT-001
      title: "NCA-specific file packaging configuration"
      layer: [L6_PACKAGING]
      priority: MUST
      phase: 1
      principles: [P3, P6, P10, P14]
      regulatory: [AIFMD, IT_TECH_R6]
      description: >
        Packaging is configurable per NCA via override configuration files loaded
        at runtime. New NCA packaging requires only a new configuration entry.
        Packaging never alters XML content.
      packaging_dimensions:
        xml_structure:
          single_aif_file: "One XML file per AIF record with AIFM in separate file"
          multi_aif_file: "All AIF records bundled with AIFM record in single XML (default)"
        compression:
          none: "Plain XML files"
          zip_single: "Single ZIP containing all batch XML files"
          zip_per_aif: "One ZIP per AIF XML"
          zip_of_zips: "Master ZIP containing individual AIF ZIPs"
          gzip: "GZIP-compressed XML"
        file_naming:
          pattern: "Configurable template per NCA"
          variables: ["{aifm_national_code}", "{aif_national_code}", "{reporting_period_type}", "{reporting_period_year}", "{filing_type}", "{submission_timestamp}", "{sequence_number}"]
        xml_variations: "NCA-specific namespace prefixes, wrapper elements, encoding declarations handled by NCA override serialisation profiles"
      requirements:
        - "Packaging configuration in NCA override files — no hard-coded packaging logic"
        - "File naming templates validated at configuration time"
        - "Packaging shown to client in submission preview before delivery"
        - "Checksum (MD5 or SHA-256 per NCA requirement) generated per packaged file and stored in audit record"
      acceptance_criteria:
        - "Adding a new NCA packaging profile passes integration tests without modifying existing code"


  # -------------------------------------------------------------------------
  # NCA delivery channels
  # -------------------------------------------------------------------------
  nca_delivery_channels:

    - id: REQ-DEL-001
      title: "Five-channel NCA delivery model"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P3, P6, P7]
      regulatory: [DORA, AIFMD]
      description: >
        Each NCA registration has one configured delivery channel. All channels
        produce an equivalent audit trail record. All credentials for ROBOT,
        S3, and SFTP channels stored in the credential vault per REQ-NCA-003.
      channels:
        DIRECT_API:
          description: "Eagle calls the NCA REST API endpoint directly using Eagle-managed credentials"
          failure_fallback: "Retry 3 times with exponential backoff; fall back to MANUAL on persistent failure"
        ROBOT_PORTAL:
          description: "Browser automation submits via NCA web portal using client credentials from vault"
          failure_fallback: "Defined in REQ-NCA-002"
        S3_CLIENT_BUCKET:
          description: "Eagle places packaged file in client-provided S3 bucket; client responsible for onward NCA delivery"
          credentials: "Client IAM role ARN or access key in credential vault"
          confirmation: "S3 PutObject success recorded; client confirms NCA receipt"
        S3_EAGLE_BUCKET:
          description: "Eagle places packaged file in Eagle-managed S3 bucket; client pulls via presigned URL (7-day expiry)"
          confirmation: "Client records NCA confirmation number in Eagle (PENDING_CONFIRMATION flow)"
          cleanup: "File deleted after download or after 7 days — whichever comes first"
        SFTP_EAGLE_SERVER:
          description: "Client pushes data to Eagle SFTP inbound path; Eagle processes and returns packaged file to client outbound path"
          inbound_path: "/inbound/{tenant_id}/{aif_id}/"
          outbound_path: "/outbound/{tenant_id}/{period}/"
          polling: "Eagle polls inbound path every 5 minutes; new files trigger ingestion pipeline automatically"
          credentials: "Eagle issues tenant-scoped SSH key pairs; stored in credential vault"
          confirmation: "Client records NCA confirmation number in Eagle"
        MANUAL:
          description: "Eagle generates packaged file for client download; client submits via NCA portal"
          confirmation: "Client records NCA confirmation number in Eagle"
      acceptance_criteria:
        - "All five channels produce equivalent audit trail record structure"
        - "Channel delivery failure triggers defined fallback within specified timeframe"

    - id: REQ-DEL-002
      title: "SFTP inbound as automated ingestion trigger"
      layer: [L1_INGESTION]
      priority: SHOULD
      phase: 1
      principles: [P2, P6]
      regulatory: [DORA, GDPR]
      requirements:
        - "Files deposited to SFTP inbound path trigger ingestion pipeline automatically"
        - "Auto-detection (REQ-LEG-002) applied to SFTP inbound files"
        - "Processing status of SFTP-triggered ingestion visible in dashboard"
        - "Inbound path is tenant- and AIF-scoped; misrouting architecturally impossible"
        - "Inbound files deleted after successful ingestion"
      acceptance_criteria:
        - "File on SFTP appears as ingestion event in dashboard within 10 minutes"


  # -------------------------------------------------------------------------
  # NCA portal robots
  # -------------------------------------------------------------------------
  nca_portal_robots:

    - id: REQ-NCA-001
      title: "NCA portal robot submission"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P2, P7, P9, P14]
      regulatory: [DORA, AIFMD]
      description: >
        Browser automation submits validated XML to NCA web portal using client
        credentials from the encrypted vault. Triggered manually by
        COMPLIANCE_REVIEWER or TENANT_ADMIN after review gate approval.
        All robot actions logged. Credentials never logged or retained in memory
        beyond the session.
      robot_flow:
        1: "Review gate approval recorded"
        2: "Credentials retrieved from vault for session duration"
        3: "Headless browser opens NCA portal and authenticates"
        4: "Automation navigates to submission page and uploads XML"
        5: "NCA portal confirmation number captured and stored"
        6: "Browser session terminated; credentials cleared from memory"
      requirements:
        - "ROBOT mode available per NCA registration configuration"
        - "Robot scripts version-controlled and subject to change management"
        - "Eagle does not attempt to bypass CAPTCHAs under any circumstances"
      acceptance_criteria:
        - "AFM portal robot tested against AFM test environment before go-live"

    - id: REQ-NCA-002
      title: "NCA portal robot fallback procedure"
      layer: [L7_SUBMISSION, L9_ORCHESTRATION]
      priority: MUST
      phase: 1
      principles: [P7]
      regulatory: [DORA]
      failure_scenarios:
        authentication_failure: "Halt robot; alert EAGLE_ADMIN and client; fall back to MANUAL within 15 minutes"
        portal_unavailable: "Retry 3 times at 10-minute intervals; alert and fall back to MANUAL"
        layout_changed: "Halt immediately; alert EAGLE_ADMIN; emergency change process for robot script"
        captcha_encountered: "Halt immediately; fall back to MANUAL; EAGLE_ADMIN investigates"
      requirements:
        - "Fallback to MANUAL is automatic; download link generated and client notified within 15 minutes"
        - "EAGLE_ADMIN notified within 5 minutes of any robot failure"
        - "Robot failure within 5 business days of deadline classified as SIGNIFICANT ICT incident"
        - "Sustained failure rate >10% triggers EAGLE_ADMIN alert and investigation"


  # -------------------------------------------------------------------------
  # Submission mechanics
  # -------------------------------------------------------------------------
  submission_mechanics:

    - id: REQ-SUB-001
      title: "INIT and AMND filing type support"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P3, P8, P14]
      regulatory: [AIFMD, IT_TECH_R6, DQEF]
      filing_types:
        INIT: "Initial filing for a reporting period — one INIT per AIFM per period per NCA; duplicate blocked"
        AMND: "Amendment of a previously accepted INIT — references original; CancelledRecordFlag = C"
      acceptance_criteria:
        - "Filing type auto-assigned based on submission history for the period"
        - "Duplicate INIT blocked with explanatory error"

    - id: REQ-SUB-002
      title: "Cancellation record support"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P8]
      regulatory: [AIFMD, IT_TECH_R6]
      requirements:
        - "CancellationAIFMRecordInfo and CancellationAIFRecordInfo supported"
        - "CancelledRecordFlag must be C"
        - "Cannot cancel an already-cancelled record"
        - "Cancellation requires COMPLIANCE_REVIEWER approval at review gate"

    - id: REQ-SUB-003
      title: "Batch submission sequencing"
      layer: [L7_SUBMISSION]
      priority: MUST
      phase: 1
      principles: [P7, P8]
      regulatory: [AIFMD, DORA]
      description: >
        AIFM-level record must be submitted and acknowledged before any AIF-level
        records in the same batch. NCA-specific rate limits respected.
      requirements:
        - "AIFM acknowledgement verified before any AIF records are submitted"
        - "AIFM submission failure holds all AIF records in the batch"
        - "NCA rate limit configuration stored in NCA override files (REQ-MOD-001)"
        - "ROBOT mode: sessions serialised per NCA portal — no parallel sessions"


  # -------------------------------------------------------------------------
  # DQEF feedback export
  # -------------------------------------------------------------------------
  dqef_feedback_export:

    - id: REQ-DQEF-001
      title: "ESMA DQEF false-positive feedback export"
      layer: [L6_PACKAGING]
      priority: MUST
      phase: 1
      principles: [P2, P7, P8, P10]
      regulatory: [DQEF]
      dqef_reference: "ESMA50-1605533872-8344 AIFMD Technical Document (2025) — sheet 4b FEEDBACK_TEMPLATE"
      description: >
        NCAs must return false-positive feedback to ESMA within 12 weeks of
        receiving DQ test results. Eagle enables COMPLIANCE_REVIEWER or
        TENANT_ADMIN to mark individual DQ_WARNING flags as false positives
        and generates an export in the exact column format prescribed by ESMA.
        This export is the primary instrument by which the NCA communicates
        remedial actions and false positives back to ESMA under the semi-annual
        DQEF cycle (HY1: feedback deadline ~15 Jan; HY2: ~15 Jul — see
        Technical Document sheet 4_TIMELINE).
      esma_feedback_columns:
        ID_ISSUE:          "Eagle-generated unique identifier for the flagged issue (alphanumeric)"
        NCA:               "ISO 3166-1 alpha-2 country code of the responsible NCA"
        TEST_NUMBER:       "ESMA DQEF test ID e.g. AIFMS_DQT_4060500"
        NATIONAL_ID_MANAGER: "Manager national ID as reported to ESMA"
        NATIONAL_ID_FUND:  "Fund national ID as reported to ESMA"
        REPORTING_YEAR:    "Year of the reporting period (YYYY)"
        REPORTING_PERIOD:  "Period code — one of {Q1,Q2,Q3,Q4,H1,H2,Y1,X1,X2}"
        TIMESTAMP:         "ESMA submission timestamp of the flagged record (dd/mm/yyyy hh:mm:ss)"
        ERROR_CODE:        "ESMA DQEF warning code e.g. AIFMS_DQT_4060500_WARNING1 (from REQ-VAL-003 dqef_error_code)"
        RECORD_ESMA_ID:    "ESMA internal record ID for the flagged record"
        DATE_FIRST_FLAG:   "Date when ESMA first flagged the issue (dd/mm/yyyy hh:mm:ss)"
        STATUS:            "Optional: WRONG_FLAG if NCA confirms false positive; blank otherwise"
      workflow:
        1: "ESMA sends DQ test results to NCA (Step 1/2 in DQEF cycle)"
        2: "COMPLIANCE_REVIEWER or TENANT_ADMIN reviews flagged items in Eagle DQ dashboard"
        3: "For each item: mark as CONFIRMED_ERROR (triggers amendment workflow REQ-AMD-001) or FALSE_POSITIVE"
        4: "FALSE_POSITIVE items: reviewer records justification (min 50 chars) — stored in audit trail"
        5: "Eagle generates DQEF feedback export file containing all FALSE_POSITIVE items in ESMA column format"
        6: "COMPLIANCE_REVIEWER downloads and submits export to ESMA via NCA communication channel"
        7: "Export submission recorded in audit trail with timestamp and reviewer identity"
      requirements:
        - "Export column names match ESMA template exactly (capital letters, same order as sheet 4b)"
        - "Export available as .xlsx download only — no other format; matches ESMA template structure"
        - "Export scoped per DQEF cycle (HY1 or HY2) and per NCA registration"
        - "Items without a dqef_error_code (REQ-VAL-003) cannot be included in export — Eagle warns reviewer"
        - "Export generation does not require EAGLE_ADMIN involvement; available to COMPLIANCE_REVIEWER"
        - "Submitted export stored immutably in audit trail per DQEF cycle"
        - "12-week ESMA response deadline surfaced as a dashboard reminder from the date ESMA results are received"
      acceptance_criteria:
        - "Generated export passes ESMA column validation (exact headers, no extra columns)"
        - "DQEF cycle deadline reminder tested: appears 12 weeks before expiry, escalates at 4 weeks and 1 week"
        - "Export for a batch of 50 false-positive items generates within 30 seconds"
        - "Audit trail record for export submission is immutable and queryable by EAGLE_ADMIN"


