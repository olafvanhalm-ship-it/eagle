# =============================================================================
# MODULE REQUIREMENTS  (2 requirements)
# =============================================================================

requirements:

  # -------------------------------------------------------------------------
  # External API and integration
  # -------------------------------------------------------------------------
  external_api_and_integration:

    - id: REQ-API-001
      title: "Versioned REST API"
      layer: [L10_API]
      priority: MUST
      phase: 1.5
      principles: [P3, P6, P13]
      regulatory: [DORA]
      requirements:
        - "OpenAPI 3.0 specification published at /api/docs"
        - "Breaking changes require new major version with 90-day deprecation notice"
        - "API changelog accessible to TENANT_ADMIN"
      minimum_endpoints:
        ingestion: ["POST /api/v1/submissions/aifm", "POST /api/v1/submissions/aif", "POST /api/v1/submissions/positions", "POST /api/v1/submissions/unstructured"]
        status: ["GET /api/v1/submissions/{id}", "GET /api/v1/submissions"]
        calendar: ["GET /api/v1/calendar"]
        audit: ["GET /api/v1/audit/{submission_id}"]
        reference: ["GET /api/v1/health"]

    - id: REQ-API-002
      title: "White-label and embedded integration"
      layer: [L10_API]
      priority: SHOULD
      phase: 1.5
      principles: [P3, P13]
      regulatory: []
      requirements:
        - "Embeddable UI components via iframe with configurable origin allowlist"
        - "White-label branding (logo, primary colour) configurable per tenant by EAGLE_ADMIN"
        - "Branding limited to logo and colour — layout and functionality fixed per Principle 3"
        - "White-label configuration change does not require code deployment"


