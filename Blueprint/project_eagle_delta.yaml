    document:       "project_eagle_cfo_v1_1_corrected_v2.md"
    sectie:         "## 7. Guiding Principles"
    ernst:          "warning"
    bevinding: >
      De Guiding Principles sectie van de CFO vermeldt P3, P4, P10, P12 en P16,
      maar P14 (Database-first) ontbreekt. De body-tekst beschrijft onder P4 al
      dat de CFO alle financiële metrics afleidt uit het canonieke datamodel en
      dat parallelle spreadsheets een 'design violation' zijn — de inhoudelijke
      verplichting is aanwezig, maar P14 wordt niet als sturend principe benoemd.
      CTO, COO, Head of Engineering en Head of Compliance & Risk hebben P14 wél
      opgenomen.
    aanbevolen_actie: >
      Voeg P14 toe aan de Guiding Principles sectie van de CFO met een
      CFO-specifieke toelichting, bijv.: "All financial metrics — CAC, LTV,
      cost-per-submission, automation ratio, gross margin — are derived exclusively
      from the canonical database. Financial dashboards and threshold reports are
      database-native views. Parallel spreadsheets or extracts that diverge from
      the canonical record are a design violation: the CFO escalates these to the
      CTO and does not treat them as authoritative sources."

