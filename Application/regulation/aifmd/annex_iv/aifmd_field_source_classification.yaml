# =============================================================================
# SUMMARY
# =============================================================================
# AIFM: 38 fields + 5 special
#   entity:    6 fields  (name, jurisdiction, LEI, BIC, EEA flag, base currency)
#   composite: 9 fields  (principal markets, instruments, AuM totals)
#   report:   23 fields  (header, filing metadata, NCA-specific)
#
# AIF: 302 fields + 5 special
#   entity:  ~155 fields (fund identification, share classes, strategies,
#                         risk measures, liquidity profiles, leverage, etc.)
#   composite: ~95 fields (derived from positions: geo, top-5, exposures,
#                          turnover, investor breakdown, counterparties)
#   report:   ~52 fields (header, filing metadata, NCA-specific)
#
# For ESMA/FCA XML imports:
#   - entity fields → lifted to Source Canonical (reusable)
#   - composite fields → stay at Report Canonical (not deconstructable)
#   - report fields → stay at Report Canonical (filing-specific)
# =============================================================================
