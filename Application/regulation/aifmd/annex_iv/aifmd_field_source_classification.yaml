# =============================================================================
# AIFMD Field Source Classification
# =============================================================================
# Classifies each ESMA field into one of three categories for the two-layer
# canonical architecture:
#
#   entity    → Scalar fact about a real-world entity (Fund, Manager, etc.)
#               Can be "lifted" from an ESMA/FCA XML import into the Source
#               Canonical for reuse across report types.
#
#   composite → Aggregated/derived from multiple source entities (positions,
#               transactions, etc.) Only available with full lineage when
#               calculated by a projection from source data.
#               When imported from ESMA/FCA XML, stored at report level only.
#
#   report    → Only meaningful in the context of this specific AIFMD report
#               filing. Not reusable for other report types.
#
# Source entity mapping (for entity fields) indicates which Source Canonical
# entity the field maps to when reverse-lifting from ESMA/FCA imports.
# =============================================================================

version: "1.0"
description: "Field classification for AIFMD two-layer canonical architecture"

