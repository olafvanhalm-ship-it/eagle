################################################################################
# NCA-SPECIFIC OVERRIDES — AFM (Netherlands)
# Version: v1 — 2026-03-31
# Base YAML: aifmd_validation_rules.yaml (v2.0)
#
# Schema: nca_rules entries use identical field layout as aif_rules/aifm_rules
# in the base YAML, plus NCA-specific fields (nca_error_codes, status,
# deactivated_version, nca_source_doc, eagle_action, base_rule_path).
#
# Source: AFM AIFMD reporting specifications and observed production data
# from M adapter filings to DNB/AFM portal.
################################################################################

nca_overrides:
  nca: AFM
  country: NL
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.0'
  source_document:
    title: AFM AIFMD Annex IV Reporting Requirements
    version: '1.0'
    date: '2026-03-31'
    publisher: Autoriteit Financiele Markten (AFM)
    url: https://www.afm.nl
  changelog:
  - version: v1
    date: '2026-03-31'
    changes:
    - Initial AFM NCA override file
    - >-
      NCA-AFM-ReportingMemberState: ReportingMemberState must be constant
      NL for all filings to AFM
    - >-
      NCA-AFM-AIFMNationalCode: AFM assigns AIFM codes in format BXX999
      (letter B + 2 uppercase letters + 3 digits)
    - >-
      NCA-AFM-AIFNationalCode: AFM assigns AIF codes as 8-digit numbers
      starting with 500 (range 50000000-50099999)
    - >-
      NCA-AFM-FilenameAIFM: AIFM XML filename convention
      AIFM_NL_{AIFMNationalCode}_{YYYYMMDD}.xml
    - >-
      NCA-AFM-FilenameAIF: AIF XML filename convention
      AIF_NL_{AIFNationalCode}_{YYYYMMDD}.xml; multiple AIFs in ZIP
    - >-
      NCA-AFM-AIFMJurisdiction: AIFM jurisdiction must be NL for
      domestic registered managers

  nca_rules:

  # ── Section: Header — ReportingMemberState ─────────────────────────────────

  - rule_id: NCA-AFM-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    xsd_element: <ReportingMemberState>
    xml_type: CountryCodeType
    format: 2 [A-Z]+
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Header file
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - AFM-001
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path:
      aifm_report: aifm_report.envelope.ReportingMemberState
      aif_report: aif_report.envelope.ReportingMemberState
    technical_guidance: >-
      For reports submitted to the AFM the value must always be the
      constant "NL". Any other value is rejected by the DNB/AFM
      filing portal.
    eagle_action: ''
    validation_rules: >-
      ReportingMemberState = "NL"

  # ── Section: AIFM Identifier — AIFMNationalCode ───────────────────────────

  - rule_id: NCA-AFM-AIFMNationalCode
    base_rule_id: AIFM-18
    field_id: '18'
    field_name: AIFM National Code
    xsd_element: <AIFMNationalCode>
    xml_type: AIFMNationalCodeType
    format: B[A-Z]{2}[0-9]{3}
    data_type: Z
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Identifiers
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - AFM-002
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path:
      aifm_report: aifm_report.identification.AIFMNationalCode
      aif_report: aif_report.identification.AIFMNationalCode
    technical_guidance: >-
      AFM assigns AIFM national identifiers in the format BXX999:
      constant letter "B" followed by exactly 2 uppercase letters and
      exactly 3 digits. Total length is always 6 characters.
      Examples: BJQ306, BJP612, BJH161.
    eagle_action: ''
    validation_rules:
    - Must match regex ^B[A-Z]{2}[0-9]{3}$
    - Total length must be exactly 6 characters
    - Value in XML must be identical to AIFM code segment of the filename
    example: BJQ306

  # ── Section: AIF Identifier — AIFNationalCode ─────────────────────────────

  - rule_id: NCA-AFM-AIFNationalCode
    base_rule_id: AIF-17
    field_id: '17'
    field_name: AIF National Code
    xsd_element: <AIFNationalCode>
    xml_type: AIFNationalCodeType
    format: 500[0-9]{5}
    data_type: N
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIF - Identifiers
    report_type: AIF
    severity: CRITICAL
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - AFM-003
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path:
      aif_report: aif_report.identification.AIFNationalCode
    technical_guidance: >-
      AFM assigns AIF national identifiers as 8-digit numeric codes
      starting with prefix "500". Valid range is 50000000 through
      50099999. Examples: 50020108, 50019055, 50017086.
    eagle_action: ''
    validation_rules:
    - Must match regex ^500[0-9]{5}$
    - Total length must be exactly 8 digits
    - Must be purely numeric (no letters)
    - Value in XML must be identical to AIF code segment of the filename
    example: '50020108'

  # ── Section: AIFM Jurisdiction ─────────────────────────────────────────────

  - rule_id: NCA-AFM-AIFMJurisdiction
    base_rule_id: AIFM-17
    field_id: '17'
    field_name: AIFM Jurisdiction
    xsd_element: <AIFMJurisdiction>
    xml_type: CountryCodeType
    format: 2 [A-Z]+
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Identifiers
    report_type: AIFM
    severity: HIGH
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - AFM-004
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path:
      aifm_report: aifm_report.identification.AIFMJurisdiction
    technical_guidance: >-
      For domestic registered managers filing to AFM, the AIFM
      jurisdiction must be "NL". Non-NL managers filing to AFM
      (e.g. cross-border marketing notification) are permitted
      but rare for registered managers.
    eagle_action: ''
    validation_rules: >-
      AIFMJurisdiction should be "NL" for domestic managers;
      warn if different

  # ── Section: File naming conventions ───────────────────────────────────────

  - rule_id: NCA-AFM-FilenameAIFM
    base_rule_id: ''
    field_id: FNAME-AIFM
    field_name: AIFM XML filename convention
    xsd_element: ''
    xml_type: ''
    format: AIFM_NL_{AIFMNationalCode}_{YYYYMMDD}.xml
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File naming and packaging
    report_type: AIFM
    severity: HIGH
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ''
    nca_error_codes:
    - AFM-010
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path: {}
    technical_guidance: >-
      AIFM report XML filename must follow the pattern
      AIFM_NL_{AIFMNationalCode}_{YYYYMMDD}.xml where YYYYMMDD is
      the reporting period end date. Example: AIFM_NL_BJP612_20241231.xml.
      One AIFM file per manager per reporting period.
    eagle_action: >-
      Adapter generates filename automatically from AIFM national code
      and reporting period end date.
    validation_rules:
    - Filename must match regex ^AIFM_NL_B[A-Z]{2}[0-9]{3}_[0-9]{8}\.xml$
    - Date segment must equal ReportingPeriodEndDate (without hyphens)
    - NationalCode segment must equal AIFMNationalCode in XML

  - rule_id: NCA-AFM-FilenameAIF
    base_rule_id: ''
    field_id: FNAME-AIF
    field_name: AIF XML filename convention
    xsd_element: ''
    xml_type: ''
    format: AIF_NL_{AIFNationalCode}_{YYYYMMDD}.xml
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File naming and packaging
    report_type: AIF
    severity: HIGH
    rule_source: AFM AIFMD Reporting Requirements
    esma_doc: ''
    nca_error_codes:
    - AFM-011
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: AFM AIFMD Reporting Requirements
    nca_doc_date: '2026-03-31'
    base_rule_path: {}
    technical_guidance: >-
      AIF report XML filename must follow the pattern
      AIF_NL_{AIFNationalCode}_{YYYYMMDD}.xml where YYYYMMDD is the
      reporting period end date. Example: AIF_NL_50017086_20241231.xml.
      When the manager has a single AIF, one XML file is produced.
      When the manager has multiple AIFs, each AIF gets its own XML
      file and all are packaged into a single ZIP archive.
    eagle_action: >-
      Adapter generates one AIF XML per fund. If multiple AIFs,
      packages into ZIP. Naming convention for ZIP TBD.
    validation_rules:
    - Filename must match regex ^AIF_NL_500[0-9]{5}_[0-9]{8}\.xml$
    - Date segment must equal ReportingPeriodEndDate (without hyphens)
    - NationalCode segment must equal AIFNationalCode in XML
    - Each AIF must have its own separate XML file
