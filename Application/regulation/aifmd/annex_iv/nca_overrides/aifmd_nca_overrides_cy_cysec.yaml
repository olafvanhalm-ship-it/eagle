################################################################################
# NCA-SPECIFIC OVERRIDES — CYSEC (CY)
# Version: v2
# Base YAML: aifmd_validation_rules.yaml (v2.3)
#
# SCHEMA: DELTA-ONLY OVERRIDES (Option B)
#
# This file uses the delta-only override pattern. Each nca_rules entry carries
# ONLY the fields that DIFFER from the base YAML rule it overrides.
# All other attributes are INHERITED from the base rule at load time.
#
# Required keys per override rule:
#   rule_id        — unique NCA rule identifier
#   base_rule_id   — links to the base YAML rule (e.g. AIFM-1, AIF-17)
#   field_id       — the ESMA field number being overridden
#
# Always-present NCA keys (even if empty):
#   nca_error_codes, overrides_esma, status, nca_source_doc, nca_doc_date
#   validation_rules, technical_guidance, eagle_action
#
# Delta keys (only present when NCA value differs from base):
#   field_name, format, data_type, m_c_o_f, mandatory, severity, etc.
#
# NCA-specific rules (base_rule_id empty): carry FULL field definition
# since there is no base rule to inherit from.
#
# Infrastructure sections (transmission, file_format, correction_rules,
# eagle_implementation, return_files) are NCA-specific and always present.
#
# LOADER CONTRACT:
#   merged_rule = base_rule | nca_override   (Python dict merge)
#   i.e. NCA keys overwrite base keys; base keys not in NCA are inherited.
################################################################################

nca_overrides:
  nca: CYSEC
  country: CY
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.3'
  source_document:
    title: AIFMD Annex IV Reporting Requirements — Cyprus Securities and Exchange Commission (CySEC)
    version: '1.0'
    date: '2026-04-03'
    publisher: Cyprus Securities and Exchange Commission (CySEC)
    url: https://www.cysec.gov.cy
  transmission:
    portal: Transaction Reporting System (TRS) — digitally signed XML via email
    method: XML upload
  file_format:
    packaging: XML (digitally signed)
    national_code_info: CySEC-assigned AIFM registration code
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial CYSEC NCA override file — based on web research of latest documentation
  - version: v2
    date: '2026-04-10'
    changes:
    - Migrated to delta-only override schema (Option B)
    - Removed fields identical to base YAML — only NCA deltas retained
    - Updated base_yaml_version from '2.3' to '2.3'
    - 'Schema: NCA rules now carry only rule_id, base_rule_id, field_id + delta keys'
  nca_rules:
  - rule_id: NCA-CySEC-CY-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    overrides_esma: true
    status: active
    nca_source_doc: Cyprus Securities and Exchange Commission (CySEC) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: For reports submitted to CySEC the value must always be CY.
    validation_rules: ReportingMemberState = "CY"
  - rule_id: NCA-CySEC-CY-DigitalSignature
    base_rule_id: ''
    field_id: SIGNATURE
    field_name: Digital Signature Requirement
    xsd_element: ''
    severity: HIGH
    overrides_esma: false
    status: active
    nca_source_doc: Cyprus Securities and Exchange Commission (CySEC) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: CySEC requires all XML files to be digitally signed. Submission is via the Transaction
      Reporting System (TRS). Data language must be English.
    validation_rules: XML files must be digitally signed before submission to TRS
  - rule_id: NCA-CySEC-CY-FoFExtension
    base_rule_id: ''
    field_id: DEADLINE-FOF
    field_name: Fund of Funds Deadline Extension
    xsd_element: ''
    severity: LOW
    overrides_esma: false
    status: active
    nca_source_doc: Cyprus Securities and Exchange Commission (CySEC) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: CySEC allows Fund of Funds managers to request a 15-day extension beyond the standard
      30-day deadline, for a total of 45 calendar days after period end.
    validation_rules: Fund of Funds may request 15-day extension (total 45 days)
