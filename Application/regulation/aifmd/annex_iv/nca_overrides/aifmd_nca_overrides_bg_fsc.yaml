nca_overrides:
  nca: FSC
  country: BG
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.3'
  source_document:
    title: AIFMD Annex IV Reporting Requirements — Financial Supervision Commission (FSC Bulgaria)
    version: '1.0'
    date: '2026-04-03'
    publisher: Financial Supervision Commission (FSC Bulgaria)
    url: https://www.fsc.bg
  transmission:
    portal: FSC reporting portal
    method: File upload
  file_format:
    packaging: ZIP
    national_code_info: FSC-assigned identifier
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial FSC NCA override file — based on web research of latest documentation
  - version: v2
    date: '2026-04-10'
    changes:
    - Migrated to delta-only override schema (Option B)
    - Removed fields identical to base YAML — only NCA deltas retained
    - Updated base_yaml_version from '2.3' to '2.3'
    - 'Schema: NCA rules now carry only rule_id, base_rule_id, field_id + delta keys'
  nca_rules:
  - rule_id: NCA-FSC-BG-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    overrides_esma: true
    status: active
    nca_source_doc: Financial Supervision Commission (FSC Bulgaria) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: For reports submitted to FSC Bulgaria the value must always be BG. Only professional investors may
      be marketed to in Bulgaria.
    validation_rules: ReportingMemberState = "BG"
    report_type: AIFM
  - rule_id: NCA-FSC-BG-FilePackaging
    base_rule_id: ''
    field_id: PACKAGING
    field_name: File Packaging
    xsd_element: ''
    severity: MEDIUM
    overrides_esma: false
    status: active
    nca_source_doc: Financial Supervision Commission (FSC Bulgaria) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: FSC requires XML files to be compressed in ZIP format with YYYYMMDD date stamps in filenames.
    validation_rules: XML compressed into ZIP; standard ESMA date-stamped naming
