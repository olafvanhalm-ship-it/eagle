################################################################################
# NCA-SPECIFIC OVERRIDES — FSMA (Belgium)
# Version: v1 — 2026-04-01
# Base YAML: aifmd_validation_rules.yaml (v2.0)
#
# Schema: nca_rules entries use identical field layout as aif_rules/aifm_rules
# in the base YAML, plus NCA-specific fields.
#
# Source: FSMA AIFMD reporting specifications and observed production data
# from M adapter filings to FSMA portal.
#
# Key differences vs ESMA base / other NCAs:
#   - HFT fields (HFTTransactionNumber, HFTBuySellMarketValue) are required
#   - AssetTypeExposure ShortValue is required (even when zero)
#   - Additional MarketRiskMeasures required: NET_FX_DELTA, NET_CTY_DELTA,
#     VEGA_EXPO (with VegaRiskMeasureValues sub-element)
#   - File packaging: individual XML wrapped in ZIP
################################################################################

nca_overrides:
  nca: FSMA
  country: BE
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.0'
  source_document:
    title: FSMA AIFMD Annex IV Reporting Requirements
    version: '1.0'
    date: '2026-04-01'
    publisher: Financial Services and Markets Authority (FSMA)
    url: https://www.fsma.be
  changelog:
  - version: v1
    date: '2026-04-01'
    changes:
    - Initial FSMA NCA override file
    - 'NCA-FSMA-HFTFields: HFT transaction count and market value required'
    - 'NCA-FSMA-ShortValue: ShortValue required in AssetTypeExposures'
    - >-
      NCA-FSMA-ExtraRiskMeasures: NET_FX_DELTA, NET_CTY_DELTA, VEGA_EXPO
      risk measures required in AIF report
    - 'NCA-FSMA-FilePackaging: XML files delivered as .zip'

  nca_rules:

  # ── Section: Header — ReportingMemberState ─────────────────────────────────

  - rule_id: NCA-FSMA-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    xsd_element: <ReportingMemberState>
    xml_type: CountryCodeType
    format: 2 [A-Z]+
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Header file
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-001
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aifm_report: aifm_report.envelope.ReportingMemberState
      aif_report: aif_report.envelope.ReportingMemberState
    technical_guidance: >-
      For reports submitted to the FSMA the value must always be
      the constant "BE".
    eagle_action: ''
    validation_rules: >-
      ReportingMemberState = "BE"

  # ── Section: AIFM Identifier — AIFMNationalCode ───────────────────────────

  - rule_id: NCA-FSMA-AIFMNationalCode
    base_rule_id: AIFM-18
    field_id: '18'
    field_name: AIFM National Code
    xsd_element: <AIFMNationalCode>
    xml_type: AIFMNationalCodeType
    format: '[0-9]{10}'
    data_type: N
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Identifiers
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-002
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aifm_report: aifm_report.identification.AIFMNationalCode
      aif_report: aif_report.identification.AIFMNationalCode
    technical_guidance: >-
      FSMA assigns AIFM national identifiers as 10-digit zero-padded
      numeric codes. Example: 0000071453.
    eagle_action: ''
    validation_rules:
    - Must match regex ^[0-9]{10}$
    - Total length must be exactly 10 digits
    - Must be zero-padded if shorter
    example: '0000071453'

  # ── Section: AIF Identifier — AIFNationalCode ─────────────────────────────

  - rule_id: NCA-FSMA-AIFNationalCode
    base_rule_id: AIF-17
    field_id: '17'
    field_name: AIF National Code
    xsd_element: <AIFNationalCode>
    xml_type: AIFNationalCodeType
    format: '[0-9]{5}-[0-9]{4}'
    data_type: Z
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIF - Identifiers
    report_type: AIF
    severity: CRITICAL
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-003
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aif_report: aif_report.identification.AIFNationalCode
    technical_guidance: >-
      FSMA assigns AIF national identifiers in the format XXXXX-0001
      (5 digits, hyphen, always followed by 0001). Example: 05044-0001.
      The suffix -0001 is constant for all AIFs.
    eagle_action: >-
      Ensure AIF national code always ends with -0001 suffix.
    validation_rules:
    - Must match regex ^[0-9]{5}-0001$
    - Total length must be exactly 10 characters (including hyphen)
    - The suffix -0001 is always fixed
    example: '05044-0001'

  # ── Section: AIF Report — HFT Fields (BE-specific) ────────────────────────

  - rule_id: NCA-FSMA-HFTTransactionNumber
    base_rule_id: ''
    field_id: '24'
    field_name: HFT Transaction Number
    xsd_element: <HFTTransactionNumber>
    xml_type: xs:integer
    format: N
    data_type: N
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIF - Principal Info - Description
    report_type: AIF
    severity: MEDIUM
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-010
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aif_report: aif_report.principal_info.description.HFTTransactionNumber
    technical_guidance: >-
      FSMA requires the HFT transaction number field to be present in
      all AIF reports, even when the value is 0. This field is optional
      or omitted in some other NCA jurisdictions (e.g. BaFin DE).
    eagle_action: >-
      Adapter must include <HFTTransactionNumber> for BE filings.
      Default to 0 if not provided in template.
    validation_rules:
    - Must be a non-negative integer
    - Must be present (not omitted) in BE filings

  - rule_id: NCA-FSMA-HFTBuySellMarketValue
    base_rule_id: ''
    field_id: '25'
    field_name: HFT Buy/Sell Market Value
    xsd_element: <HFTBuySellMarketValue>
    xml_type: xs:integer
    format: N
    data_type: N
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIF - Principal Info - Description
    report_type: AIF
    severity: MEDIUM
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-011
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aif_report: aif_report.principal_info.description.HFTBuySellMarketValue
    technical_guidance: >-
      FSMA requires the HFT buy/sell market value field to be present
      in all AIF reports, even when the value is 0. This field is
      optional or omitted in some other NCA jurisdictions (e.g. BaFin DE).
    eagle_action: >-
      Adapter must include <HFTBuySellMarketValue> for BE filings.
      Default to 0 if not provided in template.
    validation_rules:
    - Must be a non-negative integer
    - Must be present (not omitted) in BE filings

  # ── Section: AIF Report — AssetTypeExposure ShortValue (BE-specific) ──────

  - rule_id: NCA-FSMA-AssetTypeExposureShortValue
    base_rule_id: ''
    field_id: ATE-SHORT
    field_name: AssetTypeExposure ShortValue
    xsd_element: <ShortValue>
    xml_type: xs:integer
    format: N
    data_type: N
    m_c_o_f: M
    repetition: '[1..n]'
    mandatory: true
    conditional: false
    section: AIF - Risk Profile - AssetTypeExposures
    report_type: AIF
    severity: MEDIUM
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-020
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aif_report: aif_report.risk_profile.asset_type_exposures.ShortValue
    technical_guidance: >-
      FSMA requires ShortValue to be present in each AssetTypeExposure
      element, even when the value is 0. BaFin (DE) omits this field
      when no short positions exist.
    eagle_action: >-
      Adapter must include <ShortValue> in each AssetTypeExposure for
      BE filings. Default to 0 if no short positions.
    validation_rules:
    - Must be a non-negative integer
    - Must be present in each AssetTypeExposure block for BE filings

  # ── Section: AIF Report — Extra Market Risk Measures (BE-specific) ────────

  - rule_id: NCA-FSMA-ExtraRiskMeasures
    base_rule_id: ''
    field_id: MRM-EXTRA
    field_name: Additional Market Risk Measures
    xsd_element: <MarketRiskMeasure>
    xml_type: complex
    format: ''
    data_type: ''
    m_c_o_f: M
    repetition: '[1..n]'
    mandatory: true
    conditional: false
    section: AIF - Risk Profile - Market Risk Measures
    report_type: AIF
    severity: MEDIUM
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes:
    - FSMA-030
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path:
      aif_report: aif_report.risk_profile.market_risk_measures
    technical_guidance: >-
      FSMA requires three additional MarketRiskMeasure elements beyond
      the ESMA minimum set. BaFin (DE) only requires the base set
      (NET_EQTY_DELTA, NET_DV01, NET_CS01, VAR). The additional
      FSMA-required measures are:

      1. NET_FX_DELTA — Net FX delta. Always present, value 0.00 with
         description when not applicable.

      2. NET_CTY_DELTA — Net commodity delta. Always present, value 0.00
         with description when not applicable.

      3. VEGA_EXPO — Vega exposure. Uses VegaRiskMeasureValues sub-element
         with CurrentMarketRiskMeasureValue, LowerMarketRiskMeasureValue,
         HigherMarketRiskMeasureValue. All set to 0.00 with description
         when not applicable.

      The order of risk measures in BE filings is:
      NET_EQTY_DELTA, NET_FX_DELTA, NET_CTY_DELTA, NET_DV01, NET_CS01,
      VEGA_EXPO, VAR
    eagle_action: >-
      Adapter must include NET_FX_DELTA, NET_CTY_DELTA, and VEGA_EXPO
      MarketRiskMeasure elements for BE filings. Use template values
      or default to 0.00 with "Not applicable" description.
    validation_rules:
    - NET_FX_DELTA must be present with RiskMeasureValue
    - NET_CTY_DELTA must be present with RiskMeasureValue
    - VEGA_EXPO must be present with VegaRiskMeasureValues sub-element
    - VegaRiskMeasureValues must contain Current/Lower/Higher values

  # ── Section: File naming and packaging ────────────────────────────────────

  - rule_id: NCA-FSMA-FilenameAIFM
    base_rule_id: ''
    field_id: FNAME-AIFM
    field_name: AIFM XML filename convention
    xsd_element: ''
    xml_type: ''
    format: AIFM_BE_{AIFMNationalCode}_{YYYYMMDD}.xml
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File naming and packaging
    report_type: AIFM
    severity: HIGH
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ''
    nca_error_codes:
    - FSMA-040
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path: {}
    technical_guidance: >-
      AIFM report XML filename must follow the pattern
      AIFM_BE_{AIFMNationalCode}_{YYYYMMDD}.xml where YYYYMMDD is
      the reporting period end date. The XML file must be wrapped
      in a ZIP archive with the same base name:
      AIFM_BE_{AIFMNationalCode}_{YYYYMMDD}.zip
    eagle_action: >-
      Adapter generates AIFM XML, then wraps in ZIP archive.
    validation_rules:
    - XML filename must match regex ^AIFM_BE_[0-9]{10}_[0-9]{8}\.xml$
    - ZIP filename must match regex ^AIFM_BE_[0-9]{10}_[0-9]{8}\.zip$
    - ZIP must contain exactly one XML file

  - rule_id: NCA-FSMA-FilenameAIF
    base_rule_id: ''
    field_id: FNAME-AIF
    field_name: AIF XML filename convention
    xsd_element: ''
    xml_type: ''
    format: AIF_BE_{AIFNationalCode}_{YYYYMMDD}.xml
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File naming and packaging
    report_type: AIF
    severity: HIGH
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ''
    nca_error_codes:
    - FSMA-041
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path: {}
    technical_guidance: >-
      AIF report XML filename must follow the pattern
      AIF_BE_{AIFNationalCode}_{YYYYMMDD}.xml. The XML file must be
      wrapped in a ZIP archive with the same base name:
      AIF_BE_{AIFNationalCode}_{YYYYMMDD}.zip.
      Each AIF gets its own ZIP file.
    eagle_action: >-
      Adapter generates AIF XML, then wraps in ZIP archive per AIF.
    validation_rules:
    - XML filename must match regex ^AIF_BE_[0-9]{5}-[0-9]{4}_[0-9]{8}\.xml$
    - ZIP filename must match regex ^AIF_BE_[0-9]{5}-[0-9]{4}_[0-9]{8}\.zip$
    - Each AIF ZIP must contain exactly one XML file

  # ── Section: Compression format ───────────────────────────────────────────

  - rule_id: NCA-FSMA-Compression
    base_rule_id: ''
    field_id: COMP
    field_name: File compression format
    xsd_element: ''
    xml_type: ''
    format: ZIP
    data_type: ''
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File naming and packaging
    report_type: AIF+AIFM
    severity: HIGH
    rule_source: FSMA AIFMD Reporting Requirements
    esma_doc: ''
    nca_error_codes:
    - FSMA-042
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FSMA AIFMD Reporting Requirements
    nca_doc_date: '2026-04-01'
    base_rule_path: {}
    technical_guidance: >-
      All files submitted to FSMA must be compressed as ZIP archives.
      Each ZIP contains exactly one XML file. The ZIP filename matches
      the XML filename but with .zip extension.
    eagle_action: >-
      Adapter wraps each generated XML in a ZIP archive for BE filings.
    validation_rules:
    - Must be valid ZIP format
    - Must contain exactly one XML file
