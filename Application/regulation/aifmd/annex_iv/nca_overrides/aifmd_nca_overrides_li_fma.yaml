nca_overrides:
  nca: FMA
  country: LI
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.3'
  source_document:
    title: AIFMD Annex IV Reporting Requirements — FMA Liechtenstein (Finanzmarktautorität)
    version: '1.0'
    date: '2026-04-03'
    publisher: FMA Liechtenstein (Finanzmarktautorität)
    url: https://www.fma-li.li
  transmission:
    portal: FMA Incoming Platform (e-Service Module)
    method: File upload
  file_format:
    packaging: ZIP
    national_code_info: FMA LI assigned AIFM code
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial FMA NCA override file — based on web research of latest documentation
  - version: v2
    date: '2026-04-10'
    changes:
    - Migrated to delta-only override schema (Option B)
    - Removed fields identical to base YAML — only NCA deltas retained
    - Updated base_yaml_version from '2.3' to '2.3'
    - 'Schema: NCA rules now carry only rule_id, base_rule_id, field_id + delta keys'
  nca_rules:
  - rule_id: NCA-FMALI-LI-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    overrides_esma: true
    status: active
    nca_source_doc: FMA Liechtenstein (Finanzmarktautorität) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: For reports submitted to FMA Liechtenstein the value must always be LI.
    validation_rules: ReportingMemberState = "LI"
    report_type: AIFM
  - rule_id: NCA-FMALI-LI-SubmissionDeadline
    base_rule_id: ''
    field_id: DEADLINE
    field_name: Extended Submission Deadline
    xsd_element: ''
    severity: HIGH
    overrides_esma: false
    status: active
    nca_source_doc: FMA Liechtenstein (Finanzmarktautorität) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: FMA Liechtenstein requires semi-annual reporting for most AIFMs with a 2-month submission deadline
      (longer than ESMA standard 30 days). Reports due by end of August (for H1) and end of February (for H2). Test submissions
      permitted before final.
    validation_rules: 'Semi-annual reporting: 2 months after 30 June and 31 December'
