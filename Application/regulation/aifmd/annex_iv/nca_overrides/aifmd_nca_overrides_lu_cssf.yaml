    data_type: N
    m_c_o_f: C
    repetition: '[0..1]'
    mandatory: false
    conditional: true
    section: Financing Liquidity Profile
    report_type: AIF
    severity: warning
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes:
