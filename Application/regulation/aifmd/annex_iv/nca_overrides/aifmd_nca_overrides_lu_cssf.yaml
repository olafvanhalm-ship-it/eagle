  - rule_id: NCA-CSSF-ReportingMemberState
    base_rule_id: AIFM-24
    field_id: '24'
    report_type: AIF+AIFM
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes:
