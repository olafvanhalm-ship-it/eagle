    technical_guidance: 'For AIFs with Article 24(2) reporting obligations, all three risk measure types
      NET_EQTY_DELTA, NET_CS01 and NET_DV01 must be reported. Note: the original CAF-216 (deactivated
      at CSSF) was replaced by a new CAF-216 and new CAF-217 in guidance v1.4. Both new controls are active.'
