    base_rule_path: aif_report.principal_info.AIFBaseCurrencyDescription.sub_fields.FXEURRate
    technical_guidance: CSSF performs four separate checks on the EUR exchange rate reported in AIF-level
      submissions.
    eagle_action: ''
    validation_rules:
    - FXEURRate must not be 0 — CSSF-035
    - FXEURRate must not be null/empty — CSSF-037
    - 'If FXEURRate = 1 AND deviation from ECB > 1% in absolute terms: error — CSSF-036'
    - FXEURRate must not deviate more than 1% from ECB rate — CSSF-038
    - FXEURRate must not be the inverse of the ECB rate — CSSF-039
    esma_doc: ESMA/2013/1358 Rev.6
    note: ECB reference rates are published daily when the TARGET system is open. Use the ECB rate on
      or nearest to the ReportingPeriodEndDate.
