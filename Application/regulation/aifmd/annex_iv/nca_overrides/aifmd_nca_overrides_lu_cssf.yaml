    nca_doc_date: '2024-07-01'
    base_rule_path: aif_report.individual_info.LiquidityRiskProfile.FinancingLiquidityProfile
    technical_guidance: CSSF-042 is raised as a WARNING (non-blocking) when the sum of financing percentages
