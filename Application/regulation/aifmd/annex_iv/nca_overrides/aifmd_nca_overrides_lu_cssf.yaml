  transmission:
    note: As of version 1.7 (1 July 2024) the old external transmission channels (SWIFT, direct SFTP,
      etc.) are permanently deactivated. Only the two channels below are accepted. Eagle must exclusively
      use one of these.
    overrides_esma: true
    channels:
      api_s3:
        name: Application Programming Interface (S3 bucket)
        description: Reports are uploaded to a dedicated S3 bucket named "Reporting AIFM" created by the
          sender''s IT Expert on the eDesk IT management console. The bucket type is only available after
          sender registration (see sender_registration below).
        technical_guide_url: https://www.cssf.lu/en/Document/methods-of-transmitting-reports-via-s3-application-programming-interface-technical-guidance/
        auth_control:
          cssf_error_code: AUTH-50
          description: The bucket participant must match the filename sender field. Mismatch results in
            immediate rejection.
          status: active
      edesk:
        name: EDesk web portal
        description: Manual submission via the EDesk portal. Provides dashboard for submission and feedback
          consultation. Follows the same file naming convention as the API channel.
        url: https://edesk.apps.cssf.lu/aifm/edesk-aifm/
        note: Available only to entities registered as sender for at least one AIFM.
    sender_registration:
      required: true
      description: 'Before the first API submission, the sender must register the link between sender
        and AIFM with CSSF by e-mail to edesk@cssf.lu. Required information: sender name + CSSF ID, AIFM
        name + CSSF ID (A-xxxx), full name / phone / e-mail of a contact person. For double-licensed entities:
        include the CSSF ID used to create the bucket.'
      overrides_esma: true
  file_format:
    encoding: UTF-8
    container: ZIP
    zip_rules:
    - Exactly one XML file per ZIP — error ERR-009 if multiple XML files found
    - ZIP must not be password-protected (security is handled by the channel)
    - ZIP filename must be identical to the enclosed XML filename (extension differs)
    - Duplicate filename (same naming convention + timestamp) will be refused — ERR-003
    xml_format:
    - Must conform to the current ESMA XSD version (v1.2) — error FOR-001 if invalid
    - All text fields must be filled in English — CSSF policy
    naming_convention_aifm_report:
      description: Naming convention for AIFM manager-level (MAN) files.
      format: TYRDIR-EIIIIIIII-ANNNNNNNN-F00000000-00000000-MAN-YYYYMMDDHHMMSS[-CORRELATIONID].ext
      fields:
        TYR:
          value: AIF
          description: Reporting type — constant
        DIR:
          allowed_values:
            REP: Report — sent to CSSF
            FBR: Feedback on Reception — acknowledgement from CSSF
            FDB: Feedback — CSSF result after content analysis
            FBH: ESMA Feedback — CSSF result after ESMA refusal
        E:
          description: Entity type of sender/technical agent — single char (B, P, I, S, K, 1, …)
        IIIIIIII:
          description: 8-digit CSSF identification number of the sender (zero-padded)
        A:
          value: A
          description: Entity type of the AIFM — constant 'A'
        NNNNNNNN:
          description: 8-digit CSSF identification number of the AIFM (zero-padded)
        F:
          value: F
          description: Entity type of the AIF — constant 'F' for AIFM report
        MMMMMMMM:
          value: '00000000'
          description: AIF number — constant '00000000' in an AIFM-level file
        CCCCCCCC:
          value: '00000000'
          description: Compartment number — constant '00000000' in an AIFM-level file
        MAN:
          value: MAN
          description: File type — constant 'MAN' for AIF Manager report
        YYYYMMDDHHMMSS:
          description: File creation date-time (14 digits). Used to determine processing order and ensure
            uniqueness.
        CORRELATIONID:
          description: UUID (RFC 4122) — present only in feedback files (DIR = FBR, FDB, FBH).
        ext:
          allowed_values:
            .zip or .ZIP: For REP files (enclosing the XML)
            .xml: For FBR feedback files
            .zip: For FDB and FBH feedback files
      example: AIFREP-P12345678-A00000001-F00000000-00000000-MAN-20140129145000.zip
    naming_convention_aif_report:
      description: Naming convention for AIF fund-level (AIF) files.
      format: TYRDIR-EIIIIIIII-ANNNNNNNN-FMMMMMMMM-CCCCCCCC-AIF-YYYYMMDDHHMMSS[-CORRELATIONID].ext
      fields:
        F:
          description: AIF entity type — CSSF-specific sub-classification replacing the generic ''F''.
          allowed_values:
            O: Part II fund or Specialised Investment Fund (SIF)
            K: SICAR (Société d'investissement en capital à risque)
            V: Other vehicle not regulated by CSSF
          overrides_esma: true
          base_rule_path: nca_overrides.field_overrides.AIFNationalCode
          note: The ESMA XSD accepts a generic entity type code; CSSF further specifies the sub-type via
            the first character of the AIF identifier in the filename.
        MMMMMMMM:
          description: 8-digit CSSF identification number of the AIF (zero-padded)
        CCCCCCCC:
          description: 8-digit compartment/sub-fund number (zero-padded). Use ''00000000'' if the fund
            has no compartments.
        AIF:
          value: AIF
          description: File type — constant 'AIF' for AIF-level report
      example: AIFREP-P12345678-A00000111-V00002222-00003333-AIF-20140129145000.zip
  return_files:
    note: CSSF generates three distinct return file types. Eagle must parse all three and route them to
      the appropriate internal workflow.
    source: CSSF AIFM Reporting — Technical Guidance v1.7 (Section 3)
    AIFFBR:
      xml_schema: FileAcknowledge
      trigger: Immediately upon receipt of a submission
      description: Standard acknowledgement of receipt. Confirms the file was received but does not indicate
        acceptance of content.
      eagle_action: Store timestamp; update submission status to ''acknowledged''. No client action required
        unless no FBR received within 24 hours.
    AIFFDB:
      format: ZIP
      trigger: After CSSF automated and manual content analysis
      description: 'Detailed content feedback. Generated in two cases: (a) all CSSF automated and manual
        tests pass — acceptance; or (b) at least one test fails — rejection with error codes and messages.'
      eagle_action: 'Parse error codes from the inner FDB files. Map each error code to the field_overrides
        or deactivated_controls sections above using the base_rule_path fields for full traceability back
        to v0.3. For rejections: trigger client notification and correction workflow. For acceptance:
        update submission status to ''''accepted_by_cssf''''.'
    AIFFBH:
      format: ZIP
      trigger: Only when ESMA refusal occurs after initial CSSF acceptance
      description: ESMA-level feedback. Generated by CSSF when ESMA analysis of the forwarded report returns
        error messages.
      eagle_action: Treat as a post-acceptance rejection. Notify client immediately. Check whether the
        triggered errors correspond to a deactivated_control at CSSF — if so, the client must correct
        and resubmit despite the original CSSF acceptance.
  correction_rules:
    amendment_rule:
      description: When correcting a previously accepted report (FilingType = AMND), the complete data
        record must be resubmitted — partial updates are not permitted.
      base_rule_path: aifm_report.record_header.FilingType
      overrides_esma: false
      cssf_error_code: CAM-001 / CAF-001
      validation_rule: If a report has been received without errors for a given combination of AIFMNationalCode
        (or AIFNationalCode) + ReportingPeriodType + ReportingPeriodYear, any subsequent filing must use
        FilingType = AMND. A duplicate INIT is rejected.
    filename_uniqueness:
      description: A file with a duplicate filename will be refused. For corrections, the creation timestamp
        in the filename must differ from the original.
      base_rule_path: aifm_report.envelope.CreationDateAndTime
      cssf_error_code: ERR-003
      validation_rule: CreationDateAndTime in filename must be unique per AIFM national code.
  eagle_implementation:
    pre_submission_checks:
    - Verify ReportingMemberState = 'LU'
    - Validate AIFMNationalCode pattern A[0-9]{8} and existence in CSSF register
    - Validate AIFNationalCode pattern [OKV][0-9]{8}_[0-9]{8} and existence in CSSF register
    - Confirm sender is registered with CSSF for this AIFM before first submission
    - Enforce single XML per ZIP; no password protection
    - Apply filename naming convention exactly — CreationDateAndTime must be unique
    - Run FX rate checks CSSF-035 to CSSF-039 before submission
    deactivated_control_handling:
      description: Run all deactivated CSSF controls internally as quality-layer warnings. Log results.
        Do not block submission. If ESMA triggers one via AIFFBH, treat as high-priority correction.
      traceability: Use base_rule_path in each deactivated_controls entry to find the corresponding validation_rules
        in aifmd_validation_rules.yaml.
    return_file_processing:
      description: Eagle must subscribe to all CSSF return file prefixes (AIFFBR, AIFFDB, AIFFBH) on the
        S3 bucket or EDesk and process them automatically.
    update_trigger: 'Monitor https://www.cssf.lu for new versions of the AIFM Reporting Technical Guidance.
      This section must be reviewed whenever CSSF publishes a new version. Current captured version: 1.7
      (July 2024).'
    owner: Head of Compliance & Risk
