    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CSSF AIFM Reporting Technical Guidance v1.7
    nca_doc_date: '2024-07-01'
    base_rule_path:
      aifm_report: aifm_report.envelope.ReportingMemberState
      aif_report: aif_report.envelope.ReportingMemberState
    technical_guidance: For reports submitted to the CSSF the value must always be the constant "LU".
      Any other value is rejected.
    eagle_action: ''
    validation_rules: ReportingMemberState = "LU"
  - rule_id: NCA-CSSF-AIFMNationalCode
    base_rule_id: AIFM-25
    field_id: '25'
    format: ANNNNNNNN  (A + 8-digit zero-padded number)
    report_type: AIF+AIFM
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes:
    - ERR-001
    - CSSF-001
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CSSF AIFM Reporting Technical Guidance v1.7
    nca_doc_date: '2024-07-01'
    base_rule_path:
      aifm_report: aifm_report.identification.AIFMNationalCode
      aif_report: aif_report.identification.AIFMNationalCode
    technical_guidance: 'CSSF assigns AIFM identifiers in the format ANNNNNNNN: constant letter ''''A''''
      followed by the numeric CSSF identification number zero-padded to exactly 8 digits.'
    eagle_action: ''
    validation_rules:
    - Must match pattern A[0-9]{8}
    - Must exist in the CSSF AIFM/AIF identifier list published at https://www.cssf.lu/en/document/identifiers-of-aifms/
    - Value in XML must be identical to AIFM code segment of the filename
    example: A00000001
    lookup_resource: 'CSSF AIFM/AIF identifier list: https://www.cssf.lu/en/document/identifiers-of-aifms/'
  - rule_id: NCA-CSSF-AIFNationalCode
    base_rule_id: AIF-44
    field_id: '44'
    format: '[OKV][0-9]{8}_[0-9]{8}'
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes:
    - ERR-004
    - ERR-008
    - CSSF-015
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CSSF AIFM Reporting Technical Guidance v1.7
    nca_doc_date: '2024-07-01'
    base_rule_path: aif_report.identification.AIFNationalCode
    technical_guidance: CSSF assigns AIF identifiers in the format FMMMMMMMM_CCCCCCCC where F is replaced
      by 'O', 'K' or 'V' per entity type (see below).
    eagle_action: ''
    validation_rules:
    - Must match pattern [OKV][0-9]{8}_[0-9]{8}
    - Must exist in the CSSF AIFM/AIF identifier list
    - AIFM and AIF must appear on the same line of the identifier list (linked)
    - Value in XML field must equal value in the AIF segment of the filename
    - Sub-fund (CCCCCCCC) must exist in CSSF register — CSSF-015
    examples:
    - O00012345_00003333  (Part II / SIF fund with compartment)
    - K00009876_00000000  (SICAR with no compartments)
    - V00001111_00000001  (unregulated vehicle, sub-fund 1)
    allowed_entity_type_values:
      O: Part II fund or Specialised Investment Fund (SIF)
      K: Société d'investissement en capital à risque (SICAR)
      V: Another vehicle not regulated by the CSSF
    lookup_resource: 'CSSF AIFM/AIF identifier list: https://www.cssf.lu/en/document/identifiers-of-aifms/'
  - rule_id: NCA-CSSF-ShareClassNationalCode
    base_rule_id: AIF-34
    field_id: '34'
    format: 4 [0-9]{4}
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CSSF AIFM Reporting Technical Guidance v1.7
    nca_doc_date: '2024-07-01'
    base_rule_path: aif_report.principal_info.ShareClassIdentification.sub_fields.ShareClassNationalCode
    technical_guidance: 'CSSF assigns share class codes as 4-digit numbers zero-padded: "PPPP". This field
      is forbidden when ShareClassFlag = false and optional otherwise.'
    eagle_action: ''
    validation_rules: ''
    example: '0001'
    format_description: 4-digit zero-padded share class identifier
  - rule_id: NCA-CSSF-AIFMContentType
    base_rule_id: AIFM-5
    field_id: '5'
    rule_source: CSSF AIFM Reporting Technical Guidance v1.7
    nca_error_codes:
    - CSSF-003
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CSSF AIFM Reporting Technical Guidance v1.7
    nca_doc_date: '2024-07-01'
    base_rule_path: aifm_report.record_header.AIFMContentType
    technical_guidance: CSSF clarifies the meaning of each code in the Luxembourg context. Code values
      are identical to the base YAML; only the descriptions reflect the LU supervision status.
    eagle_action: ''
    validation_rules: AIFMContentType must correspond to the AIFM''s supervision status in the CSSF register.
    allowed_values:
      '1':
        esma_code: 1 (Authorised/Licensed Manager — Art. 24(1) for all AIFs managed)
        cssf_label: Luxembourg domiciled authorised AIFM. Reporting obligations under Article 24(1) of
          the AIFMD.
      '2':
        esma_code: 2 (Registered/Light Manager — Art. 3(3)(d) for all AIFs managed)
        cssf_label: Luxembourg domiciled registered AIFM. Reporting obligations under Article 3(3)(d)
          of the AIFMD.
      '3':
        esma_code: 3 (NPPR/Non-EU Manager — Art. 24(1) for all AIFs marketed)
        cssf_label: Non-EU AIFM marketing AIFs under Article 42 of the AIFMD. Reporting obligations under
          Article 24(1) of the AIFMD.
