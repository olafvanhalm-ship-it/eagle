################################################################################
# NCA-SPECIFIC OVERRIDES — MNB (HU)
# Version: v1 — 2026-04-03
# Base YAML: aifmd_validation_rules.yaml
#
# Source: Online research of NCA documentation and ESMA guidelines
# National code: MNB-assigned AIFM code
# Portal: ASZP Data Supplier Portal (https://aszp.mnb.hu)
# File packaging: CAP/ERA format (non-standard — not XML)
# Deadline: Standard 30 days after reporting period end
################################################################################
nca_overrides:
  nca: MNB
  country: HU
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '1.0'
  source_document:
    title: AIFMD Annex IV Reporting Requirements — Magyar Nemzeti Bank (MNB)
    version: '1.0'
    date: '2026-04-03'
    publisher: Magyar Nemzeti Bank (MNB)
    url: https://www.mnb.hu
  transmission:
    portal: ASZP Data Supplier Portal (https://aszp.mnb.hu)
    method: XML upload
  file_format:
    packaging: CAP/ERA format (non-standard — not XML)
    national_code_info: MNB-assigned AIFM code
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial MNB NCA override file — based on web research of latest documentation
  nca_rules:
  - rule_id: NCA-MNB-HU-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    xsd_element: <ReportingMemberState>
    severity: CRITICAL
    overrides_esma: true
    status: active
    nca_source_doc: Magyar Nemzeti Bank (MNB) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: For reports submitted to MNB the value must always be HU.
    validation_rules: ReportingMemberState = "HU"
  - rule_id: NCA-MNB-HU-CAPERAFormat
    base_rule_id: ''
    field_id: FORMAT
    field_name: CAP/ERA Format Requirement
    xsd_element: ''
    severity: CRITICAL
    overrides_esma: false
    status: active
    nca_source_doc: Magyar Nemzeti Bank (MNB) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: 'CRITICAL OVERRIDE: Hungary''s MNB does NOT accept standard ESMA XML format. Reports must be submitted
      in CAP or ERA format via the ASZP Data Supplier Portal. This requires format conversion from the standard AIFMD XML.
      Contact MNB for format specifications.'
    validation_rules: MNB requires CAP or ERA format instead of standard ESMA XML
