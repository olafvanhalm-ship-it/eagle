################################################################################
# NCA-SPECIFIC OVERRIDES — FIN-FSA / Finanssivalvonta (Finland)
# Version: v1 — 2026-04-03
# Base YAML: aifmd_validation_rules.yaml (v1.0)
#
# Source: FIN-FSA AIFMD reporting guidance, Reporter Portal documentation,
#         Description of Electronic Reporting (4 January 2024).
################################################################################

nca_overrides:
  nca: FIN-FSA
  country: FI
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '1.0'
  source_document:
    title: Description of Electronic Reporting — AIFMD
    version: 4 January 2024
    date: '2024-01-04'
    publisher: Finanssivalvonta (FIN-FSA)
    url: https://www.finanssivalvonta.fi/en/reporting/reporting-of-financial-standing-and-risks/new-reporting-system/aifmd-reporting/
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial FIN-FSA/Finland override file based on web research
    - 'Covers: ReportingMemberState, national code format (Y-tunnus/TK-tunnus),'
    - '  Reporter Portal, register cross-check, submission deadlines'

  nca_rules:

  # ── Section: Header — ReportingMemberState ─────────────────────────────────

  - rule_id: NCA-FINFSA-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    xsd_element: <ReportingMemberState>
    xml_type: CountryCodeType
    format: 2 [A-Z]+
    data_type: A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Header file
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: FIN-FSA AIFMD Reporting
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FIN-FSA Description of Electronic Reporting
    nca_doc_date: '2024-01-04'
    base_rule_path:
      aifm_report: aifm_report.envelope.ReportingMemberState
      aif_report: aif_report.envelope.ReportingMemberState
    technical_guidance: >-
      For reports submitted to FIN-FSA the value must always be "FI".
    eagle_action: ''
    validation_rules: >-
      ReportingMemberState = "FI"

  # ── Section: AIFM Identifier — AIFMNationalCode (Y-tunnus) ────────────────

  - rule_id: NCA-FINFSA-AIFMNationalCode
    base_rule_id: AIFM-18
    field_id: '18'
    field_name: AIFM National Code
    xsd_element: <AIFMNationalCode>
    xml_type: AIFMNationalCodeType
    format: '[0-9]{7}'
    data_type: N
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIFM - Identifiers
    report_type: AIFM
    severity: CRITICAL
    rule_source: FIN-FSA AIFMD Reporting
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FIN-FSA Description of Electronic Reporting
    nca_doc_date: '2024-01-04'
    base_rule_path:
      aifm_report: aifm_report.identification.AIFMNationalCode
    technical_guidance: >-
      FIN-FSA assigns AIFM national codes as 7-digit numeric identifiers. Example: 8506386. Note that this
      differs from the Y-tunnus (Finnish Business ID, which is 7+1 digits with hyphen). The NCA code used
      in AIFMD reporting is specifically the 7-digit FIN-FSA assigned identifier.
    eagle_action: >-
      Use the 7-digit FIN-FSA assigned NCA code, not the Y-tunnus directly.
    validation_rules:
    - Must match regex ^[0-9]{7}$
    - Total length must be exactly 7 digits
    - Must match the code registered in FIN-FSA systems
    example: '8506386'

  # ── Section: AIF Identifier — AIFNationalCode ────────────────────────────

  - rule_id: NCA-FINFSA-AIFNationalCode
    base_rule_id: AIF-17
    field_id: '17'
    field_name: AIF National Code
    xsd_element: <AIFNationalCode>
    xml_type: AIFNationalCodeType
    format: '[0-9]{7}#[0-9]{3}'
    data_type: Z
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: AIF - Identifiers
    report_type: AIF
    severity: CRITICAL
    rule_source: FIN-FSA AIFMD Reporting
    esma_doc: ESMA/2013/1358 Rev.6
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FIN-FSA Description of Electronic Reporting
    nca_doc_date: '2024-01-04'
    base_rule_path:
      aif_report: aif_report.identification.AIFNationalCode
    technical_guidance: >-
      FIN-FSA assigns AIF national codes using the AIFM's 7-digit code followed by a hash (#) and a
      3-digit sequence number. Example: 8506386#001. The sequence number starts at 001 for the first
      AIF under that manager and increments for each additional AIF.
    eagle_action: >-
      Compose AIF national code as {AIFMNationalCode}#{sequence_number}. Sequence is 3-digit zero-padded.
    validation_rules:
    - Must match regex ^[0-9]{7}#[0-9]{3}$
    - The 7-digit prefix must match the AIFM's national code
    - Sequence number is 3 digits, zero-padded (001, 002, etc.)
    example: '8506386#001'

  # ── Section: Register cross-check ──────────────────────────────────────────

  - rule_id: NCA-FINFSA-RegisterCrossCheck
    base_rule_id: ''
    field_id: ''
    field_name: FIN-FSA register cross-check on submission
    xsd_element: <AIFMNationalCode> + <AIFNationalCode>
    xml_type: various
    format: N/A
    data_type: N/A
    m_c_o_f: M
    repetition: N/A
    mandatory: true
    conditional: false
    section: Submission - Validation
    report_type: AIF+AIFM
    severity: CRITICAL
    rule_source: FIN-FSA AIFMD Reporting
    esma_doc: ''
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: FIN-FSA Description of Electronic Reporting
    nca_doc_date: '2024-01-04'
    base_rule_path:
      aif_report: aif_report.identification
      aifm_report: aifm_report.identification
    technical_guidance: >-
      FIN-FSA performs a register cross-check on submission. Reports are rejected if the identifying details
      (fund manager and fund information) do NOT match information stored in the FIN-FSA register. Before
      submitting, ensure that AIFM and AIF details are up to date via the reporting obligation notification
      forms. After submission, reporters receive a receipt notification followed by an automatic feedback
      message (Accepted or Rejected) with a findings attachment (.xlsx) detailing any errors.
    eagle_action: >-
      Verify all entity identifiers against FIN-FSA register data before submission. If identifiers have
      changed, update via reporting obligation notification forms first.
    validation_rules:
    - AIFM and AIF identifying details must match FIN-FSA register
    - Mismatched identifiers cause immediate rejection
    - Update via reporting obligation notification forms if entity details have changed
    - Feedback provided as .xlsx findings attachment

  # ── Section: Submission deadline ───────────────────────────────────────────

  - rule_id: NCA-FINFSA-SubmissionDeadline
    base_rule_id: ''
    field_id: ''
    field_name: Submission deadline
    xsd_element: N/A (process rule)
    xml_type: N/A
    format: N/A
    data_type: N/A
    m_c_o_f: M
    repetition: N/A
    mandatory: true
    conditional: false
    section: Submission - Deadlines
    report_type: AIF+AIFM
    severity: HIGH
    rule_source: FIN-FSA AIFMD Reporting
    esma_doc: ''
    nca_error_codes: []
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: FIN-FSA reporting calendar
    nca_doc_date: '2024-01-04'
    base_rule_path: {}
    technical_guidance: >-
      Standard deadline is 30 calendar days from quarter-end. Fund-of-funds receive 45 calendar days
      (additional 15 days). Quarterly reporting applies when AUM exceeds EUR 1 billion. Reporting obligation
      begins at the start of the quarter after AIFM authorisation/registration is granted (domestic) or
      marketing permission is granted (foreign AIFMs).
    eagle_action: ''
    validation_rules:
    - Standard deadline: 30 calendar days from quarter-end
    - Fund-of-funds deadline: 45 calendar days from quarter-end
    - Quarterly reporting when AUM > EUR 1 billion

  transmission:
    note: >-
      Since 30 September 2023, all AIFMD reports must be submitted via the FIN-FSA Reporter Portal (replacing
      the legacy Jakelu Distribution Service). Three submission methods are available.
    overrides_esma: true
    channels:
      reporter_portal:
        name: FIN-FSA Reporter Portal
        description: >-
          Reports can be submitted via: (1) direct web form entry, (2) self-produced XML upload, or
          (3) A2A (Application-to-Application) interface for automated submissions. A test environment
          (Validation service) is available for pre-submission testing.
        url: https://www.finanssivalvonta.fi/en/reporting/reporting-of-financial-standing-and-risks/new-reporting-system/aifmd-reporting/
  file_format:
    encoding: UTF-8
    container: XML (per FIN-FSA electronic reporting description)
    xml_format:
    - Must conform to ESMA XSD schema version 1.2 (Rev 6)
    - Must include schema specification in each report file
    - National special requirements documented in FIN-FSA Description of Electronic Reporting
  correction_rules:
    submission_deadlines:
      schedule:
      - reporting_date: '31-03'
        due_date: '30-04'
      - reporting_date: '30-06'
        due_date: '31-07'
      - reporting_date: '30-09'
        due_date: '31-10'
      - reporting_date: '31-12'
        due_date: '31-01'
      fund_of_funds_extension:
        description: Additional 15 days for fund-of-funds.
        extension_days: 15
  eagle_implementation:
    pre_submission_checks:
    - 'Verify ReportingMemberState = "FI"'
    - 'Validate AIFMNationalCode: Y-tunnus without hyphen (domestic) or TK-tunnus (foreign)'
    - Verify all entity identifiers match FIN-FSA register
    - Validate against ESMA XSD v1.2 Rev 6
    contact:
      reporting_info: https://www.finanssivalvonta.fi/en/reporting/reporting-of-financial-standing-and-risks/new-reporting-system/aifmd-reporting/
      detailed_instructions: https://www.finanssivalvonta.fi/en/reporting/reporting-of-financial-standing-and-risks/new-reporting-system/aifmd-reporting/more-detailed-instructions-on-aifmd-reporting/
    update_trigger: >-
      Monitor https://www.finanssivalvonta.fi for updates. Current guidance: 4 January 2024.
