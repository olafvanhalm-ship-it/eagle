nca_overrides:
  nca: CMVM
  country: PT
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.3'
  source_document:
    title: CMVM AIFMD Reporting Requirements (Regulation 1/2020, 3/2025, 7/2023)
    version: Regulation 3/2025 (18 April 2025)
    date: '2025-04-18'
    publisher: Comissão do Mercado de Valores Mobiliários (CMVM)
    url: https://www.cmvm.pt
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial CMVM/Portugal override file based on web research
    - 'Covers: ReportingMemberState, national code format, ZIP packaging, deadlines'
    - 'Note: limited public documentation — direct CMVM contact recommended'
  - version: v2
    date: '2026-04-10'
    changes:
    - Migrated to delta-only override schema (Option B)
    - Removed fields identical to base YAML — only NCA deltas retained
    - Updated base_yaml_version from '2.3' to '2.3'
    - 'Schema: NCA rules now carry only rule_id, base_rule_id, field_id + delta keys'
  nca_rules:
  - rule_id: NCA-CMVM-ReportingMemberState-AIFM
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    report_type: AIFM
    rule_source: CMVM AIFMD Reporting
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM regulatory framework
    nca_doc_date: '2025-04-18'
    base_rule_path:
      aifm_report: aifm_report.envelope.ReportingMemberState
    technical_guidance: For reports submitted to the CMVM the value must always be "PT".
    eagle_action: ''
    validation_rules: ReportingMemberState = "PT"
  - rule_id: NCA-CMVM-ReportingMemberState-AIF
    base_rule_id: AIF-1
    field_id: '1'
    field_name: Reporting Member State
    report_type: AIF
    rule_source: CMVM AIFMD Reporting
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM regulatory framework
    nca_doc_date: '2025-04-18'
    base_rule_path:
      aif_report: aif_report.envelope.ReportingMemberState
    technical_guidance: For reports submitted to the CMVM the value must always be "PT".
    eagle_action: ''
    validation_rules: ReportingMemberState = "PT"
  - rule_id: NCA-CMVM-AIFNationalCode
    base_rule_id: AIF-17
    field_id: '17'
    field_name: AIF National Code
    format: ANNNNNNNN (A + 8-digit number)
    section: AIF - Identifiers
    rule_source: CMVM AIFMD Reporting
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM regulatory framework
    nca_doc_date: '2025-04-18'
    base_rule_path:
      aif_report: aif_report.identification.AIFNationalCode
    technical_guidance: 'CMVM assigns AIF national identifiers in the format ANNNNNNNN: fixed letter "A" followed by exactly
      8 digits. This identifier must match the CMVM register.'
    eagle_action: ''
    validation_rules:
    - Must match pattern A[0-9]{8}
    - Total length: 9 characters (A + 8 digits)
    - Must exist in CMVM register
    example: A12345678
    report_type: AIF
  - rule_id: NCA-CMVM-FilePackaging
    base_rule_id: ''
    field_id: ''
    field_name: File packaging format
    xsd_element: N/A (file-level)
    xml_type: N/A
    format: XML in ZIP
    data_type: N/A
    m_c_o_f: M
    repetition: '[1..1]'
    mandatory: true
    conditional: false
    section: File - Packaging
    report_type: AIF+AIFM
    severity: HIGH
    rule_source: CMVM AIFMD Reporting
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM regulatory framework
    nca_doc_date: '2025-04-18'
    base_rule_path: {}
    technical_guidance: Per ESMA standard, XML files must be compressed as .ZIP for transmission. Single .xml file compressed
      as .zip with the same filename.
    eagle_action: Adapter must compress each XML into ZIP.
    validation_rules:
    - XML files must be wrapped in ZIP format
    - Filename extension: .zip (replacing .xml)
    esma_doc: ''
  - rule_id: NCA-CMVM-SubmissionDeadline
    base_rule_id: ''
    field_id: ''
    field_name: Submission deadline
    xsd_element: N/A (process rule)
    xml_type: N/A
    format: N/A
    data_type: N/A
    m_c_o_f: M
    repetition: N/A
    mandatory: true
    conditional: false
    section: Submission - Deadlines
    report_type: AIF+AIFM
    severity: HIGH
    rule_source: CMVM AIFMD Reporting
    nca_error_codes: []
    overrides_esma: false
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM regulatory framework
    nca_doc_date: '2025-04-18'
    base_rule_path: {}
    technical_guidance: Standard EU deadline of 30 calendar days from end of reporting period. Fund-of-funds receive additional
      15-day extension. Frequency (annual, semi-annual, quarterly) depends on AuM, leverage, asset types, and AIFM authorisation
      status.
    eagle_action: ''
    validation_rules:
    - Standard deadline: 30 calendar days from period end
    - Fund-of-funds deadline: additional 15 days
    esma_doc: ''
  - rule_id: NCA-CMVM-PrudentialReporting
    base_rule_id: ''
    field_id: ''
    field_name: CMVM quarterly prudential reporting
    xsd_element: N/A (additional obligation)
    xml_type: N/A
    format: N/A
    data_type: N/A
    m_c_o_f: M
    repetition: N/A
    mandatory: true
    conditional: false
    section: Additional obligations
    report_type: AIFM
    severity: MEDIUM
    rule_source: CMVM Regulation 1/2020
    nca_error_codes: []
    overrides_esma: true
    status: active
    deactivated_version: ''
    nca_source_doc: CMVM Regulation 1/2020 and 3/2025
    nca_doc_date: '2025-04-18'
    base_rule_path: {}
    technical_guidance: In addition to AIFMD Annex IV reporting, AIFMs authorised by CMVM have quarterly prudential reporting
      obligations under CMVM Regulation 1/2020 (as amended by Regulation 3/2025). This includes compliance reporting on prudential
      requirements. This is an additional obligation on top of Annex IV, not a replacement.
    eagle_action: Track CMVM prudential reporting deadlines separately from Annex IV deadlines. Alert users of additional
      Portuguese obligations.
    validation_rules:
    - Quarterly prudential reporting required under CMVM Regulation 1/2020
    - Separate from and in addition to AIFMD Annex IV returns
    - Annual financial reporting also required (accounts + general meeting minutes)
    esma_doc: ''
  transmission:
    note: CMVM has its own submission portal. Limited public documentation available on the exact submission channel. Direct
      CMVM contact recommended for portal access details.
    overrides_esma: true
    channels:
      cmvm_portal:
        name: CMVM Submission Portal
        description: Reports submitted electronically to CMVM. Specific portal access and registration details should be obtained
          directly from CMVM.
        url: https://www.cmvm.pt
  file_format:
    encoding: UTF-8
    container: ZIP (XML wrapped in ZIP)
    xml_format:
    - Must conform to ESMA XSD schema version 1.2 (Rev 6)
    - AIFM reports use AIFMD_DATMAN_V1.2.xsd
    - AIF reports use AIFMD_DATAIF_V1.2.xsd
  correction_rules:
    submission_deadlines:
      schedule:
      - reporting_date: 31-03
        due_date: 30-04
      - reporting_date: 30-06
        due_date: 31-07
      - reporting_date: 30-09
        due_date: 31-10
      - reporting_date: 31-12
        due_date: 31-01
      fund_of_funds_extension:
        description: Additional 15 days for fund-of-funds.
        extension_days: 15
  eagle_implementation:
    pre_submission_checks:
    - Verify ReportingMemberState = "PT"
    - Validate AIFNationalCode matches pattern A[0-9]{8}
    - Ensure XML is wrapped in ZIP
    - Validate against ESMA XSD v1.2 Rev 6
    - Track additional CMVM prudential reporting obligations
    contact:
      cmvm_portal: https://www.cmvm.pt
    update_trigger: 'Monitor https://www.cmvm.pt for updates. Latest regulation: 3/2025 (18 April 2025). Direct CMVM contact
      recommended for detailed technical specifications.'
