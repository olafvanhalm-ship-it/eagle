nca_overrides:
  nca: ASF
  country: RO
  base_yaml: aifmd_validation_rules.yaml
  base_yaml_version: '2.3'
  source_document:
    title: AIFMD Annex IV Reporting Requirements — Autoritatea de Supraveghere Financiară (ASF)
    version: '1.0'
    date: '2026-04-03'
    publisher: Autoritatea de Supraveghere Financiară (ASF)
    url: https://asfromania.ro
  transmission:
    portal: ASF reporting portal
    method: XML upload
  file_format:
    packaging: XML
    national_code_info: ASF-assigned national identification code
  changelog:
  - version: v1
    date: '2026-04-03'
    changes:
    - Initial ASF NCA override file — based on web research of latest documentation
  - version: v2
    date: '2026-04-10'
    changes:
    - Migrated to delta-only override schema (Option B)
    - Removed fields identical to base YAML — only NCA deltas retained
    - Updated base_yaml_version from '2.3' to '2.3'
    - 'Schema: NCA rules now carry only rule_id, base_rule_id, field_id + delta keys'
  nca_rules:
  - rule_id: NCA-ASF-RO-ReportingMemberState
    base_rule_id: AIFM-1
    field_id: '1'
    field_name: Reporting Member State
    overrides_esma: true
    status: active
    nca_source_doc: Autoritatea de Supraveghere Financiară (ASF) reporting requirements
    nca_doc_date: '2026-04-03'
    technical_guidance: For reports submitted to ASF Romania the value must always be RO. ASF implements AIFMD via Law no.
      74/2015, amended by Law 237/2022 and Government Emergency Ordinance 71/2024.
    validation_rules: ReportingMemberState = "RO"
    report_type: AIFM
