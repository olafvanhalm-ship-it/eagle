  esma_doc: ESMA/2013/1358 Rev.6
  allowed_values_ref: strategy_codes
  esma_error_codes:
  - CAF-036
  - CAF-037
  esma_error_details:
  - code: CAF-036
    message: The investment strategy code is not consistent with the predominant AIF type.
    control: 'Check that: - For predominant AIF type "HFND", the <HedgeFundStrategyTypeType> block is reported - For predominant
      AIF type "PEQF", the <PrivateEquityFundStrategyType> block is reported - For predominant AIF type "RESF", the <RealEstateFundStrategyType>
      block is reported - For predominant AIF type "FOFS", the <FundOfFundsStrategyType> block is reported - For predominant
      AIF type "OTHR", the <OtherFundStrategyType> block is reported'
    error_type: Content error
    severity: HIGH
  - code: CAF-037
    message: The investment strategy code is not allowed.
    control: 'Check that: - Different Investment strategies are not reported when the AIF predominant type is different from
      "NONE. In that case, only one investment strategy block (HedgeFundInvestmentStrategies, PrivateEquityFundInvestmentStrategies,
      RealEstateFundInvestmentStrategies, FundOfFundsInvestmentStrategies, OtherFundInvestmentStrategies) can be reported
      as the investment strategies are mutually exclusive.. - Within the <HedgeFundStrategyType> block, if the investment
      strategy code "MULT_HFND" is reported, at least 2 other different hedge fund investment strategy codes should be reported.
      - Within the <PrivateEquityFundStrategyType> block, if the investment strategy code "MULT_PEQF" is reported, at least
      2 other different Private equity fund investment strategy codes should be reported. - Within the <RealEstateFundStrategyType>
      block, if the investment strategy code "MULT_PEQF" is reported, at least 2 other different Private equity fund investment
      strategy codes should be reported.'
    error_type: Content error
    severity: HIGH
