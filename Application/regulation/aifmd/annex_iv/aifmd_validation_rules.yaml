################################################################################
# REPORTING OBLIGATION MATRIX
#
# Source: ESMA Guidelines on reporting obligations (AIFMD Art. 3, 24)
#
# This matrix defines ALL valid combinations of AIFM type × AIF characteristics
# and maps each to the correct:
#   - AIFM content type  (AIFM Field 5)    → drives AIFM field visibility
#   - AIF content type   (AIF Field 5)     → drives AIF field visibility
#   - AIFM reporting code (AIFM Field 16)  → identifies AIFM obligation tier
#   - AIF reporting code  (AIF Field 20)   → identifies AIF obligation tier
#   - Reporting frequency (AIF Field 8)    → Q1-Q4 / H1-H2 / Y1
#   - Reporting contents                   → which ESMA articles apply
#
# ── DERIVATION CONTRACT ─────────────────────────────────────────────────
# The backend resolves the correct obligation row by matching these inputs:
#
#   Input                  Source field / derivation
#   ─────────────────────  ──────────────────────────────────────────────
#   aifm_type              AIFM Field 5 (AIFMContentType): 1=Auth, 2=Reg, 3=NPPR
#   leveraged              Derived from AIF leverage data (commitment/gross > 100%)
#   eu_aif                 AIF Field 19 (EEA flag, derived from AIF Field 21 domicile)
#   marketed_in_union      AIF marketing passport / NCA registration context
#   above_500m_threshold   Derived from AIF NAV/AuM (Field 24 or AIF-level AuM)
#   unleveraged_non_listed Derived from AIF strategy type (PEQF) + leverage status
#
# Lookup: match the row where ALL conditions are satisfied → return the
# aif_content_type, aif_reporting_code, frequency, and reporting_contents.
#
# ── N/A ROWS ────────────────────────────────────────────────────────────
# Rows with aif_content_type: null represent AIFs that are NOT reportable
# to the NCA (e.g. non-EU AIFs not marketed in the Member State under NPPR).
# The system should flag these as "no AIF reporting obligation".
################################################################################

reporting_obligations:
  # ── Registered AIFM (Light) ────────────────────────────────────────────
  - aifm_content_type: 2
    aif_content_type: 3
    aifm_reporting_code: 1
    aifm_reporting_label: Registered AIFM (Light)
    aif_reporting_code: 1
    aif_reporting_label: EU AIF (of a Registered AIFM) (light)
    unleveraged_non_listed: null        # Yes or No
    leveraged: null                     # Yes or No
    eu_aif: true
    marketed_in_union: null             # Yes or No
    above_500m_threshold: false
    frequency: Y1
    reporting_contents: '3(3d)'

  # ── Authorised AIFM (opt-in) ──────────────────────────────────────────
  - aifm_content_type: 1
    aif_content_type: 4
    aifm_reporting_code: 2
    aifm_reporting_label: Authorised AIFM (opt-in)
    aif_reporting_code: 2
    aif_reporting_label: Leveraged EU AIF (of an opt-in AIFM)
    unleveraged_non_listed: false
    leveraged: true
    eu_aif: true
    marketed_in_union: null             # Yes or No
    above_500m_threshold: false
    frequency: Y1
    reporting_contents: '24(1)+(2)+(4)'

  - aifm_content_type: 1
    aif_content_type: 4
    aifm_reporting_code: 2
    aifm_reporting_label: Authorised AIFM (opt-in)
    aif_reporting_code: 3
    aif_reporting_label: Leveraged non EU AIF (of an opt-in AIFM) marketed in the Union
    unleveraged_non_listed: false
    leveraged: true
    eu_aif: false
    marketed_in_union: true
    above_500m_threshold: false
    frequency: Y1
    reporting_contents: '24(1)+(2)+(4)'

  - aifm_content_type: 1
    aif_content_type: 5
    aifm_reporting_code: 2
    aifm_reporting_label: Authorised AIFM (opt-in)
    aif_reporting_code: 4
    aif_reporting_label: Leveraged non EU AIF (of an opt-in AIFM), not marketed in the Union
    unleveraged_non_listed: false
    leveraged: true
    eu_aif: false
    marketed_in_union: false
    above_500m_threshold: false
    frequency: Y1
    reporting_contents: '24(1)+(4)'

  - aifm_content_type: 1
    aif_content_type: 2
    aifm_reporting_code: 2
