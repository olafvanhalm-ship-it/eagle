  repetition: '[0..1]'
  mandatory: false
  conditional: true
  section: Values of assets under management for all AIFs managed, calculated as set out in Article 2
  report_type: AIFM
  technical_guidance: ECB FX Rate used for converting base currency AuM amount into Euro AuM amount at the reporting date
    It is filled in with 4 decimal places. The field is mandatory when the AIFM base currency is filled in and different from
    EUR and forbidden otherwise.
  severity: MEDIUM
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  content_types:
  - 1
  - 2
  - 3
  - 4
  - 5
  no_reporting: true
  filing_types:
  - INIT
  - AMND
  - CANCEL
  system_field: false
  gate_field: '35'
  gate_condition: not_equals(35, EUR) and filled_in(35)
  gate_esma_text: M for AIFM base currency different from EUR; F otherwise
  dependency_lock:
    lock_field: '35'
    lock_condition: not_equals(35, EUR) and filled_in(35)
    reason: Only populated when AIFM base currency (AFM35) is different from EUR
  derivation_rule: null
- rule_id: AIFM-38
  field_id: '38'
  field_name: Base currency / EUR FX reference rate description for no ECB rates
  xsd_element: <FXEUROtherReferenceRateDescription>
  xml_type: StringRestricted30Type
  format: 30 (max)
  data_type: Z
  m_c_o_f: C
  repetition: '[0..1]'
  mandatory: false
  conditional: true
  section: Values of assets under management for all AIFs managed, calculated as set out in Article 2
  report_type: AIFM
  technical_guidance: Name of the source of the euro reference rates used according to the FX EUR conversion reference rate
    type reported - Free text for "OTH" type when the corresponding euro reference rate is not published by the ECB - Empty
    for "ECB" type when the corresponding euro reference rate is published by the ECB The field is mandatory for Base currency
