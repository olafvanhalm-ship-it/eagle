- rule_id: AIFM-16
  field_id: '16'
  field_name: AIFM reporting code
  xsd_element: <AIFMReportingCode>
  xml_type: AIFMReportingCodeType
  format: '1'
  data_type: N
  m_c_o_f: M
  repetition: '[1..1]'
  mandatory: true
  conditional: false
  section: AIFM - Header section
  report_type: AIFM
  technical_guidance: 'Code indicating whether the AIFM is : - 1 for "Registered AIFM" under Article 3 - 2 for "Authorised
    AIFM (opt-in)" under Article 7 - 3 for "Authorised AIFM with only unleveraged AIFs investing in non-listed companies and
    issuers in order to acquire control" under Article 7 - 4 for "Authorised AIFM with half yearly obligation" under Article
    7 - 5 for "Authorised AIFM with quarterly obligation " under Article 7 - 6 for "Non-EU AIFM under Private Placement Regime
    with annual obligation" under Artic'
  severity: CRITICAL
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  allowed_values_ref: aifm_reporting_codes
  esma_error_codes:
  - CAM-021
  - CAM-022
  - CAM-023
  - CAM-025
  esma_error_details:
  - code: CAM-021
    message: The authorised AIFM national code does not exist in the ESMA register
    control: The AIFM for which reporting code is comprised between 2 and 5 (included) should be valid in the ESMA register.
    error_type: Content error
    severity: HIGH
  - code: CAM-022
    message: The authorised AIFM is not referenced as an Head Office in the ESMA Register
    control: The AIFM for which reporting code is comprised between 2 and 5 (included) should not be referenced in the ESMA
      register with a Branch type.
    error_type: Content error
    severity: HIGH
  - code: CAM-023
    message: The authorised AIFM is no more active in the ESMA Register
    control: The AIFM for which reporting code is comprised between 2 and 5 (included) should be referenced in the ESMA Register
      with an AIFM authorisation date less or equal to the reporting period start date and with an authorisation end date
      (when filled in) greater or equal to the reporting period end date.
    error_type: Content error
    severity: HIGH
  - code: CAM-025
    message: The reporting code of the AIFMs and AIFs should be consistent
    control: 'An error is generated when the AIFM reporting code is not consistent with the AIF reporting code: - WHEN NOT(AIFReportingCode=1
      AND AIFMReportingCode=1) - OR NOT (2=<AIFReportingCode=<34 AND 2=<AIFMReportingCode<=5) - OR NOT (AIFReportingCode>=35
      AND 6<=AIFMReportingCode<=9)'
    error_type: null
    severity: INFO
  content_types:
  - 1
  - 2
  - 3
  - 4
  - 5
  no_reporting: false
