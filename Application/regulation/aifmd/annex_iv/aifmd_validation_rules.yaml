  esma_error_details:
  - code: CAM-020
    message: The reference rate description is not consistent with the reference rate type.
    control: The field is mandatory for Base currency / EUR FX reference rate type equal to "OTH" and forbidden otherwise
    error_type: Content error
    severity: HIGH
  content_types:
  - 1
  - 2
  - 3
  - 4
  - 5
  no_reporting: true
  filing_types:
  - INIT
  - AMND
  - CANCEL
  system_field: false
  gate_field: '36'
  gate_condition: equals(36, OTH)
  gate_esma_text: M for Base currency / EUR FX reference rate type equal to OTH; F otherwise
  dependency_lock:
    lock_field: '36'
    lock_condition: equals(36, OTH)
    reason: Only populated when FX reference rate type (AFM36) is OTH
  derivation_rule: null
