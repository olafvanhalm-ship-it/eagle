  field_name: Counterparty LEI code of the 10 principal exposures
  xsd_element: <EntityIdentificationLEI>
  xml_type: LEICodeType
  format: 20 ([0-9a-zA-Z]{18}[0-9]{2})
  data_type: A
  m_c_o_f: C
  repetition: '[0..10]'
  mandatory: false
  conditional: true
  section: Geographical focus
  report_type: AIF
  technical_guidance: 'Legal Entity Identifer (LEI) (ISO 17442 standard) of the Entity or if not available the Interim Entity
    Identifier (IEI): -Characters 1-4: A four character prefix allocated uniquely to each LOU. -Characters 5-6: Two reserved
    characters set to zero. -Characters 7-18: Entity - specific part of the code generated and assigned by LOUs according
    to transparent, sound and robust allocation policies. -Characters 19-20: Two check digits The LEI code cannot be filled
