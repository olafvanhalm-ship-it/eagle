- rule_id: AIFM-CAM-016
  field_id: CROSS-FIELD
  field_name: AuM base currency vs AuM Euro consistency
  xsd_element: <TotalAuMAmountInEuro> / <TotalAuMAmountBaseCurrency>
  xml_type: xs:decimal
  format: cross-field
  data_type: N
  m_c_o_f: M
  repetition: '[1..1]'
  mandatory: true
  conditional: true
  section: AIFM - Assets Under Management
  report_type: AIFM
  technical_guidance: The total AuM amount expressed in base currency should be equal to the total AuM amount in Euro * Base
    currency / EUR FX rate.
  severity: LOW
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  esma_error_codes:
  - CAM-016
  esma_error_details:
  - code: CAM-016
    message: The total AuM amount in base currency is not consistent with the  total AuM amount in Euro.
    control: The total AuM amount expressed in base currency should be equal to the total AuM amount in Euro * Base currency
      / EUR FX rate.
    error_type: Notification
    severity: LOW
  condition_note: 'Cross-field check: only applicable when both AuM base currency and AuM Euro fields are present.'
  content_types:
  - 1
  - 2
  - 3
  - 4
  - 5
  no_reporting: true
  filing_types:
  - INIT
  - AMND
  - CANCEL
  system_field: false
  gate_field: null
  gate_condition: null
  dependency_lock: null
  derivation_rule: null
