  xsd_element: <AIFContentType>
  xml_type: AIFContentTypeType
  format: '1'
  data_type: N
  m_c_o_f: M
  repetition: '[1..1]'
  mandatory: true
  conditional: false
  section: AIF - Header Section
  report_type: AIF
  technical_guidance: 'Code indicating the contents of the AIF reporting. The AIF content types admitted are: - 1 for "24(1)
    reporting obligation" - 2 for "24(1) + 24(2) reporting obligation" - 3 for "3(3) (d) reporting obligation" - 4 for "24(1)
    + 24(2) + 24(4) reporting obligation" - 5 for "24(1) + 24(4) reporting obligation" When the AIF no reporting flag is false:
    The block "AIFPrincipalInfo" will be filled in for all AIF content types. The block "AIFIndividualInfo" will be filled
    in for AIF content type'
  severity: CRITICAL
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  allowed_values_ref: aif_content_types
  esma_error_codes:
