    that is also reported under field 96. The gross value is expressed in base currency filled in without decimal places.
    An error is generated when it is not the case. The field is forbidden for sub-asset type different from "DER_FEX_INVT",
    "DER_FEX_HEDG" and "DER_IRD_INTR".
