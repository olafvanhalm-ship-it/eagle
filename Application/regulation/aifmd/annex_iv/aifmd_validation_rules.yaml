    - 'Purpose: single source of truth for field masking (Option A architecture)'
  - version: '2.3'
    date: '2026-04-10'
    changes:
    - 'Added system_field (boolean) to all fields: true for auto-populated metadata fields (19 fields)'
    - 'Added gate_field + gate_condition: ESMA-sourced conditional visibility from M/C/O column'
    - Added gate_esma_text with original ESMA conditional text for traceability
    - 'Added dependency_lock to 6 fields: UI editability constraints (AFM20, AIF19, AFM34-38)'
    - 'Added derivation_rule to 2 fields: EEA flag auto-derivation (AFM20←AFM17, AIF19←AIF21)'
