  xsd_element: <RateJanuary>
  xml_type: SignedRate15p2Type
  format: 19 (+/- 15.2) Negative values are allowed totalDigits 17 fractionDigits 2 minExclusive -1000000000000000 maxExclusive
    1000000000000000
  data_type: N
  m_c_o_f: O
  repetition: '[0..1]'
  mandatory: false
  conditional: false
  section: Historical risk profile
  report_type: AIF
  technical_guidance: Gross investment returns or IRR of the AIF for January (in %, gross of management and performance fees).
    Rate expressed as a percentage. For each calendar year, the January rate should be reported only once. For Q1 reporting
    period, only January, February and March rates may be reported. For Q2 reporting period, only April, May and June rates
    may be reported. For Q3 reporting period, only July, August and September rates may be reported. For Q4 reporting period,
    only October, November and Decemb
  severity: HIGH
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  esma_error_codes:
  - CAF-134
  esma_error_details:
  - code: CAF-134
    message: The month rate is not consistent with the reporting period.
    control: For each calendar year, the January rate should be reported only once. For Q1 reporting period, only January,
      February and March rates may be reported. For Q2 reporting period, only April, May and June rates may be reported. For
      Q3 reporting period, only July, August and September rates may be reported. For Q4 reporting period, only October, November
