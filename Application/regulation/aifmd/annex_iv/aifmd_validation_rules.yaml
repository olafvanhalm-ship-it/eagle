    - 'CORRECTED: removed phantom gates on Q283-Q292, Q294-Q297 (plain M/O per ESMA)'
    - 'CORRECTED: Q204-Q207 are independent O flags per ESMA, NOT gated on Q203'
    - 'CORRECTED: Q45-Q47 prime broker fields are plain O per ESMA, no gate'
