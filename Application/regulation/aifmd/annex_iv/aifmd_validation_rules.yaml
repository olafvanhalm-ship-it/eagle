- rule_id: AIF-299
  field_id: '299'
  field_name: LEI code of the largest source of borrowed cash or securities
  xsd_element: <EntityIdentificationLEI>
  xml_type: LEICodeType
  format: 20 ([0-9a-zA-Z]{18}[0-9]{2})
  data_type: A
  m_c_o_f: C
  repetition: '[0..5]'
  mandatory: false
  conditional: true
  section: Five largest sources of borrowed cash or securities (short positions)
  report_type: AIF
  technical_guidance: 'LEI code (ISO 17442 standard) or if not available the interim entity identifier: Characters 1-4: A
    four character prefix allocated uniquely to each LOU. -Characters 5-6: Two reserved characters set to zero. -Characters
    7-18: Entity - specific part of the code generated and assigned by LOUs according to transparent, sound and robust allocation
    policies. -Characters 19-20: Two check digits The field is forbidden for name of the counterparty not filled in and optional
    otherwise.'
  severity: HIGH
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  esma_error_codes:
  - CAF-142
  - CAF-143
  esma_error_details:
  - code: CAF-142
    message: The check digits of the LEI code are not correct.
    control: Verify the correctness of the LEI code format rules following the calculation methodology of the 2-last check
      digits under validation rules using ISO 7064, (“ISO/IEC 7064:2003 Information technology -- Security techniques -- Check
      character systems”).
    error_type: Content error
    severity: HIGH
  - code: CAF-143
    message: The LEI code is not consistent with the borrowing source flag.
    control: Within each ranking, Forbidden  for Borrowing source flag equal to “false”
    error_type: Content error
    severity: HIGH
  content_types: *id006
  no_reporting: true
  filing_types:
  - INIT
  - AMND
  - CANCEL
  system_field: false
  gate_field: '297'
  gate_condition: not_equals(297, false)
