  report_type: AIF
  technical_guidance: The investment strategy that is disclosed to investors in the fund rules or other offering documents.
    The investment strategy types admitted are listed in Annex II - Table 3. Investment strategies are mutually exclusive,
    except when AIFMs select 'None'. Within the <HedgeFundStrategyType> block, if the investment strategy code "MULT_HFND"
    is reported, at least 2 other different hedge fund investment strategy codes should be reported. Within the <PrivateEquityFundStrategyType>
    block, if the invest
  severity: HIGH
