################################################################################
# AIFMD ANNEX IV VALIDATION RULES — SINGLE SOURCE OF TRUTH
#
# This file is the ESMA-level base definition for all 350 AIFMD Annex IV fields
# (43 AIFM + 307 AIF). It is the authoritative source for field metadata
# including data types, content types, gate conditions, and validation rules.
#
# ── NCA OVERRIDE ARCHITECTURE (Option B — delta-only) ────────────────────────
#
# NCA-specific deviations are stored in separate files under:
#   nca_overrides/aifmd_nca_overrides_{cc}_{nca}.yaml
#
# Each NCA file uses a DELTA-ONLY schema:
#   - Override rules carry ONLY the tags that DIFFER from this base YAML
#   - All other attributes are INHERITED from the base rule at load time
#   - NCA-specific rules (no base equivalent) carry full definitions
#
# Required keys per NCA override rule:
#   rule_id        — unique NCA rule identifier (e.g. NCA-AFM-AIFMNationalCode)
#   base_rule_id   — links to a rule in this file (e.g. AIFM-18)
#   field_id       — the ESMA field number being overridden
#
# Loader contract (Python):
#   merged_rule = base_rule | nca_override
#   (NCA keys overwrite base keys; base keys absent from NCA are inherited)
#
# When adding NEW attributes to this base YAML:
#   1. No changes needed in NCA files — new tags are inherited automatically
#   2. Only update an NCA file if the NCA has a DIFFERENT value for the new tag
#   3. Update base_yaml_version in this file and verify NCA files reference it
#
# ── FIELD ATTRIBUTE REFERENCE ────────────────────────────────────────────────
#
# Per-field attributes (v2.3):
#   rule_id, field_id, field_name, xsd_element, xml_type, format, data_type,
#   m_c_o_f, repetition, mandatory, conditional, section, report_type,
#   technical_guidance, severity, rule_source, esma_doc,
#   allowed_values_ref, validation_type, esma_error_codes,
#   content_types       (v2.2) — ESMA content types [1-5] per field
#   no_reporting        (v2.2) — hidden when no-reporting flag is set
#   filing_types        (v2.2) — INIT/AMND/CANCEL visibility
#   system_field        (v2.3) — true for auto-populated metadata fields
#   gate_field          (v2.3) — field ID controlling conditional visibility
#   gate_condition      (v2.3) — condition expression, e.g. equals(field, value)
#   gate_esma_text      (v2.3) — original ESMA M/C/O conditional text
#   dependency_lock     (v2.3) — UI editability constraint expression
#   derivation_rule     (v2.3) — auto-computation rule expression
################################################################################

