  esma_error_details:
  - code: CAF-002
    message: The reported AIF information does not correspond to the AIF content type.
    control: For AIF content type equal to "4" or "5" (24(4) contents), validate that the AIFLeverageArticle24.4 block is
      reported. When the AIF no reporting flag is false, validate that the AIFPrincipalInfo block is reported. When the AIF
      no reporting flag is false and AIF content type equal to "2", "4" or "5" (24(2) contents), validate that the AIFIndividualInfo
      block is reported.
    error_type: Warning
    severity: MEDIUM
