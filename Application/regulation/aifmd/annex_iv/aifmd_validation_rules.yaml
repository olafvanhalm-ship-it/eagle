    period for which the creditor is contractually committed to provide such financing. The total should equal 100%. An error
    is generated when the sum of the percentages is not equal to a value between 99 and 101%.
  severity: MEDIUM
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  esma_error_codes:
  - CAF-133
  - CAF-204
  esma_error_details:
  - code: CAF-133
    message: The sum of the percentages should be equal to 100%.
    control: The sum of the percentages of financing amount should be 100%.
    error_type: Warning
    severity: MEDIUM
  - code: CAF-204
    message: The sum of the percentages should be equal to a value between 99 and 101%
    control: An error is generated IF Sum(TotalFinancingInDays0to1Rate, TotalFinancingInDays2to7Rate, TotalFinancingInDays8to30Rate,
      TotalFinancingInDays31to90Rate, TotalFinancingInDays91to180Rate,  TotalFinancingInDays181to365Rate, TotalFinancingInDays365MoreRate)
      < 99% OR Sum(TotalFinancingInDays0to1Rate, TotalFinancingInDays2to7Rate, TotalFinancingInDays8to30Rate, TotalFinancingInDays31to90Rate,
      TotalFinancingInDays91to180Rate, TotalFinancingInDays181to365Rate, TotalFinancingInDays365MoreRate) >101%
