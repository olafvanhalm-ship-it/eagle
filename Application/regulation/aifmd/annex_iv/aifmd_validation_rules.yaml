  xsd_element: <ReportingPeriodStartDate>
  xml_type: xs:date
  format: 4(n)-2(n)-2(n)
  data_type: D
  m_c_o_f: M
  repetition: '[1..1]'
  mandatory: true
  conditional: false
  section: AIF - Header Section
  report_type: AIF
  technical_guidance: The start date of the reporting period should begin on the first calendar day of January, April, July
    or October. yyyy-mm-dd (ISO 8601 Date Format)
  severity: CRITICAL
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  esma_error_codes:
  - CAF-003
  esma_error_details:
  - code: CAF-003
    message: The reporting period start date is not allowed.
    control: 'For quarterly reporting (Q1, Q2, Q3, Q4) Validate that the reporting start date is the beginning of a quarter.
      Allowed values are YYYY-10-01, YYYY-07-01, YYYY-04-01, YYYY-01-01 For half-yearly reporting (H1, H2) Validate that the
      reporting start date is the beginning of a half-yearly period (H1, H2) Allowed values are YYYY-07-01, YYYY-01-01 For
      yearly reporting (Y1) Validate that the reporting start date is the beginning of the calendar year (Y1) Allowed value
      is YYYY-01-01

      Validate that the reporting period start date has the same year that the reporting year.'
    error_type: Content error
    severity: HIGH
  content_types: *id002
  no_reporting: false
