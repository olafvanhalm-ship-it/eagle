  field_name: Base currency / EUR FX reference rate type
  xsd_element: <FXEURReferenceRateType>
  xml_type: FXEURReferenceRateTypeType
  format: '3'
  data_type: A
  m_c_o_f: C
  repetition: '[0..1]'
  mandatory: false
  conditional: true
  section: Values of assets under management for all AIFs managed, calculated as set out in Article 2
  report_type: AIFM
  technical_guidance: '- "ECB" when the base currency is one of the currencies for which the exchange rates are euro reference
    rates published by the ECB - "OTH" in other cases The field is mandatory when the AIFM base currency is filled in and
    different from EUR and forbidden otherwise. The ECB reference rates are published daily when TARGET system is open.'
  severity: MEDIUM
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
  allowed_values_ref: fx_rate_source
  content_types:
  - 1
  - 2
  - 3
  - 4
  - 5
  no_reporting: true
  filing_types:
  - INIT
  - AMND
  - CANCEL
  system_field: false
  gate_field: '35'
  gate_condition: not_equals(35, EUR) and filled_in(35)
  gate_esma_text: M for AIFM base currency different from EUR; F otherwise
  dependency_lock:
    lock_field: '35'
    lock_condition: not_equals(35, EUR) and filled_in(35)
    reason: Only populated when AIFM base currency (AFM35) is different from EUR
  derivation_rule: null
