  esma_error_details:
  - code: CAF-004
    message: The reporting period end date is not allowed
    control: 'Validate that the reporting end date is less or equal to the end of the last reporting period according to the
      reporting year and reporting period type. For quarterly reporting (Q1, Q2, Q3, Q4) and reporting year YYYY: Validate
      that the reporting end date is less or equal to YYYY-03-31 for Q1, YYYY-06-30 for Q2, YYYY-09-30 for Q3, YYYY-12-31
      for Q4. For half-yearly reporting (H1, H2) and reporting year YYYY: Validate that the reporting end date is less or
      equal to YYYY-06-30 for H1,  YYYY-12-31 for H2. For yearly reporting (Y1) and reporting year YYYY: Validate that the
      reporting end date is less or equal to YYYY-12-31 for Y1.

      Validate that the reporting end date is greater than the reporting start date and has the same year.'
    error_type: Content error
    severity: HIGH
