  report_type: AIFM
  technical_guidance: 'Code indicating the quarter during which the frequency and/or contents reporting obligation on the
    AIFM changes. The codes for the reporting obligation change quarter are: - Q1: for 1st quarter of the calendar year -
    Q2: for 2nd quarter of the calendar year - Q3: for 3rd quarter of the calendar year - Q4: for 4th quarter of the calendar
