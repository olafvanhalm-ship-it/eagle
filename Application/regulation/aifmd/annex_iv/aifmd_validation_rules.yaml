  xml_type: AIFMContentTypeType
  format: '1'
  data_type: N
  m_c_o_f: M
  repetition: '[1..1]'
  mandatory: true
  conditional: false
  section: AIFM - Header section
  report_type: AIFM
  technical_guidance: 'Code indicating the contents of the AIFM reporting (manager category). Admitted codes: 1 = Authorised/Licensed
    Manager (Art. 24(1) reporting contents for all AIFs managed); 2 = Registered/Light Manager (Art. 3(3)(d) reporting contents
    for all AIFs managed); 3 = NPPR/Non-EU Manager (Art. 24(1) reporting contents for all AIFs marketed in the Member State,
    typically Article 42 NPPR filers).'
  severity: CRITICAL
  rule_source: ESMA AIFMD Annex IV -- Technical Guidance Rev.6
  esma_doc: ESMA/2013/1358 Rev.6
