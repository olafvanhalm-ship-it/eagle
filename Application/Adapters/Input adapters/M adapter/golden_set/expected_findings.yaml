schema_version: 2
reviewed_by: null
reviewed_at: '2026-04-04'
next_review: null
rationale:
  dummy_nca_code: 'The M example templates use fictitious national codes (e.g. XXX123, 12345678, BAB123) that do not comply
    with NCA-specific format rules. This is expected for test data and does not indicate a defect in the adapter or validator.

    '
  eur_base_currency: 'AIF-50 (FXEURRate) and AIF-51 (FXEURReferenceRateType) are conditional elements that only apply when
    the AIF base currency is not EUR. The example templates use EUR as base currency, so these elements are correctly absent.

    '
  split_empty_nca_code: 'The split template example deliberately uses empty national code fields to test the adapter''s handling
    of missing NCA data. The file naming validator flags the empty code in the filename.

    '
  split_sparse_full: 'The split template is a FULL (CT=3 authorised) template used to test Excel+CSV position splitting. It
    contains only basic header data and positions, so many Art 24(1) and Art 24(2) mandatory and conditional fields are absent.
    These findings are expected for this sparse test template; real authorised fund submissions would populate all sections.

    '
  multi_nca_lu_format: 'The LU/CSSF AIFM national code A00007891 in the multi-NCA example template does not match the CSSF-required
    old AIFM format. This is expected for the example data; real submissions would use a CSSF-compliant code.

    '
